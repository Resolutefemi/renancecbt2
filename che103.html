        { "id": 12, "topic": "Lab Apparatus", "question": "Which apparatus and procedure is used to determine the melting point of a crystalline substance?", "options": ["A volumetric flask filled with a saturated standard solution", "A Woulff's bottle connected to a vacuum pump", "A melting-point capillary tube attached to a thermometer, immersed in a slowly heated oil or water bath", "A Kipp's apparatus with solid and liquid acid chambers"], "answer": "A melting-point capillary tube attached to a thermometer, immersed in a slowly heated oil or water bath", "explanation": "Melting point determination uses a thin capillary tube containing the solid attached to a thermometer in a heating bath. The sharp MP indicates purity." },
        { "id": 13, "topic": "Lab Apparatus", "question": "A combustion tube for organic analysis must be made of what material?", "options": ["Soda-lime glass — transparent and thin-walled", "Polypropylene plastic for broad chemical resistance", "Pyrex (borosilicate) or hard glass — to withstand very high combustion temperatures", "Porcelain — same material as crucibles"], "answer": "Pyrex (borosilicate) or hard glass — to withstand very high combustion temperatures", "explanation": "Pyrex/borosilicate glass has very low thermal expansion and can withstand the high temperatures used in organic combustion analysis (600–900°C)." },
        { "id": 14, "topic": "Lab Apparatus", "question": "Crucible tongs are used in the chemistry laboratory for which specific operation?", "options": ["Handling hot crucibles, evaporating dishes, and other hot porcelain items safely", "Tightening the stopcock of a burette or separating funnel", "Clamping a Liebig condenser to the distillation flask", "Crushing large solid samples before analysis"], "answer": "Handling hot crucibles, evaporating dishes, and other hot porcelain items safely", "explanation": "Crucible tongs are made of metal and designed to grip the rim of hot crucibles and porcelain ware without burning hands or risking dropping." },
        { "id": 15, "topic": "Lab Apparatus", "question": "What is the function of a delivery tube in a gas preparation experiment?", "options": ["To store the prepared gas at elevated pressure", "To absorb moisture and impurities from the prepared gas", "To convey (lead) the prepared gas from the generator to the collection vessel or test reagent", "To measure the rate of gas production in cm³ per minute"], "answer": "To convey (lead) the prepared gas from the generator to the collection vessel or test reagent", "explanation": "The delivery tube connects the gas generator (flask) to the collection vessel or testing solution, guiding the gas flow through the system." },
        { "id": 16, "topic": "Lab Apparatus", "question": "What is the purpose of a pneumatic trough in gas collection?", "options": ["To dry the gas using a column of drying agent", "To absorb acidic impurities from the gas stream", "To hold water so that gas can be collected by displacement in an inverted jar", "To measure the volume of gas produced at standard conditions"], "answer": "To hold water so that gas can be collected by displacement in an inverted jar", "explanation": "The pneumatic trough is filled with water. Gas bubbles up from the delivery tube into the inverted, water-filled gas jar, displacing the water." },
        { "id": 17, "topic": "Lab Apparatus", "question": "The amber (dark brown) reagent bottle is designed for what specific purpose?", "options": ["Storing dry solids that readily absorb moisture", "Storing liquid reagents that decompose on exposure to sunlight (e.g. H₂O₂, AgNO₃, iodine solutions)", "Storing concentrated acids that attack ordinary glass", "Collecting and storing gases produced during reactions"], "answer": "Storing liquid reagents that decompose on exposure to sunlight (e.g. H₂O₂, AgNO₃, iodine solutions)", "explanation": "Amber glass blocks UV and visible light that would catalyse the decomposition of light-sensitive reagents like H₂O₂, AgNO₃, and iodine solutions." },
        { "id": 18, "topic": "Lab Apparatus", "question": "A desiccator is used to store substances after drying. What is placed in the base to absorb moisture?", "options": ["Concentrated HCl to absorb basic vapours", "Silica gel, CaCl₂, or P₂O₅ — desiccant that absorbs water vapour from the enclosed space", "Activated charcoal to remove organic vapour impurities", "Distilled water to maintain a constant humidity inside"], "answer": "Silica gel, CaCl₂, or P₂O₅ — desiccant that absorbs water vapour from the enclosed space", "explanation": "A desiccator stores hygroscopic substances in a dry environment. Common desiccants: silica gel (mild), CaCl₂, anhydrous CaSO₄, and P₂O₅ (very strong)." },
        { "id": 19, "topic": "Lab Apparatus", "question": "The volumetric (standard) flask has a single graduation mark on its narrow neck. What is its specific purpose?", "options": ["Heating liquids to boiling point and collecting distillate", "Collecting filtrate during suction filtration", "Preparing a standard solution of a precise, definite volume (e.g. exactly 250.00 cm³)", "Distilling immiscible liquid mixtures at varying pressures"], "answer": "Preparing a standard solution of a precise, definite volume (e.g. exactly 250.00 cm³)", "explanation": "The volumetric flask's single calibration mark ensures exactly the stated volume when the meniscus is at the mark. Used to prepare standard solutions." },
        { "id": 20, "topic": "Lab Apparatus", "question": "A Buchner flask (side-arm flask) side arm is connected to what during filtration under reduced pressure?", "options": ["A Liebig condenser for cooling vapour", "A vacuum pump — creating suction that draws the filtrate through the Buchner funnel", "A burette for standardized delivery of acid", "A thermometer to monitor the reaction temperature"], "answer": "A vacuum pump — creating suction that draws the filtrate through the Buchner funnel", "explanation": "The side arm of the Buchner flask connects via rubber tubing to a vacuum pump. The reduced pressure inside pulls filtrate rapidly through the filter cake." },
        { "id": 21, "topic": "Lab Apparatus", "question": "The separating funnel has a glass stopcock and is pear-shaped. What is it primarily used for?", "options": ["Separating miscible liquids with closely related boiling points", "Separating immiscible liquids (e.g. kerosene and water) that form two distinct density-based layers", "Filtering fine solid particles out of a liquid suspension", "Separating dissolved gases from a liquid mixture"], "answer": "Separating immiscible liquids (e.g. kerosene and water) that form two distinct density-based layers", "explanation": "Immiscible liquids separate into layers by density in the separating funnel. The stopcock allows the lower (denser) layer to be drained first." },
        { "id": 22, "topic": "Lab Apparatus", "question": "Why must a pipette filler be used instead of sucking a pipette with the mouth?", "options": ["Because mouth suction gives less accurate volume measurements", "Safety — the liquid may be toxic, corrosive, or harmful; the rubber filler prevents any contact with the mouth", "Because the rubber filler maintains the liquid at constant temperature", "Because mouth suction introduces CO₂ from breath, contaminating the solution"], "answer": "Safety — the liquid may be toxic, corrosive, or harmful; the rubber filler prevents any contact with the mouth", "explanation": "Mouth pipetting is strictly forbidden in modern laboratories. The rubber bulb filler keeps hazardous liquids away from the mouth entirely." },
        { "id": 23, "topic": "Lab Apparatus", "question": "A bulb (transfer) pipette is used during titrations. What is its primary function?", "options": ["Dispensing indicator liquid dropwise during endpoint detection", "Accurately transferring a fixed, definite volume (e.g. 25.00 cm³) of solution from a stock solution to the conical flask", "Measuring approximate volumes in a large beaker", "Filling the burette from the reagent bottle safely"], "answer": "Accurately transferring a fixed, definite volume (e.g. 25.00 cm³) of solution from a stock solution to the conical flask", "explanation": "A bulb (one-mark) pipette delivers exactly one fixed volume with the highest accuracy (±0.04 cm³), far superior to measuring cylinders or beakers." },
        { "id": 24, "topic": "Lab Apparatus", "question": "The Liebig condenser's function in distillation is to:", "options": ["Increase the boiling point of the liquid being distilled", "Cool and condense vapour from the flask into liquid distillate using cold water flowing through the outer jacket", "Separate gases by molecular weight in a density gradient", "Precisely measure the temperature of the boiling liquid"], "answer": "Cool and condense vapour from the flask into liquid distillate using cold water flowing through the outer jacket", "explanation": "The Liebig condenser uses flowing cold water in the outer jacket to cool and condense vapour passing through the inner tube, converting it back to liquid." },
        { "id": 25, "topic": "Lab Apparatus", "question": "A Buchner funnel is made of perforated porcelain. When connected to a vacuum pump, what process does it enable?", "options": ["Simple gravity filtration using folded filter paper", "Fractional distillation of close-boiling liquid mixtures", "Filtration under suction (reduced pressure), which is faster and leaves the solid drier", "Intermittent supply of liquid acid reagents to a reaction mixture"], "answer": "Filtration under suction (reduced pressure), which is faster and leaves the solid drier", "explanation": "Vacuum filtration through a Buchner funnel is 10× faster than gravity filtration and produces much drier filter cakes — essential for collecting crystalline products." },
        { "id": 26, "topic": "Lab Apparatus", "question": "To accurately measure and transfer exactly 25.0 cm³ of a liquid for a titration, which apparatus should be used?", "options": ["A 100 mL measuring cylinder read to the nearest 0.5 mL", "A 250 mL conical flask filled to a graduation mark", "A 25 cm³ bulb (transfer) pipette calibrated to deliver precisely 25.00 cm³", "A 50 mL beaker with printed graduation marks"], "answer": "A 25 cm³ bulb (transfer) pipette calibrated to deliver precisely 25.00 cm³", "explanation": "A bulb (one-mark) pipette delivers exactly one fixed volume with the highest accuracy (±0.04 cm³), far superior to measuring cylinders or beakers." },
        { "id": 27, "topic": "Lab Apparatus", "question": "Why is a round-bottomed flask (RBF) preferred over a flat-bottomed flask for distillation and reflux?", "options": ["Because it is cheaper and more readily available", "Because it holds more liquid than a flat-bottomed flask of the same size", "Because the curved surface distributes heat evenly and prevents the glass from cracking under thermal stress", "Because it can be stoppered more easily with a rubber bung"], "answer": "Because the curved surface distributes heat evenly and prevents the glass from cracking under thermal stress", "explanation": "Curved glassware distributes thermal stress evenly. Flat-bottomed flasks concentrate stress at corners and can crack when heated strongly." },
        { "id": 28, "topic": "Lab Apparatus", "question": "A thistle funnel has a bulb top and long, narrow stem. What is it used for in gas preparation?", "options": ["Filtering solid impurities from a liquid solvent", "Adding a liquid reagent (acid) to a solid inside a flask, allowing controlled introduction while sealing the apparatus", "Separating two immiscible liquid layers in an extraction", "Dispensing a measured volume of indicator to a conical flask"], "answer": "Adding a liquid reagent (acid) to a solid inside a flask, allowing controlled introduction while sealing the apparatus", "explanation": "The thistle funnel allows addition of acid dropwise to the solid reactant while keeping the gas-generation apparatus sealed, controlling gas production rate." },
        { "id": 29, "topic": "Lab Apparatus", "question": "In a titration set-up, why is a white tile placed beneath the conical flask?", "options": ["To prevent the flask from sliding during swirling", "To keep the flask and its contents warm", "To provide a sharp, bright white background making the colour change at the endpoint easier to detect", "To reflect heat from below and maintain a steady reaction temperature"], "answer": "To provide a sharp, bright white background making the colour change at the endpoint easier to detect", "explanation": "The white background maximises contrast at the titration endpoint, helping the analyst detect the precise moment of permanent colour change." },
        { "id": 30, "topic": "Lab Apparatus", "question": "Which five pieces of apparatus are all used for measuring or delivering volumes of liquid?", "options": ["Pipette, burette, measuring cylinder, volumetric flask, and graduated conical flask", "Crucible, watch glass, petri dish, evaporating dish, and desiccator", "Bunsen burner, retort stand, tripod, gauze, and crucible tongs", "Separating funnel, thistle funnel, Buchner funnel, filter funnel, and dropper"], "answer": "Pipette, burette, measuring cylinder, volumetric flask, and graduated conical flask", "explanation": "All volumetric glassware (pipette, burette, measuring cylinder, volumetric flask) measure or deliver liquid volumes. Each has a specific accuracy level for different applications." },

        /* ══ SECTION 2: SEPARATION TECHNIQUES ══ */
        { "id": 31, "topic": "Separation Techniques", "question": "Simple distillation separates components based on which physical property?", "options": ["Difference in density of the two liquids", "Difference in volatility (boiling point) — the more volatile component evaporates and is condensed first", "Difference in solubility in a common third solvent", "Difference in magnetic susceptibility of the components"], "answer": "Difference in volatility (boiling point) — the more volatile component evaporates and is condensed first", "explanation": "Simple distillation works best when boiling points differ by more than 25°C. The lower boiling point component distils over first." },
        { "id": 32, "topic": "Separation Techniques", "question": "Fractional distillation of ethanol (b.p. 78°C) and water (b.p. 100°C) requires which additional apparatus compared to simple distillation?", "options": ["A separating funnel to drain off the denser layer", "A fractionating column packed with glass beads — providing multiple condensation/re-evaporation cycles for better separation", "A Buchner funnel and vacuum pump for suction filtration", "A chromatographic tank with solvent and silica stationary phase"], "answer": "A fractionating column packed with glass beads — providing multiple condensation/re-evaporation cycles for better separation", "explanation": "The fractionating column provides many theoretical plates where vapour repeatedly condenses and re-evaporates, giving better separation of close-boiling components." },
        { "id": 33, "topic": "Separation Techniques", "question": "Crystallisation as a separation technique exploits what physical property of the dissolved substance?", "options": ["Difference in specific heat capacity between solute and solvent", "Difference in boiling points at standard atmospheric pressure", "Difference in solubility at different temperatures — cooling a hot saturated solution causes less-soluble material to crystallise out", "Difference in bubble-point pressure at reduced atmospheric pressure"], "answer": "Difference in solubility at different temperatures — cooling a hot saturated solution causes less-soluble material to crystallise out", "explanation": "Most solids are more soluble at high temperatures. Rapid cooling of a saturated solution produces crystals of the pure substance." },
        { "id": 34, "topic": "Separation Techniques", "question": "Which method is used to separate a mixture of immiscible liquids such as kerosene and water?", "options": ["Separating funnel — the two immiscible liquids form separate density-based layers", "Evaporation — the water evaporates, leaving the kerosene", "Filtration — using filter paper to trap the kerosene", "Simple distillation — the liquids are boiled and condensed separately"], "answer": "Separating funnel — the two immiscible liquids form separate density-based layers", "explanation": "Kerosene (less dense, upper layer) and water (denser, lower layer) separate by density. The stopcock allows each layer to be drained independently." },
        { "id": 35, "topic": "Separation Techniques", "question": "How are a mixture of iron filings and copper filings best separated?", "options": ["Magnetic separation — iron is ferromagnetic and attracted by a magnet; copper is non-magnetic", "Crystallisation from a common solvent at low temperature", "Evaporation from a mixed dissolved metallic solution", "Distillation from a mixed metallic melt"], "answer": "Magnetic separation — iron is ferromagnetic and attracted by a magnet; copper is non-magnetic", "explanation": "Iron's ferromagnetism makes it respond strongly to magnetic fields. Copper, being diamagnetic, is not attracted by a magnet." },
        { "id": 36, "topic": "Separation Techniques", "question": "Which separation method is used to separate several solutes that all dissolve in the same solvent?", "options": ["Evaporation to dryness — removes only the solvent", "Gravity filtration — separates only insoluble solids", "Chromatography — different solutes migrate at different rates through the stationary phase", "Sublimation — applicable only when one component sublimes"], "answer": "Chromatography — different solutes migrate at different rates through the stationary phase", "explanation": "Chromatography separates solutes based on their differential affinity for the stationary phase vs. the mobile phase, giving different migration distances (Rf values)." },
        { "id": 37, "topic": "Separation Techniques", "question": "The process in which heavier suspended impurities settle at the bottom of a liquid under gravity is called:", "options": ["Decantation", "Sedimentation", "Filtration", "Evaporation"], "answer": "Sedimentation", "explanation": "Sedimentation is the gravitational settling of dense particles. Decantation is the subsequent pouring off of the clear liquid above the sediment." },
        { "id": 38, "topic": "Separation Techniques", "question": "Which method of separation is used to separate butter from curd?", "options": ["Sublimation — one component sublimes when gently heated", "Paper chromatography — components travel at different rates", "Centrifugation — rapid spinning separates the less-dense fat from the denser liquid", "Magnetic separation — fat is non-magnetic"], "answer": "Centrifugation — rapid spinning separates the less-dense fat from the denser liquid", "explanation": "Centrifugation uses centrifugal force to separate components of different densities. Butter (less dense fat) separates from curd (denser liquid)." },
        { "id": 39, "topic": "Separation Techniques", "question": "In paper chromatography, the Rf value of a substance is defined as:", "options": ["Distance moved by solvent front ÷ distance moved by spot from baseline", "Mass of solute ÷ volume of solvent used", "Distance moved by spot from baseline ÷ distance moved by solvent front from baseline", "Distance moved by spot × concentration of the applied solution"], "answer": "Distance moved by spot from baseline ÷ distance moved by solvent front from baseline", "explanation": "Rf = distance (spot) / distance (solvent front). It is always between 0 and 1, and is characteristic of the substance in a given solvent system." },
        { "id": 40, "topic": "Separation Techniques", "question": "Selection of the correct filter paper grade depends on:", "options": ["The drying rate of the paper after filtration", "Finer particles require slower, denser paper; coarser particles allow faster-flow paper", "The ability of the paper to absorb and decolorise the solution", "The paper's thickness to determine the decantation rate"], "answer": "Finer particles require slower, denser paper; coarser particles allow faster-flow paper", "explanation": "Filter paper pore size must match particle size. If pores are too large, fine particles pass through; if too small, filtration is too slow." },
        { "id": 41, "topic": "Separation Techniques", "question": "Fractional distillation of liquefied air separates nitrogen and oxygen because:", "options": ["Nitrogen is magnetic and oxygen is not", "They have different densities in the liquid phase", "N₂ (b.p. −196°C) has a lower boiling point than O₂ (b.p. −183°C) and boils off first during gradual warming", "They have different solubilities in the liquid nitrogen phase"], "answer": "N₂ (b.p. −196°C) has a lower boiling point than O₂ (b.p. −183°C) and boils off first during gradual warming", "explanation": "During gradual warming of liquid air, the more volatile nitrogen (lower b.p.) evaporates first and is collected separately from the less volatile oxygen." },
        { "id": 42, "topic": "Separation Techniques", "question": "Sublimation as a separation technique is applicable when:", "options": ["Both components dissolve in the same solvent at room temperature", "One component converts directly from solid to vapour without melting when gently heated, while the other remains solid", "Both components are liquids with significantly different boiling points", "One component is ferromagnetic and the other is non-magnetic"], "answer": "One component converts directly from solid to vapour without melting when gently heated, while the other remains solid", "explanation": "Substances that sublime (e.g. iodine, ammonium chloride, naphthalene) can be separated from non-subliming impurities by gentle heating and condensation." },
        { "id": 43, "topic": "Separation Techniques", "question": "Zone refining (zone melting) is an advanced purification technique used to produce ultra-pure:", "options": ["Distilled water for laboratory use", "Semiconductor materials like silicon and germanium for the electronics industry", "Salt (NaCl) from seawater by controlled crystallisation", "Pharmaceutical compounds from plant extracts"], "answer": "Semiconductor materials like silicon and germanium for the electronics industry", "explanation": "Zone refining sweeps impurities to one end of a solid rod by moving a narrow molten zone along it repeatedly, producing 99.9999% pure semiconductors." },
        { "id": 44, "topic": "Separation Techniques", "question": "Steam distillation is used to separate substances that:", "options": ["Are completely miscible with water in all proportions", "Are immiscible with water and have high boiling points — they co-distil with steam at temperatures below 100°C", "Are solids that sublime readily when heated gently", "Are gases at room temperature and must be liquefied for collection"], "answer": "Are immiscible with water and have high boiling points — they co-distil with steam at temperatures below 100°C", "explanation": "Steam distillation is used to isolate high-boiling, water-immiscible compounds (e.g. essential oils) without decomposing them at their normal boiling points." },
        { "id": 45, "topic": "Separation Techniques", "question": "In liquid-liquid extraction, the process depends on:", "options": ["The difference in density between the two solvents", "The partition coefficient — the ratio of solute concentration in solvent A to solvent B at equilibrium", "The difference in boiling point between the two solvents", "The magnetic susceptibility of the solute in each solvent"], "answer": "The partition coefficient — the ratio of solute concentration in solvent A to solvent B at equilibrium", "explanation": "The partition (distribution) coefficient K = [solute]_A / [solute]_B determines how completely a solute transfers between two immiscible solvents." },
        { "id": 46, "topic": "Separation Techniques", "question": "What is the stationary phase in paper chromatography?", "options": ["The solvent (mobile phase) that moves up the paper", "The water adsorbed on the cellulose fibres of the paper", "The solute being separated and identified", "The solvent front that moves to the top of the paper"], "answer": "The water adsorbed on the cellulose fibres of the paper", "explanation": "In paper chromatography, the cellulose paper fibres adsorb water, which acts as the stationary phase. The solvent (mobile phase) moves through it carrying solutes at different rates." },
        { "id": 47, "topic": "Separation Techniques", "question": "Which separation technique is dependent on difference in volatility?", "options": ["Distillation", "Crystallization", "Magnetic separation", "Fractional crystallization"], "answer": "Distillation", "explanation": "Distillation separates mixtures based on differences in boiling points (volatility). The more volatile component evaporates first and is condensed separately." },
        { "id": 48, "topic": "Separation Techniques", "question": "A mixture of oil and water is separated by ____.", "options": ["Separating funnel", "Evaporation", "Decantation", "Filtration"], "answer": "Separating funnel", "explanation": "Oil and water are immiscible. They form two distinct layers in a separating funnel, allowing each layer to be drained separately." },

        /* ══ SECTION 3: INDICATORS, REDOX & SOLUTIONS ══ */
        { "id": 49, "topic": "Indicators & Redox", "question": "When is a buffer solution used in chemistry?", "options": ["To make a solution permanently and strongly basic", "To make a solution permanently and strongly acidic", "To resist (prevent) significant changes in pH when small amounts of acid or base are added", "To neutralise all acids and bases to exactly pH 7.0"], "answer": "To resist (prevent) significant changes in pH when small amounts of acid or base are added", "explanation": "A buffer solution resists changes in pH when small amounts of acid or base are added, maintaining a relatively constant pH." },
        { "id": 50, "topic": "Indicators & Redox", "question": "What type of indicator is Chlorophenol Red?", "options": ["A redox indicator that changes colour with changes in oxidation state", "A colorimetric (pH) indicator — changes colour based on the acidity or alkalinity of the solution", "An adsorption indicator used in precipitation titrations", "A radioactive tracer used in kinetic studies"], "answer": "A colorimetric (pH) indicator — changes colour based on the acidity or alkalinity of the solution", "explanation": "Chlorophenol Red is a pH colorimetric indicator that changes colour based on the hydrogen ion concentration of the solution." },
        { "id": 51, "topic": "Indicators & Redox", "question": "Phenolsulfonphthalein (Phenol Red) appears what colour at exactly pH 7.0?", "options": ["Bright red", "Violet or purple", "Blue-green", "Yellow — it is yellow below pH 6.8 and transitions to red above pH 8.4"], "answer": "Yellow — it is yellow below pH 6.8 and transitions to red above pH 8.4", "explanation": "Phenol Red appears yellow below pH 6.8, orange at neutral pH 7, and bright pink/red above pH 8.4." },
        { "id": 52, "topic": "Indicators & Redox", "question": "Why does the [Fe(SCN)]²⁺ complex solution appear red?", "options": ["It emits red light through fluorescence when excited by UV radiation", "It absorbs green wavelengths (~490 nm) and transmits the complementary red wavelengths to our eyes", "It absorbs all red wavelengths and reflects all green light", "The SCN⁻ ion itself is inherently red-coloured in all metal complexes"], "answer": "It absorbs green wavelengths (~490 nm) and transmits the complementary red wavelengths to our eyes", "explanation": "The Fe(SCN)²⁺ complex absorbs green light (complementary colour) and transmits red light, which is what we perceive as the red colour." },
        { "id": 53, "topic": "Indicators & Redox", "question": "Which statement correctly describes a reducing agent?", "options": ["It accepts electrons from the substance it reacts with and is itself reduced", "It has a higher oxidation state than the substance being reduced", "It donates electrons to the oxidising agent, reducing it — and is itself oxidised in the process", "It is always a metal oxide or a hydroxide compound"], "answer": "It donates electrons to the oxidising agent, reducing it — and is itself oxidised in the process", "explanation": "A reducing agent donates electrons to other species (oxidising agents), causing them to be reduced. The reducing agent itself gets oxidised (loses electrons)." },
        { "id": 54, "topic": "Indicators & Redox", "question": "The standard hydrogen electrode (SHE) has a standard electrode potential of:", "options": ["0.00 V — by international convention", "+2.87 V — the most positive possible electrode potential", "−3.04 V — the most negative electrode potential", "+1.23 V — the potential for oxygen evolution"], "answer": "0.00 V — by international convention", "explanation": "By international convention, the SHE is assigned E° = 0.00 V at all temperatures. All other standard electrode potentials are measured relative to it." },
        { "id": 55, "topic": "Indicators & Redox", "question": "Potassium permanganate (KMnO₄) is deep purple. When it reacts with a reducing agent in acidic solution, what colour change occurs?", "options": ["Colourless to deep purple", "Deep purple/violet to colourless (or very pale pink) — MnO₄⁻ reduced to Mn²⁺", "Yellow to colourless — the chromate ion is reduced", "Blue to red — the complex ion changes oxidation state"], "answer": "Deep purple/violet to colourless (or very pale pink) — MnO₄⁻ reduced to Mn²⁺", "explanation": "MnO₄⁻ (purple, Mn in +7 state) is reduced to Mn²⁺ (almost colourless, pale pink) in acidic solution. The colour disappearance marks the endpoint." },
        { "id": 56, "topic": "Indicators & Redox", "question": "In photosynthesis, water is oxidised into ____________.", "options": ["H₂", "CO₂", "C₆H₁₂O₆", "O₂"], "answer": "O₂", "explanation": "In photosynthesis, water molecules are split (oxidised) by light energy: 2H₂O → 4H⁺ + 4e⁻ + O₂. The oxygen is released as a byproduct." },
        { "id": 57, "topic": "Indicators & Redox", "question": "With an increase in temperature, which concentration measure changes while others remain constant?", "options": ["Molality (mol/kg) — based on mass of solvent", "Mole fraction — a dimensionless ratio of moles", "Molarity (mol/L) — volume changes with temperature, so mol/L changes too", "Mass percent (% w/w) — based on mass ratio"], "answer": "Molarity (mol/L) — volume changes with temperature, so mol/L changes too", "explanation": "Molality, mole fraction, and mass fraction are temperature-independent (based on mass). Molarity depends on volume which changes with temperature." },
        { "id": 58, "topic": "Indicators & Redox", "question": "Which indicator is used in EDTA complexometric titration for determining water hardness?", "options": ["Phenolphthalein — colourless to pink at pH 9", "Methyl orange — red to yellow in acidic to basic transition", "Eriochrome Black T (EBT) — wine-red in presence of metal ions, turns blue at endpoint", "Starch solution — gives a blue-black colour with iodine"], "answer": "Eriochrome Black T (EBT) — wine-red in presence of metal ions, turns blue at endpoint", "explanation": "EBT forms a wine-red complex with Ca²⁺ and Mg²⁺ ions. When EDTA fully complexes all metal ions, EBT is released and turns blue — this is the endpoint." },
        { "id": 59, "topic": "Indicators & Redox", "question": "In an iodometric titration, starch indicator gives what endpoint?", "options": ["Colourless to pink — starch reacts with iodide to form a coloured complex", "Blue-black to colourless — starch forms blue-black complex with I₂; at endpoint all I₂ is consumed and colour disappears", "Yellow to red — the iodo-starch complex changes colour as pH increases", "Colourless to yellow — the appearance of free iodine causes the yellow colour"], "answer": "Blue-black to colourless — starch forms blue-black complex with I₂; at endpoint all I₂ is consumed and colour disappears", "explanation": "Starch forms an intense blue-black complex with I₃⁻. When the reducing agent consumes all I₂, the blue-black colour disappears sharply — the endpoint." },

        /* ══ SECTION 4: QUALITATIVE ANALYSIS ══ */
        { "id": 60, "topic": "Qualitative Analysis", "question": "When excess NaOH is added to a solution containing Cu²⁺ ions, what is observed?", "options": ["A white precipitate that dissolves in excess NaOH to give a colourless solution", "A green precipitate that is insoluble in excess NaOH", "A pale blue precipitate of Cu(OH)₂ that is insoluble in excess NaOH", "No precipitate — Cu²⁺ ions remain in solution even with excess NaOH"], "answer": "A pale blue precipitate of Cu(OH)₂ that is insoluble in excess NaOH", "explanation": "Cu²⁺ + 2OH⁻ → Cu(OH)₂↓ (pale blue gelatinous precipitate). This precipitate does NOT dissolve in excess NaOH, distinguishing Cu²⁺ from Al³⁺ and Zn²⁺." },
        { "id": 61, "topic": "Qualitative Analysis", "question": "When excess NaOH is added to a solution containing Al³⁺ ions, what is observed?", "options": ["A pale blue gelatinous precipitate that does not dissolve in excess NaOH", "A green precipitate that darkens on standing in air", "A white gelatinous precipitate of Al(OH)₃ that dissolves in excess NaOH to give a colourless aluminate solution", "No precipitate — Al³⁺ remains fully in solution even with excess NaOH"], "answer": "A white gelatinous precipitate of Al(OH)₃ that dissolves in excess NaOH to give a colourless aluminate solution", "explanation": "Al(OH)₃ is amphoteric — it dissolves in excess NaOH: Al(OH)₃ + NaOH → NaAl(OH)₄ (sodium aluminate, colourless solution). This amphoteric behaviour distinguishes Al³⁺." },
        { "id": 62, "topic": "Qualitative Analysis", "question": "The 'brown ring' test is used to confirm the presence of which ion?", "options": ["The sulphate ion (SO₄²⁻)", "The nitrate ion (NO₃⁻) — FeSO₄ + conc. H₂SO₄ gives a brown ring at the interface", "The chloride ion (Cl⁻)", "The carbonate ion (CO₃²⁻)"], "answer": "The nitrate ion (NO₃⁻) — FeSO₄ + conc. H₂SO₄ gives a brown ring at the interface", "explanation": "The brown ring test: FeSO₄ solution + test solution layered over conc. H₂SO₄. A brown ring of [Fe(NO)(H₂O)₅]²⁺ at the interface confirms NO₃⁻." },
        { "id": 63, "topic": "Qualitative Analysis", "question": "When AgNO₃ solution is added to a solution containing Cl⁻ ions, what is observed?", "options": ["A yellow precipitate soluble in dilute HNO₃", "A white precipitate of AgCl insoluble in dilute HNO₃ but soluble in dilute NH₃", "A red precipitate of Ag₂CrO₄ insoluble in all acids", "No precipitate — chloride ions remain in solution"], "answer": "A white precipitate of AgCl insoluble in dilute HNO₃ but soluble in dilute NH₃", "explanation": "Ag⁺ + Cl⁻ → AgCl↓ (white). AgCl is insoluble in dilute HNO₃ but dissolves in dilute NH₃: AgCl + 2NH₃ → [Ag(NH₃)₂]⁺ + Cl⁻. This confirms Cl⁻." },
        { "id": 64, "topic": "Qualitative Analysis", "question": "When dilute H₂SO₄ is added to a carbonate or bicarbonate, what is observed?", "options": ["Yellow fumes produced that turn moist starch-iodide paper blue", "Colourless odourless gas produced that turns limewater milky", "A pungent smell of SO₂ and a white precipitate forms", "Effervescence of a gas that relights a glowing splint"], "answer": "Colourless odourless gas produced that turns limewater milky", "explanation": "CO₃²⁻ + H⁺ → CO₂ + H₂O. CO₂ turns limewater (Ca(OH)₂ solution) milky due to CaCO₃ precipitation. This is the standard test for CO₃²⁻ and CO₂." },
        { "id": 65, "topic": "Qualitative Analysis", "question": "A gas that turns moist blue litmus paper red and has a pungent smell is most likely:", "options": ["Ammonia (NH₃)", "Carbon dioxide (CO₂)", "Hydrogen chloride (HCl) or sulphur dioxide (SO₂) — acidic pungent gases", "Nitrogen (N₂)"], "answer": "Hydrogen chloride (HCl) or sulphur dioxide (SO₂) — acidic pungent gases", "explanation": "Acidic gases like HCl, SO₂, and HBr turn moist blue litmus red. Ammonia turns red litmus blue. CO₂ is acidic but not pungent. N₂ is inert." },

        /* ══ SECTION 5: LAB SAFETY & MATERIALS ══ */
        { "id": 66, "topic": "Lab Safety", "question": "When diluting a concentrated acid with water, what is the correct safe procedure?", "options": ["Add water slowly to the concentrated acid with constant stirring", "Always add acid slowly into water — never add water to acid (prevents violent, exothermic spattering)", "Mix acid and water simultaneously in equal rapid portions", "Pour acid into water quickly in the fume cupboard"], "answer": "Always add acid slowly into water — never add water to acid (prevents violent, exothermic spattering)", "explanation": "Adding water to acid concentrates the heat locally causing violent spattering. Adding acid to water disperses the heat safely in the large volume of water." },
        { "id": 67, "topic": "Lab Safety", "question": "Where must all pungent, choking, or poisonous gases be prepared in the chemistry laboratory?", "options": ["At an open bench near a large window for cross-ventilation", "In a sealed glass container at the back of the laboratory", "In the fume cupboard (fume hood) — its extraction fan safely removes toxic gases from the lab air", "Outdoors in the open air next to the laboratory building"], "answer": "In the fume cupboard (fume hood) — its extraction fan safely removes toxic gases from the lab air", "explanation": "All toxic, corrosive, and choking gases (Cl₂, HCl, SO₂, NH₃, Br₂ vapour) must be handled in the fume cupboard to protect the experimenter." },
        { "id": 68, "topic": "Lab Safety", "question": "If a laboratory fire breaks out involving a burning organic solvent, what should be done FIRST?", "options": ["Pour water directly onto the flame to extinguish it quickly", "Smother the fire with a fire blanket or damp cloth — water can spread burning organic liquid and worsen the fire", "Blow out the flame with a fan directed at the burning liquid", "Immediately leave the lab and do not attempt to extinguish it"], "answer": "Smother the fire with a fire blanket or damp cloth — water can spread burning organic liquid and worsen the fire", "explanation": "Water floats organic solvents and spreads the fire. Smothering cuts off the oxygen supply. Always use CO₂ extinguisher or fire blanket for solvent fires." },
        { "id": 69, "topic": "Lab Safety", "question": "What Personal Protective Equipment (PPE) is essential in the chemistry laboratory at all times?", "options": ["Only a lab coat to protect clothing from spills", "Only safety goggles to protect the eyes from splashes", "Laboratory coat, safety goggles, and closed-toe shoes — at minimum; gloves when handling corrosive or toxic substances", "No PPE is required for simple, room-temperature experiments"], "answer": "Laboratory coat, safety goggles, and closed-toe shoes — at minimum; gloves when handling corrosive or toxic substances", "explanation": "The minimum PPE in any chemistry lab are lab coat (body protection), safety goggles (eye protection), and closed shoes (foot protection from spills and broken glass)." },
        { "id": 70, "topic": "Lab Safety", "question": "What does the COSHH acronym stand for in laboratory safety?", "options": ["Chemical Operations Safe Substance Handling", "Control of Substances Hazardous to Health", "Certified Operations for Safe Substance Handling in Hospitals", "Chemical Oversight for Safety and Substance Handling"], "answer": "Control of Substances Hazardous to Health", "explanation": "COSHH (Control of Substances Hazardous to Health) is the regulatory framework requiring risk assessment and safe handling procedures for hazardous chemicals." },
        { "id": 71, "topic": "Lab Safety", "question": "Which variety of glass is most commonly used for high-quality chemistry laboratory apparatus?", "options": ["Pyrex (borosilicate glass) — low thermal expansion, high chemical resistance, withstands strong heating", "Soda-lime glass (sodaglass) — the most chemically resistant and cheapest", "Lead crystal glass — used for precision optical components", "Polycarbonate — a synthetic transparent polymer for impact resistance"], "answer": "Pyrex (borosilicate glass) — low thermal expansion, high chemical resistance, withstands strong heating", "explanation": "Pyrex/borosilicate glass has very low thermal expansion coefficient (~3×10⁻⁶/°C vs 9×10⁻⁶/°C for soda-lime glass), making it resistant to thermal shock during heating." },
        { "id": 72, "topic": "Lab Safety", "question": "Plastic apparatus (polythene, polypropene) has a significant limitation in the chemistry laboratory. What is it?", "options": ["They are very expensive compared to glass and porcelain apparatus", "They cannot withstand contact with dilute mineral acids or water", "They are readily dissolved or swollen by organic solvents (e.g. acetone, CHCl₃, benzene)", "They are opaque and cannot be used where colour changes must be observed"], "answer": "They are readily dissolved or swollen by organic solvents (e.g. acetone, CHCl₃, benzene)", "explanation": "Plastics like polythene and polypropylene are chemically resistant to aqueous acids and bases but are attacked or swollen by many organic solvents." },
        { "id": 73, "topic": "Lab Safety", "question": "Why is Teflon (PTFE) used for stopcock plugs, tubing, and seals in laboratory apparatus?", "options": ["Because it is transparent and allows colour changes to be observed easily", "Because it is the cheapest and most available polymer material", "Because it is chemically inert to virtually all common chemicals including strong acids, bases, and organic solvents", "Because it is an excellent conductor of heat and electricity"], "answer": "Because it is chemically inert to virtually all common chemicals including strong acids, bases, and organic solvents", "explanation": "PTFE (Teflon) has exceptional chemical resistance due to strong C-F bonds that resist attack by virtually all laboratory chemicals, making it ideal for seals and stopcocks." },
        { "id": 74, "topic": "Lab Safety", "question": "Concentrated H₂SO₄ is used as a drying agent for prepared gases. Which gas CANNOT be dried with conc. H₂SO₄?", "options": ["Hydrogen (H₂)", "Chlorine (Cl₂)", "Carbon dioxide (CO₂)", "Ammonia (NH₃) — reacts with H₂SO₄ to form (NH₄)₂SO₄"], "answer": "Ammonia (NH₃) — reacts with H₂SO₄ to form (NH₄)₂SO₄", "explanation": "NH₃ is an alkaline gas. It reacts with H₂SO₄: 2NH₃ + H₂SO₄ → (NH₄)₂SO₄. So it cannot be dried using conc. H₂SO₄. Use CaO or soda-lime for NH₃." },
        { "id": 75, "topic": "Lab Safety", "question": "A Kipp's apparatus (gas generator) allows intermittent production of gas WITHOUT heating. What reaction does it use?", "options": ["A solid reacts with a liquid (acid) at room temperature — e.g. marble chips + HCl → CO₂; Zn + H₂SO₄ → H₂", "A liquid mixture is heated to boiling and vapour collected over water", "Two liquids are electrolysed to produce gas at electrodes", "A solid is strongly heated in air until it thermally decomposes"], "answer": "A solid reacts with a liquid (acid) at room temperature — e.g. marble chips + HCl → CO₂; Zn + H₂SO₄ → H₂", "explanation": "Kipp's apparatus has three chambers. Opening the tap allows acid to contact the solid, producing gas on demand. Closing the tap stops the reaction automatically." },
        { "id": 76, "topic": "Lab Safety", "question": "When a gas jar or test tube containing a dangerous chemical breaks in the laboratory, what is the FIRST action?", "options": ["Continue the experiment and clean up after", "Alert everyone in the lab immediately; evacuate if necessary; then clean up following COSHH procedures with gloves and protective equipment", "Pour water on the spill to dilute and neutralise it", "Leave the area and allow the chemical to evaporate naturally"], "answer": "Alert everyone in the lab immediately; evacuate if necessary; then clean up following COSHH procedures with gloves and protective equipment", "explanation": "Safety first: alert others, ensure everyone is safe, evacuate if the spill is serious. Then clean up following proper COSHH procedures with appropriate PPE." },

        { "id": 77, "topic": "Organic Chemistry", "question": "Which of the following is the simplest member of all organic compounds?", "options": ["Formic acid (HCOOH) — the simplest carboxylic acid", "Formaldehyde (HCHO) — the simplest aldehyde", "Methane (CH₄) — the simplest alkane, hydrocarbon, and organic compound", "Methanol (CH₃OH) — the simplest alcohol"], "answer": "Methane (CH₄) — the simplest alkane, hydrocarbon, and organic compound", "explanation": "Methane (CH₄) has just one carbon and four hydrogens. It is the first member of the alkane homologous series and the simplest of all organic compounds." },
        { "id": 78, "topic": "Organic Chemistry", "question": "Hydrocarbons are organic compounds containing element(s) ________.", "options": ["Both hydrogen and carbon only", "Carbon only", "Hydrogen only", "Oxygen, hydrogen and carbon"], "answer": "Both hydrogen and carbon only", "explanation": "Hydrocarbons by definition contain ONLY hydrogen and carbon atoms. Examples include methane (CH₄), ethane (C₂H₆), and benzene (C₆H₆)." },
        { "id": 79, "topic": "Organic Chemistry", "question": "What is the general molecular formula for alkanes?", "options": ["CₙH₂ₙ", "CₙH₂ₙ₊₂", "CₙH₂ₙ₋₂", "CₙHₙ"], "answer": "CₙH₂ₙ₊₂", "explanation": "Alkanes follow the general formula CₙH₂ₙ₊₂, where n is the number of carbon atoms. E.g. methane CH₄ (n=1), ethane C₂H₆ (n=2), propane C₃H₈ (n=3)." },
        { "id": 80, "topic": "Organic Chemistry", "question": "What type of reaction do alkanes typically undergo?", "options": ["Addition reactions with bromine water", "Electrophilic substitution with halogens in sunlight", "Free radical substitution — UV light initiates halogenation", "Nucleophilic addition with HBr"], "answer": "Free radical substitution — UV light initiates halogenation", "explanation": "Alkanes undergo free radical substitution with halogens in the presence of UV light or high temperature. E.g. CH₄ + Cl₂ → CH₃Cl + HCl (photochlorination)." },
        { "id": 81, "topic": "Organic Chemistry", "question": "Which functional group is present in alcohols?", "options": ["Carbonyl group (C=O)", "Carboxyl group (-COOH)", "Hydroxyl group (-OH)", "Amino group (-NH₂)"], "answer": "Hydroxyl group (-OH)", "explanation": "Alcohols are characterised by the hydroxyl (-OH) functional group attached to a saturated carbon. E.g. methanol (CH₃OH), ethanol (C₂H₅OH)." },
        { "id": 82, "topic": "Organic Chemistry", "question": "What is produced when an alcohol reacts with a carboxylic acid in the presence of concentrated H₂SO₄?", "options": ["An aldehyde and water", "An ester and water — this is esterification", "A ketone and hydrogen gas", "A salt and carbon dioxide"], "answer": "An ester and water — this is esterification", "explanation": "Esterification: Alcohol + Carboxylic acid ⇌ Ester + Water (with conc. H₂SO₄ as catalyst). E.g. CH₃OH + CH₃COOH → CH₃COOCH₃ + H₂O." },
        { "id": 83, "topic": "Organic Chemistry", "question": "The IUPAC name for CH₃CH₂CH₂OH is:", "options": ["Methanol", "Ethanol", "Propan-1-ol", "Butan-1-ol"], "answer": "Propan-1-ol", "explanation": "CH₃CH₂CH₂OH has 3 carbon atoms (prop-), it is an alcohol (-ol), and the -OH is on carbon 1 (1-ol). Hence propan-1-ol." },

        /* ══ SECTION 7: ANALYTICAL CALCULATIONS ══ */
        { "id": 84, "topic": "Analytical Calculations", "question": "Ammonia evolved from 0.75 g soil sample neutralises 10 mL of 1M H₂SO₄ in Kjeldahl's method. Find the percentage of nitrogen in the soil.", "options": ["35.33%", "37.33%", "43.33%", "45.33%"], "answer": "37.33%", "explanation": "Moles H₂SO₄ = 0.01×1 = 0.01 mol. Moles NH₃ = 0.02 mol (1 mol H₂SO₄ reacts with 2 mol NH₃). Mass N = 0.02×14 = 0.28 g. %N = (0.28/0.75)×100 = 37.33%." },
        { "id": 85, "topic": "Analytical Calculations", "question": "25 mL of barium hydroxide solution titrated against 0.1 M HCl gave titer of 35 mL. What is the molarity of Ba(OH)₂?", "options": ["0.07 M", "0.14 M", "0.28 M", "0.35 M"], "answer": "0.07 M", "explanation": "Ba(OH)₂ + 2HCl → BaCl₂ + 2H₂O. Moles HCl = 0.035×0.1 = 0.0035. Moles Ba(OH)₂ = 0.0035/2 = 0.00175. Molarity = 0.00175/0.025 = 0.07 M." },
        { "id": 86, "topic": "Analytical Calculations", "question": "How many moles of NaOH are needed to neutralise 25 mL of 0.1 M H₂SO₄?", "options": ["0.0025 mol", "0.005 mol", "0.01 mol", "0.025 mol"], "answer": "0.005 mol", "explanation": "H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O. Moles H₂SO₄ = 0.025×0.1 = 0.0025 mol. Moles NaOH = 2×0.0025 = 0.005 mol." },
        { "id": 87, "topic": "Analytical Calculations", "question": "What volume of 2 M HCl is needed to dissolve 5.85 g of NaCl? (Molar mass NaCl = 58.5 g/mol)", "options": ["50 mL", "100 mL", "No HCl is needed — NaCl dissolves in water", "200 mL"], "answer": "No HCl is needed — NaCl dissolves in water", "explanation": "NaCl is a neutral salt that dissolves readily in water without needing acid. This question tests understanding that HCl is unnecessary for dissolving neutral salts." },
        { "id": 88, "topic": "Analytical Calculations", "question": "The molarity of a solution prepared by dissolving 4 g of NaOH (Mr = 40) in water to make 500 mL of solution is:", "options": ["0.1 M", "0.2 M", "0.4 M", "0.8 M"], "answer": "0.2 M", "explanation": "Moles NaOH = 4/40 = 0.1 mol. Volume = 500 mL = 0.5 L. Molarity = 0.1/0.5 = 0.2 M." },

        { "id": 93, "topic": "Separation Techniques", "question": "The process in which the heavier impurities settle at the bottom is ____.", "options": ["Decantation", "Sedimentation", "Filtration", "Evaporation"], "answer": "Sedimentation", "explanation": "Sedimentation is the process where suspended particles settle to the bottom under gravity due to their higher density compared to the liquid." },
