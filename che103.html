<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHE 103 CBT Portal</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea580c;
            --border: rgba(0,0,0,0.07);
            --share-gradient: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #7c3aed 100%);
        }
        .dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; min-height: 100vh; }

        nav {
            background: var(--card-bg); padding: 0.9rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--primary); }

        main { padding: 2rem 5%; max-width: 960px; margin: 0 auto; }

        #resume-banner {
            display: none; background: var(--card-bg);
            border: 1.5px solid var(--success); border-radius: 14px;
            padding: 1rem 1.2rem; margin-bottom: 1.2rem;
            box-shadow: 0 2px 10px rgba(22,163,74,0.1);
        }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 1rem; text-align: center; border: 1.5px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.1rem; }
        .box {
            background: var(--card-bg); padding: 1.5rem 1rem; border-radius: 14px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(30,64,175,0.12); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; line-height: 1.4; }
        .box p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
        .box-random { background: linear-gradient(135deg, #1e40af, #3b82f6) !important; color: white !important; border: none !important; }
        .box-random p { color: rgba(255,255,255,0.8) !important; }

        #setup-screen { text-align: center; background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 360px; }
        .setup-group label { font-weight: 600; font-size: 0.88rem; color: var(--text); display: block; margin-bottom: 7px; }
        .setup-input { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 9px; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 1rem; background: rgba(0,0,0,0.02); padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 15px; padding: 0 4px; flex-wrap: wrap; gap: 10px; }
        .q-counter { font-size: 1rem; color: var(--text); }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer { color: var(--danger); background: rgba(220,38,38,0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; }
        #topic-text { color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.6px; }

        .question-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1.5px solid var(--border); }
        #question-text { line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; word-wrap: break-word; }

        .option-btn {
            display: block; width: 100%; padding: 0.95rem 1.1rem; margin: 0.65rem 0;
            border: 2px solid #e2e8f0; border-radius: 10px; background: var(--card-bg);
            color: var(--text); text-align: left; cursor: pointer;
            font-size: 0.97rem; transition: background 0.15s, border-color 0.15s; line-height: 1.5;
        }
        .option-btn:not(:disabled):hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn.selected { background: #e0f2fe !important; border-color: #3b82f6 !important; color: #0369a1 !important; }
        .option-btn.correct  { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong    { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; }
        .explanation-box { background: rgba(30,64,175,0.07); border-left: 4px solid var(--primary); padding: 1rem; border-radius: 6px; margin-top: 10px; font-weight: 400; font-size: 0.88rem; line-height: 1.6; color: var(--text); }
        .dark-mode .explanation-box { background: rgba(30,64,175,0.15); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn { padding: 0.8rem 1.6rem; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem; }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .result-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(8px); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .result-modal-content { background: var(--card-bg); padding: 40px 28px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; color: var(--text); box-shadow: 0 25px 60px rgba(0,0,0,0.45); animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes bounceIn { 0% { opacity:0; transform:scale(0.78) translateY(30px); } 100% { opacity:1; transform:scale(1) translateY(0); } }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        .score-display { background: rgba(37,99,235,0.06); border: 2px dashed rgba(37,99,235,0.2); border-radius: 18px; padding: 18px; margin: 18px 0; }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
        .btn-review { background: rgba(30,64,175,0.08); color: var(--primary); border: 1.5px solid rgba(30,64,175,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.3rem; }
            .result-modal-content { padding: 28px 18px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <div><i class="fa-solid fa-flask"></i> CHE 103 Practice Portal</div>
        <div style="font-size:0.9rem; font-weight:600; color:var(--text-muted); letter-spacing:0.3px;">by Resolute Femi</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#64748b; padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <div id="dashboard-wrap">
        <div id="resume-banner"></div>
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title" style="margin-bottom:1.8rem; color:var(--primary); font-size:1.3rem;"></h2>
        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>
        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>
        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>
        <div class="setup-group checkbox-group">
            <label class="custom-checkbox"><input type="checkbox" id="shuffle-questions" checked> Shuffle Questions</label>
            <label class="custom-checkbox"><input type="checkbox" id="shuffle-options" checked> Shuffle Options (A, B, C, D)</label>
        </div>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">Start Now <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()"><i class="fa-solid fa-paper-plane"></i> Submit</button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()"><i class="fa-solid fa-house"></i> Exit Review</button>
                <span id="timer">30:00</span>
            </div>
        </div>
        <div class="question-card">
            <div id="topic-text"></div>
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
            <div id="feedback-area"></div>
        </div>
        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)"><i class="fa-solid fa-arrow-left"></i> Previous</button>
            <button class="btn" id="next-btn" onclick="move(1)">Next <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>
</main>

<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 14px; font-size:1.5rem;">Outstanding!</h2>
        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>
        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>
        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()"><i class="fa-solid fa-share-nodes"></i> Share Score</button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()"><i class="fa-solid fa-magnifying-glass"></i> Review Answers</button>
            <button class="btn-action btn-home" onclick="goHome()"><i class="fa-solid fa-house"></i> Dashboard</button>
        </div>
    </div>
</div>

        { "id": 19, "topic": "Separation Techniques", "question": "Which separation method is used to separate solutes that all dissolve in the same solvent?", "options": ["Evaporation", "Filtration", "Chromatography", "Sublimation"], "answer": "Chromatography", "explanation": "Chromatography separates mixtures of solutes dissolved in the same solvent based on their different affinities for the stationary and mobile phases." },
        { "id": 20, "topic": "Separation Techniques", "question": "A mixture of oil and water is separated by ____.", "options": ["Separating funnel", "Evaporation", "Decantation", "Filtration"], "answer": "Separating funnel", "explanation": "Oil and water are immiscible. They form two distinct layers in a separating funnel, allowing each layer to be drained separately." },
        { "id": 21, "topic": "Separation Techniques", "question": "Which method of separation will be used to separate butter from curd?", "options": ["Sublimation", "Chromatography", "Centrifugation", "All of the above"], "answer": "Centrifugation", "explanation": "Centrifugation uses centrifugal force to separate components of different densities. Butter (less dense fat) separates from curd (denser liquid)." },
        { "id": 22, "topic": "Separation Techniques", "question": "The process in which heavier impurities settle at the bottom of a liquid is ____.", "options": ["Decantation", "Sedimentation", "Filtration", "Evaporation"], "answer": "Sedimentation", "explanation": "Sedimentation is the process where suspended particles settle to the bottom under gravity due to their higher density compared to the liquid." },
        { "id": 23, "topic": "Lab Apparatus", "question": "What piece of equipment dispenses liquids in measured drops?", "options": ["Pipette", "Dropper", "Beaker", "Flask"], "answer": "Dropper", "explanation": "A dropper (also called a Pasteur pipette or medicine dropper) dispenses liquids one drop at a time for precise small volume addition." },
        { "id": 24, "topic": "Lab Apparatus", "question": "What piece of equipment is used for stirring, mixing, heating, and rough measurements of liquids?", "options": ["Beaker", "Flask", "Dropper", "Mortar and pestle"], "answer": "Beaker", "explanation": "A beaker is a general-purpose cylindrical container used for mixing, heating, and rough volume measurement. It is NOT for accurate volumetric measurements." },
        { "id": 25, "topic": "Lab Apparatus", "question": "What piece of equipment is used to hold test tubes upright?", "options": ["Test tube rack", "Forceps", "Ring clamp", "Petri dish"], "answer": "Test tube rack", "explanation": "A test tube rack holds multiple test tubes in an upright position, preventing them from rolling or falling during experiments." },
        { "id": 26, "topic": "Organic Chemistry", "question": "Which of the following is the simplest member of organic compounds?", "options": ["Formic acid", "Formaldehyde", "Methane", "Methanol"], "answer": "Methane", "explanation": "Methane (CH₄) is the simplest alkane and the simplest organic compound, consisting of one carbon atom bonded to four hydrogen atoms." },
        { "id": 27, "topic": "Organic Chemistry", "question": "Hydrocarbons are organic compounds containing element(s) ________.", "options": ["Both hydrogen and carbon", "Carbon only", "Hydrogen only", "Oxygen"], "answer": "Both hydrogen and carbon", "explanation": "Hydrocarbons by definition contain ONLY hydrogen and carbon atoms. Examples include methane (CH₄), ethane (C₂H₆), and benzene (C₆H₆)." },
        { "id": 28, "topic": "Analytical Chemistry", "question": "Ammonia evolved from 0.75 g soil sample neutralises 10 mL of 1M H₂SO₄ in Kjeldahl's method. Find the percentage of nitrogen in the soil.", "options": ["35.33%", "37.33%", "43.33%", "45.33%"], "answer": "37.33%", "explanation": "Moles H₂SO₄ = 0.01×1 = 0.01 mol. Moles NH₃ = 0.02 mol (1 mol H₂SO₄ reacts with 2 mol NH₃). Mass N = 0.02×14 = 0.28 g. %N = (0.28/0.75)×100 = 37.33%." },
        { "id": 29, "topic": "Analytical Chemistry", "question": "25 mL of barium hydroxide solution titrated against 0.1 M HCl gave titer of 35 mL. What is the molarity of Ba(OH)₂?", "options": ["0.07", "0.14", "0.28", "0.35"], "answer": "0.07", "explanation": "Ba(OH)₂ + 2HCl → BaCl₂ + 2H₂O. Moles HCl = 0.035×0.1 = 0.0035. Moles Ba(OH)₂ = 0.0035/2 = 0.00175. Molarity = 0.00175/0.025 = 0.07 M." },
        { "id": 30, "topic": "Solutions", "question": "With increase in temperature, which of these changes?", "options": ["Molality", "Fraction of solute present in water", "Weight fraction of solute", "Mole fraction"], "answer": "Weight fraction of solute", "explanation": "Molality, mole fraction, and mass fraction are all temperature-independent. Molarity changes with temperature, and weight fraction of solute can change as density changes with temperature." },

        /* ── FROM HTML FILE (108 questions) ── */
        { "id": 31, "topic": "Lab Apparatus", "question": "Which piece of apparatus is specifically designed for evaporating liquid solutions to dryness or concentrating them?", "options": ["Evaporating dish — shallow porcelain dish with a spout; can be heated directly", "Beaker — cylindrical flat-bottomed glass vessel used for mixing", "Crucible — small deep container for igniting at very high temperatures", "Watch glass — thin circular glass plate used as a cover"], "answer": "Evaporating dish — shallow porcelain dish with a spout; can be heated directly", "explanation": "The evaporating dish is made of porcelain and can be heated directly on a wire gauze. Its shallow design allows rapid evaporation of solvent." },
        { "id": 32, "topic": "Lab Apparatus", "question": "A burette is a long graduated glass tube with a stopcock. What is its PRIMARY function in laboratory titrations?", "options": ["Measuring approximate volumes of liquid for rough experiments", "Accurately measuring and delivering variable volumes during titrations (up to 50.00 cm³ ±0.05 cm³)", "Transferring a fixed definite volume from a stock solution", "Storing concentrated acid reagents safely between experiments"], "answer": "Accurately measuring and delivering variable volumes during titrations (up to 50.00 cm³ ±0.05 cm³)", "explanation": "The burette with its stopcock allows precise control of liquid flow and can deliver any volume from 0 to 50 cm³ with ±0.05 cm³ accuracy." },
        { "id": 33, "topic": "Lab Apparatus", "question": "A Bunsen burner is the most common heating device in the general chemistry laboratory. It burns what type of fuel gas?", "options": ["Hydrogen gas (H₂) from a cylinder", "Oxygen gas (O₂) under pressure", "Liquefied petroleum gas (LPG) — propane or butane", "Carbon monoxide (CO) piped from the main line"], "answer": "Liquefied petroleum gas (LPG) — propane or butane", "explanation": "Bunsen burners typically use LPG (propane/butane) or natural gas (methane) as fuel. The air-gas ratio is adjusted via the air hole to control flame type." },
        { "id": 34, "topic": "Lab Apparatus", "question": "What is the beehive shelf used for in a gas preparation set-up involving collection over water?", "options": ["To hold hot crucibles safely after ignition", "To support the Bunsen burner and tripod stand", "To support the inverted gas jar at the right height in a pneumatic trough for displacement collection", "To hold folded filter paper flat during gravity filtration"], "answer": "To support the inverted gas jar at the right height in a pneumatic trough for displacement collection", "explanation": "The beehive shelf sits in the pneumatic trough and has a hole through which gas travels upward into the inverted water-filled gas jar." },
        { "id": 35, "topic": "Lab Apparatus", "question": "What is the crucible primarily used for in the chemistry laboratory?", "options": ["Measuring volumes of liquids accurately to 0.01 cm³", "Supporting filter paper during gravity filtration", "Holding solid substances being heated or ignited to very high temperatures until they decompose", "Dissolving solid chemicals in a liquid solvent at room temperature"], "answer": "Holding solid substances being heated or ignited to very high temperatures until they decompose", "explanation": "Crucibles are made of porcelain, clay, or platinum and can withstand extremely high temperatures needed for ignition and decomposition reactions." },
        { "id": 36, "topic": "Lab Apparatus", "question": "A mortar and pestle (porcelain or agate) are used for what specific purpose in the chemistry laboratory?", "options": ["Measuring the pH of a solution accurately", "Grinding and crushing solid chemicals into a fine, homogeneous powder", "Holding liquid reagents at constant high temperatures for extended reactions", "Mixing two immiscible liquid phases by mechanical agitation"], "answer": "Grinding and crushing solid chemicals into a fine, homogeneous powder", "explanation": "The pestle is used to crush and grind solids in the bowl (mortar), increasing surface area for faster dissolution or reaction." },
        { "id": 37, "topic": "Lab Apparatus", "question": "A wire gauze with a ceramic/asbestos centre is placed on a tripod stand. What is its purpose?", "options": ["To filter fine solid particles from a liquid suspension", "To collect gases over water by displacement in a trough", "To support a vessel (beaker, flask, dish) and distribute heat evenly from the Bunsen burner below", "To weigh solid chemicals accurately on an analytical balance"], "answer": "To support a vessel (beaker, flask, dish) and distribute heat evenly from the Bunsen burner below", "explanation": "The ceramic centre of the wire gauze spreads heat from the Bunsen flame uniformly, preventing hot spots that could crack glassware." },
        { "id": 38, "topic": "Lab Apparatus", "question": "A retort stand with a clamp is used to support which apparatus during laboratory experiments?", "options": ["The Bunsen burner and tripod stand only", "The filter funnel, thermometer, burette, condenser, or flask — whichever requires vertical support", "The evaporating dish during crystallisation only", "The mortar and pestle during grinding operations"], "answer": "The filter funnel, thermometer, burette, condenser, or flask — whichever requires vertical support", "explanation": "The retort stand with boss and clamp is a versatile support system for virtually any piece of apparatus requiring vertical or angled positioning." },
        { "id": 39, "topic": "Lab Apparatus", "question": "A test-tube holder is specifically designed for what purpose?", "options": ["Holding test tubes upright in a rack when not in use", "Safely gripping hot test tubes or those containing corrosive and reactive reagents", "Measuring the exact volume of liquid inside a test tube", "Sealing a test tube tightly to prevent escape of gas"], "answer": "Safely gripping hot test tubes or those containing corrosive and reactive reagents", "explanation": "Test-tube holders allow the experimenter to handle test tubes safely during heating without burning their fingers or dropping the tube." },
        { "id": 40, "topic": "Lab Apparatus", "question": "What is the key difference between a measuring cylinder and a burette when measuring liquid volumes?", "options": ["A measuring cylinder is more accurate than a burette in all situations", "They are identical — 'burette' is just an alternative name for a measuring cylinder", "A burette (±0.05 cm³) is far more accurate than a measuring cylinder (±0.5 mL); only the burette has a stopcock for controlled delivery", "A measuring cylinder has a stopcock; a burette does not"], "answer": "A burette (±0.05 cm³) is far more accurate than a measuring cylinder (±0.5 mL); only the burette has a stopcock for controlled delivery", "explanation": "A burette is a precision instrument with 10× better accuracy than a measuring cylinder and is used in quantitative titration analysis." },
        { "id": 41, "topic": "Lab Apparatus", "question": "The Hofmann voltameter is used in the laboratory for which specific purpose?", "options": ["Measuring the electromotive force (EMF) of a galvanic cell", "Electrolyzing water to produce and separately collect hydrogen (cathode) and oxygen (anode) in graduated tubes", "Testing electrical conductivity of dilute ionic solutions", "Separating charged molecules by electrophoresis on a gel plate"], "answer": "Electrolyzing water to produce and separately collect hydrogen (cathode) and oxygen (anode) in graduated tubes", "explanation": "The Hofmann voltameter demonstrates the electrolysis of water: 2H₂O → 2H₂ + O₂. H₂ collects at the cathode (twice the volume of O₂ at the anode)." },
        { "id": 42, "topic": "Separation Techniques", "question": "Simple distillation separates components based on which physical property?", "options": ["Difference in density of the two liquids", "Difference in volatility (boiling point) — the more volatile component evaporates and is condensed and collected first", "Difference in solubility in a common third solvent", "Difference in magnetic susceptibility of the components"], "answer": "Difference in volatility (boiling point) — the more volatile component evaporates and is condensed and collected first", "explanation": "Simple distillation works best when boiling points differ by more than 25°C. The lower boiling point component distils over first." },
        { "id": 43, "topic": "Separation Techniques", "question": "Fractional distillation of ethanol (b.p. 78°C) and water (b.p. 100°C) requires which additional apparatus compared to simple distillation?", "options": ["A separating funnel to drain off the denser layer", "A fractionating column packed with glass beads — providing multiple condensation/re-evaporation cycles for better separation", "A Buchner funnel and vacuum pump for suction filtration", "A chromatographic tank with solvent and silica stationary phase"], "answer": "A fractionating column packed with glass beads — providing multiple condensation/re-evaporation cycles for better separation", "explanation": "The fractionating column provides many theoretical plates where vapour repeatedly condenses and re-evaporates, giving better separation of close-boiling components." },
        { "id": 44, "topic": "Separation Techniques", "question": "Crystallisation as a separation technique exploits what physical property of the dissolved substance?", "options": ["Difference in specific heat capacity between solute and solvent", "Difference in boiling points at standard atmospheric pressure", "Difference in solubility at different temperatures — cooling a hot saturated solution causes less-soluble material to crystallise out", "Difference in bubble-point pressure at reduced atmospheric pressure"], "answer": "Difference in solubility at different temperatures — cooling a hot saturated solution causes less-soluble material to crystallise out", "explanation": "Most solids are more soluble at high temperatures. Rapid cooling of a saturated solution produces crystals of the pure substance." },
        { "id": 45, "topic": "Separation Techniques", "question": "Which method is used to separate a mixture of immiscible liquids such as kerosene and water?", "options": ["Separating funnel — the two immiscible liquids form separate density-based layers that can be drained independently", "Evaporation — the water evaporates, leaving the kerosene", "Filtration — using filter paper to trap the kerosene", "Simple distillation — the liquids are boiled and condensed separately"], "answer": "Separating funnel — the two immiscible liquids form separate density-based layers that can be drained independently", "explanation": "Kerosene (less dense, upper layer) and water (denser, lower layer) separate by density. The stopcock allows each layer to be drained independently." },
        { "id": 46, "topic": "Separation Techniques", "question": "How are a mixture of iron filings and copper filings best separated?", "options": ["Magnetic separation — iron is ferromagnetic and attracted by a magnet; copper is non-magnetic", "Crystallisation from a common solvent at low temperature", "Evaporation from a mixed dissolved metallic solution", "Distillation from a mixed metallic melt"], "answer": "Magnetic separation — iron is ferromagnetic and attracted by a magnet; copper is non-magnetic", "explanation": "Iron's ferromagnetism makes it respond strongly to magnetic fields. Copper, being diamagnetic, is not attracted by a magnet." },
        { "id": 47, "topic": "Separation Techniques", "question": "Which separation method is used to separate several solutes that all dissolve in the same solvent?", "options": ["Evaporation to dryness — removes only the solvent", "Gravity filtration — separates only insoluble solids", "Chromatography — different solutes migrate at different rates through the stationary phase with the mobile phase solvent", "Sublimation — applicable only when one component sublimes"], "answer": "Chromatography — different solutes migrate at different rates through the stationary phase with the mobile phase solvent", "explanation": "Chromatography separates solutes based on their differential affinity for the stationary phase vs. the mobile phase, giving different migration distances (Rf values)." },
        { "id": 48, "topic": "Separation Techniques", "question": "The process in which heavier suspended impurities settle at the bottom of a liquid under gravity is called:", "options": ["Decantation", "Sedimentation", "Filtration", "Evaporation"], "answer": "Sedimentation", "explanation": "Sedimentation is the gravitational settling of dense particles. Decantation is the subsequent pouring off of the clear liquid above the sediment." },
        { "id": 49, "topic": "Lab Safety", "question": "If a laboratory fire breaks out involving a burning organic solvent, what should be done FIRST?", "options": ["Pour water directly onto the flame to extinguish it quickly", "Smother the fire with a fire blanket or damp cloth — water can spread burning organic liquid and worsen the fire", "Blow out the flame with a fan directed at the burning liquid", "Immediately leave the lab and do not attempt to extinguish it"], "answer": "Smother the fire with a fire blanket or damp cloth — water can spread burning organic liquid and worsen the fire", "explanation": "Water floats organic solvents and spreads the fire. Smothering cuts off the oxygen supply. Always use CO₂ extinguisher or fire blanket for solvent fires." },
        { "id": 50, "topic": "Lab Safety", "question": "What Personal Protective Equipment (PPE) is essential in the chemistry laboratory at all times?", "options": ["Only a lab coat to protect clothing from spills", "Only safety goggles to protect the eyes from splashes", "Laboratory coat, safety goggles, and closed-toe shoes — at minimum; gloves when handling corrosive, toxic, or carcinogenic substances", "No PPE is required for simple, room-temperature experiments"], "answer": "Laboratory coat, safety goggles, and closed-toe shoes — at minimum; gloves when handling corrosive, toxic, or carcinogenic substances", "explanation": "The minimum PPE in any chemistry lab are lab coat (body protection), safety goggles (eye protection), and closed shoes (foot protection from spills and broken glass)." },
        { "id": 51, "topic": "Lab Safety", "question": "What does the COSHH acronym stand for in laboratory safety?", "options": ["Chemical Operations Safe Substance Handling", "Control of Substances Hazardous to Health", "Certified Operations for Safe Substance Handling in Hospitals", "Chemical Oversight for Safety and Substance Handling"], "answer": "Control of Substances Hazardous to Health", "explanation": "COSHH (Control of Substances Hazardous to Health) is the regulatory framework requiring risk assessment and safe handling procedures for hazardous chemicals." },
        { "id": 52, "topic": "Lab Apparatus", "question": "Why is Teflon (PTFE) used for stopcock plugs, tubing, and seals in laboratory apparatus?", "options": ["Because it is transparent and allows colour changes to be observed easily", "Because it is the cheapest and most available polymer material", "Because it is chemically inert to virtually all common chemicals including strong acids, bases, and organic solvents", "Because it is an excellent conductor of heat and electricity"], "answer": "Because it is chemically inert to virtually all common chemicals including strong acids, bases, and organic solvents", "explanation": "PTFE (Teflon) has exceptional chemical resistance due to strong C-F bonds that resist attack by virtually all laboratory chemicals, making it ideal for seals and stopcocks." },
        { "id": 53, "topic": "Organic Chemistry", "question": "Which of the following is the simplest member of all organic compounds?", "options": ["Formic acid (HCOOH) — the simplest carboxylic acid", "Formaldehyde (HCHO) — the simplest aldehyde", "Methane (CH₄) — the simplest alkane, hydrocarbon, and organic compound", "Methanol (CH₃OH) — the simplest alcohol"], "answer": "Methane (CH₄) — the simplest alkane, hydrocarbon, and organic compound", "explanation": "Methane (CH₄) has just one carbon and four hydrogens. It is the first member of the alkane homologous series and the simplest of all organic compounds." },
        { "id": 54, "topic": "Lab Apparatus", "question": "The Liebig condenser consists of an inner glass tube and an outer glass jacket. What is its function in distillation?", "options": ["To increase the boiling point of the liquid being distilled", "To cool and condense vapour from the flask into liquid distillate using cold water flowing through the outer jacket", "To separate gases by molecular weight in a density gradient", "To precisely measure the temperature of the boiling liquid"], "answer": "To cool and condense vapour from the flask into liquid distillate using cold water flowing through the outer jacket", "explanation": "The Liebig condenser uses flowing cold water in the outer jacket to cool and condense vapour passing through the inner tube, converting it back to liquid distillate." },
        { "id": 55, "topic": "Lab Apparatus", "question": "A Buchner funnel is made of perforated porcelain. When connected to a Buchner flask and vacuum pump, what process does it enable?", "options": ["Simple gravity filtration using folded filter paper in a conical funnel", "Fractional distillation of close-boiling liquid mixtures", "Filtration under suction (reduced pressure), which is faster and leaves the solid drier", "Intermittent supply of liquid acid reagents to a reaction mixture"], "answer": "Filtration under suction (reduced pressure), which is faster and leaves the solid drier", "explanation": "Vacuum filtration through a Buchner funnel is 10× faster than gravity filtration and produces much drier filter cakes — essential for collecting crystalline products." },
        { "id": 56, "topic": "Lab Apparatus", "question": "To accurately measure and transfer exactly 25.0 cm³ of a liquid for a titration, which apparatus should be used?", "options": ["A 100 mL measuring cylinder read to the nearest 0.5 mL", "A 250 mL conical flask filled to a graduation mark", "A 25 cm³ bulb (transfer) pipette calibrated to deliver precisely 25.00 cm³", "A 50 mL beaker with printed graduation marks"], "answer": "A 25 cm³ bulb (transfer) pipette calibrated to deliver precisely 25.00 cm³", "explanation": "A bulb (one-mark) pipette delivers exactly one fixed volume with the highest accuracy (±0.04 cm³), far superior to measuring cylinders or beakers." },
        { "id": 57, "topic": "Lab Apparatus", "question": "Why is a round-bottomed flask (RBF) preferred over a flat-bottomed flask for distillation and reflux?", "options": ["Because it is cheaper and more readily available than flat-bottomed flasks", "Because it holds more liquid than a flat-bottomed flask of the same size", "Because the curved surface distributes heat evenly and prevents the glass from cracking under thermal stress", "Because it can be stoppered more easily with a rubber bung"], "answer": "Because the curved surface distributes heat evenly and prevents the glass from cracking under thermal stress", "explanation": "Curved glassware distributes thermal stress evenly. Flat-bottomed flasks concentrate stress at corners and can crack when heated strongly." },
        { "id": 58, "topic": "Lab Apparatus", "question": "A thistle funnel has a bulb top and a long, narrow stem. What is it used for in gas preparation?", "options": ["Filtering solid impurities from a liquid solvent", "Adding a liquid reagent (acid) to a solid inside a flask, allowing controlled introduction while sealing the apparatus", "Separating two immiscible liquid layers in an extraction", "Dispensing a measured volume of indicator to a conical flask"], "answer": "Adding a liquid reagent (acid) to a solid inside a flask, allowing controlled introduction while sealing the apparatus", "explanation": "The thistle funnel allows addition of acid dropwise to the solid reactant while keeping the gas-generation apparatus sealed, controlling the rate of gas production." },
        { "id": 59, "topic": "Lab Apparatus", "question": "In a titration set-up, why is a white tile or sheet of white paper placed beneath the conical flask?", "options": ["To prevent the flask from sliding or moving during swirling", "To keep the flask and its contents warm during the reaction", "To provide a sharp, bright white background making the colour change at the endpoint easier to detect", "To reflect heat from below and maintain a steady reaction temperature"], "answer": "To provide a sharp, bright white background making the colour change at the endpoint easier to detect", "explanation": "The white background maximises contrast at the titration endpoint, helping the analyst detect the precise moment of permanent colour change." },
