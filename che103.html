        { "id": 95, "topic": "Organic Chemistry", "question": "Which of the following is the simplest member of organic compounds?", "options": ["Formic acid", "Formaldehyde", "Methane", "Methanol"], "answer": "Methane", "explanation": "Methane (CH₄) is the simplest alkane and the simplest organic compound, consisting of one carbon atom bonded to four hydrogen atoms." },
        { "id": 96, "topic": "Organic Chemistry", "question": "Hydrocarbons are organic compounds with element ________.", "options": ["Both hydrogen and carbon", "Carbon", "Hydrogen", "Oxygen"], "answer": "Both hydrogen and carbon", "explanation": "Hydrocarbons by definition contain ONLY hydrogen and carbon atoms. Examples include methane (CH₄), ethane (C₂H₆), and benzene (C₆H₆)." },
        { "id": 97, "topic": "Analytical Calculations", "question": "With increase in temperature, which of these changes?", "options": ["Molality", "Fraction of solute present in water", "Weight fraction of solute", "Mole fraction"], "answer": "Weight fraction of solute", "explanation": "Molality, mole fraction, and mass fraction are all temperature-independent. Molarity changes with temperature as volume is temperature-dependent." },
        { "id": 98, "topic": "Indicators & Redox", "question": "What is the potential value of standard hydrogen electrode (SHE) at 298K?", "options": ["0", "2", "10", "-1.44"], "answer": "0", "explanation": "By international convention, the standard hydrogen electrode (SHE) is assigned a standard electrode potential of exactly 0 V at all temperatures." },
        { "id": 99, "topic": "Separation Techniques", "question": "Which of the following methods can be used to separate a mixture of iron and copper fillings?", "options": ["Magnetic separation", "Crystallisation", "Evaporation", "Distillation"], "answer": "Magnetic separation", "explanation": "Iron is ferromagnetic and is attracted to a magnet, while copper is non-magnetic. A magnet easily separates the two metals." },
        { "id": 100, "topic": "Indicators & Redox", "question": "In photosynthesis reaction water is oxidised into ____________.", "options": ["H₂", "CO₂", "C₆H₁₂O₆", "O₂"], "answer": "O₂", "explanation": "In photosynthesis, water molecules are split (oxidised) by light energy: 2H₂O → 4H⁺ + 4e⁻ + O₂. The oxygen is released as a byproduct." },
        { "id": 101, "topic": "Indicators & Redox", "question": "What is the correct statement for 'reducing agent'?", "options": ["It has a higher oxidation state", "It withdraws electrons", "It reduces oxidising agents by donating electrons", "It gets reduced itself in the redox reaction"], "answer": "It reduces oxidising agents by donating electrons", "explanation": "A reducing agent donates electrons to other species (oxidising agents), causing them to be reduced. The reducing agent itself gets oxidised." },
        { "id": 102, "topic": "Analytical Calculations", "question": "25 mL of a solution of barium hydroxide on titration with 0.1 molar solution of hydrochloric acid gave titer value of 35 mL. The molarity of barium hydroxide solution was:", "options": ["0.07", "0.14", "0.28", "0.35"], "answer": "0.07", "explanation": "Ba(OH)₂ + 2HCl → BaCl₂ + 2H₂O. Moles HCl = 0.035×0.1 = 0.0035. Moles Ba(OH)₂ = 0.0035/2 = 0.00175. Molarity = 0.00175/0.025 = 0.07 M." },
        { "id": 103, "topic": "Indicators & Redox", "question": "When do we use Buffer Solution?", "options": ["To make the solution basic", "To make the solution acidic", "To prevent solution's pH change", "None of the above"], "answer": "To prevent solution's pH change", "explanation": "A buffer solution resists changes in pH when small amounts of acid or base are added, maintaining a relatively constant pH." },
        { "id": 104, "topic": "Indicators & Redox", "question": "What type of indicator is Chlorophenol Red?", "options": ["Redox indicator", "Colorimetric indicator", "Adsorption indicator", "Radioactive indicator"], "answer": "Colorimetric indicator", "explanation": "Chlorophenol Red is a pH colorimetric indicator that changes colour based on the hydrogen ion concentration of the solution." },
        { "id": 105, "topic": "Indicators & Redox", "question": "What is the colour of the Phenolsulfonphthalein indicator at pH 7.0?", "options": ["Red", "Violet", "Green", "Yellow"], "answer": "Yellow", "explanation": "Phenol Red (Phenolsulfonphthalein) appears yellow below pH 6.8, orange-red at neutral pH 7, and bright pink/red above pH 8.4." },
        { "id": 106, "topic": "Indicators & Redox", "question": "Why does the colour of [Fe(SCN)]²⁺ solution appear red?", "options": ["Complex add red radiation to solvent", "Absorbs in the complementary green region and transmit red component", "Absorbs in the red region", "None of the above"], "answer": "Absorbs in the complementary green region and transmit red component", "explanation": "The Fe(SCN)²⁺ complex absorbs green light (complementary colour) and transmits red light, which is what we perceive as the red colour." },
        { "id": 107, "topic": "Separation Techniques", "question": "How is Oil and Hexane separated?", "options": ["Distillation", "Separating funnel", "Crystallization", "Electrophoresis"], "answer": "Separating funnel", "explanation": "Oil and hexane are immiscible liquids that form separate layers. A separating funnel allows the denser layer to be drained off independently." },
        { "id": 108, "topic": "Lab Apparatus", "question": "Selection of filter paper depends on size of particles to be ________.", "options": ["filtered", "dried", "decolorized", "decanted"], "answer": "filtered", "explanation": "Filter paper pore size is chosen based on the size of the particles to be filtered — coarser particles use larger pore size paper." },

        /* ══ SECTION 9: ATOMIC STRUCTURE & PERIODIC TABLE ══ */
        { "id": 109, "topic": "Atomic Structure", "question": "Which subatomic particle determines the atomic number of an element?", "options": ["Neutron", "Proton", "Electron", "Positron"], "answer": "Proton", "explanation": "The atomic number (Z) equals the number of protons in the nucleus. It uniquely identifies an element and determines its position in the periodic table." },
        { "id": 110, "topic": "Atomic Structure", "question": "The mass number of an atom is defined as:", "options": ["Number of protons only", "Number of neutrons only", "Number of protons + number of neutrons", "Number of electrons + number of protons"], "answer": "Number of protons + number of neutrons", "explanation": "Mass number (A) = number of protons (Z) + number of neutrons (N). Electrons contribute negligible mass and are not included in the mass number." },
        { "id": 111, "topic": "Atomic Structure", "question": "Isotopes of an element have the same number of protons but different numbers of:", "options": ["Electrons", "Protons", "Neutrons", "Positrons"], "answer": "Neutrons", "explanation": "Isotopes are atoms of the same element (same Z, same number of protons) that differ in the number of neutrons, giving different mass numbers." },
        { "id": 112, "topic": "Atomic Structure", "question": "The maximum number of electrons that can occupy the second shell (n=2) is:", "options": ["2", "8", "18", "32"], "answer": "8", "explanation": "The maximum electrons per shell = 2n². For n=2: 2×(2²) = 8. The second shell has 2 subshells: 2s (max 2 electrons) and 2p (max 6 electrons), total = 8." },
        { "id": 113, "topic": "Atomic Structure", "question": "Which of the following best describes an ionic bond?", "options": ["Sharing of electron pairs between two atoms of similar electronegativity", "Electrostatic attraction between oppositely charged ions formed by electron transfer", "Attraction between a hydrogen atom and a highly electronegative atom", "Delocalized electrons shared across a metallic lattice"], "answer": "Electrostatic attraction between oppositely charged ions formed by electron transfer", "explanation": "Ionic bonds form when a metal transfers one or more electrons to a non-metal, creating oppositely charged ions (cation and anion) that attract each other electrostatically." },
        { "id": 114, "topic": "Atomic Structure", "question": "The electron configuration of sodium (atomic number 11) is:", "options": ["2, 8, 1", "2, 9", "2, 8, 3", "2, 6, 3"], "answer": "2, 8, 1", "explanation": "Na (Z=11): 2 electrons fill shell 1, 8 fill shell 2, leaving 1 electron in shell 3. Configuration: 2, 8, 1 or 1s² 2s² 2p⁶ 3s¹." },
        { "id": 115, "topic": "Atomic Structure", "question": "Which group of the periodic table contains the alkali metals?", "options": ["Group 0 (Group 18)", "Group I (Group 1)", "Group II (Group 2)", "Group VII (Group 17)"], "answer": "Group I (Group 1)", "explanation": "Group I (Group 1) contains the alkali metals: Li, Na, K, Rb, Cs, Fr. They have one valence electron and readily lose it to form +1 cations." },
        { "id": 116, "topic": "Atomic Structure", "question": "Across a period from left to right in the periodic table, atomic radius:", "options": ["Increases because more electrons are added", "Decreases because nuclear charge increases while electron shielding stays roughly constant", "Stays the same because electrons fill the same shell", "First increases then decreases at the transition metals"], "answer": "Decreases because nuclear charge increases while electron shielding stays roughly constant", "explanation": "Across a period, protons increase (higher nuclear charge), pulling electrons closer to the nucleus. Shielding remains similar as electrons fill the same shell." },

        /* ══ SECTION 10: CHEMICAL BONDING ══ */
        { "id": 117, "topic": "Chemical Bonding", "question": "A covalent bond is formed by:", "options": ["Transfer of electrons from metal to non-metal", "Sharing of electron pairs between two atoms", "Electrostatic attraction between oppositely charged ions", "Delocalized electrons in a metallic lattice"], "answer": "Sharing of electron pairs between two atoms", "explanation": "Covalent bonds form when two atoms share one or more pairs of electrons, achieving a stable noble gas configuration. E.g. H₂, Cl₂, H₂O." },
        { "id": 118, "topic": "Chemical Bonding", "question": "The shape of a water molecule (H₂O) is:", "options": ["Linear — all atoms in a straight line", "Trigonal planar — three bonds at 120°", "V-shaped (bent) — due to two lone pairs repelling the bonding pairs", "Tetrahedral — four equal bond angles of 109.5°"], "answer": "V-shaped (bent) — due to two lone pairs repelling the bonding pairs", "explanation": "H₂O has 2 bonding pairs and 2 lone pairs. The lone pairs repel more strongly, compressing the H-O-H bond angle to ~104.5°, giving a bent (V-shaped) molecule." },
        { "id": 119, "topic": "Chemical Bonding", "question": "Which of the following molecules has a linear shape?", "options": ["H₂O (water)", "NH₃ (ammonia)", "CO₂ (carbon dioxide)", "CH₄ (methane)"], "answer": "CO₂ (carbon dioxide)", "explanation": "CO₂ has two double bonds and no lone pairs on the central carbon. The two bond pairs repel equally, giving a linear shape with a bond angle of 180°." },
        { "id": 120, "topic": "Chemical Bonding", "question": "Hydrogen bonding occurs between molecules that contain:", "options": ["Any hydrogen atom and any other atom", "A hydrogen atom bonded to N, O, or F — and a lone pair on another N, O, or F atom", "Hydrogen and a metallic element only", "Any two polar molecules with a dipole moment"], "answer": "A hydrogen atom bonded to N, O, or F — and a lone pair on another N, O, or F atom", "explanation": "Hydrogen bonds form between the δ⁺ hydrogen on N-H, O-H, or F-H and the lone pair of electrons on N, O, or F of a neighbouring molecule." },
        { "id": 121, "topic": "Chemical Bonding", "question": "Which property of water is explained by hydrogen bonding?", "options": ["Its ability to dissolve ionic compounds", "Its unusually high boiling point (100°C) for a molecule of its size", "Its colourless and odourless nature", "Its reaction with metals to produce hydrogen gas"], "answer": "Its unusually high boiling point (100°C) for a molecule of its size", "explanation": "Without hydrogen bonding, water's b.p. would be about -80°C (like H₂S, -60°C). Hydrogen bonds require extra energy to break, giving water its anomalously high boiling point." },

        /* ══ SECTION 11: ACIDS, BASES & SALTS ══ */
        { "id": 122, "topic": "Acids, Bases & Salts", "question": "According to the Brønsted-Lowry theory, an acid is defined as:", "options": ["A substance that produces OH⁻ ions in solution", "A proton (H⁺) donor — it gives a proton to another substance", "An electron pair acceptor (Lewis acid)", "A substance with pH less than 5"], "answer": "A proton (H⁺) donor — it gives a proton to another substance", "explanation": "Brønsted-Lowry: an acid is a proton donor and a base is a proton acceptor. E.g. HCl → H⁺ + Cl⁻ (HCl donates H⁺, so it is an acid)." },
        { "id": 123, "topic": "Acids, Bases & Salts", "question": "What is the pH of a neutral solution at 25°C?", "options": ["0", "7", "14", "It depends on the concentration of water"], "answer": "7", "explanation": "At 25°C, pure water has [H⁺] = [OH⁻] = 10⁻⁷ mol/L. pH = -log[H⁺] = -log(10⁻⁷) = 7. Below 7 is acidic; above 7 is alkaline." },
        { "id": 124, "topic": "Acids, Bases & Salts", "question": "Which of the following is a strong acid?", "options": ["Acetic acid (CH₃COOH)", "Hydrochloric acid (HCl)", "Carbonic acid (H₂CO₃)", "Formic acid (HCOOH)"], "answer": "Hydrochloric acid (HCl)", "explanation": "HCl is a strong acid — it fully dissociates in water: HCl → H⁺ + Cl⁻. Acetic, carbonic, and formic acids are weak acids that only partially dissociate." },
        { "id": 125, "topic": "Acids, Bases & Salts", "question": "The reaction between an acid and a metal carbonate produces:", "options": ["A salt, hydrogen gas, and water", "A salt, carbon dioxide gas, and water", "A salt and hydrogen gas only", "An oxide, carbon dioxide, and water"], "answer": "A salt, carbon dioxide gas, and water", "explanation": "Acid + Carbonate → Salt + CO₂ + H₂O. E.g. 2HCl + CaCO₃ → CaCl₂ + CO₂ + H₂O. The CO₂ effervescence is a test for carbonates." },
        { "id": 126, "topic": "Acids, Bases & Salts", "question": "What is produced when sodium hydroxide (NaOH) reacts with sulphuric acid (H₂SO₄)?", "options": ["Sodium sulphate and hydrogen", "Sodium sulphate and water", "Sodium hydrogen sulphate and water only", "Sodium oxide and sulphurous acid"], "answer": "Sodium sulphate and water", "explanation": "NaOH + H₂SO₄ → Na₂SO₄ + H₂O (neutralisation). With excess NaOH: 2NaOH + H₂SO₄ → Na₂SO₄ + 2H₂O." },
        { "id": 127, "topic": "Acids, Bases & Salts", "question": "An amphoteric substance is one that can:", "options": ["React with both water and alcohol", "Act as both an acid (proton donor) and a base (proton acceptor)", "Dissolve in both polar and non-polar solvents", "Form both ionic and covalent bonds"], "answer": "Act as both an acid (proton donor) and a base (proton acceptor)", "explanation": "Amphoteric substances react with both acids and bases. Examples: Al(OH)₃, Zn(OH)₂, water (H₂O), and amino acids." },
        { "id": 128, "topic": "Acids, Bases & Salts", "question": "The indicator methyl orange is red in acid and yellow in alkali. What colour does it show at its end point (pH ~4)?", "options": ["Yellow", "Red", "Orange", "Blue"], "answer": "Orange", "explanation": "Methyl orange transitions from red (acid, pH < 3.1) through orange (at transition pH ~4) to yellow (alkali, pH > 4.4). The endpoint is orange." },

        /* ══ SECTION 12: ENERGETICS & THERMOCHEMISTRY ══ */
        { "id": 129, "topic": "Energetics", "question": "If the enthalpy of products is lower than the enthalpy of reactants, the reaction is:", "options": ["Endothermic", "Exothermic", "Isothermal", "Catalytic"], "answer": "Exothermic", "explanation": "A lower final enthalpy means energy was lost (given off) to the surroundings during the reaction. ΔH is negative for exothermic reactions." },
        { "id": 130, "topic": "Energetics", "question": "What is the standard enthalpy of formation (ΔHf°) for an element in its standard state?", "options": ["100 kJ/mol", "1 kJ/mol", "0 kJ/mol", "It varies depending on temperature"], "answer": "0 kJ/mol", "explanation": "By thermodynamic convention, the standard enthalpy of formation of any element in its most stable form at standard conditions is exactly zero." },
        { "id": 131, "topic": "Energetics", "question": "Hess's Law states that:", "options": ["The enthalpy change of a reaction depends on the pathway taken", "The total enthalpy change is the same regardless of the route, as long as initial and final states are the same", "Endothermic reactions cannot occur spontaneously", "All combustion reactions release exactly the same amount of heat"], "answer": "The total enthalpy change is the same regardless of the route, as long as initial and final states are the same", "explanation": "Hess's Law (conservation of energy): ΔH for a reaction is independent of the pathway. This allows calculation of ΔH for reactions that cannot be measured directly." },
        { "id": 132, "topic": "Energetics", "question": "An endothermic reaction is one in which:", "options": ["Heat is released to the surroundings and the products have lower energy than reactants", "Heat is absorbed from the surroundings and the products have higher energy than reactants", "The temperature of the reaction mixture rises during the reaction", "No energy change occurs and ΔH = 0"], "answer": "Heat is absorbed from the surroundings and the products have higher energy than reactants", "explanation": "In endothermic reactions, ΔH is positive. Energy is absorbed from the surroundings, so the surroundings cool down. E.g. dissolution of ammonium nitrate in water." },
        { "id": 133, "topic": "Energetics", "question": "Which of the following is an exothermic process?", "options": ["Melting of ice (solid → liquid)", "Evaporation of water (liquid → vapour)", "Combustion of methane (CH₄ + 2O₂ → CO₂ + 2H₂O)", "Dissolution of ammonium chloride in water"], "answer": "Combustion of methane (CH₄ + 2O₂ → CO₂ + 2H₂O)", "explanation": "Combustion is always exothermic — it releases energy as heat and light. Melting and evaporation are endothermic (absorb energy to break intermolecular forces)." },

        /* ══ SECTION 13: CHEMICAL KINETICS ══ */
        { "id": 134, "topic": "Chemical Kinetics", "question": "Which of the following does NOT affect the rate of a chemical reaction?", "options": ["Temperature", "Concentration of reactants", "Presence of a catalyst", "The standard electrode potential of the reaction"], "answer": "The standard electrode potential of the reaction", "explanation": "Rate of reaction is affected by temperature, concentration, pressure (for gases), surface area, and catalysts. Standard electrode potential is a thermodynamic quantity, not a kinetic one." },
        { "id": 135, "topic": "Chemical Kinetics", "question": "A catalyst increases the rate of reaction by:", "options": ["Increasing the concentration of reactants", "Providing an alternative reaction pathway with a lower activation energy", "Increasing the temperature of the reaction mixture", "Increasing the pressure of gaseous reactants"], "answer": "Providing an alternative reaction pathway with a lower activation energy", "explanation": "A catalyst provides an alternative pathway with lower activation energy (Ea). More molecules have enough energy to react, so the rate increases, but ΔH remains the same." },
        { "id": 136, "topic": "Chemical Kinetics", "question": "Increasing the temperature of a reaction generally increases the reaction rate because:", "options": ["It decreases the activation energy required", "It increases the frequency of collisions AND the proportion of molecules with energy ≥ Ea", "It increases the concentration of reactants in solution", "It changes the equilibrium constant K"], "answer": "It increases the frequency of collisions AND the proportion of molecules with energy ≥ Ea", "explanation": "Higher temperature means more kinetic energy: molecules move faster (more frequent collisions) and more molecules exceed the activation energy threshold." },
        { "id": 137, "topic": "Chemical Kinetics", "question": "For a heterogeneous reaction (solid + solution), increasing the surface area of the solid:", "options": ["Decreases the reaction rate by exposing fewer reactive sites", "Increases the reaction rate by providing more collision sites per unit time", "Has no effect on rate — only concentration matters", "Changes the equilibrium position of the reaction"], "answer": "Increases the reaction rate by providing more collision sites per unit time", "explanation": "Grinding a solid into powder greatly increases surface area, exposing more reactive particles to the solution and increasing the frequency of productive collisions." },

        /* ══ SECTION 14: ELECTROCHEMISTRY ══ */
        { "id": 138, "topic": "Electrochemistry", "question": "During the electrolysis of dilute sulphuric acid, what is produced at the cathode?", "options": ["Oxygen gas", "Sulphur dioxide gas", "Hydrogen gas", "Sulphate ions are discharged"], "answer": "Hydrogen gas", "explanation": "At the cathode (negative electrode), H⁺ ions are reduced: 2H⁺ + 2e⁻ → H₂. At the anode, water is oxidised: 2H₂O → O₂ + 4H⁺ + 4e⁻." },
        { "id": 139, "topic": "Electrochemistry", "question": "Faraday's first law of electrolysis states that:", "options": ["The mass of substance deposited is inversely proportional to the current", "The mass of substance deposited at an electrode is directly proportional to the quantity of electricity (charge) passed", "Equal volumes of different gases are always deposited at electrodes", "The voltage required for electrolysis depends on the electrode material only"], "answer": "The mass of substance deposited at an electrode is directly proportional to the quantity of electricity (charge) passed", "explanation": "Faraday's 1st law: m = (M × Q)/(n × F), where m = mass, M = molar mass, Q = charge, n = electron count, F = Faraday constant (96,485 C/mol)." },
        { "id": 140, "topic": "Electrochemistry", "question": "In a galvanic (voltaic) cell, oxidation occurs at the:", "options": ["Cathode (positive electrode)", "Anode (negative electrode)", "Salt bridge", "External circuit wire"], "answer": "Anode (negative electrode)", "explanation": "In a galvanic cell: oxidation (loss of electrons) occurs at the anode (negative). Reduction (gain of electrons) occurs at the cathode (positive). Electrons flow from anode to cathode externally." },
        { "id": 141, "topic": "Electrochemistry", "question": "The standard electrode potential of the Zn²⁺/Zn half-cell is −0.76 V. What does the negative sign indicate?", "options": ["Zinc is a weaker reducing agent than hydrogen", "Zinc is a stronger reducing agent than hydrogen — it is more easily oxidised than H₂", "The cell reaction is endothermic", "Zinc cannot undergo electrolysis"], "answer": "Zinc is a stronger reducing agent than hydrogen — it is more easily oxidised than H₂", "explanation": "A negative E° means the half-cell has a greater tendency to be oxidised than the SHE. Zinc readily loses electrons (Zn → Zn²⁺ + 2e⁻), making it a good reducing agent." },

        /* ══ SECTION 15: STOICHIOMETRY & MOLES ══ */
        { "id": 142, "topic": "Stoichiometry", "question": "Avogadro's number (Avogadro's constant) is approximately:", "options": ["6.02 × 10²⁰", "6.02 × 10²³", "6.02 × 10²⁶", "6.02 × 10¹⁶"], "answer": "6.02 × 10²³", "explanation": "Avogadro's constant (Nₐ) = 6.022 × 10²³ mol⁻¹. It is the number of atoms, molecules, or ions in one mole of a substance." },
        { "id": 143, "topic": "Stoichiometry", "question": "The molar mass of H₂SO₄ is: (H=1, S=32, O=16)", "options": ["64 g/mol", "80 g/mol", "96 g/mol", "98 g/mol"], "answer": "98 g/mol", "explanation": "H₂SO₄: 2(1) + 32 + 4(16) = 2 + 32 + 64 = 98 g/mol." },
        { "id": 144, "topic": "Stoichiometry", "question": "How many moles of atoms are in 24 g of carbon? (Ar of C = 12)", "options": ["0.5 mol", "1 mol", "2 mol", "24 mol"], "answer": "2 mol", "explanation": "Moles = mass ÷ molar mass = 24 ÷ 12 = 2 mol of carbon atoms." },
        { "id": 145, "topic": "Stoichiometry", "question": "The empirical formula of a compound is the:", "options": ["Actual number of atoms of each element in one molecule", "Simplest whole number ratio of atoms of each element present", "Structural arrangement of atoms in the molecule", "Total molecular weight of the compound"], "answer": "Simplest whole number ratio of atoms of each element present", "explanation": "The empirical formula shows the simplest ratio. E.g. glucose C₆H₁₂O₆ has the empirical formula CH₂O (ratio 1:2:1)." },
        { "id": 146, "topic": "Stoichiometry", "question": "What mass of water is produced when 4 g of hydrogen completely combusts in excess oxygen? (H=1, O=16)", "options": ["18 g", "32 g", "36 g", "64 g"], "answer": "36 g", "explanation": "2H₂ + O₂ → 2H₂O. Moles H₂ = 4/2 = 2 mol. Moles H₂O = 2 mol. Mass H₂O = 2 × 18 = 36 g." },
        { "id": 147, "topic": "Stoichiometry", "question": "A 25.0 mL sample of 0.200 M NaOH requires 20.0 mL of HCl for complete neutralisation. What is the concentration of HCl?", "options": ["0.160 M", "0.200 M", "0.250 M", "0.400 M"], "answer": "0.250 M", "explanation": "NaOH + HCl → NaCl + H₂O (1:1 ratio). Moles NaOH = 0.025 × 0.200 = 0.005 mol. Moles HCl = 0.005 mol. [HCl] = 0.005/0.020 = 0.250 M." },

        /* ══ SECTION 16: GAS LAWS ══ */
        { "id": 148, "topic": "Gas Laws", "question": "Boyle's Law states that, at constant temperature, the pressure of a fixed mass of gas is:", "options": ["Directly proportional to its volume", "Inversely proportional to its volume (P ∝ 1/V)", "Independent of its volume", "Directly proportional to the square of its volume"], "answer": "Inversely proportional to its volume (P ∝ 1/V)", "explanation": "Boyle's Law: P₁V₁ = P₂V₂ at constant temperature. If volume doubles, pressure halves. Gas molecules spread further apart, hitting the walls less frequently." },
        { "id": 149, "topic": "Gas Laws", "question": "Charles's Law states that, at constant pressure, the volume of a fixed mass of gas is:", "options": ["Inversely proportional to the absolute temperature", "Directly proportional to the absolute temperature (V ∝ T)", "Independent of temperature", "Proportional to the square root of temperature"], "answer": "Directly proportional to the absolute temperature (V ∝ T)", "explanation": "Charles's Law: V₁/T₁ = V₂/T₂ at constant pressure. As temperature rises, gas molecules move faster and occupy more volume. Temperature must be in Kelvin." },
        { "id": 150, "topic": "Gas Laws", "question": "The ideal gas equation is PV = nRT. What does R represent?", "options": ["Rate of reaction constant", "The universal gas constant (8.314 J mol⁻¹ K⁻¹)", "Ratio of products to reactants at equilibrium", "Relative atomic mass of the gas"], "answer": "The universal gas constant (8.314 J mol⁻¹ K⁻¹)", "explanation": "R is the universal (molar) gas constant = 8.314 J mol⁻¹ K⁻¹ = 0.08206 L atm mol⁻¹ K⁻¹. It relates pressure, volume, moles, and temperature for ideal gases." },
        { "id": 151, "topic": "Gas Laws", "question": "At standard temperature and pressure (STP), one mole of an ideal gas occupies approximately:", "options": ["11.2 L", "22.4 L", "33.6 L", "44.8 L"], "answer": "22.4 L", "explanation": "At STP (0°C = 273.15 K, 1 atm), 1 mole of any ideal gas occupies 22.4 L (the molar volume). This is useful for gas stoichiometry calculations." },
        { "id": 152, "topic": "Gas Laws", "question": "Graham's Law of diffusion states that the rate of diffusion of a gas is:", "options": ["Directly proportional to its molecular mass", "Directly proportional to the square root of its molecular mass", "Inversely proportional to the square root of its molecular mass", "Independent of molecular mass at constant temperature"], "answer": "Inversely proportional to the square root of its molecular mass", "explanation": "Graham's Law: rate ∝ 1/√M. Lighter gases diffuse faster. E.g. H₂ (M=2) diffuses 4× faster than O₂ (M=32) since √(32/2) = √16 = 4." },

        /* ══ SECTION 17: SOLUTIONS & COLLIGATIVE PROPERTIES ══ */
        { "id": 153, "topic": "Solutions", "question": "Which of the following is an example of a colligative property?", "options": ["Colour of the solution", "Boiling point elevation", "Conductivity of the solution", "Viscosity of the solvent"], "answer": "Boiling point elevation", "explanation": "Colligative properties depend only on the number of solute particles, not their identity. Examples: boiling point elevation, freezing point depression, osmotic pressure, vapour pressure lowering." },
        { "id": 154, "topic": "Solutions", "question": "Adding a non-volatile solute to a solvent causes the boiling point of the solution to:", "options": ["Decrease — solute molecules lower the vapour pressure", "Increase — solute molecules raise the boiling point above the pure solvent's boiling point", "Remain unchanged — only the melting point changes", "Depend on the identity of the solute"], "answer": "Increase — solute molecules raise the boiling point above the pure solvent's boiling point", "explanation": "Dissolved solute particles reduce the vapour pressure (Raoult's Law). The solution must be heated to a higher temperature before vapour pressure equals atmospheric pressure — hence higher b.p." },
        { "id": 155, "topic": "Solutions", "question": "Osmosis is defined as the movement of solvent molecules through a semi-permeable membrane:", "options": ["From a region of high solute concentration to low solute concentration", "From a region of low solute concentration (high solvent) to high solute concentration (low solvent)", "Only from concentrated solution to dilute solution for ionic compounds", "Against the concentration gradient using active transport"], "answer": "From a region of low solute concentration (high solvent) to high solute concentration (low solvent)", "explanation": "Osmosis: solvent moves from dilute solution (high water potential) through a semi-permeable membrane to concentrated solution (low water potential)." },
        { "id": 156, "topic": "Solutions", "question": "Molarity is defined as:", "options": ["Moles of solute per kilogram of solvent", "Moles of solute per litre of solution", "Grams of solute per 100 mL of solvent", "Moles of solute per mole of solvent"], "answer": "Moles of solute per litre of solution", "explanation": "Molarity (M) = moles of solute / volume of solution in litres. E.g. dissolving 58.5 g NaCl (1 mol) in water to make 1 L gives 1 M NaCl solution." },
        { "id": 157, "topic": "Solutions", "question": "Molality is defined as:", "options": ["Moles of solute per litre of solution", "Moles of solute per kilogram of solvent", "Grams of solute per litre of solution", "Moles of solvent per mole of solute"], "answer": "Moles of solute per kilogram of solvent", "explanation": "Molality (m) = moles of solute / mass of solvent in kg. Unlike molarity, molality is independent of temperature because it uses mass (not volume) of solvent." },

        /* ══ SECTION 18: ENVIRONMENTAL & APPLIED CHEMISTRY ══ */
        { "id": 158, "topic": "Applied Chemistry", "question": "What is the primary cause of acid rain?", "options": ["Excess CO₂ in the atmosphere reacting with water vapour", "Oxides of sulphur (SO₂, SO₃) and nitrogen (NO, NO₂) dissolving in rainwater to form H₂SO₄ and HNO₃", "Chlorofluorocarbons (CFCs) reacting with atmospheric water", "Ozone (O₃) reacting with water droplets in clouds"], "answer": "Oxides of sulphur (SO₂, SO₃) and nitrogen (NO, NO₂) dissolving in rainwater to form H₂SO₄ and HNO₃", "explanation": "SO₂ + H₂O → H₂SO₃; SO₃ + H₂O → H₂SO₄; NO₂ + H₂O → HNO₃. These acids lower the pH of rain to below 5.6, causing acid rain." },
        { "id": 159, "topic": "Applied Chemistry", "question": "The Haber process is used for the industrial synthesis of:", "options": ["Sulphuric acid from SO₂ and O₂", "Ammonia from nitrogen and hydrogen", "Nitric acid from ammonia and oxygen", "Sodium hydroxide from sodium chloride by electrolysis"], "answer": "Ammonia from nitrogen and hydrogen", "explanation": "Haber process: N₂ + 3H₂ ⇌ 2NH₃. Conditions: 450°C, 200 atm, iron catalyst. About 150 million tonnes of NH₃ are produced annually for fertilisers." },
        { "id": 160, "topic": "Applied Chemistry", "question": "Hard water is caused by the presence of dissolved:", "options": ["NaCl and KCl — common table and potassium salts", "Ca²⁺ and Mg²⁺ ions from dissolved CaCO₃, CaSO₄, and MgSO₄", "CO₂ gas dissolved from the atmosphere", "Fe²⁺ ions from corroded pipes"], "answer": "Ca²⁺ and Mg²⁺ ions from dissolved CaCO₃, CaSO₄, and MgSO₄", "explanation": "Hard water contains Ca²⁺ and Mg²⁺ ions. These ions react with soap to form insoluble scum (metal stearates). They can be removed by ion exchange, boiling (temporary hardness), or adding Na₂CO₃." },

        /* ══ SECTION 19: EXTRA MIXED PRACTICE ══ */
        { "id": 161, "topic": "Organic Chemistry", "question": "What reagent is used to test for the presence of a C=C double bond (alkenes)?", "options": ["Fehling's solution — turns from blue to brick-red precipitate", "Bromine water — decolourised from orange/brown to colourless", "Tollens' reagent — forms a silver mirror", "Limewater — turns milky"], "answer": "Bromine water — decolourised from orange/brown to colourless", "explanation": "Alkenes undergo electrophilic addition with Br₂: CH₂=CH₂ + Br₂ → CH₂BrCH₂Br. Bromine water is decolourised instantly. Alkanes do not react with bromine water in the dark." },
        { "id": 162, "topic": "Organic Chemistry", "question": "Which reagent is used to distinguish an aldehyde from a ketone?", "options": ["Bromine water — decolourises with both", "Tollens' reagent (ammoniacal AgNO₃) — gives silver mirror with aldehydes only", "Concentrated H₂SO₄ — reacts with ketones only", "Limewater — turns milky with aldehydes only"], "answer": "Tollens' reagent (ammoniacal AgNO₃) — gives silver mirror with aldehydes only", "explanation": "Aldehydes are reducing agents and reduce Ag⁺ to Ag metal (silver mirror test). Ketones are not easily oxidised and give no reaction with Tollens' reagent." },
        { "id": 163, "topic": "Qualitative Analysis", "question": "Which gas is produced when a metal reacts with a dilute acid, and how is it tested?", "options": ["CO₂ — turns limewater milky", "O₂ — relights a glowing splint", "H₂ — gives a squeaky pop with a burning splint", "SO₂ — turns dichromate paper green"], "answer": "H₂ — gives a squeaky pop with a burning splint", "explanation": "Metals + dilute acid → salt + H₂. The squeaky pop test: a burning splint at the mouth of the test tube causes hydrogen to ignite with a characteristic 'pop'." },
        { "id": 164, "topic": "Qualitative Analysis", "question": "Limewater (Ca(OH)₂ solution) turns milky when which gas is passed through it?", "options": ["Oxygen (O₂)", "Hydrogen (H₂)", "Carbon dioxide (CO₂)", "Nitrogen (N₂)"], "answer": "Carbon dioxide (CO₂)", "explanation": "CO₂ + Ca(OH)₂ → CaCO₃↓ (white precipitate) + H₂O. The milky appearance is due to insoluble CaCO₃. Excess CO₂ redissolves the precipitate: CaCO₃ + CO₂ + H₂O → Ca(HCO₃)₂." },
        { "id": 165, "topic": "Analytical Calculations", "question": "How many molecules are in 0.5 mol of CO₂? (Nₐ = 6.02 × 10²³)", "options": ["3.01 × 10²³", "6.02 × 10²³", "1.20 × 10²⁴", "3.01 × 10²⁴"], "answer": "3.01 × 10²³", "explanation": "Number of molecules = moles × Nₐ = 0.5 × 6.02 × 10²³ = 3.01 × 10²³ molecules of CO₂." },
        { "id": 166, "topic": "Stoichiometry", "question": "In the reaction N₂ + 3H₂ → 2NH₃, how many moles of NH₃ are produced from 6 moles of H₂?", "options": ["2 mol", "3 mol", "4 mol", "6 mol"], "answer": "4 mol", "explanation": "From the equation, 3 mol H₂ produces 2 mol NH₃. So 6 mol H₂ produces (6/3) × 2 = 4 mol NH₃." },
        { "id": 167, "topic": "Chemical Kinetics", "question": "Which of the following will NOT increase the rate of the reaction between marble chips and dilute HCl?", "options": ["Increasing the temperature", "Using powdered marble instead of chips", "Adding more HCl to increase concentration", "Adding a solid catalyst that is insoluble in HCl"], "answer": "Adding a solid catalyst that is insoluble in HCl", "explanation": "A catalyst that cannot contact the reactants (insoluble marble chips and aqueous HCl system) cannot lower the activation energy and therefore would not affect the rate." },
        { "id": 168, "topic": "Atomic Structure", "question": "Which of the following elements has the largest atomic radius in Period 3 of the periodic table?", "options": ["Sodium (Na)", "Silicon (Si)", "Chlorine (Cl)", "Argon (Ar)"], "answer": "Sodium (Na)", "explanation": "Across Period 3, atomic radius decreases from Na to Cl as nuclear charge increases. Na has the largest radius in Period 3 as it has the lowest nuclear charge (Z=11) pulling its outermost electron." },
        { "id": 169, "topic": "Chemical Bonding", "question": "Which of the following substances has the highest melting point?", "options": ["NaCl (sodium chloride)", "SiO₂ (silicon dioxide — giant covalent)", "CO₂ (carbon dioxide)", "H₂O (water)"], "answer": "SiO₂ (silicon dioxide — giant covalent)", "explanation": "SiO₂ has a giant covalent lattice with millions of strong Si-O covalent bonds throughout — it requires very high energy to melt (~1650°C). NaCl has strong ionic bonds (~801°C). CO₂ is molecular and easily sublimes." },
        { "id": 170, "topic": "Acids, Bases & Salts", "question": "What is the pH of a 0.01 M HCl solution? (HCl fully dissociates)", "options": ["1", "2", "7", "12"], "answer": "2", "explanation": "[H⁺] = 0.01 M = 10⁻² M. pH = -log[H⁺] = -log(10⁻²) = 2. This confirms that stronger acids (higher concentration) give lower pH values." }
    ];

    /* ══════════════
       STATE VARS
    ══════════════ */
    let currentExamData = [], userAnswers = {}, currentIndex = 0;
    let timeRemaining = 0, timerId = null;
    let activeMode = 'practice', isReviewMode = false;
    let examSelectionType = 'random', partNum = 1;

    window.onload = () => {
        initDashboard();
        loadStatsBar();
        showResumeBanner();
        if (localStorage.getItem(STORAGE_KEY)) document.getElementById('resume-btn').style.display = 'block';
    };

    async function loadStatsBar() {
        const bar = document.getElementById('stats-bar');
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) return;
            const { data } = await db.from('test_results').select('score').eq('student_id', user.id).eq('course_id', COURSE_CODE);
            if (!data || data.length === 0) return;
            const taken = data.length;
            const avg  = Math.round(data.reduce((s, r) => s + r.score, 0) / taken);
            const best = Math.max(...data.map(r => r.score));
            bar.innerHTML = `
                <div class="stat-card"><div class="stat-val">${taken}</div><div class="stat-lbl">Tests Taken</div></div>
                <div class="stat-card"><div class="stat-val">${avg}%</div><div class="stat-lbl">Average Score</div></div>
                <div class="stat-card"><div class="stat-val">${best}%</div><div class="stat-lbl">Best Score</div></div>`;
            bar.style.display = 'grid';
        } catch (e) {}
    }

    function showResumeBanner() {
        const saved  = localStorage.getItem(STORAGE_KEY);
        const banner = document.getElementById('resume-banner');
        if (!saved || !banner) return;
        const s        = JSON.parse(saved);
        const answered = Object.keys(s.userAnswers).length;
        const total    = s.currentExamData.length;
        const label    = s.examSelectionType === 'random' ? 'Random Mix' : `Part ${s.partNum}`;
        const mLeft    = Math.floor(s.timeRemaining / 60);
        const sLeft    = s.timeRemaining % 60;
        const timeStr  = `${mLeft}:${sLeft < 10 ? '0'+sLeft : sLeft}`;
        const pct      = Math.round((answered / total) * 100);
        banner.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                <div>
                    <div style="font-weight:700;font-size:0.95rem;">📌 Resume Saved Exam</div>
                    <div style="font-size:0.82rem;color:var(--text-muted);margin-top:3px;">
                        <strong>${label}</strong> &nbsp;·&nbsp; ${answered}/${total} answered (${pct}%) &nbsp;·&nbsp; ⏱ ${timeStr} left
                    </div>
                </div>
                <div style="display:flex;gap:8px;flex-shrink:0;">
                    <button class="btn" style="background:var(--success);padding:8px 16px;font-size:0.87rem;" onclick="resumeExam()"><i class="fa-solid fa-rotate-right"></i> Continue</button>
                    <button class="btn" style="background:#64748b;padding:8px 16px;font-size:0.87rem;" onclick="discardSaved()"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;
        banner.style.display = 'block';
    }

    function discardSaved() {
        if (!confirm('Discard your saved exam progress?')) return;
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById('resume-banner').style.display = 'none';
        document.getElementById('resume-btn').style.display    = 'none';
    }

    function initDashboard() {
        const board = document.getElementById('dashboard');
        board.innerHTML = '';
        const total = MASTER_POOL.length;
        const parts = Math.ceil(total / 50);
        if (total === 0) { board.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);">No questions loaded.</p>`; return; }
        const rand = document.createElement('div');
        rand.className = 'box box-random';
        rand.innerHTML = `<div style="font-size:1.8rem;">🔀</div><h3>Random Mode</h3><p>${total} Questions</p>`;
        rand.onclick = () => openSetup('random', 0);
        board.appendChild(rand);
        for (let i = 1; i <= parts; i++) {
            const start = (i - 1) * 50 + 1;
            const end   = Math.min(i * 50, total);
            const card  = document.createElement('div');
            card.className = 'box';
            card.innerHTML = `<div style="font-size:1.8rem;color:var(--primary);">⚗️</div><h3>Part ${i}</h3><p>Q${start} – Q${end}</p>`;
            card.onclick = () => openSetup('part', i);
            board.appendChild(card);
        }
    }

    function openSetup(type, part) {
        examSelectionType = type; partNum = part;
        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('setup-screen').style.display   = 'block';
        document.getElementById('setup-title').innerText = type === 'random' ? 'Randomised Practice' : `CHE 103 — Part ${part}`;
        document.getElementById('random-settings').style.display = type === 'random' ? 'block' : 'none';
    }

    function goHome() {
        clearInterval(timerId);
        isReviewMode = false; currentExamData = []; userAnswers = {}; currentIndex = 0;
        document.getElementById('quiz-interface').style.display  = 'none';
        document.getElementById('setup-screen').style.display    = 'none';
        document.getElementById('quizResultModal').style.display = 'none';
        document.getElementById('dashboard-wrap').style.display  = 'block';
        showResumeBanner(); loadStatsBar();
    }

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
        return a;
    }

    function startExam() {
        timeRemaining = parseInt(document.getElementById('t-limit').value) * 60;
        activeMode    = document.getElementById('quiz-mode').value;
        isReviewMode  = false; userAnswers = {}; currentIndex = 0;
        let pool = JSON.parse(JSON.stringify(MASTER_POOL));
        if (examSelectionType === 'random') {
            const qty = Math.min(parseInt(document.getElementById('q-count').value), pool.length);
            pool = shuffleArray(pool).slice(0, qty);
        } else {
            const start = (partNum - 1) * 50;
            pool = pool.slice(start, start + 50);
        }
        if (document.getElementById('shuffle-questions').checked) pool = shuffleArray(pool);
        if (document.getElementById('shuffle-options').checked) pool.forEach(q => { q.options = shuffleArray([...q.options]); });
        currentExamData = pool;
        document.getElementById('setup-screen').style.display  = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;
        runTimer(); renderQuestion();
    }

    function runTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeRemaining--;
            const m = Math.floor(timeRemaining/60), s = timeRemaining%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
        }, 1000);
    }

    function renderQuestion() {
        const q = currentExamData[currentIndex];
        const hasAnswered = userAnswers.hasOwnProperty(currentIndex);
        const userAns = userAnswers[currentIndex];
        const labels  = ['A','B','C','D','E','F'];
        document.getElementById('cur-idx').innerText       = currentIndex + 1;
        document.getElementById('topic-text').innerText    = q.topic || '';
        document.getElementById('question-text').innerText = q.question;
        const optBox = document.getElementById('options-box');
        const feedArea = document.getElementById('feedback-area');
        optBox.innerHTML = ''; feedArea.innerHTML = '';
        q.options.forEach((val, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[idx]||idx+1}.</strong> ${val}`;
            if (isReviewMode || (activeMode === 'practice' && hasAnswered)) {
                if (val === q.answer)    btn.classList.add('correct');
                else if (userAns === val) btn.classList.add('wrong');
                btn.disabled = true;
            } else if (activeMode === 'exam' && hasAnswered && userAns === val) {
                btn.classList.add('selected');
            }
            btn.onclick = () => {
                if (isReviewMode) return;
                if (activeMode === 'practice' && hasAnswered) return;
                userAnswers[currentIndex] = val; saveState(); renderQuestion();
            };
            optBox.appendChild(btn);
        });
        const expHtml = q.explanation ? `<div class="explanation-box"><strong>Explanation:</strong> ${q.explanation}</div>` : '';
        if (isReviewMode) {
            if (hasAnswered) {
                const ok = userAns === q.answer;
                feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#166534':'#991b1b'}">${ok?'✔ Correct!':'✘ Incorrect. Answer: <strong>'+q.answer+'</strong>'}</div>${expHtml}`;
            } else {
                feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3;color:#854d0e;border:1px solid #fde047;">⚠ Not answered. Correct: <strong>${q.answer}</strong></div>${expHtml}`;
            }
        } else if (activeMode === 'practice' && hasAnswered) {
            const ok = userAns === q.answer;
            feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#166534':'#991b1b'}">${ok?'✔ Correct!':'✘ Incorrect. Answer: <strong>'+q.answer+'</strong>'}</div>${expHtml}`;
        }
        const isLast = currentIndex === currentExamData.length - 1;
        document.getElementById('next-btn').style.display          = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display        = isReviewMode ? 'none' : 'block';
        document.getElementById('finish-review-btn').style.display = isReviewMode ? 'block' : 'none';
    }

    function move(d) { const n=currentIndex+d; if(n>=0&&n<currentExamData.length){currentIndex=n;renderQuestion();} }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentExamData, userAnswers, currentIndex, timeRemaining, activeMode, examSelectionType, partNum, savedAt: Date.now() }));
    }

    function resumeExam() {
        const saved = localStorage.getItem(STORAGE_KEY); if (!saved) return;
        const s = JSON.parse(saved);
        currentExamData=s.currentExamData; userAnswers=s.userAnswers; currentIndex=s.currentIndex;
        timeRemaining=s.timeRemaining; activeMode=s.activeMode||'practice';
        examSelectionType=s.examSelectionType||'random'; partNum=s.partNum||1; isReviewMode=false;
        document.getElementById('dashboard-wrap').style.display  = 'none';
        document.getElementById('resume-banner').style.display   = 'none';
        document.getElementById('setup-screen').style.display    = 'none';
        document.getElementById('quizResultModal').style.display = 'none';
        document.getElementById('resume-btn').style.display      = 'none';
        document.getElementById('quiz-interface').style.display  = 'block';
        document.getElementById('total-idx').innerText           = currentExamData.length;
        const timerEl = document.getElementById('timer');
        timerEl.style.background='rgba(220,38,38,0.08)'; timerEl.style.color='var(--danger)';
        runTimer(); renderQuestion();
    }

    async function showResults(forced=false) {
        const answered = Object.keys(userAnswers).length;
        if (!forced && answered < currentExamData.length) { if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return; }
        clearInterval(timerId); localStorage.removeItem(STORAGE_KEY);
        let score=0; currentExamData.forEach((q,i)=>{ if(userAnswers[i]===q.answer) score++; });
        const total=currentExamData.length, pct=Math.round((score/total)*100);
        document.getElementById('finalScoreText').innerText = pct;
        document.getElementById('modalCorrect').innerText   = score;
        document.getElementById('modalTotal').innerText     = total;
        document.getElementById('modalReviewBtn').style.display = activeMode==='practice'?'none':'flex';
        if (pct>=70) { document.getElementById('resultIcon').innerText='🏆'; document.getElementById('resultGreeting').innerText='Outstanding! 🌟'; document.getElementById('resultFeedback').innerText='Excellent work! Keep it up!'; confetti({particleCount:160,spread:70,origin:{y:0.6}}); }
        else if (pct>=50) { document.getElementById('resultIcon').innerText='👍'; document.getElementById('resultGreeting').innerText='Good Job!'; document.getElementById('resultFeedback').innerText='Almost there — aim for 70%+!'; }
        else { document.getElementById('resultIcon').innerText='💪'; document.getElementById('resultGreeting').innerText='Keep Trying!'; document.getElementById('resultFeedback').innerText='Review your notes and try again!'; }
        document.getElementById('quizResultModal').style.display = 'flex';
        await saveTestScore(pct);
    }

    async function saveTestScore(pct) {
        const el=document.getElementById('save-status'); el.innerText='⏳ Saving...';
        try {
            const {data:{user}}=await db.auth.getUser(); if (!user) { el.innerText=''; return; }
            const {data:prev}=await db.from('test_results').select('score').eq('student_id',user.id).eq('course_id',COURSE_CODE);
            if (prev&&prev.length>0) { const all=[...prev.map(r=>r.score),pct]; document.getElementById('modalAvg').innerText=Math.round(all.reduce((a,b)=>a+b,0)/all.length)+'%'; }
            const {error}=await db.from('test_results').insert([{student_id:user.id,course_id:COURSE_CODE,score:pct}]);
            el.innerText=error?'⚠️ Could not save (offline)':'✅ Score saved!';
        } catch(e) { el.innerText='⚠️ Offline — score not saved'; }
    }

    function enterReviewMode() {
        document.getElementById('quizResultModal').style.display='none'; isReviewMode=true; currentIndex=0;
        document.getElementById('timer').innerText='REVIEW'; document.getElementById('timer').style.background='#dbeafe'; document.getElementById('timer').style.color='#1e40af';
        renderQuestion();
    }

    async function shareQuizResult() {
        const score=document.getElementById('finalScoreText').innerText;
        const section=examSelectionType==='random'?'a random mix':`Part ${partNum}`;
        const text=`I just scored ${score}% on ${COURSE_CODE} (${section})! 🚀\n\nChallenge yourself on the Renance CBT portal! 📚🔥\nhttps://renancecbt1.vercel.app`;
        try { if(navigator.share) await navigator.share({title:`My ${COURSE_CODE} Score`,text,url:'https://renancecbt1.vercel.app'}); else { await navigator.clipboard.writeText(text); alert('Score copied to clipboard! 📋'); } } catch(_) {}
    }
</script>
