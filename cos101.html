<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS 101 | RENANCE CBT</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            background: url('beauty.jpg') center/cover fixed no-repeat;
            padding-top: 100px;
        }

        main {
            padding: 2rem 5%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .course-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .stat-lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .box-random {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: #fff;
            border: none;
        }

        .setup-screen {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .setup-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .setup-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .setup-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
        }

        .quiz-interface { display: none; }

        .option-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            text-align: left;
            color: var(--text-main);
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .option-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .option-btn.selected { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .option-btn.correct { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #10b981; }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); display: none;
            align-items: center; justify-content: center; z-index: 2000;
        }

        .result-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .btn-home {
            position: fixed; top: 20px; left: 20px;
            background: var(--bg-glass); border: 1px solid var(--border);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main); text-decoration: none; z-index: 1100;
        }
    </style>
</head>
<body data-theme="dark">

<a href="dashboard.html" class="btn-home" title="Back to Dashboard">
    <i class="fa-solid fa-house"></i>
</a>

<main class="animate-fade">
    <div class="course-card">
        <!-- Dashboard Wrap -->
        <div id="dashboard-wrap">
            <div style="margin-bottom: 30px; text-align: center;">
                <h1 style="font-family:'Bebas Neue'; letter-spacing:2px; font-size:2.5rem;">COS 101</h1>
                <p style="color:var(--text-muted); text-transform:uppercase; font-size:0.8rem; letter-spacing:1px;">Introduction to Computer Science</p>
            </div>

            <div id="resume-banner"></div>
            <div class="stats-bar" id="stats-bar" style="display:none;"></div>
            <div class="dashboard-grid" id="dashboard"></div>
        </div>

        <!-- Setup Screen -->
        <div id="setup-screen" style="display:none;">
            <div class="setup-screen">
                <h2 id="setup-title" style="margin-bottom: 25px; font-family:'Bebas Neue'; letter-spacing:1px;">Practice Setup</h2>
                
                <div id="random-settings" style="display:none;">
                    <div class="setup-group">
                        <label>Number of Questions</label>
                        <input type="number" id="q-count" value="50" min="5" max="200" class="setup-input">
                    </div>
                </div>

                <div class="setup-group">
                    <label>Time Limit (minutes)</label>
                    <input type="number" id="t-limit" value="30" min="1" max="180" class="setup-input">
                </div>

                <div class="setup-group">
                    <label>Quiz Mode</label>
                    <select id="quiz-mode" class="setup-input">
                        <option value="practice">Practice Mode (Immediate Feedback)</option>
                        <option value="exam">Exam Mode (Results at the end)</option>
                    </select>
                </div>

                <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:30px; text-align:left;">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="shuffle-questions" checked> <span>Shuffle Questions</span>
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="shuffle-options" checked> <span>Shuffle Options</span>
                    </label>
                </div>

                <div style="display:flex; gap:10px;">
                    <button class="btn btn-primary" style="flex:1;" id="btn-start-exam">START SESSION</button>
                    <button class="btn" style="background:rgba(255,255,255,0.1); border:1px solid var(--border); color:var(--text-main);" id="btn-go-home">CANCEL</button>
                </div>
            </div>
        </div>

        <!-- Quiz Interface -->
        <div id="quiz-interface" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:15px;">
                <div style="font-weight:700; color:var(--accent);">Q <span id="cur-idx">1</span> / <span id="total-idx">--</span></div>
                <div id="timer" style="font-family:'Bebas Neue'; font-size:1.5rem; letter-spacing:1px; background:rgba(0,0,0,0.2); padding:5px 15px; border-radius:10px;">00:00</div>
                <button class="btn" style="padding:5px 15px; font-size:0.8rem; background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid #ef4444;" id="btn-go-home">QUIT</button>
            </div>

            <div id="question-text" style="font-size:1.1rem; font-weight:600; line-height:1.6; margin-bottom:25px;"></div>
            <div id="options-box"></div>
            <div id="feedback-area" style="margin-top:20px;"></div>

            <div style="display:flex; justify-content:space-between; margin-top:30px; gap:10px;">
                <button class="btn" style="background:rgba(255,255,255,0.1); border:1px solid var(--border); color:var(--text-main);" id="prev-btn">PREVIOUS</button>
                <button class="btn btn-primary" id="next-btn">NEXT QUESTION</button>
                <button class="btn btn-primary" id="submit-btn" style="display:none; background:var(--brand-green);">SUBMIT EXAM</button>
                <button class="btn btn-primary" id="finish-review-btn" style="display:none;">FINISH REVIEW</button>
            </div>
        </div>
    </div>
</main>

<!-- Result Modal -->
<div class="modal-overlay" id="quizResultModal">
    <div class="result-card">
        <div id="resultIcon" style="font-size:4rem; margin-bottom:15px;">🏆</div>
        <h2 id="resultGreeting" style="font-family:'Bebas Neue'; font-size:2.5rem; margin-bottom:5px;">Outstanding!</h2>
        <p id="resultFeedback" style="color:var(--text-muted); margin-bottom:25px;">Excellent work! Keep it up!</p>
        
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:30px;">
            <div>
                <div style="font-size:2.5rem; font-weight:800; color:var(--accent);"><span id="finalScoreText">0</span>%</div>
                <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Score</div>
            </div>
            <div style="border-left:1px solid var(--border);"></div>
            <div>
                <div style="font-size:2.5rem; font-weight:800; color:var(--text-main);"><span id="modalCorrect">0</span>/<span id="modalTotal">0</span></div>
                <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Correct</div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="btn btn-primary" id="btn-modal-home">BACK TO DASHBOARD</button>
            <div style="font-size:0.8rem; color:var(--text-muted); margin-top:10px;" id="save-status"></div>
        </div>
    </div>
</div>

<script src="dist/ui-core.js"></script>
<script src="dist/cos101.js"></script>
</body>
</html>
