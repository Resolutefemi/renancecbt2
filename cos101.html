    { id: 523, question: "CAD stands for", options: { "A": "Computer aided design", "B": "Computer algorithm for design", "C": "Computer application in design", "D": "All of the above" }, answer: "A", explanation: "Computer Aided Design is used by architects and engineers." },
    { id: 524, question: "Which of the following memories has the shortest access times?", options: { "A": "Cache memory", "B": "Magnetic bubble memory", "C": "Magnetic core memory", "D": "RAM" }, answer: "A", explanation: "Cache is high-speed memory located directly on the CPU chip." },
    { id: 525, question: "A smart device is so called because it contains a", options: { "A": "Computer", "B": "Microcomputer", "C": "Programmable", "D": "Sensor" }, answer: "B", explanation: "The integration of a microcomputer makes a standard device 'smart'." },
    { id: 526, question: "Which of the following is not a primary storage device?", options: { "A": "Magnetic tape", "B": "Magnetic disk", "C": "Optical disk", "D": "All of above" }, answer: "D", explanation: "None of these are primary storage; they are all secondary storage media." },
    { id: 527, question: "Who invented Analytical engine?", options: { "A": "Blaise Pascal", "B": "George Boole", "C": "Charles Babbage", "D": "Herman Hollerith" }, answer: "C", explanation: "Charles Babbage designed the Analytical Engine in the 1830s." },
    { id: 528, question: "CPU speed of a personal computer is measured in", options: { "A": "KIPS", "B": "MIPS", "C": "Baud", "D": "None of these" }, answer: "B", explanation: "MIPS stands for Millions of Instructions Per Second." },
    { id: 529, question: "Circular division of disks to store and retrieve data are known as", options: { "A": "tracks", "B": "sectors", "C": "cycles", "D": "rings" }, answer: "A", explanation: "Tracks are the concentric circles drawn on a disk platter." },
    { id: 530, question: "Which statement is valid?", options: { "A": "1KB = 1024 bytes", "B": "1 MB = 2048 bytes", "C": "1 MB = 1000 kilobytes", "D": "1 KB = 1000 bytes" }, answer: "A", explanation: "Repeated for emphasis; binary Kilo is always 1024." },
    { id: 531, question: "The least significant bit of the binary equivalent of any odd decimal number is:", options: { "A": "0", "B": "1", "C": "1 or 0", "D": "3" }, answer: "B", explanation: "All odd numbers in binary end in 1; even numbers end in 0." },
    { id: 532, question: "Keyboards that sense movement by change in capacitance are called", options: { "A": "Capacitance keyboard", "B": "Mechanical keyboard", "C": "Qwerty keyboard", "D": "Dvorak keyboard" }, answer: "A", explanation: "They use electrical change rather than physical metal switches." },
    { id: 533, question: "The Stepped Reckoner was invented by", options: { "A": "John Napier", "B": "William Oughtred", "C": "Gottfried Leibnitz", "D": "Blaise Pascal" }, answer: "C", explanation: "Leibniz built the first machine that could do multiplication and division automatically." },
    { id: 534, question: "A term used to describe interconnected computer systems is", options: { "A": "Network", "B": "Server", "C": "Bus", "D": "Link" }, answer: "A", explanation: "A network is two or more computers connected to share resources." },
    { id: 535, question: "While inserting a diskette into a PC, the label side should face", options: { "A": "East", "B": "North", "C": "South", "D": "Up" }, answer: "D", explanation: "This was a standard instruction for handling floppy disks safely." },
    { id: 536, question: "Inexpensive computers without a disk drive are called", options: { "A": "Home computers", "B": "Diskless computers", "C": "Dedicated computers", "D": "General purpose" }, answer: "A", explanation: "Early home computers often used cassette tapes instead of expensive disk drives." },
    { id: 537, question: "What is a light pen?", options: { "A": "Mechanical Input device", "B": "Optical input device", "C": "Electronic input device", "D": "Optical output device" }, answer: "B", explanation: "It uses a light-sensitive tip to allow users to 'draw' directly on a CRT screen." },
    { id: 538, question: "Which class of computers cannot support multiple users simultaneously?", options: { "A": "Mainframe", "B": "Mini", "C": "Micro", "D": "None of above" }, answer: "C", explanation: "Microcomputers (PCs) were originally designed as 'Personal' single-user machines." },
    { id: 539, question: "Which of the following is considered the first general-purpose electronic computer?", options: { "A": "Z3", "B": "ABC", "C": "Mark I", "D": "ENIAC" }, answer: "D", explanation: "ENIAC (1945) set the blueprint for future electronic digital computers." },
    { id: 540, question: "Standard used for converting keystrokes into bits is", options: { "A": "ANSI", "B": "ASCII", "C": "EBCDIC", "D": "ISO" }, answer: "B", explanation: "ASCII is the bridge between human characters and binary data." },
    { id: 541, question: "In order to play and hear sound on a computer, one needs:", options: { "A": "sound card and speakers", "B": "microphone", "C": "joystick", "D": "printer" }, answer: "A", explanation: "The sound card processes digital audio, and speakers output the waves." },
    { id: 542, question: "Which of the following devices can be used to directly image printed text?", options: { "A": "OCR", "B": "OMR", "C": "MICR", "D": "All of above" }, answer: "A", explanation: "Optical Character Recognition (OCR) scans and converts physical text into digital text." },
    { id: 543, question: "For which of the following tasks can computers NOT be used?", options: { "A": "gathering data", "B": "calculating data", "C": "comparing data", "D": "creative thinking" }, answer: "D", explanation: "Computers are logical tools; true creativity remains a human characteristic." },
    { id: 544, question: "Which of the following are called low level languages?", options: { "A": "Machine language", "B": "Assembly language", "C": "Both of the above", "D": "None of above" }, answer: "C", explanation: "Both are close to hardware and require deep machine knowledge." },
    { id: 546, question: "Who invented punched cards?", options: { "A": "Charles Babbage", "B": "Herman Hollerith", "C": "Howard Aiken", "D": "Joseph Jacquard" }, answer: "B", explanation: "Hollerith founded the company that became IBM using his punch card system." },
    { id: 547, question: "Each model of a computer has a unique", options: { "A": "Assembly language", "B": "Machine language", "C": "High level language", "D": "None of above" }, answer: "B", explanation: "Machine code is specific to the exact CPU architecture it runs on." },
    { id: 548, question: "Which of the following is not a primary storage device?", options: { "A": "RAM", "B": "ROM", "C": "Magnetic disk", "D": "None of above" }, answer: "C", explanation: "Magnetic disks are secondary storage because they hold data permanently." },
    { id: 549, question: "In a punched card system, data is processed by a", options: { "A": "Keypunch and sorter", "B": "Accounting machine and billing machine", "C": "Sorter and billing machine", "D": "Accounting machine, keypunch and sorter" }, answer: "D", explanation: "Card systems required a series of specialized electromechanical machines." },
    { id: 550, question: "Which device is required for the Internet connection?", options: { "A": "Joystick", "B": "Modem", "C": "CD Drive", "D": "NIC Card" }, answer: "B", explanation: "A modem (Modulator-Demodulator) converts data for transmission over lines." },
    { id: 551, question: "Rods used for multiplication and division aids are known as", options: { "A": "Pascaline", "B": "Napier’s Bones", "C": "Stepped Reckoner", "D": "Slide Rule" }, answer: "B", explanation: "Repeated; Napier's Bones were ivory rods used for math." },
    { id: 552, question: "Seek time is", options: { "A": "time to position head over track", "B": "time to position head over sector", "C": "time to position head over cylinder", "D": "none of above" }, answer: "A", explanation: "It is the time for the physical drive arm to move to the correct track." },
    { id: 553, question: "Tape speed is measured in", options: { "A": "Feet per second", "B": "Inch per second", "C": "Meter per second", "D": "Centimeter per second" }, answer: "B", explanation: "Inches per second (IPS) is the standard measurement for magnetic tape velocity." },
    { id: 554, question: "Punched cards were first introduced by", options: { "A": "Powers", "B": "Pascal", "C": "Jacquard", "D": "Herman Hollerith" }, answer: "D", explanation: "Hollerith pioneered their use for data processing in the 1890 census." },
    { id: 555, question: "Which computers support co-processors?", options: { "A": "XT computer", "B": "AT computers", "C": "None of these", "D": "Both of these" }, answer: "D", explanation: "Early PC architectures often had an extra socket for a math co-processor (like the 80287)." },
    { id: 556, question: "A floppy disk contains", options: { "A": "Circular tracks only", "B": "Sectors only", "C": "Both circular tracks and sectors", "D": "None of the above" }, answer: "C", explanation: "Disks are organized into concentric tracks and pie-shaped sectors." },
    { id: 557, question: "The capacity of 3.5 inch floppy disk is", options: { "A": "1.40 MB", "B": "1.44 GB", "C": "1.40 GB", "D": "1.44 MB" }, answer: "D", explanation: "The standard High Density 3.5-inch floppy holds 1.44 MB." },
    { id: 558, question: "The contribution of Konrad Zuse was long ignored because", options: { "A": "Secret development", "B": "Complicated design", "C": "He was German (political reasons)", "D": "All of above" }, answer: "C", explanation: "Zuse built the Z3 (the first programmable computer) during WWII, but his work was isolated from the West." },
    { id: 559, question: "Method for controlling access to memory is known as", options: { "A": "Memory map", "B": "Memory protection", "C": "Memory management", "D": "Memory instruction" }, answer: "B", explanation: "Memory protection prevents one program from accidentally crashing another." },
    { id: 560, question: "In what respect computers are superior to human beings?", options: { "A": "Diligence", "B": "Intelligence", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "Repeated; computers can perform millions of tasks without fatigue (diligence)." },
    { id: 561, question: "Com in Latin is", options: { "A": "intensifying prefix", "B": "intensifying suffix", "C": "a term that means to reckon", "D": "None of above" }, answer: "A", explanation: "In the word 'computare', 'com' serves as an intensifying prefix to the root 'putare'." },
    { id: 562, question: "The system unit of a personal computer typically contains all of the following except:", options: { "A": "Microprocessor", "B": "Disk controller", "C": "Serial interface", "D": "Modem" }, answer: "D", explanation: "Modems were traditionally external devices or separate plug-in cards." },
    { id: 563, question: "Which of the following is related to fifth generation computers?", options: { "A": "Knowledge information processing system", "B": "Very large scale integration (VLSI)", "C": "Both of above", "D": "Only b" }, answer: "A", explanation: "Repeated; KIPS is the defining concept of the 5th generation." },
    { id: 564, question: "Loading instructions from secondary storage into memory to start a computer is called", options: { "A": "Duping", "B": "Booting", "C": "Padding", "D": "CPS" }, answer: "B", explanation: "Booting (from 'bootstrap') is the startup sequence of the computer." },
    { id: 565, question: "MSI stands for", options: { "A": "Medium Scale Integrated Circuits", "B": "Medium System Integrated Circuits", "C": "Medium Scale Intelligent Circuit", "D": "Medium System Intelligent Circuit" }, answer: "A", explanation: "Medium Scale Integration." },
    { id: 566, question: "A Pixel is _________", options: { "A": "A computer program", "B": "A picture stored in memory", "C": "The smallest resolvable part of a picture", "D": "None of these" }, answer: "C", explanation: "Pixels are the tiny dots that make up everything you see on a monitor." },
    { id: 567, question: "A/n _____ Device is any device that provides information, which is sent to the CPU", options: { "A": "Input", "B": "Output", "C": "CPU", "D": "Memory" }, answer: "A", explanation: "Input devices send data to the processor; output devices receive it." },
    { id: 568, question: "What was the nick name of the computer used by Americans in 1952 for the H-bomb project?", options: { "A": "ENIAC", "B": "EDSAC", "C": "MANIAC", "D": "UNIVAC" }, answer: "C", explanation: "MANIAC stood for Mathematical Analyzer, Numerical Integrator, and Computer." },
    { id: 570, question: "LSI, VLSI & ULSI chips were used in which generation?", options: { "A": "First", "B": "Second", "C": "Third", "D": "Fourth" }, answer: "D", explanation: "The 4th generation is characterized by putting millions of transistors on a single chip." },
    { id: 571, question: "Which of the following is a major manufacturer of Hard Disk Drives?", options: { "A": "IBM", "B": "Seagate", "C": "Microsoft", "D": "3M" }, answer: "B", explanation: "Seagate is one of the world's leading hard drive producers." },
    { id: 572, question: "Networking such as LAN and MAN started from", options: { "A": "First generation", "B": "Second generation", "C": "Third generation", "D": "Fourth generation" }, answer: "D", explanation: "Microcomputers in the 4th gen drove the need for local networking." },
    { id: 573, question: "Which characteristic of a computer distinguishes it from electronic calculators?", options: { "A": "Accuracy", "B": "Storage", "C": "Versatility", "D": "Automatic" }, answer: "B", explanation: "Computers have large internal storage to hold both data and programs." },
    { id: 574, question: "Which register keeps track of the address of the memory location for the next instruction?", options: { "A": "Memory address register", "B": "Memory data register", "C": "Instruction register", "D": "Program counter" }, answer: "D", explanation: "The Program Counter (PC) always 'points' to the next step in the code." },
    { id: 575, question: "Which of the following is not a classification of computers based on application?", options: { "A": "Electronic Computers", "B": "Analog Computers", "C": "Digital Computers", "D": "Hybrid Computers" }, answer: "A", explanation: "Electronic describes how they are built, while the others describe how they process data." },
    { id: 576, question: "Which of the following is not a standard category of Software?", options: { "A": "System Software", "B": "Application Software", "C": "Utility Software", "D": "Entertainment Software" }, answer: "D", explanation: "While real, entertainment isn't a fundamental technical category like System or Application software." },
    { id: 577, question: "Who invented the high level language C?", options: { "A": "Dennis M. Ritchie", "B": "Niklaus Wirth", "C": "Seymour Papert", "D": "Donald Knuth" }, answer: "A", explanation: "Dennis Ritchie created C at Bell Labs in the early 1970s." },
    { id: 578, question: "What do you call programs used to find possible faults and their causes?", options: { "A": "Operating system extensions", "B": "Cookies", "C": "Diagnostic software", "D": "Boot diskettes" }, answer: "C", explanation: "Diagnostics are tools that check the 'health' of hardware and software." },
    { id: 579, question: "Which computer memory is used for storing programs and data currently being processed?", options: { "A": "Mass memory", "B": "Internal memory", "C": "Non-volatile memory", "D": "Secondary memory" }, answer: "B", explanation: "Internal memory (RAM) is the CPU's active workspace." },
    { id: 580, question: "Which code used in present day computing was developed by IBM Corporation?", options: { "A": "ASCII", "B": "Hollerith Code", "C": "Baudot Code", "D": "EBCDIC Code" }, answer: "D", explanation: "Repeated; EBCDIC is IBM's proprietary 8-bit character code." },
    { id: 581, question: "When were transistors invented?", options: { "A": "1947", "B": "1938", "C": "1958", "D": "1968" }, answer: "A", explanation: "Bardeen, Brattain, and Shockley invented the transistor at Bell Labs in 1947." },
    { id: 582, question: "In the third Generation of computers:", options: { "A": "Distributed data processing became popular", "B": "Operating systems were first developed", "C": "High level languages were first used", "D": "Online real-time systems became popular" }, answer: "D", explanation: "Real-time systems (like flight booking) were made possible by IC-based computers." },
    { id: 583, question: "The most important advantage of an IC is its", options: { "A": "Easy replacement", "B": "Extremely high reliability", "C": "Reduced cost", "D": "Lower power consumption" }, answer: "B", explanation: "By reducing thousands of wire connections to a single chip, reliability was greatly increased." },
    { id: 584, question: "Which magazine covers only the IBM PC and its compatibles?", options: { "A": "Byte", "B": "PC Magazine", "C": "Personal Computing", "D": "Interface Age" }, answer: "B", explanation: "PC Magazine was the industry leader for IBM-standard hardware." },
    { id: 585, question: "UNIVAC stands for", options: { "A": "Universal Automatic Computer", "B": "Universal Array Computer", "C": "Unique Automatic Computer", "D": "Unvalued Automatic Computer" }, answer: "A", explanation: "Universal Automatic Computer." },
    { id: 586, question: "Which is required when more than one person uses a central computer at the same time?", options: { "A": "Terminal", "B": "Light pen", "C": "Digitizer", "D": "Mouse" }, answer: "A", explanation: "Terminals allow multiple users to connect to a single powerful computer." },
    { id: 587, question: "Which of the following is not an output device?", options: { "A": "Scanner", "B": "Printer", "C": "Flat Screen", "D": "Touch Screen" }, answer: "A", explanation: "Scanner is an input device." },
    { id: 588, question: "The main circuit board of a personal computer is called the", options: { "A": "Daughterboard", "B": "Motherboard", "C": "Fatherboard", "D": "Childboard" }, answer: "B", explanation: "Motherboard." },
    { id: 589, question: "The basic or major operation performed by a computer is", options: { "A": "Arithmetic operation", "B": "Logical operation", "C": "Storage and retrieval", "D": "All the above" }, answer: "D", explanation: "A computer performs arithmetic operations, logical operations, and storage and retrieval." },
{ id: 590, question: "The two major types of computer chips are", options: { "A": "Internal and external memory chips", "B": "Primary memory and microprocessor chips", "C": "Primary and Secondary memory chips", "D": "Silicon and integrated circuits" }, answer: "B", explanation: "The two major types of computer chips are primary memory and microprocessor chips." },
{ id: 591, question: "What is the main difference between a mainframe and a super computer?", options: { "A": "Super computer is much larger than mainframe computers", "B": "Super computers are much smaller than mainframe computers", "C": "Supercomputers are focused to execute few programs as fast as possible while mainframe uses its power to execute as many programs concurrently", "D": "Supercomputers are focused to execute as many programs as possible while mainframe uses its power to execute few programs as fast as possible" }, answer: "C", explanation: "Supercomputers execute few programs as fast as possible, while mainframes execute many programs concurrently." },
{ id: 592, question: "What are the stages in the compilation process?", options: { "A": "Feasibility study, system design and testing", "B": "Implementation and documentation", "C": "Lexical Analysis, syntax analysis, and code generation", "D": "None of the above" }, answer: "C", explanation: "The stages in compilation are Lexical Analysis, Syntax Analysis, and Code Generation." },
{ id: 593, question: "One millisecond is", options: { "A": "1 second", "B": "10th of a second", "C": "1000th of a second", "D": "10000th of a second" }, answer: "C", explanation: "One millisecond is 1/1000th of a second." },

{ id: 595, question: "Which of the following can be regarded as a problem oriented language?", options: { "A": "High level language", "B": "Machine language", "C": "Assembly language", "D": "Low level language" }, answer: "A", explanation: "High level languages are problem-oriented languages." },

{ id: 597, question: "The computer size was very large in", options: { "A": "First Generation", "B": "Second Generation", "C": "Third Generation", "D": "Fourth Generation" }, answer: "A", explanation: "First generation computers were very large in size due to vacuum tubes." },
{ id: 598, question: "The term GIGO is related to which characteristics of computers?", options: { "A": "Speed", "B": "Automatic", "C": "Accuracy", "D": "Reliability" }, answer: "C", explanation: "GIGO (Garbage In, Garbage Out) is related to the accuracy characteristic of computers." },
{ id: 599, question: "One of the popular mass storage devices is CD ROM. What does CD ROM stand for?", options: { "A": "Compactable Disc Read Only Memory", "B": "Compact Disc Read Only Memory", "C": "Compactable Disk Read Only Memory", "D": "Compact Disk Read Only Memory" }, answer: "D", explanation: "CD ROM stands for Compact Disk Read Only Memory." },
{ id: 600, question: "ASCII stands for", options: { "A": "American Standard Code for International Interchange", "B": "American Standard Code for Institutional Interchange", "C": "American Standard Code for Information Interchange", "D": "American Standard Code to Interchange Information" }, answer: "C", explanation: "ASCII stands for American Standard Code for Information Interchange." },
{ id: 601, question: "In analog computer", options: { "A": "Input is first converted to digital form", "B": "Input is never converted to digital form", "C": "Output is displayed in digital form", "D": "All of the above" }, answer: "B", explanation: "In an analog computer, input is never converted to digital form." },

{ id: 603, question: "The octal equivalence of 111010 (binary) is", options: { "A": "67", "B": "72", "C": "71", "D": "27" }, answer: "B", explanation: "Binary 111010 grouped as 111 010 = 7 2 = octal 72." },

{ id: 608, question: "In a distributed computer system", options: { "A": "There are many computers and terminals", "B": "The task is executed by a number of processors", "C": "The task is distributed throughout the system", "D": "All of the above" }, answer: "D", explanation: "A distributed computer system involves many computers, multiple processors, and distributed tasks." },
{ id: 609, question: "The linking of computers with a communication system is called", options: { "A": "Interconnection", "B": "Networking", "C": "Internet working", "D": "Internetworking" }, answer: "B", explanation: "Linking computers with a communication system is called Networking." },
{ id: 610, question: "Distributed data entry means that data can be", options: { "A": "Entered at different locations where it originates", "B": "Sent to different locations from a central place", "C": "Accessed from different places known as distribution points", "D": "Distributed through a network" }, answer: "A", explanation: "Distributed data entry means data can be entered at different locations where it originates." },

{ id: 612, question: "Stored instructions and data in digital computers consist of", options: { "A": "Bytes", "B": "Kilobytes", "C": "Digits", "D": "Bits" }, answer: "D", explanation: "Stored instructions and data in digital computers consist of bits." },

    const MASTER_POOL = RAW_DATA.map(item => {
        const letters = ["A", "B", "C", "D"];
        if (item.q) {
            
            const opts = {};
            item.options.forEach((opt, idx) => opts[letters[idx]] = opt);
            return {
                id: item.id,
                question: item.q,
                options: opts,
                answer: letters[item.ans],
                explanation: item.explanation || `Correct answer is ${letters[item.ans]}`
            };
        }
        
        return {
            ...item,
            explanation: item.explanation || `Correct answer is ${item.answer}`
        };
    });

    /* ── Stats Bar ── */
    async function loadStatsBar() {
        const bar = document.getElementById('stats-bar');
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) return;
            const { data } = await db.from('test_results')
                .select('score').eq('student_id', user.id).eq('course_id', COURSE_CODE);
            if (!data || data.length === 0) return;
            const taken = data.length;
            const avg  = Math.round(data.reduce((s, r) => s + r.score, 0) / taken);
            const best = Math.max(...data.map(r => r.score));
            bar.innerHTML = `
                <div class="stat-card"><div class="stat-val">${taken}</div><div class="stat-lbl">Tests Taken</div></div>
                <div class="stat-card"><div class="stat-val">${avg}%</div><div class="stat-lbl">Average Score</div></div>
                <div class="stat-card"><div class="stat-val">${best}%</div><div class="stat-lbl">Best Score</div></div>`;
            bar.style.display = 'grid';
        } catch (e) { /* offline */ }
    }

    /* ── Dashboard ── */
    function initDashboard() {
        const board = document.getElementById('dashboard');
        board.innerHTML = '';
        const total = MASTER_POOL.length;

        if (total === 0) {
            board.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);">No questions loaded. Paste your data into RAW_DATA.</p>`;
            return;
        }

        const parts = Math.ceil(total / 50);

        const rand = document.createElement('div');
        rand.className = 'box box-random';
        rand.innerHTML = `<div style="font-size:1.8rem;">🔀</div><h3>Random Mode</h3><p>${total} Questions</p>`;
        rand.onclick = () => openSetup('random', 0);
        board.appendChild(rand);

        for (let i = 1; i <= parts; i++) {
            const start = (i - 1) * 50 + 1;
            const end   = Math.min(i * 50, total);
            const card  = document.createElement('div');
            card.className = 'box';
            card.innerHTML = `
                <div style="font-size:1.8rem;color:var(--primary);">💻</div>
                <h3>Part ${i}</h3>
                <p>Q${start} – Q${end}</p>`;
            card.onclick = () => openSetup('part', i);
            board.appendChild(card);
        }
    }

    /* ── Helpers ── */
    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    /* ══════════════════
       START EXAM
    ══════════════════ */
    function startExam() {
        timeRemaining = parseInt(document.getElementById('t-limit').value) * 60;
        activeMode    = document.getElementById('quiz-mode').value;
        isReviewMode  = false;
        userAnswers   = {};
        currentIndex  = 0;

        let pool = JSON.parse(JSON.stringify(MASTER_POOL));

        if (examSelectionType === 'random') {
            const qty = Math.min(parseInt(document.getElementById('q-count').value), pool.length);
            pool = shuffleArray(pool).slice(0, qty);
        } else {
            const start = (partNum - 1) * 50;
            pool = pool.slice(start, start + 50);
        }

        if (document.getElementById('shuffle-questions').checked) pool = shuffleArray(pool);

        if (document.getElementById('shuffle-options').checked) {
            pool.forEach(q => {
                const correctText = q.options[q.answer];
                const keys        = Object.keys(q.options);
                const values      = shuffleArray(Object.values(q.options));
                const newOpts     = {};
                keys.forEach((k, i) => { newOpts[k] = values[i]; });
                q.answer  = keys.find(k => newOpts[k] === correctText);
                q.options = newOpts;
            });
        }

        currentExamData = pool;

        document.getElementById('setup-screen').style.display  = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;
        runTimer();
        renderQuestion();
    }

    /* ══════════════════

    ══════════════════ */
    function runTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeRemaining--;
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
        }, 1000);
    }

            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${key}.</strong> ${val}`;

            if (isReviewMode || (activeMode === 'practice' && hasAnswered)) {
                if (key === q.answer)        btn.classList.add('correct');
                else if (userAns === key)     btn.classList.add('wrong');
                btn.disabled = true;
            } else if (activeMode === 'exam' && hasAnswered && userAns === key) {
                btn.classList.add('selected');
            }

            btn.onclick = () => {
                if (isReviewMode) return;
                if (activeMode === 'practice' && hasAnswered) return;
                userAnswers[currentIndex] = key;
                saveState();
                renderQuestion();
            };
            optBox.appendChild(btn);
        });

        const expHtml = q.explanation
            ? `<br><span style="font-weight:400;font-size:0.88rem;"><strong>Explanation:</strong> ${q.explanation}</span>`
            : '';

        if (isReviewMode || (activeMode === 'practice' && hasAnswered)) {
            const ok = userAns === q.answer;
            feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#166534':'#991b1b'}">
                ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '</strong>'}${expHtml}</div>`;
        }

        if (isReviewMode && !hasAnswered) {
            feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3;color:#854d0e;border:1px solid #fde047;">
                ⚠ Not answered. Correct: <strong>${q.answer}</strong>${expHtml}</div>`;
        }

        const isLast = currentIndex === currentExamData.length - 1;
        document.getElementById('next-btn').style.display          = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display        = isReviewMode ? 'none' : 'block';
        document.getElementById('finish-review-btn').style.display = isReviewMode ? 'block' : 'none';
    }

    function move(d) {
        const n = currentIndex + d;
        if (n >= 0 && n < currentExamData.length) { currentIndex = n; renderQuestion(); }
    }

    /* ══════════════════
       SAVE / RESUME
    ══════════════════ */
    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            currentExamData, userAnswers, currentIndex,
            timeRemaining, activeMode, examSelectionType, partNum,
            savedAt: Date.now()
        }));
    }

    function resumeExam() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const s = JSON.parse(saved);

        currentExamData   = s.currentExamData;
        userAnswers       = s.userAnswers;
        currentIndex      = s.currentIndex;
        timeRemaining     = s.timeRemaining;
        activeMode        = s.activeMode || 'practice';
        examSelectionType = s.examSelectionType || 'random';
        partNum           = s.partNum || 1;
        isReviewMode      = false;

        document.getElementById('dashboard-wrap').style.display  = 'none';
        document.getElementById('resume-banner').style.display   = 'none';
        document.getElementById('setup-screen').style.display    = 'none';
        document.getElementById('quizResultModal').style.display = 'none';
        document.getElementById('resume-btn').style.display      = 'none';
        document.getElementById('quiz-interface').style.display  = 'block';
        document.getElementById('total-idx').innerText           = currentExamData.length;

        const timerEl = document.getElementById('timer');
        timerEl.style.background = 'rgba(220,38,38,0.08)';
        timerEl.style.color      = 'var(--danger)';

        runTimer();
        renderQuestion();
    }

    /* ══════════════════
       SHOW RESULTS
    ══════════════════ */
    async function showResults(forced = false) {
        const answered = Object.keys(userAnswers).length;
        if (!forced && answered < currentExamData.length) {
            if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return;
        }

        clearInterval(timerId);
        localStorage.removeItem(STORAGE_KEY);

        let score = 0;
        currentExamData.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
        const total = currentExamData.length;
        const pct   = Math.round((score / total) * 100);

        document.getElementById('finalScoreText').innerText = pct;
        document.getElementById('modalCorrect').innerText   = score;
        document.getElementById('modalTotal').innerText     = total;
        document.getElementById('modalReviewBtn').style.display = activeMode === 'practice' ? 'none' : 'flex';

        if (pct >= 70) {
            document.getElementById('resultIcon').innerText     = '🏆';
            document.getElementById('resultGreeting').innerText = 'Outstanding! 🌟';
            document.getElementById('resultFeedback').innerText = 'Excellent work! Keep it up!';
            confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
        } else if (pct >= 50) {
            document.getElementById('resultIcon').innerText     = '👍';
            document.getElementById('resultGreeting').innerText = 'Good Job!';
            document.getElementById('resultFeedback').innerText = 'Almost there — aim for 70%+!';
        } else {
            document.getElementById('resultIcon').innerText     = '💪';
            document.getElementById('resultGreeting').innerText = 'Keep Trying!';
            document.getElementById('resultFeedback').innerText = 'Review your notes and try again!';
        }

        document.getElementById('quizResultModal').style.display = 'flex';
        await saveTestScore(pct);
    }

    async function saveTestScore(pct) {
        const el = document.getElementById('save-status');
        el.innerText = '⏳ Saving...';
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) { el.innerText = ''; return; }

            const { data: prev } = await db.from('test_results')
                .select('score').eq('student_id', user.id).eq('course_id', COURSE_CODE);

            if (prev && prev.length > 0) {
                const all = [...prev.map(r => r.score), pct];
                const avg = Math.round(all.reduce((a, b) => a + b, 0) / all.length);
                document.getElementById('modalAvg').innerText = avg + '%';
            }

            const { error } = await db.from('test_results').insert([
                { student_id: user.id, course_id: COURSE_CODE, score: pct }
            ]);
            el.innerText = error ? '⚠️ Could not save (offline)' : '✅ Score saved!';
        } catch (e) {
            el.innerText = '⚠️ Offline — score not saved';
        }
    }

    function enterReviewMode() {
        document.getElementById('quizResultModal').style.display = 'none';
        isReviewMode = true;
        currentIndex = 0;
        document.getElementById('timer').innerText         = 'REVIEW';
        document.getElementById('timer').style.background = '#dbeafe';
        document.getElementById('timer').style.color      = '#1e40af';
        renderQuestion();
    }

    async function shareQuizResult() {
        const score   = document.getElementById('finalScoreText').innerText;
        const section = examSelectionType === 'random' ? 'a random mix' : `Part ${partNum}`;
        const text    = `I just scored ${score}% on ${COURSE_CODE} (${section})! 🚀\n\nRenance CBT is the ultimate FUTA PQ practice portal. Challenge yourself now! 📚🔥\nhttps://renancecbt1.vercel.app`;
        try {
            if (navigator.share) await navigator.share({ title: `My ${COURSE_CODE} Score`, text, url: 'https://renancecbt1.vercel.app' });
            else { await navigator.clipboard.writeText(text); alert('Score copied to clipboard! 📋'); }
        } catch (_) {}
    }
</script>
