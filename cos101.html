    { id: 238, question: "An input/output device at which data enters or leaves a computer system is", options: { "A": "Keyboard", "B": "Terminal", "C": "Printer", "D": "Plotter" }, answer: "B", explanation: "A terminal is a combination of input (keyboard) and output (screen) devices." },
    { id: 240, question: "A name or number used to identify a storage location is called", options: { "A": "A byte", "B": "A record", "C": "An address", "D": "All of above" }, answer: "C", explanation: "Addresses are the unique identifiers for specific cells in memory." },
    { id: 241, question: "Computer professionals working in a computer centre are", options: { "A": "Software", "B": "Firmware", "C": "Hardware", "D": "Humanware" }, answer: "D", explanation: "Humanware (or Peopleware) refers to the human role in computing systems." },
    { id: 242, question: "The first general purpose electronic computer in the world was", options: { "A": "UNIVAC", "B": "EDVAC", "C": "ENIAC", "D": "All of above" }, answer: "C", explanation: "ENIAC (1945) was the first large-scale, general-purpose electronic computer." },
    { id: 243, question: "The contents of information are stored in", options: { "A": "Memory data register", "B": "Memory address register", "C": "Memory arithmetic registers", "D": "Memory access register" }, answer: "A", explanation: "The MDR holds the actual data being transferred to or from memory." },
    { id: 244, question: "Which of the following is correct full form of BCD?", options: { "A": "Binary Coded Decimal", "B": "Bit Coded Decimal", "C": "Binary Coded Digit", "D": "Bit Coded Digit" }, answer: "A", explanation: "Binary Coded Decimal is a system of writing decimal numbers in binary." },
    { id: 245, question: "Which was the world’s first microcomputer that used Intel 80386 microprocessor chip?", options: { "A": "IBM PS/2", "B": "HP-9830", "C": "DeskPro-386", "D": "IBM-360" }, answer: "C", explanation: "The Compaq DeskPro-386 was the first to beat IBM to market with the 32-bit 386 chip." },
    { id: 246, question: "The qualitative or quantitative attribute of a variable is termed as", options: { "A": "data", "B": "information", "C": "both of above", "D": "none of above" }, answer: "A", explanation: "Data is the raw collection of facts and measurements." },
    { id: 247, question: "Main storage is also called", options: { "A": "Accumulator", "B": "Control Unit", "C": "Register Unit", "D": "Memory" }, answer: "D", explanation: "Main storage refers to the computer's primary random-access memory (RAM)." },
    { id: 248, question: "Which of the following are (is) considered to be video component?", options: { "A": "Resolution", "B": "Color depth", "C": "Refresh rate", "D": "All of the above" }, answer: "D", explanation: "These three factors together determine the quality and clarity of a display." },
    { id: 249, question: "For what Antikyathera was used?", options: { "A": "For counting", "B": "For Calculating tax collection", "C": "For calculating astronomical positions", "D": "For calculating firing weapons" }, answer: "C", explanation: "The Antikythera mechanism is an ancient Greek analog computer used to predict celestial events." },
    { id: 250, question: "Memory unit is one part of", options: { "A": "Input device", "B": "Control unit", "C": "Output device", "D": "Central Processing Unit" }, answer: "D", explanation: "In basic architecture, the CPU consists of the ALU, Control Unit, and Registers/Internal memory." },
    { id: 251, question: "Microprocessors can be used to make", options: { "A": "Computers", "B": "Digital Systems", "C": "Calculators", "D": "All of the above" }, answer: "D", explanation: "The microprocessor is the core processing engine for almost all modern digital electronics." },
    { id: 252, question: "Which statement is valid about computer program?", options: { "A": "High level languages must be converted into machine language to execute", "B": "High level language programs are more efficient and faster to execute", "C": "It is more difficult to identify errors in high level language program" }, answer: "A", explanation: "CPUs only speak binary; high-level code must be compiled or interpreted." },
    { id: 253, question: "By programmable machine we mean", options: { "A": "computers", "B": "modern television", "C": "washing machines", "D": "anything that can be set to perform different tasks" }, answer: "D", explanation: "Programmability is the ability to change the function of a machine through instructions." },
    { id: 254, question: "Which of the following is a secondary memory device?", options: { "A": "Keyboard", "B": "Disk", "C": "ALU", "D": "All of the above" }, answer: "B", explanation: "Disks are used for long-term, non-volatile storage outside the main memory." },
    { id: 255, question: "The memory which is programmed at the time it is manufactured", options: { "A": "ROM", "B": "RAM", "C": "PROM", "D": "EPROM" }, answer: "A", explanation: "Read-Only Memory is typically hard-coded with permanent data during production." },
    { id: 256, question: "One of the popular mass storage device is CD ROM. What does CD ROM stand for?", options: { "A": "Compactable Read Only Memory", "B": "Compact Data Read Only Memory", "C": "Compactable Disk Read Only Memory", "D": "Compact Disk Read Only Memory" }, answer: "D", explanation: "Compact Disk Read-Only Memory." },
    { id: 257, question: "Identify the true statement", options: { "A": "Computers are 100% accurate but it can suffer from GIGO", "B": "Computers are reliable because they use electronic component", "C": "Computer is never tired and does not suffer from boredom", "D": "All of above" }, answer: "D", explanation: "These are the core characteristics that make computers superior for repetitive processing." },
    { id: 258, question: "FORTRAN is", options: { "A": "File Translation", "B": "Format Translation", "C": "Formula Translation", "D": "Floppy Translation" }, answer: "C", explanation: "Formula Translation; it was the first high-level language, designed for math and science." },
    { id: 259, question: "The programs which are as permanent as hardware and stored in ROM is known as", options: { "A": "Hardware", "B": "Software", "C": "Firmware", "D": "ROM ware" }, answer: "C", explanation: "Firmware is low-level software that provides control for a device's specific hardware." },
    { id: 260, question: "Which of the following memories must be refreshed many times per second?", options: { "A": "Static RAM", "B": "Dynamic RAM", "C": "EPROM", "D": "ROM" }, answer: "B", explanation: "DRAM uses capacitors that leak charge and must be constantly 'refreshed' to keep data." },
    { id: 261, question: "A translator taking assembly language program as input & producing machine language code is an", options: { "A": "Compiler", "B": "Interpreter", "C": "Debugger", "D": "Assembler" }, answer: "D", explanation: "Assemblers specifically handle the translation of low-level assembly code." },
    { id: 263, question: "In ________ mode, the communication channel is used in both directions at the same time?", options: { "A": "Full-duplex", "B": "Simplex", "C": "Half-duplex", "D": "None of the above" }, answer: "A", explanation: "Full-duplex allows simultaneous two-way communication (like a phone call)." },
    { id: 264, question: "Who invented Slide Rules?", options: { "A": "John Napier", "B": "William Oughtred", "C": "Gottfried Leibnitz", "D": "Blaise Pascal" }, answer: "B", explanation: "William Oughtred developed the circular and linear slide rules in the 1620s." },
    { id: 265, question: "The proper definition of a modern digital computer is", options: { "A": "An electronic automated machine that can solve problems involving words and numbers", "B": "A more sophistic and modified electronic pocket calculator", "C": "Any machine that can perform mathematical operations", "D": "A machine that works on binary code" }, answer: "A", explanation: "Digital computers process both numerical data and symbolic (text) data using logic." },
    { id: 266, question: "Memory is made up of", options: { "A": "Set of wires", "B": "Set of circuits", "C": "Large number of cells", "D": "All of these" }, answer: "C", explanation: "Memory is an array of storage cells, each capable of holding one bit of information." },
    { id: 267, question: "Which of the following is the most powerful computers?", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "Super Computers" }, answer: "D", explanation: "Supercomputers perform the highest level of calculations currently possible." },
    { id: 268, question: "Which of the printers used in conjunction with computers uses dry ink powder?", options: { "A": "Daisy wheel printer", "B": "Line printer", "C": "Laser printer", "D": "Thermal printer" }, answer: "C", explanation: "Laser printers use toner, which is a fine, dry plastic powder." },
    { id: 269, question: "What is the path from which data flow in a computer system is known as", options: { "A": "Car", "B": "Bus", "C": "Truck", "D": "Road" }, answer: "B", explanation: "The bus is the internal data highway of the computer." },
    { id: 270, question: "Which term is used to describe RAM?", options: { "A": "Dynamic RAM (DRAM)", "B": "Static RAM (SRAM)", "C": "Video RAM (VRAM)", "D": "All of the above" }, answer: "D", explanation: "RAM comes in several specialized forms for different computing needs." },
    { id: 271, question: "In which year was chip used inside the computer for the first time?", options: { "A": "1964", "B": "1975", "C": "1999", "D": "1944" }, answer: "A", explanation: "The mid-1960s saw the commercial emergence of IC-based computers (3rd generation)." },
    { id: 272, question: "Assembly language started to be used from", options: { "A": "first generation computers", "B": "second generation computers", "C": "third generation computers", "D": "fourth generation computers" }, answer: "B", explanation: "The 2nd generation introduced symbolic assembly languages to replace binary machine code." },
    { id: 273, question: "Which technology is more reliable?", options: { "A": "Mechanical", "B": "Electro-Mechanical", "C": "Electronic", "D": "For reliability it does not matter" }, answer: "C", explanation: "Electronic devices have no moving parts to wear out, making them much more reliable." },
    { id: 274, question: "Which of the following is not an XT microprocessor?", options: { "A": "8088", "B": "8086", "C": "80286", "D": "None of above" }, answer: "C", explanation: "The 80286 was the heart of the AT (Advanced Technology) PC, not the XT (Extended Technology)." },
    { id: 275, question: "Hard disk is coated in both side with", options: { "A": "Magnetic metallic oxide", "B": "Optical metallic oxide", "C": "Carbon layer", "D": "All of the above" }, answer: "A", explanation: "Magnetic oxide allows for the storage of bits through magnetic polarity." },
    { id: 276, question: "ASCII stands for", options: { "A": "American Stable Code for International Interchange", "B": "American Standard Case for Institutional Interchange", "C": "American Standard Code for Information Interchange", "D": "American Standard Code for Interchange Information" }, answer: "C", explanation: "American Standard Code for Information Interchange." },
    { id: 277, question: "Raw facts and figures about any particular topic are", options: { "A": "Information", "B": "facts", "C": "data", "D": "none of above" }, answer: "C", explanation: "Data is the raw material from which information is produced." },
    { id: 278, question: "A computer can solve more than one kind of problem. This is related to which characteristic?", options: { "A": "Accuracy", "B": "Reliability", "C": "Versatility", "D": "Automatic" }, answer: "C", explanation: "Versatility is the ability to perform completely different tasks (like typing and gaming) using the same machine." },
    { id: 279, question: "From which generation computers the printers were used?", options: { "A": "first", "B": "second", "C": "third", "D": "fourth" }, answer: "B", explanation: "Transistor-based 2nd generation computers began using printers for higher-speed output." },
    { id: 280, question: "How many symbols exist in Baudot code?", options: { "A": "32", "B": "116", "C": "58", "D": "76" }, answer: "A", explanation: "Baudot code is a 5-bit character set, allowing for 32 (2 to the power 5) unique symbols." },
    { id: 281, question: "Following IC chip integrates 100 thousands electronic components per chip", options: { "A": "SSI", "B": "MSI", "C": "LSI", "D": "VLSI" }, answer: "D", explanation: "Very Large Scale Integration (VLSI) allowed for hundreds of thousands of transistors per chip." },
    { id: 282, question: "An application program that helps the user to change any number and immediately see the result is", options: { "A": "Desktop publishing program", "B": "Database", "C": "Spreadsheet", "D": "All of above" }, answer: "C", explanation: "Spreadsheets (like Excel) automatically recalculate entire sheets when a value changes." },
    { id: 283, question: "In which year was the Analytical Engine exhibition held in Paris?", options: { "A": "1820", "B": "1860", "C": "1855", "D": "1870" }, answer: "C", explanation: "Parts of Babbage's designs were famously showcased at international exhibitions in the 1850s." },
    { id: 284, question: "What is the name of the color laptop powered by a 386 processor at 33 MHz built by Epson?", options: { "A": "AX3/33", "B": "NEC-20", "C": "Magnum 2000", "D": "HCL-3000" }, answer: "A", explanation: "The Epson AX3 was a notable high-performance color portable of its era." },
    { id: 285, question: "In analog computer", options: { "A": "Input is first converted to digital form", "B": "Input is never converted to digital form", "C": "Output is displayed in digital form", "D": "All of the above" }, answer: "B", explanation: "Analog computers work strictly with continuous physical values, never converting to discrete numbers." },
    { id: 287, question: "When was the company named IBM?", options: { "A": "1914", "B": "1924", "C": "1975", "D": "None of above" }, answer: "B", explanation: "Thomas J. Watson renamed the Computing-Tabulating-Recording Company to IBM in 1924." },
    { id: 288, question: "Which of the following storage device can store the largest amount of data?", options: { "A": "Hard Disks", "B": "Flash Disks", "C": "Blu-Ray Disks", "D": "DVDs" }, answer: "A", explanation: "Hard disks currently offer the highest capacity-to-cost ratio for individual consumer devices." },
    { id: 289, question: "Who invented Mark I?", options: { "A": "Howard Aiken", "B": "J. P. Eckert", "C": "John Mauchley", "D": "John v. Atanasoff" }, answer: "A", explanation: "Howard Aiken led the development of the Harvard Mark I at IBM." },
    { id: 290, question: "ALU is", options: { "A": "Arithmetic Logic Unit", "B": "Array Logic Unit", "C": "Application Logic Unit", "D": "None of above" }, answer: "A", explanation: "Arithmetic Logic Unit." },
    { id: 291, question: "A program that converts an entire program into machine language at one time is a", options: { "A": "Interpreter", "B": "CPU", "C": "Compiler", "D": "Simulator" }, answer: "C", explanation: "Compilers translate the entire source file before the program can be run." },
    { id: 292, question: "When did arch rivals IBM and Apple Computers Inc. decide to join hands?", options: { "A": "1978", "B": "1984", "C": "1990", "D": "1991" }, answer: "D", explanation: "They formed a famous alliance in 1991 to develop new operating systems and CPUs (PowerPC)." },
    { id: 293, question: "The purpose of vacuum tube was to NOT act like", options: { "A": "an amplifier", "B": "a switch", "C": "a router", "D": "None of above" }, answer: "C", explanation: "Routers are network devices; vacuum tubes only amplify or switch electrical signals." },
    { id: 294, question: "As compared to diskettes, the hard disks are", options: { "A": "More expensive", "B": "More portable", "C": "Less rigid", "D": "Slowly accessed" }, answer: "A", explanation: "Hard disks contain precision mechanical parts and high storage, making them cost more than simple floppy diskettes." },
    { id: 295, question: "Which of the following is the most quickly accessible storage?", options: { "A": "RAM", "B": "Registers", "C": "Disks", "D": "Pen Drive" }, answer: "B", explanation: "Registers are inside the CPU itself and run at the speed of the processor." },
    { id: 296, question: "The octal equivalence of 111010 is", options: { "A": "81", "B": "72", "C": "71", "D": "None of above" }, answer: "B", explanation: "Group bits by 3 from the right: 111 (7) and 010 (2) = 72 in octal." },
    { id: 297, question: "Excessive parallel processing is related to", options: { "A": "First generation", "B": "Fourth generation", "C": "Fifth Generation", "D": "Third generation" }, answer: "C", explanation: "The 5th generation focus is on massive parallel computing for AI applications." },
    { id: 298, question: "Second generation computers were developed during", options: { "A": "1949-55", "B": "1956-65", "C": "1965-70", "D": "1970-90" }, answer: "B", explanation: "This era marks the shift from vacuum tubes to transistors." },
    { id: 299, question: "What do you call a single point on a computer screen?", options: { "A": "Cell", "B": "Element", "C": "Pixel", "D": "Bit" }, answer: "C", explanation: "A pixel (picture element) is the smallest controllable unit on a screen." },
    { id: 300, question: "Mostly which of the following device is used to carry user files?", options: { "A": "Floppy Disk", "B": "Hard Disk", "C": "RAM", "D": "CDROM" }, answer: "A", explanation: "Historically, floppies were the main portable storage for moving files between machines." },
    { id: 301, question: "Which computer implemented binary numbers and separate memory for the first time?", options: { "A": "Mark I", "B": "ABC", "C": "Z3", "D": "None of above" }, answer: "B", explanation: "The ABC was the first to use capacitors for dynamic memory and binary for logic." },
    { id: 302, question: "FORTRAN is a programming language. What does FORTRAN stand for?", options: { "A": "File Translation", "B": "Format Translation", "C": "Formula Translation", "D": "Floppy Translation" }, answer: "C", explanation: "Formula Translation." },
    { id: 303, question: "Which of the following memories needs refreshing?", options: { "A": "SRAM", "B": "DRAM", "C": "ROM", "D": "All of above" }, answer: "B", explanation: "Dynamic RAM capacitors must be recharged thousands of times per second to hold data." },
    { id: 304, question: "Can you tell what passes into and out from the computer via its ports?", options: { "A": "Data", "B": "Bytes", "C": "Graphics", "D": "Pictures" }, answer: "A", explanation: "Ports are the electrical gateways through which data flows into and out of the CPU." },
    { id: 305, question: "An output device that produces audio response from recorded messages is", options: { "A": "Magnetic tape", "B": "Voice response unit", "C": "Voice recognition unit", "D": "Voice band" }, answer: "B", explanation: "VRUs convert computer data into audible speech or recorded sounds." },
    { id: 306, question: "Which of the items below are considered removable storage media?", options: { "A": "Hard disk cartridges", "B": "(Magneto-optical) disk", "C": "Flexible disks", "D": "All of the above" }, answer: "D", explanation: "Removable media are designed to be detached and taken elsewhere." },
    { id: 307, question: "Which of the following is not purely output device?", options: { "A": "Screen", "B": "Printer", "C": "Speaker", "D": "Plotter" }, answer: "A", explanation: "Screens (monitors) often serve as interactive units, especially if they are touch-enabled." },
    { id: 308, question: "Who developed a mechanical device in the 17th century for basic arithmetic and square roots?", options: { "A": "Napier", "B": "Babbage", "C": "Pascal", "D": "Leibniz" }, answer: "D", explanation: "Gottfried Leibniz invented the Stepped Reckoner, which could multiply and divide." },
    { id: 310, question: "Which of the following is not a form of data?", options: { "A": "numbers and characters", "B": "images", "C": "sound", "D": "none of above" }, answer: "D", explanation: "Computers represent everything—text, audio, and images—as digital data." },
    { id: 311, question: "Which is not a computer classification?", options: { "A": "mainframe", "B": "maxframe", "C": "mini", "D": "notebook" }, answer: "B", explanation: "There is no official 'maxframe' category in computer architecture." },
    { id: 312, question: "The control unit of a microprocessor", options: { "A": "Stores data in the memory", "B": "Accepts input data from keyboard", "C": "Performs arithmetic/logic function", "D": "None of above" }, answer: "D", explanation: "The CU directs operations; it does not store data or perform the actual math (that is the ALU)." },
    { id: 313, question: "Which of the following is internal memory?", options: { "A": "Disks", "B": "Pen Drives", "C": "RAM", "D": "CDs" }, answer: "C", explanation: "RAM is the core internal memory used by the CPU for processing." },
    { id: 314, question: "Which operation is not performed by computer", options: { "A": "Inputting", "B": "Processing", "C": "Controlling", "D": "Understanding" }, answer: "D", explanation: "Computers follow logic and math; they do not possess human-like 'understanding' or consciousness." },
    { id: 315, question: "Floppy disks which are made from flexible plastic material are also called?", options: { "A": "Hard disks", "B": "High-density disks", "C": "Diskettes", "D": "Templates" }, answer: "C", explanation: "The name 'Diskette' reflects their smaller, light nature compared to hard disk platters." },
    { id: 316, question: "Magnetic storage chips with no moving parts providing non-volatile access are known as", options: { "A": "Magnetic core memory", "B": "Magnetic tape memory", "C": "Magnetic disk memory", "D": "Magnetic bubble memory" }, answer: "D", explanation: "Magnetic bubble memory was an experimental non-volatile memory technology of the 1970s." },
    { id: 317, question: "A collection of related instructions organized for a common purpose is referred to as", options: { "A": "File", "B": "Database", "C": "Program", "D": "None of above" }, answer: "C", explanation: "A program is a specific set of commands the computer follows to complete a task." },
    { id: 318, question: "Plotter accuracy is measured in terms of repeatability and", options: { "A": "Buffer size", "B": "Resolution", "C": "Vertical dimensions", "D": "Intelligence" }, answer: "B", explanation: "Resolution determines how many distinct lines or points a plotter can accurately draw." },
    { id: 319, question: "Computer instructions written with the use of English words instead of binary is called", options: { "A": "Mnemonics", "B": "Symbolic code", "C": "Gray codes", "D": "Opcode" }, answer: "B", explanation: "Symbolic code (like Assembly) uses text symbols to represent binary instructions." },
    { id: 320, question: "Which language is directly understood by the computer without translation program?", options: { "A": "Machine language", "B": "Assembly language", "C": "High level language", "D": "None of above" }, answer: "A", explanation: "Machine language is the only language a CPU can execute directly." },
    { id: 321, question: "On which aspect the analog computers are better than digital?", options: { "A": "Speed", "B": "Accuracy", "C": "Reliability", "D": "Automatic" }, answer: "A", explanation: "Because they don't have to 'digitize' data, early analog computers could compute continuous signals instantly." },
    { id: 322, question: "Which of the following processors use RISC technology?", options: { "A": "486dx", "B": "Power PC", "C": "486sx", "D": "6340" }, answer: "B", explanation: "The PowerPC architecture was a major pioneer of Reduced Instruction Set Computing (RISC)." },
    { id: 323, question: "Which of the following machine was not invented by Charles Babbage?", options: { "A": "Tabulating Machine", "B": "Analytical Engine", "C": "Difference Engine", "D": "None of above" }, answer: "A", explanation: "The Tabulating Machine was invented by Herman Hollerith." },
    { id: 324, question: "How many numbers could ENIAC store in its internal memory", options: { "A": "100", "B": "20", "C": "80", "D": "40" }, answer: "B", explanation: "ENIAC could store only 20 numbers (accumulators) in its extremely limited memory." },
    { id: 325, question: "The subject of cybernetics deals with the science of", options: { "A": "Genetics", "B": "Control and communication", "C": "Molecular biology", "D": "Biochemistry" }, answer: "B", explanation: "Cybernetics is the study of feedback systems in machines and living organisms." },
    { id: 326, question: "Why ABC is considered electro-mechanical computer?", options: { "A": "Invented before electronic computers", "B": "Because there are wheels, drums and bars to rotate", "C": "Because they use the flow of electrons", "D": "None of above" }, answer: "B", explanation: "It used a rotating mechanical drum for its memory system." },
    { id: 327, question: "Binary circuit elements have", options: { "A": "One stable state", "B": "Two stable state", "C": "Three stable state", "D": "None of above" }, answer: "B", explanation: "Binary circuits are 'on' or 'off', representing 1 or 0." },
    { id: 328, question: "Which of the following is used for manufacturing chips?", options: { "A": "Control bus", "B": "Control unit", "C": "Parity unit", "D": "Semiconductor" }, answer: "D", explanation: "Silicon semiconductor is the base material for all modern microchips." },
    { id: 329, question: "Which of the following is not a micro computer?", options: { "A": "Laptop PCs", "B": "Tablet PCs", "C": "Desktop PCs", "D": "None of above" }, answer: "D", explanation: "All the listed options are forms of microcomputers." },
    { id: 330, question: "The value of each bead in earth is", options: { "A": "1", "B": "3", "C": "5", "D": "7" }, answer: "A", explanation: "On the earth (lower deck) of an abacus, each bead is worth 1." },
    { id: 331, question: "When did John Napier develop logarithm?", options: { "A": "1416", "B": "1614", "C": "1641", "D": "1804" }, answer: "B", explanation: "His work 'Mirifici Logarithmorum Canonis Descriptio' was published in 1614." },
    { id: 332, question: "Which of the following terms is the most closely related to main memory?", options: { "A": "Non volatile", "B": "Permanent", "C": "Control unit", "D": "Temporary" }, answer: "D", explanation: "RAM is temporary because its data is lost when you restart the computer." },
    { id: 334, question: "A group of magnetic tapes, videos or terminals usually under the control of one master is", options: { "A": "Cylinder", "B": "Surface", "C": "Track", "D": "Cluster" }, answer: "D", explanation: "In networking and storage, a cluster is a group of units working as one." },
    { id: 335, question: "The word length of a computer is measured in", options: { "A": "Bytes", "B": "Millimeters", "C": "Meters", "D": "Bits" }, answer: "D", explanation: "Word length (e.g., 32-bit or 64-bit) tells you how many bits the CPU processes at once." },
    { id: 336, question: "What type of memory is not directly addressable by CPU and requires EMS?", options: { "A": "Extended", "B": "Expanded", "C": "Base", "D": "Conventional" }, answer: "B", explanation: "Expanded memory (EMS) was a trick used in early PCs to go beyond the 640KB RAM limit." },
    { id: 337, question: "Which unit holds data permanently?", options: { "A": "Input unit", "B": "Secondary storage unit", "C": "Output Unit", "D": "Primary Memory Unit" }, answer: "B", explanation: "Secondary storage (Hard Drives, SSDs) keeps data even after shutdown." },
    { id: 338, question: "Before a disk can be used to store data, it must be_______", options: { "A": "Formatted", "B": "Reformatted", "C": "Addressed", "D": "None of the above" }, answer: "A", explanation: "Formatting creates the logical structure (file system) required to organize data." },
    { id: 339, question: "Computer system comprises of major units", options: { "A": "input, output, control", "B": "input, output, control, storage", "C": "input, output, CPU, storage", "D": "input, output, storage" }, answer: "C", explanation: "The basic components of any computer are I/O, Processing (CPU), and Storage." },
    { id: 340, question: "The first general purpose electronic digital computer in the world was", options: { "A": "UNIVAC", "B": "EDSAC", "C": "ENIAC", "D": "All of above" }, answer: "A", explanation: "While ENIAC was first, UNIVAC was the first commercially available general-purpose machine." },
    { id: 341, question: "A computer that processes both analog and digital signals is known as", options: { "A": "Analog computer", "B": "Digital Computer", "C": "Hybrid Computer", "D": "Mainframe Computer" }, answer: "C", explanation: "Hybrid computers use the speed of analog and the logical storage of digital." },
    { id: 342, question: "High level language is also called", options: { "A": "Problem oriented language", "B": "Business oriented language", "C": "Mathematically oriented language", "D": "All of the above" }, answer: "A", explanation: "They focus on solving problems using logic that is closer to human speech than hardware." },
    { id: 343, question: "Human beings are Homosapinens; which device is called Silicon Sapiens?", options: { "A": "Monitor", "B": "Hardware", "C": "Robot", "D": "Computer" }, answer: "D", explanation: "This is a popular nickname for the computer, referring to its core silicon material and 'thinking' ability." },
    { id: 345, question: "Which of the following is associated with error detector?", options: { "A": "Odd parity bit", "B": "Even parity bit", "C": "Both of the above", "D": "None of above" }, answer: "C", explanation: "Parity bits are a simple way for computers to check if data was corrupted during transfer." },
    { id: 346, question: "Magnetic tape can serve as", options: { "A": "Secondary storage media", "B": "Output media", "C": "Input media", "D": "All of the above" }, answer: "D", explanation: "Magnetic tape can be used to feed data in, record results out, or store data long-term." },
    { id: 347, question: "Which company is the biggest player in the microprocessor industry?", options: { "A": "Motorola", "B": "IBM", "C": "Intel", "D": "AMD" }, answer: "C", explanation: "Intel has historically dominated the market share for personal computer microprocessors." },
    { id: 348, question: "The first digital computer built with IC chips was known as", options: { "A": "IBM 7090", "B": "Apple-1", "C": "IBM System/360", "D": "VAX-10" }, answer: "C", explanation: "The System/360 marked the start of the 3rd generation of computing." },
    { id: 349, question: "EBCDIC can code up to how many different characters?", options: { "A": "256", "B": "16", "C": "32", "D": "64" }, answer: "A", explanation: "As an 8-bit code, it can represent 2 to the power 8 (256) unique characters." },
    { id: 350, question: "MICR stands for", options: { "A": "Magnetic Ink Character Reader", "B": "Magnetic Ink Code Reader", "C": "Magnetic Ink Cases Reader", "D": "None" }, answer: "A", explanation: "Used primarily by banks to read the numbers at the bottom of checks." },
    { id: 351, question: "Number cruncher is the informal name for", options: { "A": "Mini computer", "B": "Super computer", "C": "Microcomputer", "D": "Mainframe computer" }, answer: "B", explanation: "Supercomputers are used for high-speed scientific math, also known as number crunching." },
    { id: 352, question: "RATS stand for", options: { "A": "Regression Analysis Time Series", "B": "Regression Analysis Time Sharing", "C": "Real Analysis Series", "D": "All of above" }, answer: "A", explanation: "RATS is a common software package for statistical analysis." },
    { id: 353, question: "Which technology is used in Compact disks?", options: { "A": "Mechanical", "B": "Electrical", "C": "Electro Magnetic", "D": "Laser" }, answer: "D", explanation: "Laser beams read the tiny 'pits' and 'lands' burned into the surface of the disc." },
    { id: 354, question: "Motherboard components are linked by sets of parallel electrical conducting lines called", options: { "A": "Conductors", "B": "Buses", "C": "Connectors", "D": "Consecutive" }, answer: "B", explanation: "The system bus links everything from the CPU to the RAM." },
    { id: 355, question: "Which is the first electronic digital computer?", options: { "A": "ENIAC", "B": "MARK I", "C": "Z3", "D": "ABC" }, answer: "D", explanation: "Though ENIAC is more famous, the ABC computer was the earliest purely electronic digital machine." },
    { id: 357, question: "Metal disks permanently housed in sealed, contamination-free containers are called", options: { "A": "Hard disks", "B": "Floppy disk", "C": "Winchester disk", "D": "Flexible disk" }, answer: "C", explanation: "Winchester was the IBM code-name for early sealed hard drive technology." },
    { id: 358, question: "A computer program that converts an entire program into machine language is called a/an", options: { "A": "Interpreter", "B": "Simulator", "C": "Compiler", "D": "Commander" }, answer: "C", explanation: "Compilers convert the whole file at once before execution." },
    { id: 359, question: "Intel corporation produces chips for which computers?", options: { "A": "IBM PCs", "B": "Apple/Macintosh PCs", "C": "Both of above", "D": "None of above" }, answer: "C", explanation: "Intel makes chips for Windows PCs and has supplied Apple for many years." },
    { id: 360, question: "The first microprocessor built by the Intel corporation was called", options: { "A": "8008", "B": "8080", "C": "4004", "D": "8800" }, answer: "C", explanation: "The 4004 was the world's first single-chip microprocessor, released in 1971." },
    { id: 361, question: "Which of the following is not a class of computers based on size?", options: { "A": "Mainframe Computers", "B": "Mini Computers", "C": "Micro Computers", "D": "Digital Computers" }, answer: "D", explanation: "Digital refers to the type of data processing, not the physical size." },
    { id: 362, question: "Who invented EDSAC?", options: { "A": "John v. Neumann", "B": "J.P. Eckert and John Mauchley", "C": "Maurice Wilkes", "D": "Howard Aiken" }, answer: "C", explanation: "Maurice Wilkes at the University of Cambridge led the EDSAC project." },
    { id: 363, question: "EEPROM stands for", options: { "A": "Electrically Erasable Programmable Read Only Memory", "B": "Electronic Erasable Programmable Read Only Memory", "C": "Easily Erasable Programmable Read Only Memory", "D": "None of the above" }, answer: "A", explanation: "Electrically Erasable Programmable Read-Only Memory." },
    { id: 364, question: "Which of the following is a class of computers based on model?", options: { "A": "Digital Computer", "B": "Hybrid Computers", "C": "Analog Computers", "D": "AT Computers" }, answer: "D", explanation: "AT (Advanced Technology) is a specific model/design standard for early PCs." },
    { id: 365, question: "What are the computers called that performs calculations/comparisons in binary?", options: { "A": "Analog Computers", "B": "Digital Computers", "C": "Hybrid Computers", "D": "None of above" }, answer: "B", explanation: "Digital computers work strictly with discrete binary values." },
    { id: 366, question: "ASCII stands for", options: { "A": "American Standard Code for Information Interchange", "B": "American Scientific Code for International Interchange", "C": "American Standard Code for Intelligence Interchange", "D": "American Scientific Code for Information Interchange" }, answer: "A", explanation: "American Standard Code for Information Interchange." },
    { id: 367, question: "The data recording format in most modern magnetic tape is", options: { "A": "7-bit ASCII", "B": "7-bit EBCDIC", "C": "8-bit ASCII", "D": "8-bit EBCDIC" }, answer: "D", explanation: "Most legacy mainframe tape systems used IBM's 8-bit EBCDIC format." },
    { id: 368, question: "Why was the ABC computer called so?", options: { "A": "Alphabetical order", "B": "Atanasoff-Berry Computer", "C": "Ancient Binary Code", "D": "None of above" }, answer: "B", explanation: "Named after John Atanasoff and Clifford Berry." },
    { id: 369, question: "Who designed the first electronics computer ENIAC?", options: { "A": "Von Neumann", "B": "Joseph M Jacquard", "C": "J. P. Eckert and J. W. Mauchly", "D": "All of above" }, answer: "C", explanation: "J. Presper Eckert and John Mauchly were the leads on the ENIAC team." },
    { id: 370, question: "Central Processing Unit is combination of", options: { "A": "Control and storage", "B": "Control and output unit", "C": "Arithmetic logic and input unit", "D": "Arithmetic logic and control unit" }, answer: "D", explanation: "The CPU consists of the control unit (CU) and the arithmetic logic unit (ALU)." },
    { id: 371, question: "IBM 1401 computer was", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "None of above" }, answer: "A", explanation: "The 1401 was a world-famous 2nd-gen mainframe." },
    { id: 372, question: "Time during which a job is processed by the computer is", options: { "A": "Delay times", "B": "Real time", "C": "Execution time", "D": "Down time" }, answer: "C", explanation: "Execution time is the total duration the processor spends running an instruction." },
    { id: 373, question: "CD-ROM stands for", options: { "A": "Compactable Read Only Memory", "B": "Compact Data Read Only Memory", "C": "Compactable Disk Read Only Memory", "D": "Compact Disk Read Only Memory" }, answer: "D", explanation: "Compact Disk Read-Only Memory." },
    { id: 374, question: "Which unit converts user data into machine readable form?", options: { "A": "Input unit", "B": "Output unit", "C": "ALU", "D": "Control Unit" }, answer: "A", explanation: "The input unit (keyboard, mouse) takes human actions and turns them into digital pulses." },
    { id: 375, question: "Which unit is known as nerve center of computer?", options: { "A": "ALU", "B": "CU", "C": "Memory", "D": "Registers" }, answer: "B", explanation: "The Control Unit sends the signals that tell all other components what to do." },
    { id: 376, question: "What does the disk drive of a computer do?", options: { "A": "Rotate the disk", "B": "Read the disk", "C": "Load programs into memory", "D": "Both b and c" }, answer: "D", explanation: "The drive both reads the magnetic signals and serves as the pathway to load software into RAM." },
    { id: 377, question: "Access time is", options: { "A": "seek time + latency time", "B": "seek time", "C": "seek time - latency time", "D": "latency time" }, answer: "A", explanation: "It is the sum of finding the track and waiting for the right sector to spin around." },
    { id: 378, question: "Who invented the microprocessor?", options: { "A": "Marcian E Huff", "B": "Herman H Goldstein", "C": "Joseph Jacquard", "D": "Ted Hoff" }, answer: "D", explanation: "Ted Hoff led the design team for the Intel 4004." },
    { id: 379, question: "MICR stands for", options: { "A": "Magnetic Ink Character Reader", "B": "Magnetic Ink Code Reader", "C": "Magnetic Ink Case Reader", "D": "None of the above" }, answer: "A", explanation: "Used primarily for reading check numbers in banking." },
    { id: 381, question: "MSI is the abbreviation of", options: { "A": "Medium Scale Integrated", "B": "Medium System Integrated", "C": "Medium Scale Intelligent", "D": "Medium System Intelligent" }, answer: "A", explanation: "Medium Scale Integration refers to chips with 10 to 100 components." },
    { id: 382, question: "A country that contributed Intel chips, Microsoft OS, and Epson printers to early PCs?", options: { "A": "India", "B": "USA", "C": "Germany", "D": "Taiwan" }, answer: "B", explanation: "Intel and Microsoft are American icons, and Epson collaborated closely with the early US PC market." },
    { id: 383, question: "Which statement is valid about interpreter?", options: { "A": "It translates one instruction at a time", "B": "Object code is saved for future use", "C": "Repeated interpretation is not necessary", "D": "All of above" }, answer: "A", explanation: "Interpreters run code line-by-line and do not create a standalone executable file." },
    { id: 384, question: "Easily relocatable language is", options: { "A": "Machine language", "B": "Assembly language", "C": "High level language", "D": "Medium level language" }, answer: "B", explanation: "Assembly uses relative addressing that allows code to be moved around in memory easily." },
    { id: 385, question: "Which of the following memories needs refresh?", options: { "A": "SRAM", "B": "DRAM", "C": "ROM", "D": "All of above" }, answer: "B", explanation: "Dynamic RAM must be constantly refreshed or it will lose its data." },
    { id: 386, question: "Through which device the main components of the computer communicate?", options: { "A": "Keyboard", "B": "System Bus", "C": "Monitor", "D": "Memory" }, answer: "B", explanation: "The bus is the central communication highway for data." },
    { id: 387, question: "What type of device is computer keyboard?", options: { "A": "Memory", "B": "Output", "C": "Storage", "D": "Input" }, answer: "D", explanation: "A keyboard is used to enter data into the computer." },
    { id: 388, question: "Which is the limitation of high level language?", options: { "A": "Lower efficiency", "B": "Machine dependence", "C": "machine level coding", "D": "None of above" }, answer: "A", explanation: "Because it is far from the hardware, it requires more overhead and is slightly slower than low-level code." },
    { id: 389, question: "An example of a digital device can be", options: { "A": "Digital clock", "B": "Automobile speed meter", "C": "Clock with a dial and two hands", "D": "All of the above" }, answer: "A", explanation: "A digital clock uses distinct numbers rather than a continuous moving hand." },
    { id: 390, question: "Which of the following is not true about transistors?", options: { "A": "Transistors are much smaller", "B": "Transistors produce low heat", "C": "Transistors were less reliable", "D": "Transistors were used in radios" }, answer: "C", explanation: "Transistors were far more reliable than the vacuum tubes they replaced." },
    { id: 391, question: "A characteristic of card systems is:", options: { "A": "Slowness in processing data", "B": "Using cards as records of transactions", "C": "Needing a larger DP staff", "D": "All of the above" }, answer: "D", explanation: "Punched card systems were the slow, staff-heavy ancestors of modern databases." },
    { id: 392, question: "The full form of EEPROM is", options: { "A": "Electrically Erasable Programmable Read Only Memory", "B": "Easily Erasable Programmable Read Only Memory", "C": "Electronic Erasable Programmable Read Only Memory", "D": "None of the above" }, answer: "A", explanation: "Electrically Erasable Programmable Read-Only Memory." },
    { id: 393, question: "The original ASCII code used__bits of each byte, reserving the last bit for error checking", "options": { "A": "5", "B": "6", "C": "7", "D": "8" }, answer: "C", explanation: "ASCII originally used 7 bits for characters and the 8th bit for parity (error) checks." },
    { id: 394, question: "A computer programmer", options: { "A": "Does all the thinking for a computer", "B": "Can enter input data quickly", "C": "Can operate all types of computer equipments", "D": "Can draw only flowchart" }, answer: "A", explanation: "The computer has no independent thought; it only does exactly what the programmer instructs." },
    { id: 395, question: "Fifth generation computer is also known as", options: { "A": "Knowledge information processing system", "B": "Very large scale integration (VLSI)", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "KIPS is the formal name for the goal of the 5th generation: computers with human-like reasoning." },
    { id: 396, question: "The standard data code representing characters in EDP systems is called", options: { "A": "ASCII", "B": "EBCDIC", "C": "BCD", "D": "All of above" }, answer: "A", explanation: "ASCII is the global standard for character representation." },
    { id: 397, question: "Which of the following have low failure rate?", options: { "A": "mechanical devices", "B": "electronic devices", "C": "electro-mechanical devices", "D": "None of above" }, answer: "B", explanation: "Electronic devices have no moving parts, so they fail much less often." },
    { id: 398, question: "Which of the following memories need refresh?", options: { "A": "SRAM", "B": "DRAM", "C": "ROM", "D": "All of the above" }, answer: "B", explanation: "DRAM must be refreshed because its storage capacitors leak electricity." },
    { id: 399, question: "An early personal computer used for business would have roughly how much RAM?", options: { "A": "4 KB", "B": "16 K", "C": "64 K", "D": "256 K" }, answer: "C", explanation: "64KB was the standard high-end memory for early home/business PCs like the Apple II." },
    { id: 400, question: "The ALU of a computer contains high speed storage elements called", options: { "A": "Semiconductor memory", "B": "Registers", "C": "Hard disks", "D": "Magnetic disk" }, answer: "B", explanation: "Registers hold the specific bits being operated on by the math unit right now." },
    { id: 401, question: "Which was the computer conceived by Babbage?", options: { "A": "Analytical Engine", "B": "Arithmetic Machine", "C": "Donald Kunth", "D": "All of above" }, answer: "A", explanation: "The Analytical Engine was Babbage's design for a general-purpose programmable computer." },
    { id: 402, question: "The processing speed of first generation computers was in", options: { "A": "milliseconds", "B": "microseconds", "C": "nanoseconds", "D": "picoseconds" }, answer: "A", explanation: "1st gen computers were very slow compared to modern ones, measuring speeds in thousandths of a second (milliseconds)." },
    { id: 403, question: "Model 5100 was ______ in 1975.", options: { "A": "The first PC built by IBM", "B": "The first PC built by Apple", "C": "The first PC built by Motorola", "D": "The first PC built by Intel" }, answer: "A", explanation: "The IBM 5100 was one of the first portable computers, predating the famous 1981 IBM PC." },
    { id: 405, question: "MICR is the short form of", options: { "A": "Magnetic Ink Character Reader", "B": "Magnetic Ink Code Reader", "C": "Magnetic Ink Cases Reader", "D": "None" }, answer: "A", explanation: "Magnetic Ink Character Recognition is used primarily by the banking industry to facilitate check processing." },
    { id: 406, question: "Which of the following is not a class based on size?", options: { "A": "Mainframe Computer", "B": "Micro Computer", "C": "Mini Computer", "D": "Digital Computer" }, answer: "D", explanation: "Digital refers to the processing technology (binary), not the physical size of the machine." },
    { id: 407, question: "Which 8-bit chip was used in many TRS-80 computers?", options: { "A": "Z-8000", "B": "Motorola 6809", "C": "Z-8808", "D": "Z-80" }, answer: "D", explanation: "The Zilog Z-80 was a highly popular 8-bit microprocessor used in early home computers." },
    { id: 408, question: "Which of the following disk is a fixed disk?", options: { "A": "Hard Disks", "B": "Flash Disks", "C": "Blu-Ray Disks", "D": "DVDs" }, answer: "A", explanation: "Hard disks are usually 'fixed' inside the system unit, unlike removable media like DVDs or Flash drives." },
    { id: 409, question: "Which profession has not been affected by personal computers?", options: { "A": "Medical", "B": "Clerical and law", "C": "Accounting", "D": "None of the above" }, answer: "D", explanation: "Computers have fundamentally transformed every modern profession listed." },
    { id: 410, question: "The word Abacus is derived from Abax, a word from", options: { "A": "Latin language", "B": "Greek Language", "C": "Sanskrit language", "D": "Ancient Egypt" }, answer: "B", explanation: "The Greek word 'abax' means a slab or board covered with dust." },
    { id: 411, question: "In latest generation computers, instructions are executed", options: { "A": "Parallel only", "B": "Sequentially only", "C": "Both sequentially and parallel", "D": "All of above" }, answer: "C", explanation: "Modern multi-core processors can handle tasks in sequence or across multiple cores at once (parallel)." },
    { id: 412, question: "Which memory medium is not used as main memory system?", options: { "A": "Magnetic core", "B": "Semiconductor", "C": "Magnetic tape", "D": "Both a and b" }, answer: "C", explanation: "Magnetic tape is a sequential access medium used for backup, not for high-speed main memory." },
    { id: 413, question: "An online backing storage system capable of storing larger quantities of data is", options: { "A": "CPU", "B": "Memory", "C": "Mass storage", "D": "Secondary storage" }, answer: "C", explanation: "Mass storage refers to high-capacity systems used to hold vast amounts of information." },
    { id: 414, question: "A dot-matrix printer that sprays magnetically-charged ink dots is called", options: { "A": "Laser printer", "B": "Ink-jet printer", "C": "Drum printer", "D": "Chain printer" }, answer: "B", explanation: "Ink-jet printers work by firing precisely aimed droplets of liquid ink onto the paper." },
    { id: 415, question: "Which does not affect the resolution of a video display image?", options: { "A": "Bandwidth", "B": "Raster scan rate", "C": "Vertical/Horizontal resolution", "D": "Screen size" }, answer: "D", explanation: "A large screen can have low resolution, while a small screen can have high resolution; size doesn't determine clarity." },
    { id: 416, question: "Which printing devices output an image composed of a series of dots?", options: { "A": "Wire matrix printer", "B": "Band printer", "C": "Wang image printer", "D": "Both a and c" }, answer: "D", explanation: "Matrix and image printers both create characters and graphics using tiny individual dots." },
    { id: 417, question: "Which of the following is an example of fifth generation computer?", options: { "A": "PIM/m", "B": "ICL 2950", "C": "IBM 1401", "D": "None of above" }, answer: "A", explanation: "PIM/m (Parallel Inference Machine) was part of the 5th gen research into AI and parallel processing." },
    { id: 418, question: "Magnetic disks are the most popular medium for", options: { "A": "Direct access", "B": "Sequential access", "C": "Both of above", "D": "None of above" }, answer: "C", explanation: "Magnetic disks are versatile and can be read in order or by jumping straight to a specific sector." },
    { id: 419, question: "Which of the following is not a third generation computer?", options: { "A": "IBM 360", "B": "IBM 1401", "C": "PDP-8", "D": "HP2115" }, answer: "B", explanation: "The IBM 1401 is a famous 2nd-generation transistor-based computer." },
    { id: 420, question: "The number of records contained within a block of data on tape is the", options: { "A": "Block definition", "B": "Record contain clause", "C": "Blocking factor", "D": "Record per block" }, answer: "C", explanation: "Blocking factor is a technical term used in data storage to define how records are grouped together." },
    { id: 421, question: "Mark I is also known as", options: { "A": "American Sequence Controlled Calculator", "B": "Automatic Sequence Calculating Controller", "C": "American Sequence Controlled Computer", "D": "Automatic Sequence Controlled Calculator" }, answer: "D", explanation: "The official name for the Harvard Mark I was the Automatic Sequence Controlled Calculator (ASCC)." },
    { id: 422, question: "Which register is loaded with contents of memory pointed to by the PC?", options: { "A": "Memory address registers", "B": "Memory data registers", "C": "Instruction register", "D": "Program counter" }, answer: "C", explanation: "The Instruction Register (IR) holds the actual instruction that was just fetched from memory." },
    { id: 423, question: "Which of the following are the cheapest memory devices in terms of Cost/Bit?", options: { "A": "Semiconductor memories", "B": "Magnetic Disks", "C": "Compact Disks", "D": "Magnetic Tapes" }, answer: "D", explanation: "Magnetic tapes remain the cheapest way to store massive amounts of archival data per bit." },
    { id: 424, question: "MIS is designed to provide information for decision making by?", options: { "A": "Consumers", "B": "Workers", "C": "Foremen", "D": "Managers" }, answer: "D", explanation: "Management Information Systems (MIS) are built specifically to help business leaders make data-driven decisions." },
    { id: 425, question: "Which is valid statement?", options: { "A": "1 KB = 1024 Bytes", "B": "1 MB = 1024 Bytes", "C": "1 KB = 1000 Bytes", "D": "1 MB = 1000 Bytes" }, answer: "A", explanation: "In binary systems, 1 Kilobyte is 2 to the power of 10, which is 1024." },
    { id: 426, question: "Latency time is", options: { "A": "Time to spin the needed data under head", "B": "Time to spin the needed data under track", "C": "Time to spin data under sector", "D": "All of above" }, answer: "A", explanation: "Latency is the delay while the disk rotates to bring the specific sector under the read/write head." },
    { id: 427, question: "Who built the first Mechanical Calculator?", options: { "A": "Joseph Marie Jacquard", "B": "John Mauchly", "C": "Blaise Pascal", "D": "Howard Aiken" }, answer: "C", explanation: "Blaise Pascal invented the Pascaline in 1642 to help his father with tax accounting." },
    { id: 429, question: "Which generation computers had expensive operation cost?", options: { "A": "First", "B": "Second", "C": "Third", "D": "Fourth" }, answer: "A", explanation: "1st gen computers were incredibly expensive to run due to high electricity use and constant maintenance." },
    { id: 430, question: "An IBM system/38 represents the computer class of:", options: { "A": "Small-scale computer", "B": "Medium-scale computer", "C": "Large-scale computer", "D": "Super computer" }, answer: "B", explanation: "The System/38 was a popular minicomputer/midrange system for businesses." },
    { id: 431, question: "Another word for a daisy wheel printer", options: { "A": "Petal printer", "B": "Golf ball printer", "C": "Laser printer", "D": "Line printer" }, answer: "A", explanation: "The characters are arranged on spokes like the petals of a daisy." },
    { id: 432, question: "Cursor is a ____", options: { "A": "Pixel", "B": "Thin blinking line", "C": "Pointing device", "D": "None of these" }, answer: "B", explanation: "A cursor is the visual indicator showing where your next action or character will appear." },
    { id: 433, question: "Which device is used to backup the data?", options: { "A": "Floppy Disk", "B": "Tape", "C": "Network Drive", "D": "All of the above" }, answer: "D", explanation: "Backup can be performed on any reliable secondary storage medium." },
    { id: 434, question: "Which printer will not work for printing on multi-carbon forms?", options: { "A": "Daisy wheel", "B": "Dot matrix", "C": "Laser", "D": "Thimble" }, answer: "C", explanation: "Laser printers don't use physical impact, so they can't press through carbon layers." },
    { id: 435, question: "Which of the following items are examples of storage devices?", options: { "A": "Floppy / hard disks", "B": "CD-ROMs", "C": "Tape devices", "D": "All of the above" }, answer: "D", explanation: "All these devices are designed to hold data for long-term use." },
    { id: 436, question: "What does ASCII stand for?", options: { "A": "American Stable Code for International Interchange", "B": "American Standard Case for Institutional Interchange", "C": "American Standard Code for Information Interchange", "D": "American Standard Code for Interchange Information" }, answer: "C", explanation: "American Standard Code for Information Interchange." },
    { id: 437, question: "Which computers are used as servers for medium sized organizations?", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "Super Computers" }, answer: "B", explanation: "Minicomputers (midrange servers) are ideal for handling department-level networking." },
    { id: 438, question: "Slide Rules was invented in", options: { "A": "1614", "B": "1617", "C": "1620", "D": "None of above" }, answer: "C", explanation: "William Oughtred is credited with inventing the slide rule around 1622 (often cited as 1620s)." },
    { id: 439, question: "A normal CD-ROM usually can store up to __________ data?", options: { "A": "680 KB", "B": "680 Bytes", "C": "700 MB", "D": "680 GB" }, answer: "C", explanation: "A standard CD-ROM typically holds about 700 Megabytes of data." },
    { id: 440, question: "Which of the following required large computer memory?", options: { "A": "Imaging", "B": "Graphics", "C": "Voice", "D": "All of above" }, answer: "D", explanation: "Non-text files like images and audio are much more data-intensive." },
    { id: 441, question: "Which was the computer conceived by Babbage?", options: { "A": "Analytical engine", "B": "Arithmetic machine", "C": "Donald Knuth", "D": "All of above" }, answer: "A", explanation: "Repeated; Babbage's masterpiece was the Analytical Engine." },
    { id: 442, question: "The lower deck of an abacus is known as", options: { "A": "heaven", "B": "sky", "C": "earth", "D": "floor" }, answer: "C", explanation: "In traditional abacus terminology, the top is heaven and the bottom is earth." },
    { id: 443, question: "All modern computers operate on", options: { "A": "Information", "B": "Floppies", "C": "Data", "D": "Word" }, answer: "C", explanation: "Computers process raw data into useful information." },
    { id: 444, question: "The computer that can input analog signals and return result in digital form is", options: { "A": "Analog Computer", "B": "Digital Computer", "C": "Hybrid Computer", "D": "Mainframe Computer" }, answer: "C", explanation: "Hybrid computers act as a bridge between the analog and digital worlds." },
    { id: 445, question: "Offline device is", options: { "A": "A device which is not connected to CPU", "B": "A device which is connected to CPU", "C": "A direct access storage device", "D": "An I/O device" }, answer: "A", explanation: "Offline means the device is not under the immediate control of the central processor." },
    { id: 446, question: "What is the latest write-once optical storage media?", options: { "A": "Digital paper", "B": "Magneto-optical disk", "C": "WORM disk", "D": "CD-ROM disk" }, answer: "C", explanation: "WORM stands for Write Once, Read Many." },
    { id: 447, question: "Which of the following programming language started from second generation?", options: { "A": "LISP", "B": "C", "C": "QBASIC", "D": "FORTRAN" }, answer: "D", explanation: "FORTRAN (1957) was one of the first high-level languages used with 2nd gen computers." },
    { id: 448, question: "Which one of the following input device is user-programmable?", options: { "A": "Dumb terminal", "B": "Smart terminal", "C": "VDT", "D": "Intelligent terminal" }, answer: "D", explanation: "Intelligent terminals have built-in processing power and can be programmed independently." },
    { id: 449, question: "Floppy disks are typically found in which diameters?", options: { "A": "3.5\"", "B": "5.25\"", "C": "8\"", "D": "All of above" }, answer: "D", explanation: "Floppies evolved from large 8-inch disks down to the common 3.5-inch size." },
    { id: 450, question: "Current SIMMs have either __ or __ connectors (pins)", options: { "A": "9 or 32", "B": "30 or 70", "C": "28 or 72", "D": "30 or 72" }, answer: "D", explanation: "Standard legacy memory modules (SIMMs) came in 30-pin or 72-pin configurations." },
    { id: 451, question: "Dot-matrix is a type of", options: { "A": "Tape", "B": "Printer", "C": "Disk", "D": "Bus" }, answer: "B", explanation: "It is an impact printer that forms characters using an array of pins." },
    { id: 453, question: "IBM 1401 is the first computer to enter in Nepal. It belonged to", options: { "A": "First Generation", "B": "Second Generation", "C": "Third Generation", "D": "Fourth Generation" }, answer: "B", explanation: "Repeated; the 1401 used transistors (2nd generation)." },
    { id: 454, question: "The Third Generation Computer was made with ________.", options: { "A": "Vacuum Tube", "B": "Discrete Components", "C": "IC", "D": "Bio Chips" }, answer: "C", explanation: "Integrated Circuits (ICs) allowed for extreme miniaturization in the 3rd generation." },
    { id: 455, question: "Which of the following are the two main components of the CPU?", options: { "A": "Control Unit and Registers", "B": "Registers and Main Memory", "C": "Control unit and ALU", "D": "ALU and bus" }, answer: "C", explanation: "The Control Unit manages instruction flow, while the ALU handles math and logic." },
    { id: 456, question: "Fifth generation computer is also known as", options: { "A": "Knowledge information processing system", "B": "Very large scale integration", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "KIPS refers to computers capable of AI and logical reasoning." },
    { id: 457, question: "Second Generation computers were developed during", options: { "A": "1949 to 1955", "B": "1956 to 1965", "C": "1965 to 1970", "D": "1970 to 1990" }, answer: "B", explanation: "The transistor era spanned roughly from the mid-50s to the mid-60s." },
    { id: 458, question: "What is the name of the computer terminal which gives paper printout?", options: { "A": "Display screen", "B": "Soft copy terminal", "C": "Hard copy terminal", "D": "Plotter" }, answer: "C", explanation: "Hard copy refers to the physical output on paper." },
    { id: 459, question: "Programs are executed on the basis of a priority number in a", options: { "A": "Batch processing system", "B": "Multiprogramming", "C": "Time sharing", "D": "None of these" }, answer: "B", explanation: "Multiprogramming allows the OS to pick the highest priority job to run next." },
    { id: 460, question: "When was Apple Macintosh II microcomputer introduced in the market?", options: { "A": "1964", "B": "1970", "C": "1983", "D": "1987" }, answer: "D", explanation: "The Mac II was the first color Macintosh, released in 1987." },
    { id: 461, question: "When was the world’s first laptop computer introduced in the market and by whom?", options: { "A": "Hewlett-Packard", "B": "Epson, 1981", "C": "Laplink software, 1982", "D": "Tandy, 1985" }, answer: "B", explanation: "The Epson HX-20 was the pioneer of portable clamshell computing." },
    { id: 462, question: "IBM was earlier known by a name which was changed in 1924. What was that name?", options: { "A": "Computer Tabulating Recording Co.", "B": "The Tabulator Ltd.", "C": "International Computer Ltd.", "D": "None of above" }, answer: "A", explanation: "CTR Company was the original name before Watson rebranded to IBM." },
    { id: 463, question: "The personnel who deals with the computer and its management put together are called", options: { "A": "Software", "B": "Humanware", "C": "Firmware", "D": "Hardware" }, answer: "B", explanation: "Humanware describes all humans involved in the design and operation of systems." },
    { id: 464, question: "Which of the following is an input device?", options: { "A": "Scanner", "B": "Speaker", "C": "Monitor", "D": "Printer" }, answer: "A", explanation: "A scanner takes physical images and 'inputs' them into the computer." },
    { id: 465, question: "Which of the following is true?", options: { "A": "Fields are composed of bytes", "B": "Records are composed of fields", "C": "Fields are composed of characters", "D": "All of above" }, answer: "D", explanation: "This correctly describes the data hierarchy from smallest (character) to largest (record)." },
    { id: 466, question: "Who built the world’s first electronic calculator using telephone relays and batteries?", options: { "A": "Claude Shannon", "B": "Konrard Zuse", "C": "George Stibitz", "D": "Howard H. Aiken" }, answer: "C", explanation: "Bell Labs engineer George Stibitz built the 'Model K' calculator on his kitchen table." },
    { id: 467, question: "WAN stands for", options: { "A": "WAP Area Network", "B": "Wide Area Network", "C": "Wide Array of Network", "D": "Wireless Access Network" }, answer: "B", explanation: "Wide Area Network covers a vast geographic distance." },
    { id: 468, question: "In which language is source program written?", options: { "A": "English", "B": "Symbolic", "C": "High level", "D": "Temporary" }, answer: "C", explanation: "Source code is the original code written by a human in a high-level language like C++ or Python." },
    { id: 469, question: "Which of the following is correct acronym of VGA?", options: { "A": "Video Graphics Array", "B": "Visual Graphics Array", "C": "Visual Graphics Adapter", "D": "Video Graphics Adapter" }, answer: "A", explanation: "Video Graphics Array is the standard analog display interface." },
    { id: 470, question: "A song being played on computer speakers is", options: { "A": "hard output", "B": "soft output", "C": "both hard and soft output", "D": "neither hard nor soft output" }, answer: "B", explanation: "Audio and screen displays are 'soft' because they are non-permanent." },
    { id: 471, question: "In the IBM PC-AT, what do the words AT stand for", options: { "A": "Additional Terminals", "B": "Advanced Technology", "C": "Applied Technology", "D": "Advanced Terminology" }, answer: "B", explanation: "AT stands for Advanced Technology, referring to the 16-bit 80286 processor." },
    { id: 472, question: "Size of the primary memory of an early PC ranges between", options: { "A": "2KB to 8KB", "B": "64KB & 256KB", "C": "256KB & 640KB", "D": "None of these" }, answer: "C", explanation: "Early PCs were famous for the 640KB RAM limit." },
    { id: 473, question: "What is the number of read-write heads in the drive for a 9-track magnetic tape?", options: { "A": "9", "B": "16", "C": "18", "D": "27" }, answer: "A", explanation: "There is one head for each track across the width of the tape." },
    { id: 474, question: "Apple company used chips from ______ for its early computers", options: { "A": "Intel", "B": "Motorola", "C": "Both of above", "D": "None of above" }, answer: "B", explanation: "Early Macs used the Motorola 68000 series microprocessors." },
    { id: 475, question: "Which of the following is a feature of fifth generation computers?", options: { "A": "Natural language", "B": "Artificial intelligence", "C": "Bio-chips", "D": "All of above" }, answer: "D", explanation: "The 5th gen is defined by research into human-like machine capabilities." },
    { id: 477, question: "A computer with CPU speed around 100 MIPS and a word length of 64 bits is known as", options: { "A": "Super computer", "B": "Mini computer", "C": "Micro computer", "D": "Macro computer" }, answer: "A", explanation: "High speed (MIPS) and wide data words are hallmarks of supercomputing." },
    { id: 478, question: "When we look at the cost, which of the following computer is most expensive?", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "Super Computers" }, answer: "D", explanation: "Supercomputers cost millions of dollars and require specialized facilities." },
    { id: 479, question: "Which of the following happens when data is entered into a memory location?", options: { "A": "It adds to current content", "B": "It changes the address", "C": "It erases previous content", "D": "It fails if data exists" }, answer: "C", explanation: "Writing to a memory address is 'destructive' to the previous data stored there." },
    { id: 480, question: "Which device is used as the standard pointing device in a GUI?", options: { "A": "Keyboard", "B": "Mouse", "C": "Joystick", "D": "Track ball" }, answer: "B", explanation: "The mouse is the primary way users interact with graphical icons on a screen." },
    { id: 481, question: "Mini computers and micro computers started from which generation of computers?", options: { "A": "First", "B": "Second", "C": "Third", "D": "Fourth" }, answer: "D", explanation: "The microprocessor (4th generation) allowed computers to fit on a desk." },
    { id: 482, question: "Which unit is used for logical operations or comparisons?", options: { "A": "Arithmetic and Logic Unit", "B": "Control Unit", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "The ALU handles all math and comparisons." },
    { id: 483, question: "The operating speed of third generation computer was", options: { "A": "Milliseconds", "B": "Microseconds", "C": "Nanoseconds", "D": "Picoseconds" }, answer: "C", explanation: "ICs pushed processing speeds into the billionths of a second (nanoseconds)." },
    { id: 484, question: "Which of the following is true about Mark I?", options: { "A": "It was 8 feet long", "B": "It was 2 feet long", "C": "It was 50 feet long", "D": "None of above" }, answer: "C", explanation: "The Harvard Mark I was a massive machine, stretching 50 feet in length." },
    { id: 485, question: "Charles Babbage is considered the father of modern computers because", options: { "A": "of his difference engine", "B": "of his analytical engine", "C": "his concept of input, mill and output", "D": "All of above" }, answer: "D", explanation: "Babbage was the first to define the basic logical components still used in PCs today." },
    { id: 486, question: "Which is used only for data entry and storage, and never for processing?", options: { "A": "Mouse", "B": "Dumb terminal", "C": "Micro computer", "D": "Dedicated data entry system" }, answer: "B", explanation: "Dumb terminals lack a local processor; they rely entirely on a central host." },
    { id: 487, question: "What was the first computer brought into Nepal?", options: { "A": "IBM 1401", "B": "ICL 2950", "C": "ENIAC", "D": "None of above" }, answer: "A", explanation: "Nepal rented the IBM 1401 for the 1971 census." },
    { id: 488, question: "The primary advantage of key-to-tape data entry system is", options: { "A": "Large percentage of editing during entry", "B": "Verification is easy", "C": "The tape is reusable", "D": "Errors detected as they occur" }, answer: "C", explanation: "Tapes could be wiped and used for different jobs, unlike paper punch cards." },
    { id: 489, question: "BASIC is ________ language.", options: { "A": "a procedural", "B": "an object oriented", "C": "both A and B", "D": "none of the above" }, answer: "A", explanation: "BASIC follows a specific sequence of commands (procedure)." },
    { id: 490, question: "A program that translates one instruction at a time into machine language is a/an", options: { "A": "Interpreter", "B": "CPU", "C": "Compiler", "D": "Simulator" }, answer: "A", explanation: "Interpreters translate and execute line by line." },
    { id: 491, question: "Which of the following have the fastest access time?", options: { "A": "Semiconductor Memories", "B": "Magnetic Disks", "C": "Magnetic Tapes", "D": "Compact Disks" }, answer: "A", explanation: "Semiconductor RAM is far faster than any physical spinning disk or tape." },
    { id: 492, question: "How many numbers could ENIAC store in its internal memory?", options: { "A": "100", "B": "20", "C": "40", "D": "80" }, answer: "B", explanation: "ENIAC could only hold 20 10-digit decimal numbers in its accumulators." },
    { id: 493, question: "The computer that processes both analog and digital is called", options: { "A": "Analog computer", "B": "Digital computer", "C": "Hybrid computer", "D": "Mainframe computer" }, answer: "C", explanation: "Hybrid = Measurement (Analog) + Logic (Digital)." },
    { id: 494, question: "What was the name of the first commercially available microprocessor chip?", options: { "A": "Intel 308", "B": "Intel 33", "C": "Intel 4004", "D": "Motorola 639" }, answer: "C", explanation: "The Intel 4004 (1971) was the world's first single-chip CPU." },
    { id: 495, question: "Which class of computers can process physical quantities such as speed?", options: { "A": "Analog Computers", "B": "Digital Computers", "C": "Hybrid Computers", "D": "None of above" }, answer: "A", explanation: "Analog computers are designed for physical measurements." },
    { id: 496, question: "How many types of storage loops exist in magnetic bubble memory?", options: { "A": "8", "B": "4", "C": "16", "D": "2" }, answer: "D", explanation: "Bubble memory used major and minor storage loops for data handling." },
    { id: 497, question: "When did IBM introduce the 80286 based PC/AT?", options: { "A": "1982", "B": "1984", "C": "1985", "D": "1989" }, answer: "B", explanation: "The revolutionary PC/AT arrived in 1984." },
    { id: 499, question: "Which computers used operating systems by Microsoft?", options: { "A": "IBM PCs", "B": "Apple PCs", "C": "IBM Compatibles", "D": "Both A & C" }, answer: "D", explanation: "MS-DOS and Windows powered the entire IBM-standard PC ecosystem." },
    { id: 500, question: "One main feature that distinguishes microprocessors from micro-computers is", options: { "A": "Words are large in microprocessors", "B": "Words are shorter in microprocessors", "C": "Microprocessor does not contain I/O device", "D": "Machine cycle time" }, answer: "C", explanation: "A microprocessor is just the CPU; a micro-computer is a full system with memory and I/O." },
    { id: 501, question: "Napier’s Bones were invented in", options: { "A": "1614", "B": "1617", "C": "1620", "D": "None of above" }, answer: "B", explanation: "John Napier introduced his 'bones' to simplify multiplication in 1617." },
    { id: 502, question: "Which of the following is not considered a portable computer?", options: { "A": "Minicomputer", "B": "Laptop", "C": "Tablet PC", "D": "All are portable" }, answer: "A", explanation: "Minicomputers are heavy cabinets, definitely not portable." },
    { id: 503, question: "Computers built before the First Generation were:", options: { "A": "Mechanical", "B": "Electro-mechanical", "C": "Electrical", "D": "None of these" }, answer: "B", explanation: "Machines like the Z3 and Mark I used both electrical circuits and mechanical moving parts." },
    { id: 504, question: "Which of the following is a way to access secondary memory?", options: { "A": "Random access", "B": "Action method", "C": "Transfer method", "D": "Density method" }, answer: "A", explanation: "Most modern secondary storage allows you to jump directly to any file (Random/Direct access)." },
    { id: 505, question: "What is System Analysis?", options: { "A": "Design of the screen", "B": "Defining data formats", "C": "Creating formal model of the problem", "D": "None of the above" }, answer: "C", explanation: "System Analysis is the process of studying a business problem to determine how it can be solved with technology." },
    { id: 506, question: "Which device can only store information but cannot erase or modify it?", options: { "A": "Floppy Disk", "B": "Hard Disk", "C": "Tape Drive", "D": "CDROM" }, answer: "D", explanation: "CD-ROM is a read-only medium; once pressed, the pits can't be changed." },
    { id: 507, question: "Which storage medium is in the form of a circular plate?", options: { "A": "Disk", "B": "CPU", "C": "Printer", "D": "ALU" }, answer: "A", explanation: "Disks (Hard, Floppy, Compact) are all circular platters." },
    { id: 508, question: "Daisy wheel printer is a type of", options: { "A": "Matrix printer", "B": "Impact printer", "C": "Laser printer", "D": "Manual printer" }, answer: "B", explanation: "It hits a ribbon against paper, making it an impact printer." },
    { id: 509, question: "A number system that has eight different symbols is known as", options: { "A": "Binary", "B": "Octal", "C": "Decimal", "D": "Hexadecimal" }, answer: "B", explanation: "Octal uses digits 0 through 7." },
    { id: 510, question: "The two basic types of record access methods are:", options: { "A": "Sequential and random", "B": "Sequential and indexed", "C": "Direct and immediate", "D": "Online and real time" }, answer: "A", explanation: "You either read data in order (Sequential) or by jumping to it (Random)." },
    { id: 511, question: "Artificial Intelligence is associated with which generation?", options: { "A": "First Generation", "B": "Second Generation", "C": "Fifth Generation", "D": "Sixth Generation" }, answer: "C", explanation: "AI is the defining goal of the 5th generation of computing." },
    { id: 512, question: "Storage devices that can access locations in any order are called", options: { "A": "DTE", "B": "DASD", "C": "DDE", "D": "Sequential" }, answer: "B", explanation: "DASD stands for Direct Access Storage Device." },
    { id: 513, question: "The actual execution of instructions happens in", options: { "A": "ALU", "B": "CU", "C": "Memory", "D": "None of above" }, answer: "A", explanation: "The ALU is where the actual 'doing' (math/logic) happens." },
    { id: 514, question: "Floppy disks are available in", options: { "A": "Single side single density", "B": "Single side double density", "C": "Both of above", "D": "None of above" }, answer: "C", explanation: "Early floppies came in many density and side configurations." },
    { id: 515, question: "Which of the following is not an electro-mechanical computer?", options: { "A": "Z3", "B": "ABC", "C": "Mark I", "D": "ENIAC" }, answer: "D", explanation: "ENIAC was the world's first fully electronic computer (no moving logic parts)." },
    { id: 516, question: "Which of the following is a programming language?", options: { "A": "Lotus", "B": "Pascal", "C": "MS-Excel", "D": "Netscape" }, answer: "B", explanation: "Pascal is a high-level language named after Blaise Pascal." },
    { id: 517, question: "Which converts the user data into machine readable form?", options: { "A": "input unit", "B": "central processing unit", "C": "output unit", "D": "decoder unit" }, answer: "A", explanation: "The input unit translates human actions into bits the computer understands." },
    { id: 518, question: "In what respect human beings are superior to computers?", options: { "A": "Diligence", "B": "Intelligence", "C": "Slavery", "D": "Reliability" }, answer: "B", explanation: "Computers have 'artificial' intelligence, but humans have original creative intelligence." },
    { id: 519, question: "As compared to secondary memory, primary memory is", options: { "A": "Large", "B": "Cheap", "C": "Fast", "D": "Slow" }, answer: "C", explanation: "Primary memory (RAM) is designed for speed, not for massive storage capacity." },
    { id: 520, question: "The language that the computer can understand and execute is called", options: { "A": "Machine language", "B": "Application software", "C": "System program", "D": "All of above" }, answer: "A", explanation: "Binary machine code is the native language of the processor." },
    { id: 521, question: "How was the generation of computer classified?", options: { "A": "by device used in processor", "B": "by speed", "C": "by model", "D": "by accuracy" }, answer: "A", explanation: "Generations are defined by the core technology (Tube -> Transistor -> IC -> Microprocessor)." },
