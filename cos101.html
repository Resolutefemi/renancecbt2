<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS 101 CBT Portal</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea580c;
            --border: rgba(0,0,0,0.07);
            --share-gradient: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #7c3aed 100%);
        }
        .dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; min-height: 100vh; }

        nav {
            background: var(--card-bg);
            padding: 0.9rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100;
            gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--primary); }

        main { padding: 2rem 5%; max-width: 960px; margin: 0 auto; }

        /* ── RESUME BANNER ── */
        #resume-banner {
            display: none;
            background: var(--card-bg);
            border: 1.5px solid var(--success);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 10px rgba(22,163,74,0.1);
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 12px; padding: 1rem;
            text-align: center; border: 1.5px solid var(--border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

        /* ── DASHBOARD ── */
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .box {
            background: var(--card-bg); padding: 1.5rem 1rem; border-radius: 14px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(30,64,175,0.12); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; }
        .box p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
        .box-random { background: linear-gradient(135deg, #1e40af, #3b82f6) !important; color: white !important; border: none !important; }
        .box-random p { color: rgba(255,255,255,0.8) !important; }

        /* ── SETUP SCREEN ── */
        #setup-screen { text-align: center; background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 360px; }
        .setup-group label { font-weight: 600; font-size: 0.88rem; color: var(--text); display: block; margin-bottom: 7px; }
        .setup-input { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 9px; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 1rem; background: rgba(0,0,0,0.02); padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        /* ── QUIZ INTERFACE ── */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 15px; padding: 0 4px; flex-wrap: wrap; gap: 10px; }
        .q-counter { font-size: 1rem; color: var(--text); }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer { color: var(--danger); background: rgba(220,38,38,0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; }

        .question-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1.5px solid var(--border); }
        #question-text { line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; }

        .option-btn {
            display: block; width: 100%; padding: 0.95rem 1.1rem;
            margin: 0.65rem 0; border: 2px solid #e2e8f0; border-radius: 10px;
            background: var(--card-bg); color: var(--text); text-align: left;
            cursor: pointer; font-size: 0.97rem; transition: background 0.15s, border-color 0.15s; line-height: 1.5;
        }
        .option-btn:not(:disabled):hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn.selected { background: #e0f2fe !important; border-color: #3b82f6 !important; color: #0369a1 !important; }
        .option-btn.correct  { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong    { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn { padding: 0.8rem 1.6rem; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem; }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        /* ── RESULT MODAL ── */
        .result-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            backdrop-filter: blur(8px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .result-modal-content {
            background: var(--card-bg); padding: 40px 28px; border-radius: 24px;
            width: 100%; max-width: 420px; text-align: center; color: var(--text);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            animation: bounceIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0%   { opacity: 0; transform: scale(0.78) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .score-display { background: rgba(37,99,235,0.06); border: 2px dashed rgba(37,99,235,0.2); border-radius: 18px; padding: 18px; margin: 18px 0; }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
        .btn-review { background: rgba(30,64,175,0.08); color: var(--primary); border: 1.5px solid rgba(30,64,175,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.3rem; }
            .result-modal-content { padding: 28px 18px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<nav>
    <div class="nav-brand">
    <div><i class="fa-solid fa-computer"></i> COS 101 Practice Portal</div>
    <div style="font-size:0.9rem; font-weight:600; color:var(--text-muted); letter-spacing:0.3px;">by Resolute Femi</div>
</div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#64748b; padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <!-- DASHBOARD -->
    <div id="dashboard-wrap">
        <div id="resume-banner"></div>
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title" style="margin-bottom:1.8rem; color:var(--primary); font-size:1.3rem;"></h2>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group checkbox-group">
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-questions" checked> Shuffle Questions
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-options" checked> Shuffle Options (A, B, C, D)
            </label>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- QUIZ INTERFACE -->
    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Exit Review
                </button>
                <span id="timer">30:00</span>
            </div>
        </div>

        <div class="question-card">
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <button class="btn" id="next-btn" onclick="move(1)">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<!-- RESULT MODAL -->
<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 14px; font-size:1.5rem;">Outstanding!</h2>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>

        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>

        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()">
                <i class="fa-solid fa-magnifying-glass"></i> Review Answers
            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Dashboard
            </button>
        </div>
    </div>
</div>

    { id: 24, question: "The output quality of a printer is measured by", options: { "A": "Dot per sq. inch", "B": "Dot per inch", "C": "Dots printed per unit time", "D": "All of the above" }, answer: "B", explanation: "DPI (Dots Per Inch) is the standard measure for how clear and sharp a printed image is." },
    { id: 25, question: "Which of the following was a special purpose computer?", options: { "A": "ABC", "B": "ENIAC", "C": "EDVAC", "D": "All of the above" }, answer: "A", explanation: "The Atanasoff-Berry Computer (ABC) was built specifically to solve linear equations, not for general tasks." },
    { id: 26, question: "What was the computer invented by Attanasoff and Clifford?", options: { "A": "Mark I", "B": "ABC", "C": "Z3", "D": "None of above" }, answer: "B", explanation: "It is named the ABC after its inventors, John Atanasoff and Clifford Berry." },
    { id: 27, question: "Which of the following storage devices can store maximum amount of data?", options: { "A": "Floppy Disk", "B": "Hard Disk", "C": "Compact Disk", "D": "Magneto Optic Disk" }, answer: "B", explanation: "Among these traditional options, Hard Disks offer significantly higher storage density and total capacity." },
    { id: 28, question: "Which computer was considered the first electronic computer until 1973 when court invalidated the patent?", options: { "A": "ENIAC", "B": "MARK I", "C": "Z3", "D": "ABC" }, answer: "A", explanation: "ENIAC was long considered the first until a court ruled that Mauchly and Eckert derived ideas from Atanasoff (ABC)." },
    { id: 29, question: "A physical connection between the microprocessor memory and other parts of the microcomputer is known as", options: { "A": "Path", "B": "Address bus", "C": "Route", "D": "All of the above" }, answer: "B", explanation: "A bus is a communication system that transfers data between components inside a computer." },
    { id: 30, question: "High density double sided floppy disks could store of data", options: { "A": "1.40 MB", "B": "1.44 GB", "C": "1.40 GB", "D": "1.44 MB" }, answer: "D", explanation: "The standard 3.5-inch high-density floppy disk has a capacity of 1.44 Megabytes." },
    { id: 31, question: "A high quality CAD system uses the following for printing drawing and graphs", options: { "A": "Dot matrix printer", "B": "Digital plotter", "C": "Line printer", "D": "All of the above" }, answer: "B", explanation: "CAD requires precise vector lines, which plotters produce much better than standard dot-matrix or line printers." },
    { id: 32, question: "Which of the following is not an input device?", options: { "A": "OCR", "B": "Optical scanners", "C": "Voice recognition device", "D": "COM (Computer Output to Microfilm)" }, answer: "D", explanation: "COM is a process that converts digital data into microfilm, which is an output process." },
    { id: 33, question: "The accuracy of the floating-point numbers representable in two 16-bit words of a computer is approximately", options: { "A": "16 digits", "B": "6 digits", "C": "9 digits", "D": "All of above" }, answer: "B", explanation: "Standard single-precision floating point (using similar word sizes) provides roughly 6 to 9 decimal digits of precision." },
    { id: 34, question: "In most of the IBM PCs, the CPU, the device drivers, memory, expansion slots and active components are mounted on a single board. What is the name of the board?", options: { "A": "Motherboard", "B": "Daughterboard", "C": "Bredboard", "D": "Fatherboard" }, answer: "A", explanation: "The main circuit board that connects all critical components is the motherboard." },
    { id: 35, question: "In most IBM PCs, the CPU, the device drives, memory expansion slots and active components are mounted on a single board. What is the name of this board?", options: { "A": "Motherboard", "B": "Breadboard", "C": "Daughter board", "D": "Grandmother board" }, answer: "A", explanation: "Repeated for emphasis; the motherboard is the 'spine' of the computer." },
    { id: 36, question: "Magnetic disks are the most popular medium for", options: { "A": "Direct access", "B": "Sequential access", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "Unlike tapes (sequential), magnetic disks allow the head to jump directly to any piece of data (Direct/Random access)." },
    { id: 37, question: "A technique used by codes to convert an analog signal into a digital bit stream is known as", options: { "A": "Pulse code modulation", "B": "Pulse stretcher", "C": "Query processing", "D": "Queue management" }, answer: "A", explanation: "Pulse Code Modulation (PCM) is the standard method for digitally representing analog audio or signals." },
    { id: 38, question: "Regarding a VDU, Which statement is more correct?", options: { "A": "It is an output device", "B": "It is an input device", "C": "It is a peripheral device", "D": "It is hardware item" }, answer: "C", explanation: "A VDU (Monitor) is a peripheral because it is an external device connected to the computer core." },
    { id: 39, question: "A modern electronic computer is a machine that is meant for", options: { "A": "Doing quick mathematical calculations", "B": "Input, storage, manipulation and outputting of data", "C": "Electronic data processing", "D": "Performing repetitive tasks accurately" }, answer: "B", explanation: "This defines the 'IPOS' cycle: Input, Processing (manipulation), Output, and Storage." },
    { id: 40, question: "When was vacuum tube invented?", options: { "A": "1900", "B": "1906", "C": "1910", "D": "1880" }, answer: "B", explanation: "Lee de Forest invented the triode vacuum tube in 1906, paving the way for electronic computers." },
    { id: 41, question: "Which of the following produces the best quality graphics reproduction?", options: { "A": "Laser printer", "B": "Ink jet printer", "C": "Plotter", "D": "Dot matrix printer" }, answer: "C", explanation: "For large-scale vector drawings, a plotter is superior to a raster-based printer." },
    { id: 42, question: "Computers with 80286 microprocessor is", options: { "A": "XT computer", "B": "AT computers", "C": "PS/2 computer", "D": "None of above" }, answer: "B", explanation: "The 'Advanced Technology' (AT) PC used the Intel 80286 processor." },
    { id: 43, question: "An application suitable for sequential processing is", options: { "A": "Processing of grades", "B": "Payroll processing", "C": "Both a and b", "D": "All of above" }, answer: "C", explanation: "Tasks where every single record must be touched in order (like paying every employee) are perfect for sequential processing." },
    { id: 44, question: "Which of the following is not processing?", options: { "A": "arranging", "B": "manipulating", "C": "calculating", "D": "gathering" }, answer: "D", explanation: "Gathering is the 'Input' phase; processing only begins once the data is already inside the system." },
    { id: 45, question: "The digital computer was developed primarily in", options: { "A": "USSR", "B": "Japan", "C": "USA", "D": "UK" }, answer: "C", explanation: "Most early milestones (ENIAC, UNIVAC) were funded and developed in the United States." },
    { id: 46, question: "Software in computer", options: { "A": "Enhances the capabilities of the hardware machine", "B": "Increase the speed of central processing unit", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "Software provides the instructions that allow the physical hardware to perform useful tasks." },
    { id: 47, question: "Today's computer giant IBM was earlier known by different name which was changes in 1924. What was that name?", options: { "A": "Tabulator Machine Co.", "B": "Computing Tabulating Recording Co.", "C": "The Tabulator Ltd.", "D": "International Computer Ltd." }, answer: "B", explanation: "IBM was originally the CTR Company before being renamed International Business Machines." },
    { id: 48, question: "Before a disk drive can access any sector record, a computer program has to provide the record's disk address. What information does this address specify?", options: { "A": "Track number", "B": "Sector number", "C": "Surface number", "D": "All of above" }, answer: "D", explanation: "A physical address on a disk requires knowing which platter surface, which ring (track), and which slice (sector) to read." },
    { id: 49, question: "The arranging of data in a logical sequence is called", options: { "A": "Sorting", "B": "Classifying", "C": "Reproducing", "D": "Summarizing" }, answer: "A", explanation: "Sorting is the process of putting items in order (e.g., A-Z or 1-10)." },
    { id: 50, question: "What is the responsibility of the logical unit in the CPU of a computer?", options: { "A": "To produce result", "B": "To compare numbers", "C": "To control flow of information", "D": "To do math's works" }, answer: "B", explanation: "The Logic unit handles comparisons (Greater than, Less than, Equal to)." },
    { id: 51, question: "Abacus was the first", options: { "A": "electronic computer", "B": "mechanical computer", "C": "electronic calculator", "D": "mechanical calculator" }, answer: "D", explanation: "The Abacus is a manual device, making it the world's first mechanical calculator." },
    { id: 52, question: "If in a computer, 16 bits are used to specify address in a RAM, the number of addresses will be", options: { "A": "216", "B": "65,536", "C": "64K", "D": "Any of the above" }, answer: "D", explanation: "2 to the power of 16 equals 65,536, which is also referred to as 64K." },
    { id: 53, question: "Instructions and memory address are represented by", options: { "A": "Character code", "B": "Binary codes", "C": "Binary word", "D": "Parity bit" }, answer: "B", explanation: "Computers use binary (0s and 1s) to represent both the command and the location in memory." },
    { id: 54, question: "The terminal device that functions as a cash register, computer terminal, and OCR reader is the:", options: { "A": "Data collection terminal", "B": "OCR register terminal", "C": "Video Display terminal", "D": "POS terminal" }, answer: "D", explanation: "Point of Sale (POS) terminals are found in retail stores and handle all these functions." },
    { id: 55, question: "A set of flip flops integrated together is called", options: { "A": "Counter", "B": "Adder", "C": "Register", "D": "None of the above" }, answer: "C", explanation: "A register is a high-speed storage location in the CPU made of several flip-flops." },
    { id: 56, question: "People often call ______ as the brain of computer system", options: { "A": "Control Unit", "B": "Arithmetic Logic Unit", "C": "Central Processing Unit", "D": "Storage Unit" }, answer: "C", explanation: "The CPU handles all core logical and mathematical processing." },
    { id: 57, question: "Which is used for manufacturing chips?", options: { "A": "Bus", "B": "Control unit", "C": "Semiconductors", "D": "A and b only" }, answer: "C", explanation: "Silicon is a semiconductor commonly used to create the transistors on a chip." },
    { id: 58, question: "The value of each bead in heaven is", options: { "A": "1", "B": "3", "C": "5", "D": "7" }, answer: "C", explanation: "In a Chinese Abacus, beads in the upper deck (heaven) represent 5, while lower deck (earth) represent 1." },
    { id: 59, question: "The first computer introduced in Nepal was", options: { "A": "IBM 1400", "B": "IBM 1401", "C": "IBM 1402", "D": "IBM1402" }, answer: "B", explanation: "The IBM 1401 was brought to Nepal for the 2028 BS census." },
    { id: 60, question: "Mnemonic a memory trick is used in which of the following language?", options: { "A": "Machine language", "B": "Assembly language", "C": "High level language", "D": "None of above" }, answer: "B", explanation: "Assembly uses mnemonics like 'MOV' or 'ADD' instead of binary codes." },
    { id: 61, question: "Instruction in computer languages consists of", options: { "A": "OPCODE", "B": "OPERAND", "C": "Both of above", "D": "None of above" }, answer: "C", explanation: "An instruction needs an Operation Code (what to do) and an Operand (what data to do it to)." },
    { id: 62, question: "Which generation of computer is still under development", options: { "A": "Fourth Generation", "B": "Fifth Generation", "C": "Sixth Generation", "D": "Seventh Generation" }, answer: "B", explanation: "The 5th generation involves Artificial Intelligence and Parallel Processing, which is still evolving." },
    { id: 63, question: "A register organized to allow to move left or right operations is called a", options: { "A": "Counter", "B": "Loader", "C": "Adder", "D": "Shift register" }, answer: "D", explanation: "Shift registers physically move bits left or right, which is used in multiplication and division." },
    { id: 64, question: "Which was the most popular first generation computer?", options: { "A": "IBM 650", "B": "IBM 360", "C": "IBM 1130", "D": "IBM 2700" }, answer: "A", explanation: "The IBM 650 was the most widely used computer in the mid-1950s." },
    { id: 65, question: "Which is considered a direct entry input device?", options: { "A": "Optical scanner", "B": "Mouse and digitizer", "C": "Light pen", "D": "All of the above" }, answer: "D", explanation: "Direct entry devices allow data to enter the computer without requiring human typing (keys)." },
    { id: 66, question: "A set of information that defines the status of resources allocated to a process is", options: { "A": "Process control", "B": "ALU", "C": "Register Unit", "D": "Process description" }, answer: "D", explanation: "Process description contains the snapshots of what a program is doing and what it owns." },
    { id: 67, question: "Each set of Napier's bones consisted of ______ rods.", options: { "A": "5", "B": "9", "C": "11", "D": "13" }, answer: "C", explanation: "John Napier's calculating rods (bones) came in a set of 11." },
    { id: 68, question: "BCD is", options: { "A": "Binary Coded Decimal", "B": "Bit Coded Decimal", "C": "Binary Coded Digit", "D": "Bit Coded Digit" }, answer: "A", explanation: "BCD is a class of binary encodings where each digit of a decimal number is represented by 4 bits." },
    { id: 69, question: "When was the world's first laptop computer introduced in the market and by whom?", options: { "A": "Hewlett-Packard, 1980", "B": "Epson, 1981", "C": "Laplink Traveling Software Inc, 1982", "D": "Tandy Model-200, 1985" }, answer: "B", explanation: "The Epson HX-20 is often cited as the first true laptop computer, released in 1981." },
    { id: 70, question: "From which generation operating systems were developed?", options: { "A": "First", "B": "Second", "C": "Third", "D": "Fourth" }, answer: "C", explanation: "3rd generation computers introduced sophisticated OSs that could handle multiprogramming." },
    { id: 71, question: "The first firm to mass-market a microcomputer as a personal computer was", options: { "A": "IBM", "B": "Super UNIVAC", "C": "Radio Shaks", "D": "Data General Corporation" }, answer: "C", explanation: "Radio Shack's TRS-80 was one of the earliest highly successful mass-market PCs." },
    { id: 72, question: "How many address lines are needed to address each machine location in a 2048 x 4 memory chip?", options: { "A": "10", "B": "11", "C": "8", "D": "12" }, answer: "B", explanation: "2 to the power of 11 equals 2048, so 11 lines are needed to address every spot." },
    { id: 73, question: "Properly arranged data is called", options: { "A": "Field", "B": "Words", "C": "Information", "D": "File" }, answer: "C", explanation: "Information is data that has been processed and organized to be meaningful." },
    { id: 74, question: "A computer consists of", options: { "A": "A central processing unit", "B": "A memory", "C": "Input and output unit", "D": "All of the above" }, answer: "D", explanation: "A standard computer architecture requires a processor, memory, and I/O devices." },
    { id: 75, question: "Why are vacuum tubes also called valves?", options: { "A": "Because they can amplify the weak signals and make them strong", "B": "Because they can stop or allow the flow of current", "C": "Both of above", "D": "None of above" }, answer: "B", explanation: "They act like 'valves' because they control (open/close) the flow of electricity." },
    { id: 76, question: "John Napier invented Logarithm in", options: { "A": "1614", "B": "1617", "C": "1620", "D": "None of above" }, answer: "A", explanation: "Napier published his work on logarithms in 1614." },
    { id: 77, question: "An integrated circuit is", options: { "A": "A complicated circuit", "B": "An integrating device", "C": "Much costlier than a single transistor", "D": "Fabricated on a tiny silicon chip" }, answer: "D", explanation: "An IC contains many miniaturized electronic components on one small piece of semiconductor." },
    { id: 78, question: "What type of control pins are needed in a microprocessor to regulate traffic on the bus?", options: { "A": "Bus control", "B": "Interrupts", "C": "Bus arbitration", "D": "Status" }, answer: "C", explanation: "Bus arbitration pins decide which device gets to use the data bus when multiple devices want it." },
    { id: 79, question: "Where as a computer mouse moves over the table surface, the trackball is", options: { "A": "Stationary", "B": "Difficult to move", "C": "Dragged", "D": "Moved in small steps." }, answer: "A", explanation: "A trackball stays still; you roll the ball with your fingers instead of moving the whole device." },
    { id: 80, question: "Which of the following is used as a primary storage device?", options: { "A": "Magnetic drum", "B": "Hard Disks", "C": "Floppy", "D": "All of above" }, answer: "A", explanation: "On very old computers (1st gen), magnetic drums were used as primary memory (RAM equivalent)." },
    { id: 81, question: "Multi user systems provided cost savings for small business because they use a single processing unit to link several", options: { "A": "Personal computers", "B": "Workstations", "C": "Dumb terminals", "D": "Mainframes" }, answer: "C", explanation: "Dumb terminals are cheap because they don't have their own CPU; they just use the main computer's brain." },
    { id: 82, question: "What are the three decisions making operations performed by the ALU of a computer?", options: { "A": "Grater than", "B": "Less than", "C": "Equal to", "D": "All of the above" }, answer: "D", explanation: "The Logic part of the ALU handles all basic comparison operations." },
    { id: 83, question: "The word processing task associated with changing the appearance of a document is", options: { "A": "Editing", "B": "Writing", "C": "Formatting", "D": "All of above" }, answer: "C", explanation: "Formatting changes how text looks (font, bold, margins), whereas editing changes the words themselves." },
    { id: 84, question: "Nepal brought a computer for census of 2028 BS. This computer was of", options: { "A": "first generation", "B": "second generation", "C": "third generation", "D": "fourth generation" }, answer: "B", explanation: "The IBM 1401 used in Nepal was a classic 2nd generation transistor-based computer." },
    { id: 85, question: "Algorithm and Flow chart help us to", options: { "A": "Know the memory capacity", "B": "Identify the base of a number system", "C": "Direct the output to a printer", "D": "Specify the problem completely and clearly" }, answer: "D", explanation: "These tools allow programmers to map out the logic of a solution before writing code." },
    { id: 86, question: "Which statement is valid about computer program?", options: { "A": "It is understood by a computer", "B": "It is understood by programmer", "C": "It is understood user", "D": "Both a & b" }, answer: "D", explanation: "Source code is for the programmer; machine code is for the computer." },
    { id: 87, question: "The difference between memory and storage is that memory is ____ and storage is ____", options: { "A": "Temporary, permanent", "B": "Permanent, temporary", "C": "Slow, fast", "D": "All of above" }, answer: "A", explanation: "Memory (RAM) loses data when power is cut; storage (Hard Disk) keeps it." },
    { id: 88, question: "When was Pascaline invented?", options: { "A": "1617", "B": "1620", "C": "1642", "D": "1837" }, answer: "C", explanation: "Blaise Pascal invented his mechanical calculator, the Pascaline, in 1642." },
    { id: 89, question: "Which of the following statement is valid?", options: { "A": "Lady Augusta is the first programmer", "B": "Ada is the daughter of Lord Byron, a famous English poet", "C": "ADA is a programming language developed by US Defense", "D": "All of above" }, answer: "D", explanation: "All these facts about Ada Lovelace and the language named after her are historically accurate." },
    { id: 90, question: "A compiler is a translating program which", options: { "A": "Translates instruction of a high level language into machine language", "B": "Translates entire source program into machine language program", "C": "It is not involved in program's execution", "D": "All of above" }, answer: "D", explanation: "A compiler translates the whole file at once but does not actually 'run' the program; it just prepares the executable." },
    { id: 91, question: "What is required when more than one person uses a central computer at the same time?", options: { "A": "Light pen", "B": "Mouse", "C": "Digitizer", "D": "Terminal" }, answer: "D", explanation: "A terminal is the access point for a user on a multi-user system." },
    { id: 92, question: "Which of the following is the first computer to use Stored Program Concept?", options: { "A": "UNIVAC", "B": "ENIAC", "C": "EDSAC", "D": "None of above" }, answer: "C", explanation: "EDSAC (1949) was the first practical computer to implement Von Neumann's stored-program architecture." },
    { id: 93, question: "The term gigabyte refers to", options: { "A": "1024 bytes", "B": "1024 kilobytes", "C": "1024 megabytes", "D": "1024 gigabyte" }, answer: "C", explanation: "In binary measurement, 1 GB = 1024 MB." },
    { id: 94, question: "in which year was UK's premier computing event started?", options: { "A": "1980", "B": "1985", "C": "1986", "D": "1987" }, answer: "A", explanation: "Historically, major tech expos like the UK Computer Show began growing in the early 80s." },
    { id: 95, question: "Once you load the suitable program and provide required data, computer does not need human intervention. This feature is known as", options: { "A": "Accuracy", "B": "Reliability", "C": "Versatility", "D": "Automatic" }, answer: "D", explanation: "Computers are automatic machines because they follow instructions without needing a human to guide every step." },
    { id: 96, question: "What is a brand?", options: { "A": "The name of companies that made computers", "B": "The name of product a company gives to identify its product in market", "C": "A name of class to indicate all similar products from different companies", "D": "All of above" }, answer: "B", explanation: "A brand is a specific identity (name/logo) used to differentiate products from competitors." },
    { id: 97, question: "Machine language is", options: { "A": "Machine dependent", "B": "Difficult to program", "C": "Error prone", "D": "All of above" }, answer: "D", explanation: "Binary coding is tied to the hardware, extremely tedious for humans, and easy to mess up." },
    { id: 98, question: "A byte consists of", options: { "A": "One bit", "B": "Four bits", "C": "Eight bits", "D": "Sixteen bits" }, answer: "C", explanation: "8 bits = 1 byte. This is the standard unit of data." },
    { id: 99, question: "Modern Computers are very reliable but they are not", options: { "A": "Fast", "B": "Powerful", "C": "Infallible", "D": "Cheap" }, answer: "C", explanation: "Infallible means 'never wrong'. While computers are reliable, they can still crash or produce wrong results due to bad data (GIGO)." },
    { id: 100, question: "What is the date when Babbage conceived Analytical engine", options: { "A": "1642", "B": "1837", "C": "1880", "D": "1850" }, answer: "B", explanation: "Charles Babbage started his work on the design for the Analytical Engine around 1837." },
    { id: 101, question: "What was the expected feature of fifth generation computers when Japan started FGCS?", options: { "A": "Operating Systems", "B": "Parallel Processing", "C": "ULSI", "D": "None of above" }, answer: "B", explanation: "The Fifth Generation Computer Systems (FGCS) project aimed to use parallel processing for high-level logic." },
    { id: 102, question: "Which of the following memory medium is not used as main memory system?", options: { "A": "Magnetic core", "B": "Semiconductor", "C": "Magnetic tape", "D": "Both semiconductor and magnetic tape" }, answer: "C", explanation: "Magnetic tape is way too slow for main memory; it is only used for secondary backup storage." },
    { id: 103, question: "The storage subsystem in a microcomputer consists mainly of __ or __ media with varying capacities", options: { "A": "Memory or video", "B": "Magnetic or optical", "C": "Optical or memory", "D": "Video or magnetic" }, answer: "B", explanation: "This covers Hard Drives (magnetic) and CDs/DVDs (optical)." },
    { id: 104, question: "Programs designed to perform specific tasks is known as", options: { "A": "system software", "B": "application software", "C": "utility programs", "D": "operating system" }, answer: "B", explanation: "Application software (like Word or Chrome) is designed for end-user tasks." },
    { id: 105, question: "Computer operators", options: { "A": "writes computer programs for specific problems", "B": "operate the device which input and output data from the computer", "C": "normally require a college degree in computer science", "D": "all of the above" }, answer: "B", explanation: "Operators manage the physical hardware and data flow, while programmers write the code." },
    { id: 106, question: "Which of the following is not anti-viruses software?", options: { "A": "NAV", "B": "F-Prot", "C": "Oracle", "D": "McAfee" }, answer: "C", explanation: "Oracle is a famous database management company, not an antivirus tool." },
    { id: 107, question: "What is a compiler?", options: { "A": "A compiler does a conversion line by line as the program is run", "B": "A compiler converts the whole of a higher level program code into machine code in one step", "C": "A compiler is a general purpose language providing very efficient execution", "D": "None of the above" }, answer: "B", explanation: "The key difference between a compiler and an interpreter is that a compiler processes the whole program at once." },
    { id: 108, question: "_______ computers are also called personal computers", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "Super Computers" }, answer: "C", explanation: "Microcomputers are the desktop/laptop machines we use every day." },
    { id: 109, question: "Which of the following is not input unit device?", options: { "A": "scanner", "B": "camera", "C": "plotter", "D": "digitizer" }, answer: "C", explanation: "A plotter is an output device used for printing." },
    { id: 110, question: "Identify the correct statement", options: { "A": "IBM PCs used RISC CPU designs", "B": "Macintosh used CISC CPU design", "C": "IBM used CISC CPU design", "D": "None of above is true" }, answer: "C", explanation: "IBM PCs historically used the x86 architecture, which is based on CISC (Complex Instruction Set Computer)." },
    { id: 111, question: "Which of the following statement is false?", options: { "A": "Mechanical analog computers have existed for thousands of years", "B": "There are mechanical analog computers and electronic analog computers.", "C": "All electronic computers are digital computers", "D": "All of above are false" }, answer: "C", explanation: "This is false because there are electronic analog computers that use varying voltages to represent data rather than digits." },
    { id: 112, question: "Which of the following require large computers memory?", options: { "A": "Imaging", "B": "Graphics", "C": "Voice", "D": "All of Above" }, answer: "D", explanation: "Multimedia files are much larger and more complex than simple text files." },
    { id: 113, question: "Which of the following is machine independence program?", options: { "A": "High level language", "B": "Low level language", "C": "Assembly language", "D": "Machine language" }, answer: "A", explanation: "High-level languages (Java, Python) can run on different hardware without changing the code." },
    { id: 114, question: "When was the first electro-mechanical computer developed?", options: { "A": "1880", "B": "1990", "C": "1944", "D": "None of above" }, answer: "C", explanation: "The Harvard Mark I, completed in 1944, was the first successful electro-mechanical computer." },
    { id: 115, question: "The first machine to successfully perform a long series of arithmetic and logical operations was:", options: { "A": "ENIAC", "B": "Mark-I", "C": "Analytic Engine", "D": "UNIVAC-1" }, answer: "B", explanation: "The Mark-I was celebrated for its ability to handle long, complex sequences of operations." },
    { id: 116, question: "Which one is the largest space?", options: { "A": "kilobyte", "B": "petabyte", "C": "terabyte", "D": "gigabyte" }, answer: "B", explanation: "The order is: Kilo < Mega < Giga < Tera < Peta." },
    { id: 117, question: "FORTRAN programming language is more suitable for ____", options: { "A": "Business Applications", "B": "Marketing Applications", "C": "Scientific Applications", "D": "None of the above" }, answer: "C", explanation: "FORTRAN (Formula Translation) was designed for engineers and scientists." },
    { id: 119, question: "Analog computer works on the supply of", options: { "A": "Continuous electrical pulses", "B": "Electrical pulses but not continuous", "C": "Magnetic strength", "D": "None of the above" }, answer: "A", explanation: "Analog computers measure continuous physical properties like current or voltage." },
    { id: 120, question: "An error in software or hardware is called a bug. What is the alternative computer jargon for it?", options: { "A": "Leech", "B": "Squid", "C": "Slug", "D": "Glitch" }, answer: "D", explanation: "Glitch is a common term for a sudden, temporary malfunction." },
    { id: 121, question: "The advantage of COM are its __ and __", options: { "A": "Compact size; speed readability", "B": "Compact size, speed", "C": "Readability; speed", "D": "Low cost; readability" }, answer: "B", explanation: "Microfilm takes up very little physical space and can be written very quickly by computers." },
    { id: 122, question: "The BIOS is the abbreviation of ________.", options: { "A": "Basic Input Output System", "B": "Best Input Output System", "C": "Basic Input Output Symbol", "D": "Base Input Output System" }, answer: "A", explanation: "BIOS is the software that starts your computer and bridges hardware with the OS." },
    { id: 123, question: "Which printer is very commonly used for desktop publishing?", options: { "A": "Laser printer", "B": "Inkjet printer", "C": "Daisywheel printer", "D": "Dot matrix printer" }, answer: "A", explanation: "Laser printers provide the fast, professional, high-resolution text required for publishing." },
    { id: 124, question: "IBM 1401 is", options: { "A": "First Generation Computer", "B": "Second Generation Computer", "C": "Third Generation Computer", "D": "Fourth Generation Computer" }, answer: "B", explanation: "The 1401 series was a major success for IBM during the transistor era." },
    { id: 125, question: "Most of the first generation computers were", options: { "A": "Special purpose computers", "B": "General purpose computers", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "Early computers were usually built to solve one specific mathematical or scientific problem." },
    { id: 126, question: "Floppy disks typically in diameter", options: { "A": "3", "B": "5.25", "C": "8", "D": "All of above" }, answer: "D", explanation: "Floppy disks evolved through these three major sizes: 8-inch, 5.25-inch, and finally 3.5-inch." },
    { id: 127, question: "The output quality of a printer is measured by", options: { "A": "Dot per inch", "B": "Dot per sq. inch", "C": "Dots printed per unit time", "D": "All of above" }, answer: "A", explanation: "DPI (Dots Per Inch) is the global standard for resolution." },
    { id: 128, question: "On a PC, how much memory is available to application software?", options: { "A": "1024 KB", "B": "760 KB", "C": "640 KB", "D": "560 KB" }, answer: "C", explanation: "In early DOS systems, there was a '640KB barrier' for user memory." },
    { id: 129, question: "In a computer _____ is capable to store single binary bit.", options: { "A": "Capacitor", "B": "Flip flop", "C": "Register", "D": "Inductor" }, answer: "B", explanation: "A flip-flop is a circuit that has two stable states and can represent a 0 or 1." },
    { id: 130, question: "What does DMA stand for?", options: { "A": "Distinct Memory Access", "B": "Direct Memory Access", "C": "Direct Module Access", "D": "Direct Memory Allocation" }, answer: "A", explanation: "Direct Memory Access allows hardware like sound cards to talk to RAM without bothering the CPU." },
    { id: 131, question: "Who invented Integrated Circuits?", options: { "A": "Jack Kilby", "B": "Robert Noyce", "C": "Both of above", "D": "None of above" }, answer: "C", explanation: "Both men independently invented versions of the IC at roughly the same time." },
    { id: 132, question: "Operating system, editors, and debuggers comes under?", options: { "A": "System Software", "B": "Application Software", "C": "Utilities", "D": "None of the above" }, answer: "A", explanation: "These tools manage the computer itself, rather than performing user-specific tasks." },
    { id: 133, question: "One computer that is not considered a portable is", options: { "A": "Minicomputer", "B": "Laptop computer", "C": "Notebook computer", "D": "All of above" }, answer: "A", explanation: "Minicomputers were 'small' compared to room-sized mainframes, but still the size of a refrigerator." },
    { id: 134, question: "Which of the following is not an electronic computer?", options: { "A": "ENIAC", "B": "ABC", "C": "UNIVAC", "D": "EDSAC" }, answer: "B", explanation: "The ABC used mechanical rotating parts, making it electro-mechanical, not fully electronic." },
    { id: 135, question: "What is the name of the display feature that highlights are of the screen which requires operator attention?", options: { "A": "Pixel", "B": "Reverse video", "C": "Touch screen", "D": "Cursor" }, answer: "B", explanation: "Reverse video swaps background and text colors to make specific areas stand out." },
    { id: 136, question: "Which is the largest computer?", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "Super Computers" }, answer: "D", explanation: "Supercomputers are the absolute peak of computing size and power." },
    { id: 137, question: "Which of the following are the best units of data on an external storage device?", options: { "A": "Bits", "B": "Bytes", "C": "Hertz", "D": "Clock cycles" }, answer: "B", explanation: "Storage is measured in bytes (KB, MB, GB)." },
    { id: 138, question: "The personal computer industry was started by", options: { "A": "IBM", "B": "Apple", "C": "Compaq", "D": "HCL" }, answer: "A", explanation: "IBM set the standard for what a Personal Computer should be in 1981." },
    { id: 139, question: "What is meant by a dedicated computer?", options: { "A": "Which is used by one person only", "B": "Which is assigned one and only one task", "C": "Which uses one kind of software", "D": "Which is meant for application software" }, answer: "B", explanation: "Like the computer in your microwave or car; it only does its specific job." },
    { id: 140, question: "Which programming languages are classified as low level languages?", options: { "A": "Basic, COBOL, FORTRAN", "B": "Prolog 2, Expert Systems", "C": "Knowledge based Systems", "D": "Assembly Languages" }, answer: "D", explanation: "Assembly is 'low' because it is very close to the 0s and 1s of the hardware." },
    { id: 141, question: "What was the main disadvantage of vacuum tubes?", options: { "A": "They were larger in size", "B": "They consumed a lot of electricity", "C": "They produced heat and often burned out", "D": "The operation cost was high" }, answer: "C", explanation: "Heat was the biggest issue; vacuum tubes were notoriously fragile." },
    { id: 143, question: "Which is not a computer of first generation?", options: { "A": "ENIAC", "B": "UNIVAC", "C": "IBM 360", "D": "IBM 1401" }, answer: "C", explanation: "The IBM 360 was a revolutionary 3rd generation system based on ICs." },
    { id: 144, question: "Registers which are partially visible to users and used to hold conditional codes, are known as", options: { "A": "PC", "B": "Flags", "C": "Memory Address Registers", "D": "General Purpose Registers" }, answer: "B", explanation: "Flags show the status of the last operation (e.g., if the result was zero or negative)." },
    { id: 145, question: "Who invented vacuum tubes?", options: { "A": "John Bardeen", "B": "William Shockley", "C": "Lee de Forest", "D": "All of above" }, answer: "C", explanation: "Lee de Forest added a third element to the tube, making it useful for computing." },
    { id: 146, question: "An approach that permits the computer to work on several programs instead of one is", options: { "A": "On-line thesaurus", "B": "Multiprogramming", "C": "Over lapped processing", "D": "Outline processor" }, answer: "B", explanation: "Multiprogramming keeps multiple jobs in memory so the CPU is always busy." },
    { id: 147, question: "Who suggested Stored Program Concept", options: { "A": "John Mauchley", "B": "J.P. Eckert", "C": "John Neumann", "D": "Joseph Jacquard" }, answer: "C", explanation: "John Von Neumann is the father of the architecture modern computers use today." },
    { id: 148, question: "The central processing unit (CPU) consists of", options: { "A": "Input, output and processing", "B": "Control unit, primary storage, and secondary storage", "C": "Control unit, arithmetic-logic unit and primary storage", "D": "Control unit, processing, and primary storage" }, answer: "C", explanation: "This describes the CU, the ALU, and the internal registers/cache." },
    { id: 149, question: "The notable features like keyboards, monitors, GUI were developed in", options: { "A": "First generation", "B": "Second generation", "C": "Third generation", "D": "Fourth generation" }, answer: "D", explanation: "The 4th generation made computers accessible to everyday people through user-friendly interfaces." },
    { id: 150, question: "UNIVAC is", options: { "A": "Universal Automatic Computer", "B": "Universal Array Computer", "C": "Unique Automatic Computer", "D": "Unvalued Automatic Computer" }, answer: "A", explanation: "Universal Automatic Computer." },
    { id: 151, question: "Which is the highest form?", options: { "A": "Data", "B": "Information", "C": "Knowledge", "D": "All of above" }, answer: "C", explanation: "Data is raw; information is organized; knowledge is information applied to solve a problem." },
    { id: 152, question: "Who is credited with the idea of using punch cards to control patterns in a waving machine?", options: { "A": "Pascal", "B": "Hollerith", "C": "Babbage", "D": "Jacquard" }, answer: "D", explanation: "Joseph Marie Jacquard's loom used punch cards, an idea Babbage later borrowed for his Analytical Engine." },
    { id: 153, question: "What is an interpreter?", options: { "A": "An interpreter does the conversion line by line as the program is run", "B": "An interpreter is the representation of the system being designed", "C": "An interpreter is a general purpose language providing very efficient execution", "D": "None of the above" }, answer: "A", explanation: "Interpreters are slower than compilers but easier for testing code since you can run it immediately." },
    { id: 154, question: "Which is a semi conductor memory?", options: { "A": "Dynamic", "B": "Static", "C": "Bubble", "D": "Both a & b" }, answer: "D", explanation: "DRAM and SRAM are both built using semiconductor transistors." },
    { id: 155, question: "RJ45 UTP cable has ________ Cables.", options: { "A": "2 pair", "B": "3 pair", "C": "4 pair", "D": "5 pair" }, answer: "C", explanation: "Standard Ethernet cables contain 8 wires twisted into 4 pairs." },
    { id: 156, question: "Which of the following is not a valid size of a Floppy Disk?", options: { "A": "8\"", "B": "5 \u00bc\"", "C": "3 \u00bd\"", "D": "5 \u00bd\"" }, answer: "D", explanation: "5 1/2 is not a standard size; 5 1/4 was the actual standard size." },
    { id: 157, question: "The earliest calculating devices are", options: { "A": "Abacus", "B": "Clock", "C": "Difference Engine", "D": "None of these" }, answer: "A", explanation: "The Abacus dates back over 2000 years." },
    { id: 158, question: "Word length of a Personal Computer is ___", options: { "A": "4 bits", "B": "8 bits", "C": "16 bits", "D": "64 bits" }, answer: "D", explanation: "Modern PCs standard is 64-bit architecture." },
    { id: 159, question: "What was the first computer to perform all calculation using electronics rather than wheels, ratchets, or mechanical switches?", options: { "A": "Mark I", "B": "ABC", "C": "Z3", "D": "None of above" }, answer: "B", explanation: "Atanasoff's ABC was the pioneer in using electronic vacuum tubes for logic." },
    { id: 160, question: "A directly accessible appointment calendar is feature of a __ resident package", options: { "A": "CPU", "B": "Memory", "C": "Buffer", "D": "ALU" }, answer: "B", explanation: "Software must be resident in the main memory to be instantly accessible." },
    { id: 161, question: "Which unit converts computer data into human readable form?", options: { "A": "Input unit", "B": "Output unit", "C": "ALU", "D": "Control Unit" }, answer: "B", explanation: "Output units (like screens) turn 0s and 1s into text and pictures we can understand." },
    { id: 162, question: "The full form of ALU is", options: { "A": "Arithmetic Logic Unit", "B": "Array Logic Unit", "C": "Application Logic Unit", "D": "None of above" }, answer: "A", explanation: "Arithmetic Logic Unit." },
    { id: 163, question: "What produces useful information out of data?", options: { "A": "Computer", "B": "Processing", "C": "Programming", "D": "none of above" }, answer: "B", explanation: "Data + Processing = Information." },
    { id: 164, question: "Which of the following device was not invented by Babbage?", options: { "A": "Pascaline", "B": "Difference Engine", "C": "Analytical Engine", "D": "None of above" }, answer: "A", explanation: "Pascaline was invented by Blaise Pascal, not Babbage." },
    { id: 165, question: "A digital computer did not score over an analog computer in terms of", options: { "A": "Speed", "B": "Accuracy", "C": "Reliability", "D": "Cost" }, answer: "A", explanation: "Early analog computers could actually be faster for certain continuous calculations because they don't use 'steps'." },
    { id: 167, question: "A computer has very low failure rate because it uses electronic components. It produces very consistent results. This is highlighted by which of the feature of computer?", options: { "A": "Accuracy", "B": "Reliability", "C": "Versatility", "D": "Automatic" }, answer: "B", explanation: "Reliability means being dependable and consistent over time." },
    { id: 168, question: "A paper printout of a document is known as", options: { "A": "Softcopy output", "B": "Hardcopy output", "C": "Permanent Output", "D": "All of above" }, answer: "B", explanation: "Physical paper is hardcopy; digital files on screen are softcopy." },
    { id: 169, question: "Which electronic component was made out of semiconductor material?", options: { "A": "Vacuum tubes", "B": "Transistors", "C": "ICs", "D": "All of above" }, answer: "C", explanation: "While transistors use semiconductors, the 'IC' as a complete component package is the definitive semiconductor breakthrough." },
    { id: 170, question: "The act of retrieving existing data from memory is called", options: { "A": "Read-out", "B": "Read from", "C": "Read", "D": "All of above" }, answer: "D", explanation: "All these terms describe the action of getting data out of a storage cell." },
    { id: 171, question: "Which part of the computer is used for calculating and comparing?", options: { "A": "Disk unit", "B": "Control unit", "C": "ALU", "D": "Modem" }, answer: "C", explanation: "Arithmetic (calculating) and Logic (comparing)." },
    { id: 172, question: "ABC is a", options: { "A": "Special purpose computer", "B": "General purpose computer", "C": "All Purpose Computer", "D": "None of above" }, answer: "A", explanation: "Built solely for solving simultaneous equations." },
    { id: 173, question: "The computer code for the interchange of information between terminals is", options: { "A": "ASCII", "B": "BCD", "C": "EBCDIC", "D": "All of above" }, answer: "A", explanation: "American Standard Code for Information Interchange is the global standard." },
    { id: 174, question: "When was the X window system born?", options: { "A": "1984", "B": "1989", "C": "1988", "D": "1990" }, answer: "A", explanation: "X11 (the graphical window system for Unix) was started at MIT in 1984." },
    { id: 175, question: "What is the first stage in software development?", options: { "A": "Specification and design", "B": "Testing", "C": "System Analysis", "D": "Maintenance" }, answer: "C", explanation: "You must analyze the system and requirements before you start designing or coding." },
    { id: 176, question: "Which of the following is valid statement?", options: { "A": "Data in itself is useless unless it is processed", "B": "The data that is processed is called a program", "C": "The data which is not yet processed is information", "D": "Information is processed by computer to generate data." }, answer: "A", explanation: "Data is just raw input; it only becomes valuable when processed into information." },
    { id: 177, question: "The Second Generation Computer was based on ________.", options: { "A": "Vacuum Tube", "B": "Silicon Chips", "C": "Transistor", "D": "Bio Chips" }, answer: "C", explanation: "Transistors made 2nd gen computers smaller, faster, and more efficient." },
    { id: 178, question: "EBCDIC stands for", options: { "A": "Extended Binary Coded Decimal Interchange Code", "B": "Extended Bit Code Decimal Interchange Code", "C": "Extended Bit Case Decimal Interchange Code", "D": "Extended Binary Case Decimal Interchange Code" }, answer: "A", explanation: "Extended Binary Coded Decimal Interchange Code." },
    { id: 179, question: "Personnel who design, program, operates and maintains computer equipment refers to", options: { "A": "Console-operator", "B": "Programmer", "C": "Peopleware", "D": "System Analyst" }, answer: "C", explanation: "Peopleware refers to the human component of a computer system." },
    { id: 180, question: "IBM System/360 is", options: { "A": "Mainframe Computer", "B": "Mini Computers", "C": "Micro Computers", "D": "None of above" }, answer: "A", explanation: "The System/360 was the most famous mainframe family in history." },
    { id: 181, question: "A system is", options: { "A": "an integration of different units so as to achieve an objective", "B": "input unit", "C": "input and output unit", "D": "input, output and storage units" }, answer: "A", explanation: "A system is defined by its components working together for a goal." },
    { id: 182, question: "Which of the following programming language started from second generation?", options: { "A": "Cobol", "B": "BASIC", "C": "LISP", "D": "C" }, answer: "A", explanation: "COBOL and FORTRAN were the giants of the 2nd generation." },
    { id: 183, question: "The translator program used in assembly language is called", options: { "A": "Compiler", "B": "Interpreter", "C": "Assembler", "D": "Translator" }, answer: "C", explanation: "An assembler converts assembly code into machine code." },
    { id: 184, question: "EEPROM stands for", options: { "A": "Electrically Erasable Programmable Read Only Memory", "B": "Easily Erasable Programmable Read Only Memory", "C": "Electronic Erasable Programmable Read Only Memory", "D": "None of the above" }, answer: "A", explanation: "EEPROM can be erased and rewritten using an electrical charge." },
    { id: 185, question: "Regarding data, computers are very good at", options: { "A": "store", "B": "Processing", "C": "retrieve", "D": "All of above" }, answer: "D", explanation: "Computers are built to handle data at every stage of its lifecycle." },
    { id: 186, question: "Bit map terminal", options: { "A": "support display containing multiple windows", "B": "require considerable amount of video RAM", "C": "requires tremendous amount of copying and hence low performance", "D": "all of above" }, answer: "D", explanation: "Bitmap displays treat every pixel individually, requiring lots of memory and processing power." },
    { id: 187, question: "First generation computers used _________ for memory", options: { "A": "vacuum tubes", "B": "silicon chips", "C": "magnetic drum", "D": "RAM" }, answer: "C", explanation: "Magnetic drums were the primary high-speed storage of the 1950s." },
    { id: 188, question: "Which of the following memories allows simultaneous read and write operations?", options: { "A": "ROM", "B": "RAM", "C": "EPROM", "D": "None of above" }, answer: "B", explanation: "RAM is designed for the CPU to jump in and out of to read and write data constantly." },
    { id: 189, question: "EPROM can be used for", options: { "A": "Erasing the contents of ROM", "B": "Reconstructing the contents of ROM", "C": "Erasing and reconstructing the contents of ROM", "D": "Duplicating ROM" }, answer: "C", explanation: "Erasable Programmable ROM can be wiped (usually by UV light) and rewritten." },
    { id: 191, question: "A term associated with the comparison of processing speeds of different computer system is:", options: { "A": "EFTS", "B": "MPG", "C": "MIPS", "D": "CPS" }, answer: "C", explanation: "MIPS stands for Millions of Instructions Per Second." },
    { id: 192, question: "which of the following is problem oriented language?", options: { "A": "High level language", "B": "Machine language", "C": "Assembly language", "D": "Low level language" }, answer: "A", explanation: "High-level languages are designed to solve problems using human-like logic." },
    { id: 193, question: "A 32 bit microprocessor has the word length equal to", options: { "A": "2 byte", "B": "32 byte", "C": "4 byte", "D": "8 byte" }, answer: "C", explanation: "32 bits divided by 8 bits per byte = 4 bytes." },
    { id: 194, question: "The term GIGO is related to", options: { "A": "Accuracy", "B": "Reliability", "C": "Versatility", "D": "Automatic" }, answer: "A", explanation: "Garbage In, Garbage Out; if the input is wrong (accuracy), the output will be wrong." },
    { id: 195, question: "Web cam is an", options: { "A": "input unit device", "B": "output unit device", "C": "processing device", "D": "Input and Output device" }, answer: "A", explanation: "It captures images and sends them into the computer." },
    { id: 196, question: "Bit stands for", options: { "A": "Binary digits", "B": "bit of system", "C": "a part of byte", "D": "All of above" }, answer: "A", explanation: "A bit is the smallest unit of information (0 or 1)." },
    { id: 197, question: "Access time is", options: { "A": "seek time + latency time", "B": "seek time", "C": "seek time - latency time", "D": "latency time" }, answer: "A", explanation: "It is the time to find the track (seek) plus the time for the disk to spin to the data (latency)." },
    { id: 198, question: "Which device can understand difference between data & programs?", options: { "A": "Input device", "B": "Output device", "C": "Memory", "D": "Microprocessor" }, answer: "D", explanation: "The CPU (Microprocessor) interprets instructions (programs) and processes data." },
    { id: 199, question: "Which of the following is a read only memory storage device?", options: { "A": "Floppy Disk", "B": "CD-ROM", "C": "Hard Disk", "D": "None of these" }, answer: "B", explanation: "Compact Disk Read Only Memory cannot be written to by a standard drive." },
    { id: 200, question: "Symbolic logic was discovered by", options: { "A": "George Boole", "B": "Herman Hollerith", "C": "Van Neumann", "D": "Basic Pascal" }, answer: "A", explanation: "Boolean logic (True/False) is named after George Boole and is the basis of all digital computing." },
    { id: 201, question: "Which of the following is not valid statement?", options: { "A": "Hard is referred to mean something temporary", "B": "Hard is used to mean something tangible", "C": "Soft is used to mean something permanent", "D": "Soft is used to mean something tangible" }, answer: "A", explanation: "Hardware refers to the physical, tangible parts; software is the intangible set of instructions." },
    { id: 202, question: "Digital devices are", options: { "A": "Digital Clock", "B": "Automobile speed meter", "C": "Clock with a dial and two hands", "D": "All of them" }, answer: "A", explanation: "Digital devices represent data in discrete steps (0s and 1s), like a digital watch." },
    { id: 204, question: "After copying the content how many times can you paste?", options: { "A": "1", "B": "16", "C": "32", "D": "Many" }, answer: "D", explanation: "Once data is in the clipboard, it remains there until replaced or the system is cleared, allowing multiple pastes." },
    { id: 205, question: "WAN stands for", options: { "A": "Wap Area Network", "B": "Wide Area Network", "C": "Wide Array Net", "D": "Wireless Area Network" }, answer: "B", explanation: "Wide Area Network covers large geographic areas like cities, countries, or the globe." },
    { id: 206, question: "An error in computer data is called", options: { "A": "Chip", "B": "Bug", "C": "CPU", "D": "Storage device" }, answer: "B", explanation: "The term 'bug' historically comes from a literal moth found in a relay of the Harvard Mark II." },
    { id: 207, question: "The instructions for starting the computer are house on", options: { "A": "Random access memory", "B": "CD-Rom", "C": "Read only memory chip", "D": "All of above" }, answer: "C", explanation: "Startup instructions (BIOS/UEFI) are stored in ROM because they must remain even when the power is off." },
    { id: 208, question: "1 nibble equals to", options: { "A": "1 bits", "B": "2 bits", "C": "4 bits", "D": "8 bits" }, answer: "C", explanation: "A nibble is exactly half of a byte (4 bits)." },
    { id: 209, question: "Perforated paper used as input of output media is known as", options: { "A": "paper tapes", "B": "magnetic tape", "C": "punched papers tape", "D": "card punch" }, answer: "A", explanation: "Paper tape was a common medium for early computers to store and read sequences of data." },
    { id: 210, question: "The secondary storage devices can only store data but they cannot perform", options: { "A": "Arithmetic Operation", "B": "Logic operation", "C": "Fetch operations", "D": "Either of the above" }, answer: "D", explanation: "Calculations and logic are performed by the CPU, not by storage devices like hard drives." },
    { id: 211, question: "Which American computer company is called Big Blue?", options: { "A": "Microsoft", "B": "Compaq Corp", "C": "IBM", "D": "Tandy Svenson" }, answer: "C", explanation: "IBM is nicknamed 'Big Blue' due to its blue logo and the blue suits once worn by its employees." },
    { id: 212, question: "It was in 2028 BS the _________ was brought in to calculate census data.", options: { "A": "IBM 1400", "B": "IBM 1401", "C": "ICL 2950", "D": "None of above" }, answer: "B", explanation: "The IBM 1401 was the first computer introduced to Nepal for census processing." },
    { id: 213, question: "Who is the inventor of ABC Computer?", options: { "A": "John v. Atanasoff", "B": "Clifford Berry", "C": "Both of above", "D": "None of above" }, answer: "C", explanation: "The Atanasoff-Berry Computer was co-invented by John Atanasoff and his student Clifford Berry." },
    { id: 214, question: "Which of the following is the largest unit?", options: { "A": "data", "B": "field", "C": "record", "D": "database file" }, answer: "D", explanation: "In the data hierarchy, a database file contains multiple records, which contain fields." },
    { id: 216, question: "Which of the following is not true for a magnetic disk?", options: { "A": "It is expensive relative to magnetic tape", "B": "It provides only sequential access to stored data", "C": "Users can easily update records by writing over the old data", "D": "All of above" }, answer: "B", explanation: "Magnetic disks provide direct/random access; magnetic tapes are the ones that provide only sequential access." },
    { id: 217, question: "A disadvantage of the laser printer is", options: { "A": "It is quieter than an impact printer", "B": "It is very slow", "C": "The output is of a lower quality", "D": "None of the above" }, answer: "D", explanation: "Laser printers are generally fast, quiet, and high quality; none of the listed options are true disadvantages." },
    { id: 218, question: "The most commonly used standard data code in EDP systems is", options: { "A": "ASCII", "B": "EBCDIC", "C": "BCD", "D": "All of above" }, answer: "A", explanation: "ASCII is the universal standard for representing text in computers and on the internet." },
    { id: 219, question: "Which access method is used to access cassette tape?", options: { "A": "Direct", "B": "Sequential", "C": "Both of the above", "D": "None of the above" }, answer: "B", explanation: "Tapes must be wound from beginning to end to reach data, which is sequential access." },
    { id: 220, question: "A Compiler is ____", options: { "A": "a combination of computer hardware", "B": "a program which translates from one high-level language to another", "C": "a program which translates from one high-level to a machine level language", "D": "None of these" }, answer: "C", explanation: "Compilers translate human-readable high-level code into the binary machine code the CPU understands." },
    { id: 221, question: "Which unit holds data temporarily?", options: { "A": "Input unit", "B": "Secondary storage unit", "C": "Output Unit", "D": "Primary Memory Unit" }, answer: "D", explanation: "Primary memory (RAM) is volatile and holds data only while the computer is powered on." },
    { id: 222, question: "The computer size was very large in", options: { "A": "First Generation", "B": "Second Generation", "C": "Third Generation", "D": "Fourth Generation" }, answer: "A", explanation: "1st generation computers used room-sized vacuum tubes and consumed massive power." },
    { id: 223, question: "A name or number used to identify storage location devices?", options: { "A": "A byte", "B": "A record", "C": "An address", "D": "All of above" }, answer: "C", explanation: "Each byte of memory has a unique 'address' so the CPU can find it." },
    { id: 224, question: "Which of the following is not computer language?", options: { "A": "High level language", "B": "Medium level language", "C": "Low level language", "D": "All of the above" }, answer: "B", explanation: "Computer languages are officially categorized as either High-Level or Low-Level." },
    { id: 225, question: "Reading data is performed in magnetic disk by", options: { "A": "Read/write leads", "B": "Sectors", "C": "Track", "D": "Lower surface" }, answer: "A", explanation: "The read/write heads hover over the spinning disk to detect magnetic signals." },
    { id: 226, question: "IBM 7000 digital computer", options: { "A": "Belongs to second generation", "B": "Uses VLSI", "C": "Employs semiconductor memory", "D": "Has modular constructions" }, answer: "A", explanation: "The IBM 7000 series were transistor-based mainframe computers of the late 1950s." },
    { id: 227, question: "Which of the following is not electro-mechanical computer?", options: { "A": "Z3", "B": "ABC", "C": "Mark I", "D": "ENIAC" }, answer: "D", explanation: "ENIAC was the first fully electronic, general-purpose digital computer." },
    { id: 228, question: "The term ‘computer’ is derived from", options: { "A": "Greek language", "B": "Sanskrit language", "C": "Latin language", "D": "German language" }, answer: "C", explanation: "It comes from the Latin word 'computare', which means to count or reckon." },
    { id: 229, question: "Which statement is valid about magnetic tape?", options: { "A": "It is a plastic ribbon", "B": "It is coated on both sides with iron oxide", "C": "It can be erased and reused", "D": "All of above" }, answer: "D", explanation: "Magnetic tape is a versatile, reusable medium still used for heavy-duty backups." },
    { id: 230, question: "Which of the following is first generation computer?", options: { "A": "EDSAC", "B": "IBM 1401", "C": "CDC 1604", "D": "ICL 2950" }, answer: "A", explanation: "EDSAC used vacuum tubes, marking it as a 1st generation machine." },
    { id: 231, question: "A hard copy would be prepared on a", options: { "A": "Line printer", "B": "Dot matrix Printer", "C": "Typewriter terminal", "D": "All of the above" }, answer: "D", explanation: "Any device that prints digital data onto physical paper produces a hard copy." },
    { id: 232, question: "The term GIGO is relate to which characteristics of computers?", options: { "A": "Speed", "B": "Automatic", "C": "Accuracy", "D": "Reliability" }, answer: "C", explanation: "Accuracy depends on the input; garbage input produces garbage output." },
    { id: 233, question: "Which of the following programming language were used in first generation computers?", options: { "A": "Machine language", "B": "Assembly language", "C": "Both of above", "D": "None of above" }, answer: "A", explanation: "Early computers had to be programmed directly in binary (machine language)." },
    { id: 234, question: "To locate a data item for storage is", options: { "A": "Field", "B": "Feed", "C": "Database", "D": "Fetch" }, answer: "D", explanation: "Fetching is the process of retrieving an instruction or data from memory." },
    { id: 235, question: "Who used punched cards practically for the first time in the history of computers?", options: { "A": "Charles Babbage", "B": "Dr. Herman Hollerith", "C": "Howard Aiken", "D": "Joseph Jacquard" }, answer: "B", explanation: "Hollerith developed punched cards to automate the 1890 US Census." },
    { id: 236, question: "Hard disk is coated in both sides with", options: { "A": "Magnetic metallic oxide", "B": "Optical metallic oxide", "C": "Carbon layer", "D": "All of the above" }, answer: "A", explanation: "The magnetic coating allows data to be stored as polarized spots on the disk." },
    { id: 237, question: "Which of the following term means to reckon?", options: { "A": "putare", "B": "com", "C": "computa", "D": "computar" }, answer: "A", explanation: "The Latin root 'putare' specifically refers to the act of thinking or reckoning." },
