<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <title>GPA Calculator | RENANCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --brand-blue: #74b9ff;
            --brand-green: #55efc4;
            --brand-red: #ff7675;
            --brand-orange: #fab1a0;
            --whatsapp-green: #25d366;
            --card-radius: 20px;
        }

        [data-theme="light"] {
            /* If we want to support light mode with glassmorphism, we might need a different bg or just a semi-opaque white */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #1a1d2e;
            --text-muted: #64748b;
            --brand-blue: #0984e3;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('beauty.jpg') center/cover fixed no-repeat;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 100px 10px 40px; /* Top padding for fixed navbar */
            transition: background 0.35s, color 0.35s;
        }

        .calc-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 30px;
            animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes fadeUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .header h1 span { color: var(--brand-blue); }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.1);
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--brand-blue);
            color: #fff;
            box-shadow: 0 4px 15px rgba(116, 185, 255, 0.3);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        /* Form Styles */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus { border-color: var(--brand-blue); background: rgba(255, 255, 255, 0.1); }

        .btn-add {
            background: var(--brand-blue);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            height: 48px;
            margin-top: auto;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.05);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); }
        td { padding: 15px; border-bottom: 1px solid var(--glass-border); }

        .grade-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Result Cards */
        .gpa-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .gpa-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .gpa-card.primary { background: var(--brand-blue); color: #fff; }
        .gpa-card h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.8; }
        .gpa-val { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; display: block; }

        .class-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-share { background: var(--brand-green); color: #fff; }
        .btn-print { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); color: var(--text-main); }
        .btn-reset { background: rgba(255, 118, 117, 0.1); border: 1px solid var(--brand-red); color: var(--brand-red); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 30px;
            width: 90%; max-width: 450px;
            color: var(--text-main);
        }

        /* Utils */
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } body { padding: 0; background: #fff !important; color: #000; } .calc-container { border: none; box-shadow: none; background: #fff; } }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--whatsapp-green); color: #fff;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none; z-index: 999;
        }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 12px 25px;
            border-radius: 30px; font-size: 0.9rem; opacity: 0;
            transition: all 0.3s; pointer-events: none; z-index: 9999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body data-theme="dark">

<a href="https://wa.me/2347046203544" class="whatsapp-float no-print" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<div class="modal-overlay" id="shareModal">
    <div class="modal">
        <h3 style="margin-bottom:15px;">📤 Share Result</h3>
        <div id="shareText" style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; font-size:0.85rem; margin-bottom:20px; white-space:pre-wrap;"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-action" id="btn-copy-result" style="background:var(--brand-blue); color:#fff;"><i class="far fa-copy"></i> Copy</button>
            <button class="btn-action" id="btn-share-wa" style="background:var(--whatsapp-green); color:#fff;"><i class="fab fa-whatsapp"></i> WhatsApp</button>
        </div>
        <button class="btn-action" id="btn-close-modal" style="margin-top:10px; width:100%; background:none; border:1px solid var(--glass-border); color:var(--text-main);">Close</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="calc-container">
    <div class="header">
        <div>
            <h1>GPA <span>Calculator</span></h1>
            <p style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:5px;">⚡ FUTA Grading System · Resolutefemi</p>
        </div>
        <button class="theme-toggle no-print" id="themeBtn">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="tab-bar no-print">
        <button class="tab-btn active" id="btn-tab-semester">📘 Semester GPA</button>
        <button class="tab-btn" id="btn-tab-cgpa">📊 CGPA Tracker</button>
    </div>

    <div class="tab-content active" id="tab-semester">
        <div class="no-print">
            <div class="input-grid">
                <div class="input-group">
                    <label>Course Code</label>
                    <input type="text" id="courseCode" placeholder="e.g. CST 301">
                </div>
                <div class="input-group">
                    <label>Units</label>
                    <input type="number" id="courseUnit" placeholder="e.g. 3" min="1" max="10">
                </div>
                <div class="input-group">
                    <label>Grade</label>
                    <select id="courseGrade">
                        <option value="5">A (5.0)</option>
                        <option value="4">B (4.0)</option>
                        <option value="3">C (3.0)</option>
                        <option value="2">D (2.0)</option>
                        <option value="1">E (1.0)</option>
                        <option value="0">F (0.0)</option>
                    </select>
                </div>
                <button class="btn-add" id="btn-add-course">Add Course</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Course</th>
                        <th>Units</th>
                        <th>Grade</th>
                        <th>Points</th>
                        <th class="no-print">Action</th>
                    </tr>
                </thead>
                <tbody id="courseBody">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>

        <div class="gpa-display">
            <div class="gpa-card primary">
                <h3>Semester GPA</h3>
                <span class="gpa-val" id="gpaScore">0.00</span>
                <div id="classLabel" class="class-badge">—</div>
            </div>
            <div class="gpa-card">
                <h3>Total Units</h3>
                <span class="gpa-val" id="totalUnits">0</span>
            </div>
            <div class="gpa-card">
                <h3>Total Points</h3>
                <span class="gpa-val" id="totalPoints">0</span>
            </div>
        </div>

        <div class="controls no-print">
            <button class="btn-action btn-share" id="btn-open-share"><i class="fas fa-share-alt"></i> Share</button>
            <button class="btn-action btn-print" id="btn-print"><i class="fas fa-print"></i> Print</button>
            <button class="btn-action btn-reset" id="btn-reset"><i class="fas fa-trash-alt"></i> Reset</button>
        </div>
    </div>

    <div class="tab-content" id="tab-cgpa">
        <div class="no-print">
            <div class="input-grid">
                <div class="input-group">
                    <label>Semester Name</label>
                    <input type="text" id="semName" placeholder="e.g. 100L 1st">
                </div>
                <div class="input-group">
                    <label>GPA</label>
                    <input type="number" id="semGPA" placeholder="4.50" step="0.01" min="0" max="5">
                </div>
                <div class="input-group">
                    <label>Total Units</label>
                    <input type="number" id="semUnits" placeholder="20">
                </div>
                <button class="btn-add" id="btn-add-semester">Add</button>
            </div>
        </div>

        <div id="semesterList" style="margin-bottom:25px;">
            <!-- Dynamic Cards -->
        </div>

        <div class="gpa-card primary" style="width:100%;">
            <h3>Cumulative GPA (CGPA)</h3>
            <span class="gpa-val" id="cgpaScore">0.00</span>
            <div id="cgpaClass" class="class-badge">—</div>
        </div>
    </div>

    <div class="footer no-print" style="margin-top:30px; text-align:center; border-top:1px solid var(--glass-border); padding-top:20px;">
        <p style="font-size:0.8rem; opacity:0.7;">Developed with ❤️ by Resolutefemi</p>
    </div>
</div>

<script src="dist/ui-core.js"></script>
<script src="dist/gpa.js"></script>
</body>
</html>
