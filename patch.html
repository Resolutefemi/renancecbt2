<script>
function showResults() {
    clearInterval(timerId);
    let score = 0;
    currentExamData.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
    });

    alert(`GNS 103 Practice Complete!\nYour Score: ${score} / ${currentExamData.length}\n\nRenance AI will now explain your missed questions.`);

    localStorage.removeItem('saved_gns_exam');

    sendToAI("GNS103", currentExamData, userAnswers);
}
</script>
