  {"id": 478, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "How can a student ethically use AI tools?", "options": ["By copying and pasting AI output directly into assignments.", "By using AI to write exams.", "By verifying outputs, avoiding plagiarism, and protecting personal data.", "By refusing to cite the use of AI."], "answer": "By verifying outputs, avoiding plagiarism, and protecting personal data.", "explanation": "Students must learn to use AI tools ethically by verifying outputs, avoiding plagiarism, and protecting personal data."},
  {"id": 479, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "What is 'algorithmic power' in the context of AI?", "options": ["The electricity required to run a computer.", "The ability of AI systems to make decisions that influence human behavior and opportunities.", "The speed of an internet connection.", "The battery life of a smartphone."], "answer": "The ability of AI systems to make decisions that influence human behavior and opportunities.", "explanation": "Critical AI literacy involves understanding algorithmic power and ethics."},
  {"id": 480, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "Why might an AI system produce biased suggestions?", "options": ["Because computers have personal feelings.", "Due to limitations and biases in its training data.", "Because the AI dislikes certain users.", "Because it operates too quickly."], "answer": "Due to limitations and biases in its training data.", "explanation": "AI systems can misinterpret cultural context or produce biased suggestions due to limitations in training data."},
  {"id": 481, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "Which of these is NOT a question you should ask when evaluating an AI tool?", "options": ["What biases may be present in the system?", "Whose knowledge or culture is privileged or excluded?", "How can I use this to avoid studying completely?", "What data was used to train this system?"], "answer": "How can I use this to avoid studying completely?", "explanation": "Critical questions include asking about biases, data training, and privileged cultures, not how to avoid studying."},
  {"id": 482, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "What does 'Currency' refer to in the CRAAP test?", "options": ["The cost of accessing the information.", "Whether the source is up to date and when it was published.", "The monetary value of the website.", "The language the text is written in."], "answer": "Whether the source is up to date and when it was published.", "explanation": "Currency: Is the source up to date? When was the information published or posted?."},
  {"id": 483, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "What constitutes 'digital writing' today?", "options": ["Using a smart pen on physical paper.", "Entering information into online forms, writing blog posts, and sending emails.", "Scanning handwritten documents.", "Only coding in HTML."], "answer": "Entering information into online forms, writing blog posts, and sending emails.", "explanation": "Writing in the 21st century also includes digital writing: entering information into online forms, creating professional profiles, writing blog posts, etc."},
  {"id": 484, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "In the context of literacies, what is the meaning of being a 'meaning maker'?", "options": ["Decoding words without understanding them.", "Comprehending the text at the level intended by the author.", "Rewriting the text to change its meaning.", "Only looking at the pictures in a text."], "answer": "Comprehending the text at the level intended by the author.", "explanation": "Meaning maker: Comprehending the text at the level intended by the author."},
  {"id": 485, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "What does a 'text critic' understand about texts?", "options": ["That all texts are perfectly neutral.", "That existing biases inform calls to action and that texts are not neutral.", "That texts should only be read once.", "That grammar is the only important aspect of reading."], "answer": "That existing biases inform calls to action and that texts are not neutral.", "explanation": "Text critic: Understanding that the text is not neutral, and that existing biases inform calls to action."},
  {"id": 486, "topic": "Module 3: Listening and Note Taking", "question": "What is an effective way to stay mentally active during a lecture?", "options": ["Daydream about the weekend.", "Take effective notes by interacting with the information and making decisions about what to record.", "Record the lecture on a phone and go to sleep.", "Talk to a classmate."], "answer": "Take effective notes by interacting with the information and making decisions about what to record.", "explanation": "Taking effective notes requires a student to be mentally active... interact with information, make decisions about what to record, and write."},
  {"id": 487, "topic": "Module 3: Listening and Note Taking", "question": "Why is listening considered a 'purposeful activity'?", "options": ["Because you have no choice but to do it.", "Because a listener is on the lookout for something in particular, requiring focus and effort.", "Because it happens automatically without thinking.", "Because it is exactly the same as hearing."], "answer": "Because a listener is on the lookout for something in particular, requiring focus and effort.", "explanation": "A listener is on the lookout for something in particular. In other words, listening is a purposeful activity."},
  {"id": 488, "topic": "Module 3: Listening and Note Taking", "question": "What physiological factor could reduce the effectiveness of listening?", "options": ["A comfortable chair.", "A loud microphone.", "Hunger or illness.", "A well-lit room."], "answer": "Hunger or illness.", "explanation": "Physical factors include hunger, illness, hearing defect."},
  {"id": 489, "topic": "Module 3: Listening and Note Taking", "question": "Which of these is a psychological factor that hinders listening?", "options": ["Noise from the corridor.", "Dislike or disrespect for the lecturer.", "A stuffy classroom.", "An inaudible speaker."], "answer": "Dislike or disrespect for the lecturer.", "explanation": "Psychological factors include mental fatigue, a wrong mental attitude, dislike/disrespect for the lecturer."},
  {"id": 490, "topic": "Module 3: Listening and Note Taking", "question": "When a lecturer uses the phrase 'let me give you an example', what is the signpost function?", "options": ["Summarising", "Focussing", "Exemplifying", "Re-expressing"], "answer": "Exemplifying", "explanation": "Exemplifying signpost words include 'to illustrate this', 'for example', 'let me give you an example'."},
  {"id": 491, "topic": "Module 3: Listening and Note Taking", "question": "What does the signpost word 'finally' indicate?", "options": ["The lecturer is introducing a new topic.", "The lecturer is summarising or ending a list.", "The lecturer is giving an example.", "The lecturer is showing contrast."], "answer": "The lecturer is summarising or ending a list.", "explanation": "Summarising words like 'finally', 'in short', 'to sum up' mean the speaker is moving to a conclusion."},
  {"id": 492, "topic": "Module 3: Listening and Note Taking", "question": "Which type of diagram is best for showing the chronology of a continuous process?", "options": ["Spidergram", "Venn Diagram", "Cycle Diagram", "Tree Diagram"], "answer": "Cycle Diagram", "explanation": "Cycle diagrams show processes, relationships, and the chronology of a continuous cycle."},
  {"id": 493, "topic": "Module 3: Listening and Note Taking", "question": "What are Radial Diagrams (or webs) useful for?", "options": ["Showing a repeating process.", "Displaying facts, aspects, attributes, or examples of a particular topic.", "Showing hierarchical relationships.", "Comparing two contrasting subjects."], "answer": "Displaying facts, aspects, attributes, or examples of a particular topic.", "explanation": "Radial diagrams (also called 'webs') are helpful in displaying facts, and aspects, attributes, or examples of a particular topic."},
  {"id": 494, "topic": "Module 3: Listening and Note Taking", "question": "Why is 'Charting' an effective note-taking method?", "options": ["It requires no writing.", "It allows information to be recorded in a table with columns and headings for easy comparison.", "It uses intricate drawings.", "It is a completely linear format."], "answer": "It allows information to be recorded in a table with columns and headings for easy comparison.", "explanation": "In Charting, information is recorded in a table format with columns and headings."},
  {"id": 495, "topic": "Module 3: Listening and Note Taking", "question": "What is a major disadvantage of a bound notebook for note-taking?", "options": ["It is too expensive.", "It is secure but not very flexible for adding or reorganizing notes.", "It is easily lost.", "It cannot hold ink properly."], "answer": "It is secure but not very flexible for adding or reorganizing notes.", "explanation": "Notebook - secure and easy to carry, but not very flexible in use."},
  {"id": 496, "topic": "Module 3: Listening and Note Taking", "question": "What does it mean to be an 'active listener'?", "options": ["Running while listening.", "Being fully involved in the listening process and interacting with the material.", "Interrupting the speaker frequently.", "Listening without taking notes."], "answer": "Being fully involved in the listening process and interacting with the material.", "explanation": "Active listening describes the process of being fully involved, which includes taking notes and evaluating the material."},
  {"id": 497, "topic": "Module 3: Listening and Note Taking", "question": "What is the purpose of 'Informational Listening'?", "options": ["To judge the speaker's outfit.", "To evaluate the validity of an argument.", "To learn something new.", "To enjoy the sound of the speaker's voice."], "answer": "To learn something new.", "explanation": "Whenever you listen to learn something, you are engaged in informational listening."},
  {"id": 498, "topic": "Module 3: Listening and Note Taking", "question": "Why is it advised to review your notes immediately after a lecture?", "options": ["Because the lecturer will collect them.", "To fill in gaps while the information is still fresh and prevent the rapid 50% memory loss.", "To memorize them word for word.", "To throw them away if they are messy."], "answer": "To fill in gaps while the information is still fresh and prevent the rapid 50% memory loss.", "explanation": "Because we forget 50% within an hour, post-listening activities like reviewing and summarizing are crucial."},
  {"id": 499, "topic": "Module 3: Listening and Note Taking", "question": "What does non-verbal communication from a lecturer (like gesturing or changing tone) often indicate?", "options": ["They are tired.", "They are signaling an important point or structural shift in the lecture.", "They want the class to leave.", "They have forgotten their notes."], "answer": "They are signaling an important point or structural shift in the lecture.", "explanation": "Movements, gestures, or pauses signal to the attentive listener to be on the lookout for an important point."},
  {"id": 500, "topic": "Module 4: Sounds of the English Language", "question": "Which of these sounds is an example of an English plosive?", "options": ["/f/", "/s/", "/t/", "/m/"], "answer": "/t/", "explanation": "Plosives include /p, b, t, d, k, g/"},
  {"id": 501, "topic": "Module 4: Sounds of the English Language", "question": "Which of these sounds is an English affricate?", "options": ["/dʒ/", "/z/", "/v/", "/ŋ/"], "answer": "/dʒ/", "explanation": "English affricates are /tʃ/ and /dʒ/"},
  {"id": 502, "topic": "Module 4: Sounds of the English Language", "question": "What characterizes the Place of Articulation for 'Velar' sounds?", "options": ["Both lips come together.", "The tongue tip touches the alveolar ridge.", "The back of the tongue rises to the soft palate.", "The vocal folds come together."], "answer": "The back of the tongue rises to the soft palate.", "explanation": "Velar: The back of the tongue rises to the soft palate (e.g., /k, g, ŋ/)."},
  {"id": 503, "topic": "Module 4: Sounds of the English Language", "question": "Which part of the vocal tract is completely blocked during the production of nasal sounds?", "options": ["The nasal cavity.", "The oral cavity.", "The pharynx.", "The trachea."], "answer": "The oral cavity.", "explanation": "Nasals: The oral cavity is blocked, but the velum is lowered so air escapes through the nose."},
  {"id": 504, "topic": "Module 4: Sounds of the English Language", "question": "What is the distinction between 'voiced' and 'voiceless' consonants based on?", "options": ["Whether the lips are rounded.", "Whether the vocal folds vibrate or not.", "Whether air escapes through the nose.", "Whether the sound is loud or soft."], "answer": "Whether the vocal folds vibrate or not.", "explanation": "If the vocal folds are held together and vibrate... the sound is voiced. If they are held apart and do not vibrate, the sound is voiceless."},
  {"id": 505, "topic": "Module 4: Sounds of the English Language", "question": "Which of these pairs represents a voiceless/voiced pair of bilabial plosives?", "options": ["/s/ and /z/", "/f/ and /v/", "/p/ and /b/", "/t/ and /d/"], "answer": "/p/ and /b/", "explanation": "/p/ is voiceless and /b/ is voiced; both are bilabial plosives."},
  {"id": 506, "topic": "Module 4: Sounds of the English Language", "question": "How do vowels differ fundamentally from consonants?", "options": ["Vowels are always voiceless.", "Vowels involve a continuous flow of air with little or no obstruction in the vocal tract.", "Vowels are only produced in the nasal cavity.", "Vowels cannot form syllables."], "answer": "Vowels involve a continuous flow of air with little or no obstruction in the vocal tract.", "explanation": "Unlike consonants, vowels involve a continuous flow of air with little or no obstruction in the vocal tract."},
  {"id": 507, "topic": "Module 4: Sounds of the English Language", "question": "What are the three main criteria used to classify vowels?", "options": ["Pitch, volume, and duration.", "Tongue Height, Tongue Part (Advancement), and Lip Position.", "Voicing, nasality, and friction.", "Length, spelling, and tone."], "answer": "Tongue Height, Tongue Part (Advancement), and Lip Position.", "explanation": "Vowels are classified primarily by: Tongue Height, Tongue Part, and Lip Position."},
  {"id": 508, "topic": "Module 4: Sounds of the English Language", "question": "What does it mean if a vowel is classified as a 'Front' vowel?", "options": ["The lips are rounded.", "The front of the tongue is raised towards the hard palate.", "The back of the tongue is raised.", "The vowel is pronounced softly."], "answer": "The front of the tongue is raised towards the hard palate.", "explanation": "Front: The front of the tongue is raised towards the hard palate."},
  {"id": 509, "topic": "Module 4: Sounds of the English Language", "question": "What is the phonetic symbol for the long vowel sound in 'car'?", "options": ["/æ/", "/ʌ/", "/ɑː/", "/ɒ/"], "answer": "/ɑː/", "explanation": "The long vowel /ɑː/ is used in words like 'car' and 'father'."},
  {"id": 510, "topic": "Module 4: Sounds of the English Language", "question": "What defines a 'Closing diphthong'?", "options": ["It glides towards the central vowel /ə/.", "It ends with a consonant.", "It glides towards a higher vowel (/ɪ/ or /ʊ/).", "It requires the mouth to close completely."], "answer": "It glides towards a higher vowel (/ɪ/ or /ʊ/).", "explanation": "Closing diphthongs: glide towards a higher vowel (/ɪ/ or /ʊ/)."},
  {"id": 511, "topic": "Module 4: Sounds of the English Language", "question": "Which diphthong is present in the word 'boy'?", "options": ["/aɪ/", "/ɔɪ/", "/eɪ/", "/aʊ/"], "answer": "/ɔɪ/", "explanation": "The word 'boy' contains the closing diphthong /ɔɪ/."},
  {"id": 512, "topic": "Module 4: Sounds of the English Language", "question": "Why is English intonation important?", "options": ["It makes the speaker sound musical.", "It helps convey grammatical meaning, emotion, and attitude, distinguishing a statement from a question.", "It dictates how words are spelled.", "It helps count syllables."], "answer": "It helps convey grammatical meaning, emotion, and attitude, distinguishing a statement from a question.", "explanation": "Intonation helps convey grammatical meaning (e.g., making a statement vs. asking a question) and shows the speaker's emotion."},
  {"id": 513, "topic": "Module 4: Sounds of the English Language", "question": "What substitution might a Nigerian English speaker make for the voiceless dental fricative /θ/ (as in 'think')?", "options": ["/s/ or /f/", "/t/", "/d/", "/k/"], "answer": "/t/", "explanation": "Southern Nigerian speakers often substitute them with alveolar plosives ([t] for /θ/)."},
  {"id": 514, "topic": "Module 4: Sounds of the English Language", "question": "How does the 'stress-timed' rhythm affect spoken English?", "options": ["It makes it impossible to understand", "It creates a regular beat where stressed syllables occur at even intervals", "It gives every single letter equal time", "It eliminates vowels"], "answer": "It creates a regular beat where stressed syllables occur at even intervals", "explanation": "Stress-timed rhythm relies on the regular spacing of stressed syllables."},
  {"id": 515, "topic": "Module 4: Sounds of the English Language", "question": "What is the effect of 'syllable-timed' rhythm on English speech?", "options": ["It sounds completely natural to native British speakers", "It gives equal time and prominence to all syllables, creating an 'in-elastic' rhythm", "It speeds up the speech significantly", "It removes all intonation"], "answer": "It gives equal time and prominence to all syllables, creating an 'in-elastic' rhythm", "explanation": "Syllable-timed rhythm treats every syllable equally, unlike Standard English."},
  {"id": 516, "topic": "Module 4: Sounds of the English Language", "question": "Which of the following is a 'Glottal' sound?", "options": ["/p/", "/t/", "/h/", "/g/"], "answer": "/h/", "explanation": "The /h/ sound is produced at the level of the glottis (vocal folds)."},
  {"id": 517, "topic": "Module 4: Sounds of the English Language", "question": "Which of the following is a 'Palato-alveolar' (or Post-alveolar) sound?", "options": ["/m/", "/ʃ/", "/b/", "/k/"], "answer": "/ʃ/", "explanation": "The /ʃ/ (sh) sound is produced just behind the alveolar ridge."},
  {"id": 518, "topic": "Module 5: Parts of Speech I", "question": "What is the primary function of a 'root morpheme'?", "options": ["It is always a prefix", "It carries the core lexical meaning of the word", "It only indicates tense", "It connects clauses together"], "answer": "It carries the core lexical meaning of the word", "explanation": "The root is the base part of the word that contains its primary meaning."},
  {"id": 519, "topic": "Module 5: Parts of Speech I", "question": "What type of morpheme is '-ly' in the word 'quickly'?", "options": ["Free morpheme", "Inflectional morpheme", "Derivational morpheme", "Root morpheme"], "answer": "Derivational morpheme", "explanation": "Adding '-ly' changes the adjective 'quick' to the adverb 'quickly', making it derivational."},
  {"id": 520, "topic": "Module 5: Parts of Speech I", "question": "What word formation process is used to create the word 'motel' from 'motor' and 'hotel'?", "options": ["Clipping", "Blending", "Compounding", "Acronymy"], "answer": "Blending", "explanation": "Blending combines parts of two words (mot + el) to create a new one."},
  {"id": 521, "topic": "Module 5: Parts of Speech I", "question": "What word formation process is used to create the word 'brunch'?", "options": ["Compounding", "Affixation", "Blending", "Borrowing"], "answer": "Blending", "explanation": "Breakfast + lunch = brunch, which is a blend."},
  {"id": 522, "topic": "Module 5: Parts of Speech I", "question": "Which of these is a regular plural formation?", "options": ["Tooth to teeth", "Child to children", "Car to cars", "Mouse to mice"], "answer": "Car to cars", "explanation": "Adding '-s' is the standard rule for regular nouns."},
  {"id": 523, "topic": "Module 5: Parts of Speech I", "question": "What is the plural of 'datum'?", "options": ["datums", "data", "datumes", "dati"], "answer": "data", "explanation": "Datum is a loan word with the irregular plural 'data'."},
  {"id": 524, "topic": "Module 5: Parts of Speech I", "question": "What type of pronoun is 'anyone'?", "options": ["Personal pronoun", "Indefinite pronoun", "Relative pronoun", "Demonstrative pronoun"], "answer": "Indefinite pronoun", "explanation": "Indefinite pronouns refer to non-specific people or things."},
  {"id": 525, "topic": "Module 5: Parts of Speech I", "question": "Which of these sentences uses a reflexive pronoun correctly?", "options": ["He bought hisself a car.", "They did it theirselves.", "She looked at herself in the mirror.", "I gave it to myself friend."], "answer": "She looked at herself in the mirror.", "explanation": "Reflexive pronouns end in -self and are used when the subject and object are the same."},
  {"id": 526, "topic": "Module 5: Parts of Speech I", "question": "What is the primary role of a 'Lexical (Main) Verb'?", "options": ["To help another verb", "To carry the primary meaning of the action or state in a clause", "To replace a noun", "To connect two sentences"], "answer": "To carry the primary meaning of the action or state in a clause", "explanation": "Lexical verbs express the main action."},
  {"id": 527, "topic": "Module 5: Parts of Speech I", "question": "What does a 'modal auxiliary verb' express?", "options": ["Only past tense", "Necessity, possibility, permission, or ability", "The main action of the sentence", "A direct command"], "answer": "Necessity, possibility, permission, or ability", "explanation": "Modals like 'can', 'must', and 'might' express these conditions."},
  {"id": 528, "topic": "Module 5: Parts of Speech I", "question": "What is a characteristic of a 'non-finite verb'?", "options": ["It shows tense and person", "It cannot be the main verb of an independent clause", "It always takes an object", "It is always capitalized"], "answer": "It cannot be the main verb of an independent clause", "explanation": "Non-finite verbs (infinitives, gerunds, participles) do not show tense and cannot stand alone as the main verb."},
  {"id": 529, "topic": "Module 5: Parts of Speech I", "question": "What form is the verb 'to eat'?", "options": ["Finite verb", "Gerund", "Infinitive", "Past participle"], "answer": "Infinitive", "explanation": "The base form preceded by 'to' is the infinitive."},
  {"id": 530, "topic": "Module 5: Parts of Speech I", "question": "What is the comparative form of 'good'?", "options": ["gooder", "more good", "better", "best"], "answer": "better", "explanation": "Good is an irregular adjective; its comparative is 'better'."},
  {"id": 531, "topic": "Module 5: Parts of Speech I", "question": "What is the superlative form of 'beautiful'?", "options": ["beautifulest", "more beautiful", "most beautiful", "beauty"], "answer": "most beautiful", "explanation": "Long adjectives form the superlative using 'most'."},
  {"id": 532, "topic": "Module 5: Parts of Speech I", "question": "Where are adjectives generally placed in a sentence?", "options": ["After the noun they modify", "Before the noun they modify or after a linking verb", "At the very end of the sentence", "Before the main verb"], "answer": "Before the noun they modify or after a linking verb", "explanation": "Adjectives typically sit before nouns (e.g., 'red car') or after linking verbs (e.g., 'the car is red')."},
  {"id": 533, "topic": "Module 6: Parts of Speech II", "question": "Which of these is an Adverb of Degree?", "options": ["Quickly", "Outside", "Extremely", "Tomorrow"], "answer": "Extremely", "explanation": "Adverbs of degree show the intensity of something."},
  {"id": 534, "topic": "Module 6: Parts of Speech II", "question": "Which of these is an Adverb of Manner?", "options": ["Very", "Carefully", "Always", "Here"], "answer": "Carefully", "explanation": "Adverbs of manner describe how an action is performed."},
  {"id": 535, "topic": "Module 6: Parts of Speech II", "question": "What type of preposition is used in 'She walked into the room'?", "options": ["Preposition of Time", "Preposition of Place", "Preposition of Direction/Movement", "Preposition of Manner"], "answer": "Preposition of Direction/Movement", "explanation": "'Into' shows the direction of the movement."},
  {"id": 536, "topic": "Module 6: Parts of Speech II", "question": "What type of preposition is used in 'He wrote the letter with a pen'?", "options": ["Preposition of Time", "Preposition of Direction", "Preposition of Manner, Cause, or Purpose", "Preposition of Place"], "answer": "Preposition of Manner, Cause, or Purpose", "explanation": "'With' explains how the action was done."},
  {"id": 537, "topic": "Module 6: Parts of Speech II", "question": "Which conjunction is used to connect elements of equal grammatical importance?", "options": ["Subordinating", "Coordinating", "Correlative", "Relative"], "answer": "Coordinating", "explanation": "Coordinating conjunctions (FANBOYS) connect equal elements."},
  {"id": 538, "topic": "Module 6: Parts of Speech II", "question": "Which conjunction connects a dependent clause to an independent clause?", "options": ["Subordinating", "Coordinating", "Correlative", "Interjective"], "answer": "Subordinating", "explanation": "Subordinating conjunctions link dependent and independent clauses."},
  {"id": 539, "topic": "Module 6: Parts of Speech II", "question": "Which interjection is commonly used to express disgust?", "options": ["Wow!", "Yay!", "Ew!", "Phew!"], "answer": "Ew!", "explanation": "Ew (or Yuck) expresses disgust."},
  {"id": 540, "topic": "Module 6: Parts of Speech II", "question": "Which interjection expresses relief?", "options": ["Oops!", "Ouch!", "Phew!", "Ahem"], "answer": "Phew!", "explanation": "Phew expresses relief or exhaustion."},
  {"id": 541, "topic": "Module 6: Parts of Speech II", "question": "Which article is used before a singular, countable noun mentioned for the first time?", "options": ["the", "a or an", "zero article", "some"], "answer": "a or an", "explanation": "Indefinite articles are used for first-time or general mentions."},
  {"id": 542, "topic": "Module 6: Parts of Speech II", "question": "Which article is used before the word 'hour'?", "options": ["a", "an", "the", "zero article"], "answer": "an", "explanation": "'Hour' starts with a silent 'h' and a vowel sound, so 'an' is used."},
  {"id": 543, "topic": "Module 6: Parts of Speech II", "question": "Which article is used before plural nouns in a general sense (e.g., 'Apples are good for you')?", "options": ["the", "a", "an", "zero article"], "answer": "zero article", "explanation": "The zero article is used for generic plural nouns."},
  {"id": 544, "topic": "Module 6: Parts of Speech II", "question": "In 'She likes both tea and coffee', what type of conjunction is 'both... and'?", "options": ["Subordinating", "Coordinating", "Correlative", "Compound"], "answer": "Correlative", "explanation": "Correlative conjunctions work in pairs."},
  {"id": 545, "topic": "Module 7: Aspects of Grammar", "question": "What distinguishes a clause from a phrase?", "options": ["A phrase has a subject and a verb; a clause does not.", "A clause has a subject and a verb; a phrase does not.", "A phrase is longer than a clause.", "A clause can never stand alone."], "answer": "A clause has a subject and a verb; a phrase does not.", "explanation": "A clause is a group of words that contains a subject and a verb, unlike a phrase which lacks them."},
  {"id": 546, "topic": "Module 7: Aspects of Grammar", "question": "What are the components of the 'MHQ' noun phrase structure?", "options": ["Main, Helper, Qualifier", "Modifier, Head, Qualifier", "Morpheme, Headword, Question", "Multiple, Head, Quotient"], "answer": "Modifier, Head, Qualifier", "explanation": "The structure of a noun phrase is MHQ, wherein M- modifier, H – head, and Q- qualifier."},
  {"id": 547, "topic": "Module 7: Aspects of Grammar", "question": "What does a Prepositional Phrase consist of?", "options": ["A preposition and its object.", "A noun and an adjective.", "A verb and an adverb.", "A conjunction and a clause."], "answer": "A preposition and its object.", "explanation": "Prepositional Phrase (PP) – consists of a preposition and its object."},
  {"id": 548, "topic": "Module 7: Aspects of Grammar", "question": "What is the function of a Noun Clause acting as the 'Subject of a Verb'?", "options": ["It describes the verb.", "It tells what the sentence is about.", "It answers who receives the action.", "It connects two independent clauses."], "answer": "It tells what the sentence is about.", "explanation": "Subject of a Verb: When it functions as the subject, it basically tells what the sentence is about."},
  {"id": 549, "topic": "Module 7: Aspects of Grammar", "question": "What function does an Adjectival Clause perform?", "options": ["It acts as a verb.", "It modifies a verb.", "It modifies a noun or a pronoun.", "It acts as a subject."], "answer": "It modifies a noun or a pronoun.", "explanation": "An adjectival/relative clause functions as an adjective, it qualifies a noun or a pronoun."},

    /* ═══════════════════════════════════════
       NORMALIZE: strip "A ", "B " prefixes
       and map letter answers to full text
    ═══════════════════════════════════════ */
    const MASTER_POOL = RAW_DATA.map(item => {
        const prefixRegex = /^[A-E][\.\)]?\s+/i;
        const cleanedOptions = item.options.map(opt => opt.replace(prefixRegex, '').trim());

        // Map letter answer (A/B/C/D) → actual text answer
        const letterIndex = { A:0, B:1, C:2, D:3, E:4 };
        const answerIndex = letterIndex[item.answer.toUpperCase()];
        const textAnswer = cleanedOptions[answerIndex] ?? item.answer;

        return {
            id: item.id,
            topic: item.topic || "General",
            question: item.question,
            options: cleanedOptions,
            answer: textAnswer,
            explanation: item.explanation || `The correct answer is ${textAnswer}.`
        };
    });

    let currentExamData = [], userAnswers = {}, currentIndex = 0;

    let examSelectionType = 'random', selectionValue = '';
    let lastScore = 0, lastCorrect = 0;

    /* ══════════════════

    window.onload = () => {
        initDashboard();
        loadStatsBar();
        if (localStorage.getItem('saved_gst111_exam')) {
            document.getElementById('resume-btn').style.display = 'block';
        }
    };

    /* ── Stats Bar ── */
    async function loadStatsBar() {
        const bar = document.getElementById('stats-bar');
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) return;

            const { data } = await db.from('test_results')
                .select('score')
                .eq('student_id', user.id)
                .eq('course_id', COURSE_CODE);

            if (!data || data.length === 0) return;

            const taken = data.length;
            const avg = Math.round(data.reduce((s, r) => s + r.score, 0) / taken);
            const best = Math.max(...data.map(r => r.score));

            bar.innerHTML = `
                <div class="stat-card"><div class="stat-val">${taken}</div><div class="stat-lbl">Tests Taken</div></div>
                <div class="stat-card"><div class="stat-val">${avg}%</div><div class="stat-lbl">Average Score</div></div>
                <div class="stat-card"><div class="stat-val">${best}%</div><div class="stat-lbl">Best Score</div></div>
            `;
            bar.style.display = 'grid';
        } catch (e) { /* offline, silently skip */ }
    }

    /* ── Dashboard ── */

        const board = document.getElementById('dashboard');
        board.innerHTML = '';

        if (MASTER_POOL.length === 0) {
            board.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">No questions loaded. Paste your JSON into RAW_DATA.</p>`;
            return;
        }

        // Random card
        const rand = document.createElement('div');
        rand.className = 'box box-random';
        rand.innerHTML = `
            <div class="box-icon">🔀</div>
            <h3>Random Mode</h3>
            <p>${MASTER_POOL.length} Questions</p>`;
        rand.onclick = () => openSetup('random', 'Randomised Practice');
        board.appendChild(rand);

        // Group by topic
        const topicMap = {};
        MASTER_POOL.forEach(q => {
            topicMap[q.topic] = (topicMap[q.topic] || 0) + 1;
        });

        for (const [topic, count] of Object.entries(topicMap)) {
            const card = document.createElement('div');
            card.className = 'box';

            let titleHtml = topic;
            if (topic.includes(':')) {
                const [mod, name] = topic.split(':');
                titleHtml = `<strong>${mod.trim()}</strong><br><span style="font-size:0.82rem; color:var(--text-muted);">${name.trim()}</span>`;
            }

            card.innerHTML = `
                <div class="box-icon" style="color:var(--primary);">📖</div>
                <h3>${titleHtml}</h3>
                <p>${count} Question${count !== 1 ? 's' : ''}</p>`;
            card.onclick = () => openSetup('topic', topic);
            board.appendChild(card);
        }
    }

    function openSetup(type, value) {
        examSelectionType = type;
        selectionValue = value;

        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('setup-title').innerHTML =
            type === 'random' ? '🔀 Randomised Practice' : value.replace(':', ':<br>');

        document.getElementById('random-settings').style.display =
            type === 'random' ? 'block' : 'none';
    }

    function goHome() {
        clearInterval(timerId);
        isReviewMode = false;
        currentExamData = []; userAnswers = {}; currentIndex = 0;
        document.getElementById('quiz-interface').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quizResultModal').style.display = 'none';
        document.getElementById('dashboard-wrap').style.display = 'block';
        loadStatsBar();
    }

    /* ── Helpers ── */
    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    /* ══════════════════
       START EXAM
    ══════════════════ */
    function startExam() {
        timeRemaining = parseInt(document.getElementById('t-limit').value) * 60;
        activeMode = document.getElementById('quiz-mode').value;
        isReviewMode = false;
        userAnswers = {};
        currentIndex = 0;

        let pool = JSON.parse(JSON.stringify(MASTER_POOL));

        if (examSelectionType === 'random') {
            const qty = Math.min(parseInt(document.getElementById('q-count').value), pool.length);
            pool = shuffleArray(pool).slice(0, qty);
        } else {
            pool = pool.filter(q => q.topic === selectionValue);
        }

        if (document.getElementById('shuffle-questions').checked) pool = shuffleArray(pool);

        if (document.getElementById('shuffle-options').checked) {
            pool.forEach(q => {
                const correct = q.answer;
                q.options = shuffleArray(q.options);
                // answer stays as text so it still matches
            });
        }

        currentExamData = pool;

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;

        runTimer();
        renderQuestion();
    }

    /* ══════════════════
       TIMER
    ══════════════════ */
    function runTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeRemaining--;
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
        }, 1000);
    }

    /* ══════════════════
       RENDER QUESTION
    ══════════════════ */
    function renderQuestion() {
        const q = currentExamData[currentIndex];
        const hasAnswered = userAnswers.hasOwnProperty(currentIndex);
        const userAns = userAnswers[currentIndex];

        document.getElementById('cur-idx').innerText = currentIndex + 1;
        document.getElementById('topic-text').innerText = q.topic || '';
        document.getElementById('question-text').innerText = q.question;

        const optBox = document.getElementById('options-box');
        const feedArea = document.getElementById('feedback-area');
        optBox.innerHTML = '';
        feedArea.innerHTML = '';

        const labels = ['A','B','C','D','E','F'];

        q.options.forEach((val, idx) => {
            const label = labels[idx] || (idx + 1);
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${label}.</strong> ${val}`;

            const isCorrect = val === q.answer;
            const isChosen  = val === userAns;

            if (isReviewMode || (activeMode === 'practice' && hasAnswered)) {
                if (isCorrect) btn.classList.add('correct');
                else if (isChosen) btn.classList.add('wrong');
                btn.disabled = true;
            } else if (activeMode === 'exam' && hasAnswered && isChosen) {
                btn.classList.add('selected');
            }

            btn.onclick = () => {
                if (isReviewMode) return;
                if (activeMode === 'practice' && hasAnswered) return;
                userAnswers[currentIndex] = val;
                saveState();
                renderQuestion();
            };
            optBox.appendChild(btn);
        });

        // Feedback
        const expHtml = q.explanation
            ? `<br><span style="font-weight:400; font-size:0.88rem;"><strong>Explanation:</strong> ${q.explanation}</span>`
            : '';

        if (isReviewMode) {
            if (hasAnswered) {
                const ok = userAns === q.answer;
                feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'}; color:${ok?'#166534':'#991b1b'}">
                    ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '</strong>'}${expHtml}</div>`;
            } else {
                feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3; color:#854d0e; border:1px solid #fde047;">
                    ⚠ Not answered. Correct: <strong>${q.answer}</strong>${expHtml}</div>`;
            }
        } else if (activeMode === 'practice' && hasAnswered) {
            const ok = userAns === q.answer;
            feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok?'#dcfce7':'#fee2e2'}; color:${ok?'#166534':'#991b1b'}">
                ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '</strong>'}${expHtml}</div>`;
        }

        const isLast = currentIndex === currentExamData.length - 1;
        document.getElementById('next-btn').style.display  = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = isReviewMode ? 'none' : 'block';
        document.getElementById('finish-review-btn').style.display = isReviewMode ? 'block' : 'none';
    }

    function move(d) {
        const next = currentIndex + d;
        if (next >= 0 && next < currentExamData.length) {
            currentIndex = next;
            renderQuestion();
        }
    }

    function saveState() {
        localStorage.setItem('saved_gst111_exam', JSON.stringify(
            { currentExamData, userAnswers, currentIndex, timeRemaining, activeMode, examSelectionType, selectionValue }
        ));
    }

    function resumeExam() {
        const s = JSON.parse(localStorage.getItem('saved_gst111_exam'));
        currentExamData = s.currentExamData;
        userAnswers = s.userAnswers;
        currentIndex = s.currentIndex;
        timeRemaining = s.timeRemaining;
        activeMode = s.activeMode || 'practice';
        examSelectionType = s.examSelectionType || 'random';
        selectionValue = s.selectionValue || '';
        isReviewMode = false;

        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('resume-btn').style.display = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;
        runTimer();
        renderQuestion();
    }

    /* ══════════════════
       SHOW RESULTS
    ══════════════════ */
    async function showResults(forced = false) {
        const answered = Object.keys(userAnswers).length;
        if (!forced && answered < currentExamData.length) {
            if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return;
        }

        clearInterval(timerId);
        localStorage.removeItem('saved_gst111_exam');

        let score = 0;
        currentExamData.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
        const total = currentExamData.length;
        const pct = Math.round((score / total) * 100);

        lastScore = pct; lastCorrect = score;
        document.getElementById('modalCorrect').innerText = score;
        document.getElementById('modalTotal').innerText = total;

        // Show modal
        document.getElementById('finalScoreText').innerText = pct;
        document.getElementById('resultTopicName').innerText =
            examSelectionType === 'random' ? 'Random Practice' : selectionValue;
        document.getElementById('modalReviewBtn').style.display =
            activeMode === 'practice' ? 'none' : 'flex';

        if (pct >= 70) {
            document.getElementById('resultIcon').innerText = '🏆';
            document.getElementById('resultGreeting').innerText = 'Outstanding! 🌟';
            document.getElementById('resultFeedback').innerText = 'Excellent work! Keep it up!';
            confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
        } else if (pct >= 50) {
            document.getElementById('resultIcon').innerText = '👍';
            document.getElementById('resultGreeting').innerText = 'Good Job!';
            document.getElementById('resultFeedback').innerText = 'Almost there — aim for 70%+!';
        } else {
            document.getElementById('resultIcon').innerText = '💪';
            document.getElementById('resultGreeting').innerText = 'Keep Trying!';
            document.getElementById('resultFeedback').innerText = 'Review your notes and try again!';
        }

        document.getElementById('quizResultModal').style.display = 'flex';
        await saveTestScore(pct);
    }

    async function saveTestScore(pct) {
        const el = document.getElementById('save-status');
        el.innerText = '⏳ Saving...';
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) { el.innerText = ''; return; }

            // Fetch previous scores for avg display
            const { data: prev } = await db.from('test_results')
                .select('score').eq('student_id', user.id).eq('course_id', COURSE_CODE);

            if (prev && prev.length > 0) {
                const allScores = [...prev.map(r => r.score), pct];
                const avg = Math.round(allScores.reduce((a,b)=>a+b,0) / allScores.length);
                document.getElementById('modalAvg').innerText = avg + '%';
            }

            const { error } = await db.from('test_results').insert([
                { student_id: user.id, course_id: COURSE_CODE, score: pct }
            ]);
            el.innerText = error ? '⚠️ Could not save (offline)' : '✅ Score saved!';
        } catch (e) {
            el.innerText = '⚠️ Offline — score not saved';
        }
    }

    function enterReviewMode() {
        document.getElementById('quizResultModal').style.display = 'none';
        isReviewMode = true;
        currentIndex = 0;
        document.getElementById('timer').innerText = 'REVIEW';
        document.getElementById('timer').style.background = '#dbeafe';
        document.getElementById('timer').style.color = '#1e40af';
        renderQuestion();
    }

    async function shareQuizResult() {
        const score = document.getElementById('finalScoreText').innerText;
        const topic = examSelectionType === 'random' ? 'a random mix' : selectionValue;
        const text = `I just scored ${score}% in ${COURSE_CODE} (${topic})! 🚀\n\nChallenge yourself on the Renance CBT portal! 📚🔥\nhttps://renancecbt1.vercel.app`;
        try {
            if (navigator.share) {
                await navigator.share({ title: `My ${COURSE_CODE} Score`, text, url: 'https://renancecbt1.vercel.app' });
            } else {
                await navigator.clipboard.writeText(text);
                alert('Score message copied to clipboard! 📋');
            }
        } catch (_) {}
    }
</script>
