<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST 111 - Practice Portal</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea580c;
            --border: rgba(0,0,0,0.07);
            --share-gradient: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #7c3aed 100%);
        }
        .dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; min-height: 100vh; }

        nav {
            background: var(--card-bg);
            padding: 0.9rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100;
            gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--primary); }

        main { padding: 2rem 5%; max-width: 960px; margin: 0 auto; }

        /* ── DASHBOARD ── */
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.1rem; }
        .box {
            background: var(--card-bg);
            padding: 1.5rem 1rem;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(30,64,175,0.12); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; line-height: 1.4; }
        .box p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
        .box-icon { font-size: 1.8rem; }
        .box-random { background: linear-gradient(135deg, #1e40af, #3b82f6) !important; color: white !important; border: none !important; }
        .box-random p { color: rgba(255,255,255,0.8) !important; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 12px; padding: 1rem;
            text-align: center; border: 1.5px solid var(--border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

        /* ── SETUP SCREEN ── */
        #setup-screen { text-align: center; background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 380px; }
        .setup-group label { font-weight: 600; font-size: 0.88rem; color: var(--text); display: block; margin-bottom: 7px; }
        .setup-input { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 9px; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 1rem; background: rgba(0,0,0,0.02); padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        /* ── QUIZ INTERFACE ── */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 15px; padding: 0 4px; flex-wrap: wrap; gap: 10px; }
        .quiz-header .q-counter { font-size: 1rem; color: var(--text); }
        .quiz-header .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        #timer { color: var(--danger); background: rgba(220,38,38,0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; }

        .question-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1.5px solid var(--border); }
        #topic-text { color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.6px; }
        #question-text { line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; }

        .option-btn {
            display: block; width: 100%; padding: 0.95rem 1.1rem;
            margin: 0.65rem 0; border: 2px solid #e2e8f0; border-radius: 10px;
            background: var(--card-bg); color: var(--text); text-align: left;
            cursor: pointer; font-size: 0.97rem; transition: background 0.15s, border-color 0.15s;
            line-height: 1.5;
        }
        .option-btn:not(:disabled):hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn.selected  { background: #e0f2fe !important; border-color: #3b82f6 !important; color: #0369a1 !important; }
        .option-btn.correct   { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong     { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn {
            padding: 0.8rem 1.6rem; border: none; border-radius: 9px; cursor: pointer;
            font-weight: 700; background: var(--primary); color: white;
            transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem;
        }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        /* ── RESULT MODAL ── */
        .result-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            backdrop-filter: blur(8px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .result-modal-content {
            background: var(--card-bg); padding: 40px 28px; border-radius: 24px;
            width: 100%; max-width: 420px; text-align: center; color: var(--text);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes bounceIn {
            0%   { opacity: 0; transform: scale(0.78) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; animation: float 3s ease-in-out infinite; display: block; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .score-display {
            background: rgba(37,99,235,0.06);
            border: 2px dashed rgba(37,99,235,0.2);
            border-radius: 18px; padding: 18px; margin: 18px 0;
        }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; }

        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 20px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); }

        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
        .btn-review { background: rgba(30,64,175,0.08); color: var(--primary); border: 1.5px solid rgba(30,64,175,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.3rem; }
            .result-modal-content { padding: 28px 18px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

   <div class="nav-brand">
    <div><i class="fa-solid fa-graduation-cap"></i> GST 111 Practice Portal</div>

</div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#64748b; padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">

    </div>
</nav>

<main>
    <!-- DASHBOARD -->
    <div id="dashboard-wrap">
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title" style="margin-bottom:1.8rem; color:var(--primary); line-height:1.4; font-size:1.3rem;"></h2>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group checkbox-group">
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-questions" checked>
                Shuffle Questions
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-options" checked>
                Shuffle Options (A, B, C, D)
            </label>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- QUIZ INTERFACE -->
    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Exit Review
                </button>
                <span id="timer">30:00</span>
            </div>
        </div>

        <div class="question-card">
            <div id="topic-text"></div>
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <button class="btn" id="next-btn" onclick="move(1)">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<!-- RESULT MODAL -->
<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 4px; font-size:1.5rem;">Outstanding!</h2>
        <p id="resultTopicName" style="font-size:0.82rem; color:var(--text-muted); margin:0 0 14px;"></p>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>

        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>

        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()">

            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Dashboard
            </button>
        </div>
    </div>
</div>

  {"id": 24, "topic": "Module 3: Listening and Note Taking", "question": "Which of the following are receptive skills,", "options": ["A Listening and writing", "B Reading and writing", "C Writing and speaking", "D Reading and listening"], "answer": "D", "explanation": "Receptive skills involve receiving information (reading and listening)."},
  {"id": 25, "topic": "Module 3: Listening and Note Taking", "question": "Which of the following are passive skills,", "options": ["A Listening and writing", "B Reading and writing", "C Writing and speaking", "D Reading and listening"], "answer": "D", "explanation": "Receptive skills are often categorized as passive compared to production skills."},
  {"id": 26, "topic": "Module 3: Listening and Note Taking", "question": "Which of the following are productive skills;", "options": ["A Listening and writing", "B Reading and writing", "C Writing and speaking", "D Reading and listening"], "answer": "C", "explanation": "Productive skills involve generating language (writing and speaking)."},
  {"id": 27, "topic": "Module 3: Listening and Note Taking", "question": "Which of the following are active skills,", "options": ["A Listening and writing", "B Reading and writing", "C Writing and speaking", "D Reading and listening"], "answer": "C", "explanation": "Productive skills are considered 'active' because the user must create content."},
  {"id": 28, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ is the ability to make and communicate meaning from and by the use of a variety of socially contextual symbols.", "options": ["A Literacy", "B Numeracy", "C Culture", "D Etiquette"], "answer": "A", "explanation": "Literacy extends beyond reading to include understanding social symbols."},
  {"id": 29, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ is \"not in isolated bits of knowledge but in students' growing ability to use language and literacy in more and broader activities\"", "options": ["A Education", "B Literacy", "C Intelligence", "D Fluency"], "answer": "B", "explanation": "This definition emphasizes the functional application of language skills."},
  {"id": 30, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ involves understanding some mathematical ideas, notation and techniques.", "options": ["A Geometry", "B Algebra", "C Numeracy", "D Physics"], "answer": "C", "explanation": "Numeracy is the mathematical equivalent of literacy."},
  {"id": 31, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ involves drawing on knowledge of particular context and circumstances in deciding when to use mathematics, choosing the mathematics to use and critically evaluating it use.", "options": ["A Statistics", "B Numeracy", "C Calculation", "D Logic"], "answer": "B", "explanation": "Advanced numeracy includes critical evaluation of mathematical application."},
  {"id": 32, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ includes the ability to read and interpret media, to reproduce data and images through digital manipulation, and to evaluate and apply new knowledge gained from digital environments.", "options": ["A Literacy", "B Digital literacy", "C E-literacy", "D B and C"], "answer": "D", "explanation": "Digital and E-literacy are often used interchangeably for these skills."},
  {"id": 33, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ is the ability to read a text in an active, reflective and questioning manner in order to better under stand power, inequality and injustice in human relations.", "options": ["A General reading", "B Critical literacy", "C Skimming", "D Scanning"], "answer": "B", "explanation": "Critical literacy focuses on uncovering social power dynamics in texts."},
  {"id": 34, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ is the practice of challenging text through an analysis of the roles that power, culture, class and gender play in the message of the texts.", "options": ["A Peer review", "B Critical literacy", "C Editing", "D Proofreading"], "answer": "B", "explanation": "This practice requires an analytical approach to the socio-cultural context of media."},
  {"id": 35, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "Which of the following is not a role that a reader assumes while reading a text critically,", "options": ["A Code breaker", "B Text user", "C Text critic", "D Meaning maker", "E None of the above"], "answer": "E", "explanation": "All listed roles (A-D) are standard roles for critical readers."},
  {"id": 36, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ is the social code of the internet.", "options": ["A Protocol", "B Firewall", "C Internet etiquette", "D Encryption"], "answer": "C", "explanation": "Also known as 'Netiquette', it governs polite online behavior."},
  {"id": 37, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "__________ refers to the set of practices created over the years to make the internet experience pleasant for everyone.", "options": ["A Web design", "B Programming", "C Internet etiquette", "D Cybersecurity"], "answer": "C", "explanation": "Etiquette ensures a standardized respectful environment online."},
  {"id": 38, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "Which of the following sections provides more information,", "options": ["A Netiquette of Basics", "B Netiquette of Confidentiality", "C Netiquette of Sending", "D Netiquette of Replying", "E All of the above"], "answer": "E", "explanation": "All these sub-sections comprise the full scope of internet etiquette."},
  {"id": 39, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "__________ are the building blocks of words.", "options": ["A Letters", "B Morpheme", "C Syllables", "D Phrases"], "answer": "B", "explanation": "Morphemes are the smallest units in word formation."},
  {"id": 40, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "__________ are units of meaning", "options": ["A Sounds", "B Morphemes", "C Sentences", "D Vowels"], "answer": "B", "explanation": "A morpheme is defined as the smallest meaningful unit of a language."},
  {"id": 41, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "Determine the number of morphemes: Boy, Boys, Flexible, Liquefied, Liquefaction, Understand", "options": ["A Boy=1, Boys=2, Flexible=2, Liquefied=2, Liquefaction=2, Understand=2", "B Boy=1, Boys=1, Flexible=1, Liquefied=1, Liquefaction=1, Understand=1", "C Boy=2, Boys=3, Flexible=3, Liquefied=3, Liquefaction=3, Understand=3", "D Boy=1, Boys=2, Flexible=1, Liquefied=2, Liquefaction=1, Understand=2"], "answer": "A", "explanation": "Calculated based on root words and suffixes (e.g., Boy + s)."},
  {"id": 42, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "How many syllables does the following have: demagnetisation, liquefied, liquefaction, understand", "options": ["A 5, 2, 3, 2", "B 6, 3, 4, 3", "C 4, 1, 2, 1", "D 7, 4, 5, 4"], "answer": "B", "explanation": "Based on standard pronunciation: de-mag-ne-ti-sa-tion (6), li-que-fied (3), li-que-fac-tion (4), un-der-stand (3)."},
  {"id": 43, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "The following are alphabetism except,", "options": ["A EFCC OBC AT", "B amu r.p.m Ah", "C SOS IT, http", "D WHO SIM", "E None of the above"], "answer": "E", "explanation": "Alphabetisms are abbreviations pronounced as individual letters."},
  {"id": 44, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "Which of the following can be jointly refer to as initialism", "options": ["A dipping and blending", "B Acronymy and eponymy", "C Affixation and suffixation", "D Acronymy and alphabetism"], "answer": "D", "explanation": "Initialisms include both acronyms (pronounced as words) and alphabetisms."},
  {"id": 45, "topic": "Module 5: Word Formation and Parts of Speech I", "question": "It is of course possible for clipping to take place without blending True or false", "options": ["A True", "B False"], "answer": "A", "explanation": "Clipping (shortening a word) does not require merging it with another word (blending)."},
  {"id": 46, "topic": "Reading and Comprehension Skills", "question": "One of the factors that inhibit efficient reading is", "options": ["A. a well-equipped library", "B. good health", "C. noise", "D. proper feeding"], "answer": "C", "explanation": "Noise is an environmental factor that distracts the reader and reduces concentration."},
  {"id": 47, "topic": "Reading and Comprehension Skills", "question": "The act of reading through a text to acquire superficial information is referred to as", "options": ["A. scanning", "B. skimming", "C. anticipation", "D. writing"], "answer": "B", "explanation": "Skimming is used to get the general idea or 'gist' of the text quickly."},
  {"id": 48, "topic": "Reading and Comprehension Skills", "question": "The sentence that bears the main information in a paragraph is known as the", "options": ["A. introduction sentence", "B. main point sentence", "C. topic sentence", "D. all of the above"], "answer": "C", "explanation": "The topic sentence summarizes the paragraph's main argument or idea."},
  {"id": 49, "topic": "Reading and Comprehension Skills", "question": "An introductory paragraph is usually written in the", "options": ["A. past tense", "B. present tense", "C. present continuous tense", "D. past participle tense"], "answer": "B", "explanation": "Present tense is standard for introducing topics and stating general facts in academic writing."},
  {"id": 50, "topic": "Reading and Comprehension Skills", "question": "Which of the following is a signal word?", "options": ["A. in addition", "B. similarly", "C. furthermore", "D. all of the above"], "answer": "D", "explanation": "Signal words (or transitions) connect ideas and show the direction of thought."},
  {"id": 51, "topic": "Reading and Comprehension Skills", "question": "Reading is important for all these except", "options": ["A. achievement and advancement in life", "B. enjoyment or leisure", "C. professional development", "D. none of the above"], "answer": "D", "explanation": "All the listed options are valid reasons why reading is important."},
  {"id": 52, "topic": "Reading and Comprehension Skills", "question": "All these are strategies of reading except", "options": ["A. anticipation", "B. skimming", "C. scamming", "D. identifying main ideas"], "answer": "C", "explanation": "The document identifies 'scamming' as a distractor; the correct strategy is 'scanning'."},
  {"id": 53, "topic": "Reading and Comprehension Skills", "question": "One of these is NOT a factor that cause slow reading", "options": ["A. word-by-word reading", "B. difficulty with the return sweep", "C. flexibility", "D. regression"], "answer": "C", "explanation": "Flexibility is a positive reading skill where you adjust speed based on text difficulty."},
  {"id": 54, "topic": "Reading and Comprehension Skills", "question": "A variety of reading skills involves", "options": ["A. making inferences", "B. using word analysis strategies", "C. applying textbook reading strategies", "D. all of the above"], "answer": "D", "explanation": "Efficient reading requires a combination of inference, analysis, and strategic approaches."},
  {"id": 55, "topic": "Reading and Comprehension Skills", "question": "Efficient reading is enhanced by these factors except", "options": ["A. environmental factors", "B. psychological factors", "C. vocalization", "D. physiological factors"], "answer": "C", "explanation": "Vocalization (whispering words) is a bad habit that slows down reading speed."},
  {"id": 56, "topic": "Reading and Comprehension Skills", "question": "The act of looking for specific information in a text is", "options": ["A. scanning", "B. skimming", "C. reading", "D. all of the above"], "answer": "A", "explanation": "Scanning is a selective reading technique for locating specific data like names or dates."},
  {"id": 57, "topic": "Reading and Comprehension Skills", "question": "A paragraph is a group of sentences that develop", "options": ["A. many ideas", "B. a single idea", "C. two ideas", "D. no idea"], "answer": "B", "explanation": "The core principle of a paragraph is unity—focusing on one central thought."},
  {"id": 58, "topic": "Reading and Comprehension Skills", "question": "In a paragraph, the sentence that summarizes the main idea is the", "options": ["A. concluding sentence", "B. supporting sentence", "C. topic sentence", "D. transition sentence"], "answer": "C", "explanation": "This acts as the 'heart' of the paragraph."},
  {"id": 59, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of ADDITION except", "options": ["A. Also", "B. moreover", "C. however", "D. in addition"], "answer": "C", "explanation": "'However' signals contrast, not addition."},
  {"id": 60, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of LISTING except", "options": ["A. first", "B. next", "C. in other words", "D. finally"], "answer": "C", "explanation": "'In other words' is used for restatement or clarification."},
  {"id": 61, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of SUMMARY except", "options": ["A. to conclude", "B. to sum up", "C. in conclusion", "D. none of the above"], "answer": "D", "explanation": "Options A, B, and C are all valid summary signals."},
  {"id": 62, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONSEQUENCE except", "options": ["A. therefore", "B. as a result", "C. however", "D. hence"], "answer": "C", "explanation": "Consequence signals show cause and effect; 'however' shows opposition."},
  {"id": 63, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONTRAST except", "options": ["A. but", "B. and", "C. on the contrary", "D. on the other hand"], "answer": "B", "explanation": "'And' is a simple additive conjunction."},
  {"id": 64, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONCESSION except", "options": ["A. however", "B. nevertheless", "C. similarly", "D. although"], "answer": "C", "explanation": "Concession signals acknowledge an opposing point; 'similarly' shows comparison."},
  {"id": 65, "topic": "Reading and Comprehension Skills", "question": "Which of the following is NOT a characteristic of a good paragraph?", "options": ["A. Unity", "B. Coherence", "C. Ambiguity", "D. Completeness"], "answer": "C", "explanation": "A good paragraph should be clear and concise; ambiguity (vagueness) is a flaw in writing."},
  {"id": 66, "topic": "Reading and Comprehension Skills", "question": "The transition from one idea to another within a paragraph is ensured by:", "options": ["A. Punctuation only", "B. Signal words and phrases", "C. Using many adjectives", "D. Starting a new page"], "answer": "B", "explanation": "Signal words act as bridges that connect sentences and ideas to create flow."},
  {"id": 67, "topic": "Reading and Comprehension Skills", "question": "Which reading technique is best used when looking for a specific name in a telephone directory?", "options": ["A. Intensive reading", "B. Skimming", "C. Scanning", "D. Critical reading"], "answer": "C", "explanation": "Scanning is the selective process of looking for a specific piece of data without reading everything."},
  {"id": 68, "topic": "Reading and Comprehension Skills", "question": "The part of a paragraph that develops the topic sentence by providing evidence or examples is called:", "options": ["A. The lead-in", "B. Supporting sentences", "C. The conclusion", "D. The header"], "answer": "B", "explanation": "Supporting sentences expand on the main idea presented in the topic sentence."},
  {"id": 69, "topic": "Reading and Comprehension Skills", "question": "Regression in reading refers to:", "options": ["A. Moving eyes forward quickly", "B. Re-reading words or sentences already passed", "C. Reading at a high speed", "D. Predicting the end of a story"], "answer": "B", "explanation": "Regression is a habit that slows down reading speed by constantly looking back at what was already read."},
  {"id": 70, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of ILLUSTRATION except:", "options": ["A. For example", "B. For instance", "C. Such as", "D. Furthermore"], "answer": "D", "explanation": "'Furthermore' is used for addition, while the others are used to provide examples."},
  {"id": 71, "topic": "Reading and Comprehension Skills", "question": "The mental process of 'guessing' what a text will be about based on titles and headers is:", "options": ["A. Vocalization", "B. Anticipation", "C. Sub-vocalization", "D. Scanning"], "answer": "B", "explanation": "Anticipation allows a reader to engage with the text by predicting its content."},
  {"id": 72, "topic": "Reading and Comprehension Skills", "question": "Which of these is a physiological factor that affects reading?", "options": ["A. Lighting", "B. Visual defects", "C. Background noise", "D. Fear of failure"], "answer": "B", "explanation": "Physiological factors relate to the physical state of the body, such as eyesight."},
  {"id": 73, "topic": "Reading and Comprehension Skills", "question": "Signal words like 'namely' or 'that is to say' perform the function of:", "options": ["A. Summary", "B. Consequence", "C. Explanation/Restatement", "D. Contrast"], "answer": "C", "explanation": "These phrases are used to clarify or further define a previous point."},
  {"id": 74, "topic": "Reading and Comprehension Skills", "question": "Reading for 'intensive' purposes usually involves:", "options": ["A. Reading for pleasure only", "B. Detailed study for examinations", "C. Looking for a single date", "D. Reading a newspaper headline"], "answer": "B", "explanation": "Intensive reading is slow, careful reading aimed at total comprehension of the material."},
  {"id": 75, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of REFERRING TO PREVIOUS SENTENCES except:", "options": ["A. that is to say, namely,", "B. nevertheless", "C. in other words", "D. as follows"], "answer": "B", "explanation": "'Nevertheless' is a concession/contrast signal."},
  {"id": 76, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONCESSION except:", "options": ["A. however", "B. nevertheless", "C. similarly", "D. although"], "answer": "C", "explanation": "'Similarly' is used for comparison, not concession."},
  {"id": 77, "topic": "Reading and Comprehension Skills", "question": "The use of 'firstly, secondly, thirdly' is an example of which signal function?", "options": ["A. Addition", "B. Listing/Enumeration", "C. Summary", "D. Contrast"], "answer": "B", "explanation": "These are sequence markers used to list points in order."},
  {"id": 78, "topic": "Reading and Comprehension Skills", "question": "In the SQ3R reading method, the 'S' stands for:", "options": ["A. Study", "B. Survey", "C. Scanning", "D. Skimming"], "answer": "B", "explanation": "Surveying involves looking over the text to get an overview before deep reading."},
  {"id": 79, "topic": "Reading and Comprehension Skills", "question": "Which habit involves moving the lips while reading silently?", "options": ["A. Regression", "B. Vocalization", "C. Finger pointing", "D. Head movement"], "answer": "B", "explanation": "Vocalization is the physical act of forming words while reading, which significantly slows speed."},
  {"id": 80, "topic": "Reading and Comprehension Skills", "question": "The conclusion of a paragraph should:", "options": ["A. Introduce a new topic", "B. Summarize the main points or restate the topic sentence", "C. Be the longest sentence", "D. Always contain a quote"], "answer": "B", "explanation": "A conclusion reinforces the main idea and brings the paragraph to a logical end."},
  {"id": 81, "topic": "Reading and Comprehension Skills", "question": "Which of the following describes the 'Return Sweep' in reading?", "options": ["A. Moving from the end of one line to the beginning of the next", "B. Re-reading a difficult paragraph", "C. Scanning the index of a book", "D. Closing the book after finishing a chapter"], "answer": "A", "explanation": "The return sweep is the rapid eye movement from the right margin back to the left margin to start the next line."},
  {"id": 82, "topic": "Reading and Comprehension Skills", "question": "A reader who adjusts their reading speed based on the difficulty of the material is demonstrating:", "options": ["A. Vocalization", "B. Flexibility", "C. Regression", "D. Fixation"], "answer": "B", "explanation": "Flexibility is the hallmark of an efficient reader who knows when to slow down for depth or speed up for gist."},
  {"id": 83, "topic": "Reading and Comprehension Skills", "question": "The 'Unity' of a paragraph is violated when:", "options": ["A. The topic sentence is at the end", "B. More than one main idea is discussed", "C. Signal words are used", "D. The paragraph is too short"], "answer": "B", "explanation": "Unity means every sentence in the paragraph should support a single central idea."},
  {"id": 84, "topic": "Reading and Comprehension Skills", "question": "Which of these is a psychological factor that can inhibit reading?", "options": ["A. Dim light", "B. Lack of interest or motivation", "C. Small print size", "D. Poor eyesight"], "answer": "B", "explanation": "Psychological factors involve the reader's mental state, such as attitude, interest, and anxiety."},
  {"id": 85, "topic": "Reading and Comprehension Skills", "question": "Identifying the 'Supporting Details' in a text helps the reader to:", "options": ["A. Find the publisher of the book", "B. Understand how the main idea is developed", "C. Improve their handwriting", "D. Speed read through the conclusion"], "answer": "B", "explanation": "Supporting details provide the evidence, examples, and explanations that give weight to the main idea."},
  {"id": 86, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of COMPARISON except:", "options": ["A. Similarly", "B. In the same way", "C. Likewise", "D. Consequently"], "answer": "D", "explanation": "'Consequently' signals a result or consequence, not a similarity."},
  {"id": 87, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of ADDITION except:", "options": ["A. Also", "B. moreover", "C. however", "D. in addition"], "answer": "C", "explanation": "As seen in previous sections, 'however' is used for contrast, not to add information."},
  {"id": 88, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of LISTING except:", "options": ["A. first", "B. next", "C. in other words", "D. finally"], "answer": "C", "explanation": "'In other words' is a restatement signal, while the others are sequence or listing signals."},
  {"id": 89, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of SUMMARY except:", "options": ["A. to conclude", "B. to sum up", "C. in conclusion", "D. none of the above"], "answer": "D", "explanation": "All options A, B, and C are valid summary markers."},
  {"id": 90, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONSEQUENCE except:", "options": ["A. therefore", "B. as a result", "C. however", "D. hence"], "answer": "C", "explanation": "Therefore, hence, and as a result show the outcome of a cause; however shows a contradiction."},
  {"id": 91, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of REFERRING TO PREVIOUS SENTENCES except:", "options": ["A. that is to say, namely", "B. nevertheless", "C. in other words", "D. as follows"], "answer": "B", "explanation": "The markers in A, C, and D refer back to clarify previous statements; 'nevertheless' is a contrast marker."},
  {"id": 92, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONTRAST except:", "options": ["A. but", "B. and", "C. on the contrary", "D. on the other hand"], "answer": "B", "explanation": "'And' is an addition marker, not used for showing differences or opposition."},
  {"id": 93, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of CONCESSION except:", "options": ["A. however", "B. nevertheless", "C. similarly", "D. although"], "answer": "C", "explanation": "'Similarly' shows likeness, whereas concession words acknowledge a conflicting fact."},
  {"id": 94, "topic": "Reading and Comprehension Skills", "question": "All the following signal words/phrases have the function of RESTATEMENT except:", "options": ["A. in other words", "B. that is to say", "C. namely", "D. furthermore"], "answer": "D", "explanation": "Furthermore adds new information, while the others repeat or clarify the same information in a different way."},
  {"id": 95, "topic": "Reading and Comprehension Skills", "question": "Which of the following signal words/phrases is used to show a logical result?", "options": ["A. For instance", "B. Consequently", "C. Similarly", "D. Furthermore"], "answer": "B", "explanation": "Consequently indicates that the following statement is a direct result of the preceding one."},
  {"id": 96, "topic": "Reading and Comprehension Skills", "question": "The primary goal of 'Critical Reading' is to:", "options": ["A. Read as fast as possible", "B. Memorize every word", "C. Evaluate the author's argument and bias", "D. Find specific dates and names"], "answer": "C", "explanation": "Critical reading involves analyzing and evaluating the validity of the information presented."},
  {"id": 97, "topic": "Reading and Comprehension Skills", "question": "In the SQ3R study method, 'Recite' refers to:", "options": ["A. Reading the text aloud", "B. Writing down the author's name", "C. Answering questions from memory after reading", "D. Re-reading the same page three times"], "answer": "C", "explanation": "Reciting helps reinforce memory by forcing the reader to retrieve information without looking at the text."},
  {"id": 98, "topic": "Reading and Comprehension Skills", "question": "A group of related sentences that discuss one main point is a:", "options": ["A. Clause", "B. Paragraph", "C. Phrase", "D. Sentence"], "answer": "B", "explanation": "The paragraph is the basic unit of organization in writing, centered around one main idea."},
  {"id": 99, "topic": "Reading and Comprehension Skills", "question": "Which signal word indicates that a writer is about to give an alternative view?", "options": ["A. Moreover", "B. Conversely", "C. Therefore", "D. In addition"], "answer": "B", "explanation": "Conversely is used to introduce an idea that is the opposite of the one previously mentioned."},
  {"id": 100, "topic": "Reading and Comprehension Skills", "question": "The 'Topic Sentence' is most commonly found at the _______ of a paragraph.", "options": ["A. Middle", "B. End", "C. Beginning", "D. Appendix"], "answer": "C", "explanation": "While it can move, placing the topic sentence at the beginning is the standard way to establish the paragraph's focus immediately."},
  {"id": 101, "topic": "Reading and Comprehension Skills", "question": "Which of the following is an example of Sub-vocalization?", "options": ["A. Reading with eyes only", "B. The inner voice heard while reading", "C. Pointing with a finger", "D. Skipping sentences"], "answer": "B", "explanation": "Sub-vocalization is internal speech while reading."},
  {"id": 102, "topic": "Reading and Comprehension Skills", "question": "The purpose of Survey in SQ3R is to:", "options": ["A. Memorize", "B. Gain overview", "C. Check spelling", "D. Read conclusion first"], "answer": "B", "explanation": "Surveying creates a mental map of the content."},
  {"id": 103, "topic": "Reading and Comprehension Skills", "question": "Word Analysis strategies look at:", "options": ["A. Price", "B. Prefixes, suffixes, and roots", "C. Cover color", "D. Font size"], "answer": "B", "explanation": "Word analysis breaks down morphemes to determine meaning."},
  {"id": 104, "topic": "Reading and Comprehension Skills", "question": "Which signal introduces a Conclusion?", "options": ["A. On the other hand", "B. In summary", "C. For instance", "D. Similarly"], "answer": "B", "explanation": "'In summary' signals the wrapping up of points."},
  {"id": 105, "topic": "Reading and Comprehension Skills", "question": "Reading for pleasure is known as:", "options": ["A. Intensive", "B. Extensive", "C. Scanning", "D. Skimming"], "answer": "B", "explanation": "Extensive reading is for general understanding and enjoyment."},

  {"id": 261, "topic": "Module 5: Parts of Speech I", "question": "What is the correct hierarchical order of the grammatical rank scale from smallest to largest?", "options": ["Morpheme, word, phrase, clause, sentence", "Word, phrase, clause, sentence, morpheme", "Sentence, clause, phrase, word, morpheme", "Phrase, clause, morpheme, word, sentence"], "answer": "Morpheme, word, phrase, clause, sentence", "explanation": "The scale goes from the smallest unit (morpheme) to the largest (sentence)."},
  {"id": 262, "topic": "Module 5: Parts of Speech I", "question": "What is a morpheme that can stand alone to form a word called?", "options": ["Bound morpheme", "Free morpheme", "Inflectional morpheme", "Derivational morpheme"], "answer": "Free morpheme", "explanation": "A free morpheme can stand alone to form a meaningful word."},

  {"id": 270, "topic": "Module 5: Parts of Speech I", "question": "Non-count nouns typically do not have what kind of form?", "options": ["Singular form", "Plural form", "Capitalized form", "Vowel form"], "answer": "Plural form", "explanation": "Non-count nouns cannot be counted directly and usually lack a plural form."},

  {"id": 272, "topic": "Module 5: Parts of Speech I", "question": "A finite verb must have a subject and show what?", "options": ["Only action", "Tense, person, or number", "No tense", "Only future events"], "answer": "Tense, person, or number", "explanation": "Finite verbs are tied to a subject and reflect tense, person, or number."},

  {"id": 275, "topic": "Module 5: Parts of Speech I", "question": "Superlative adjectives are used to compare how many nouns?", "options": ["Exactly one", "Exactly two", "More than two", "Zero"], "answer": "More than two", "explanation": "Superlatives indicate the highest degree among more than two nouns."},

  {"id": 284, "topic": "Module 6: Parts of Speech II", "question": "Correlative conjunctions always work in what way?", "options": ["Alone", "In pairs", "At the end of sentences", "Without verbs"], "answer": "In pairs", "explanation": "Correlative conjunctions work in pairs, such as either/or."},

  {"id": 290, "topic": "Module 6: Parts of Speech II", "question": "When is the 'zero article' rule applied?", "options": ["Before all vowels", "With generic plural or uncountable nouns in a general sense", "Before proper nouns only", "When you forget to write an article"], "answer": "With generic plural or uncountable nouns in a general sense", "explanation": "The zero article is used when no article is grammatically required."},
  {"id": 291, "topic": "Module 7: Aspects of Grammar", "question": "A phrase is a group of words that lacks what components?", "options": ["A subject and a predicate", "A noun and an adjective", "A prefix and a suffix", "Letters and syllables"], "answer": "A subject and a predicate", "explanation": "A phrase functions as a unit but lacks a subject and predicate."},
  {"id": 292, "topic": "Module 7: Aspects of Grammar", "question": "In the Noun Phrase structure MHQ, what does the 'H' stand for?", "options": ["Helper", "Headword", "Hyperbole", "Homonym"], "answer": "Headword", "explanation": "The Headword is the core noun of the phrase."},
  {"id": 293, "topic": "Module 7: Aspects of Grammar", "question": "Unlike a phrase, a clause must contain what components?", "options": ["An interjection", "A subject and a verb", "A capital letter and a period", "Only nouns"], "answer": "A subject and a verb", "explanation": "A clause is distinguished by having both a subject and a verb."},
  {"id": 294, "topic": "Module 7: Aspects of Grammar", "question": "A main or independent clause can stand on its own to convey what?", "options": ["A question mark", "Complete meaning", "Incomplete ideas", "A single morpheme"], "answer": "Complete meaning", "explanation": "Independent clauses form complete thoughts on their own."},
  {"id": 295, "topic": "Module 7: Aspects of Grammar", "question": "A subordinate or dependent clause derives its meaning from what?", "options": ["A dictionary", "The main clause", "A prepositional phrase", "The conclusion"], "answer": "The main clause", "explanation": "Dependent clauses rely on main clauses to make full sense."},
  {"id": 296, "topic": "Module 7: Aspects of Grammar", "question": "A simple sentence consists of exactly how many main clauses?", "options": ["Zero", "Exactly one", "Two or more", "At least three"], "answer": "Exactly one", "explanation": "A simple sentence is a single independent clause."},

  {"id": 299, "topic": "Module 7: Aspects of Grammar", "question": "A compound-complex sentence contains at least two main clauses and one or more of what?", "options": ["Prepositions", "Subordinate clauses", "Simple sentences", "Exclamation marks"], "answer": "Subordinate clauses", "explanation": "This sentence type combines the features of compound and complex sentences."},

  {"id": 304, "topic": "Module 7: Aspects of Grammar", "question": "A polar question is a type of question that can be answered with what?", "options": ["A long essay", "Yes or No", "A Wh- word", "A command"], "answer": "Yes or No", "explanation": "Polar questions are also known as Yes/No questions."},
  {"id": 305, "topic": "Module 7: Aspects of Grammar", "question": "A tag question consists of a statement followed by what?", "options": ["A full stop", "A mini-question or tag", "A command", "A long explanation"], "answer": "A mini-question or tag", "explanation": "Tag questions end with a short tag like 'didn't they?'."},

  {"id": 307, "topic": "Module 7: Aspects of Grammar", "question": "Adverbial clauses of reason answer which question?", "options": ["When?", "Where?", "How?", "Why?"], "answer": "Why?", "explanation": "Adverbial clauses of reason explain the 'why' of an action."},

  {"id": 309, "topic": "Module 7: Aspects of Grammar", "question": "Which of these conjunctions typically introduces an adverbial clause of condition?", "options": ["Because", "Where", "If", "Although"], "answer": "If", "explanation": "Condition clauses often begin with 'if' or 'unless'."},
  {"id": 310, "topic": "Module 7: Aspects of Grammar", "question": "What is the function of a subject complement in a sentence?", "options": ["It modifies the object", "It follows a linking verb and renames or describes the subject", "It introduces a prepositional phrase", "It connects two independent clauses"], "answer": "It follows a linking verb and renames or describes the subject", "explanation": "A subject complement follows a linking verb to rename or describe the subject."},
  {"id": 311, "topic": "Module 7: Aspects of Grammar", "question": "An object complement typically follows which part of the sentence?", "options": ["The subject", "The indirect object", "The direct object", "The preposition"], "answer": "The direct object", "explanation": "An object complement follows the direct object and renames or describes it."},

  {"id": 313, "topic": "Module 7: Aspects of Grammar", "question": "What is 'conversion' in word formation?", "options": ["Translating a word from another language", "Changing a word's grammatical class without adding affixes", "Clipping the end of a word", "Blending two words together"], "answer": "Changing a word's grammatical class without adding affixes", "explanation": "Conversion changes a word's class, like using the noun 'email' as a verb."},
  {"id": 314, "topic": "Module 7: Aspects of Grammar", "question": "Which word formation process involves pronouncing the initial letters of words individually (e.g., FBI)?", "options": ["Acronymy", "Alphabetism", "Clipping", "Borrowing"], "answer": "Alphabetism", "explanation": "Alphabetism involves pronouncing the initials individually, unlike acronyms where they are pronounced as a word."},

  {"id": 320, "topic": "Module 7: Aspects of Grammar", "question": "What does a prepositional phrase consist of?", "options": ["A verb and an adverb", "A noun and an adjective", "A preposition and its object", "Two independent clauses"], "answer": "A preposition and its object", "explanation": "A prepositional phrase includes a preposition and the noun or pronoun acting as its object."},

  {"id": 410, "topic": "Module 4: Sounds of the English Language", "question": "Which of these words contains a short vowel sound?", "options": ["sheep", "shoot", "cat", "car"], "answer": "cat", "explanation": "Short vowels are lax and brief. 'cat' uses the short /æ/ sound."},

  {"id": 412, "topic": "Module 4: Sounds of the English Language", "question": "What does a falling intonation (➘) typically signify?", "options": ["Surprise.", "The speaker is unsure.", "A statement, command, or the speaker has finished speaking.", "A Yes/No question."], "answer": "A statement, command, or the speaker has finished speaking.", "explanation": "Falling Intonation (➘) shows that the speaker is sure or has finished speaking (statements, commands)."},
  {"id": 413, "topic": "Module 4: Sounds of the English Language", "question": "Why do many Nigerian English speakers face challenges with English rhythm?", "options": ["Because Nigerian languages have no vowels.", "Because many Nigerian indigenous languages exhibit a syllable-timed rhythm, unlike the stress-timed rhythm of Standard English.", "Because they speak too fast.", "Because English words are too long."], "answer": "Because many Nigerian indigenous languages exhibit a syllable-timed rhythm, unlike the stress-timed rhythm of Standard English.", "explanation": "Nigerian indigenous languages exhibit a syllable-timed rhythm, which clashes with the stress-timed rhythm of Standard English."},
  {"id": 414, "topic": "Module 4: Sounds of the English Language", "question": "What happens in a 'stress-timed' language like Standard English?", "options": ["Every syllable is equally long.", "Vowels are never pronounced.", "Stressed syllables appear at roughly regular intervals, and unstressed syllables are shortened.", "Tone determines the meaning of the word."], "answer": "Stressed syllables appear at roughly regular intervals, and unstressed syllables are shortened.", "explanation": "In a stress-timed rhythm, stressed syllables appear at roughly regular intervals, and unstressed syllables are squashed together."},
  {"id": 415, "topic": "Module 4: Sounds of the English Language", "question": "What substitute do Nigerian speakers often use for the central vowel /ɜː/ (as in 'bird')?", "options": ["/i:/", "/ɔː/ or /a/", "/u/", "/æ/"], "answer": "/ɔː/ or /a/", "explanation": "Many speakers substitute it with vowels present in their mother tongues, such as /ɔː/ or /a/."},
  {"id": 416, "topic": "Module 4: Sounds of the English Language", "question": "How do Nigerian English speakers often alter intonation in statements compared to Standard English?", "options": ["They whisper statements.", "They may use a rising tone where Standard English expects a falling tone.", "They use a falling tone for Yes/No questions.", "They do not use intonation at all."], "answer": "They may use a rising tone where Standard English expects a falling tone.", "explanation": "Because of local language influence, Nigerian speakers may use a rising tone where Standard English expects a falling tone."},
  {"id": 417, "topic": "Module 4: Sounds of the English Language", "question": "What is the consequence of 'Non-reduction of Vowels' in Nigerian spoken English?", "options": ["Words become incomprehensible.", "Every syllable demands equal attention, creating an 'in-elastic timed' rhythm.", "It makes the speaker sound exactly like a native British speaker.", "It eliminates all consonant sounds."], "answer": "Every syllable demands equal attention, creating an 'in-elastic timed' rhythm.", "explanation": "Failure to reduce weak vowels means every syllable demands equal attention, resulting in an 'in-elastic timed' rhythm."},
  {"id": 418, "topic": "Module 5: Parts of Speech I", "question": "What is an abstract noun?", "options": ["A noun that names a specific person.", "A noun representing a group.", "A noun referring to something intangible which cannot be touched or seen.", "A noun made of two words."], "answer": "A noun referring to something intangible which cannot be touched or seen.", "explanation": "An abstract noun refers to something intangible which cannot be touched or seen, like 'happiness'."},
  {"id": 419, "topic": "Module 5: Parts of Speech I", "question": "Which of these is a correct rule for making a noun ending in 'f' or 'fe' plural?", "options": ["Always just add -s.", "Change the 'f' or 'fe' to -ves.", "Add -es to the end.", "Change the 'f' to 'ies'."], "answer": "Change the 'f' or 'fe' to -ves.", "explanation": "For most nouns ending in -f or -fe, change the f to v and add -es (e.g., life to lives)."},
  {"id": 420, "topic": "Module 5: Parts of Speech I", "question": "What is the plural of 'child'?", "options": ["childs", "childes", "children", "childrens"], "answer": "children", "explanation": "Irregular plurals do not follow standard rules. The plural of child is children."},
  {"id": 421, "topic": "Module 5: Parts of Speech I", "question": "What function do personal pronouns serve?", "options": ["They point to specific objects.", "They replace nouns referring to specific people or things.", "They ask questions.", "They show ownership."], "answer": "They replace nouns referring to specific people or things.", "explanation": "Personal pronouns replace nouns referring to specific people or things (e.g., I, you, he, she)."},
  {"id": 422, "topic": "Module 5: Parts of Speech I", "question": "Which type of pronoun is used to indicate ownership?", "options": ["Demonstrative pronouns", "Possessive pronouns", "Relative pronouns", "Reflexive pronouns"], "answer": "Possessive pronouns", "explanation": "Possessive pronouns indicate ownership (e.g., mine, yours, his, hers, ours, theirs)."},
  {"id": 423, "topic": "Module 5: Parts of Speech I", "question": "What is the difference between a transitive and an intransitive verb?", "options": ["Transitive verbs show tense; intransitive verbs do not.", "Transitive verbs require a direct object to complete their meaning; intransitive verbs do not.", "Transitive verbs are always passive; intransitive verbs are active.", "Transitive verbs act as nouns."], "answer": "Transitive verbs require a direct object to complete their meaning; intransitive verbs do not.", "explanation": "Transitive verbs require a direct object, whereas intransitive verbs do not require an object."},
  {"id": 424, "topic": "Module 5: Parts of Speech I", "question": "Which sentence is written in the passive voice?", "options": ["The cat chased the bird.", "The bird was chased by the cat.", "The cat sleeps.", "Birds fly high."], "answer": "The bird was chased by the cat.", "explanation": "Passive voice: The subject of the sentence receives the action (e.g., 'The bird was chased by the cat')."},
  {"id": 425, "topic": "Module 5: Parts of Speech I", "question": "What do adjectives modify?", "options": ["Verbs and adverbs.", "Other adjectives.", "Nouns or pronouns.", "Prepositions."], "answer": "Nouns or pronouns.", "explanation": "Adjectives are words that describe or modify nouns or pronouns."},
  {"id": 426, "topic": "Module 5: Parts of Speech I", "question": "When is a comparative adjective used?", "options": ["To describe a single noun.", "To compare more than two nouns.", "To compare exactly two nouns.", "To replace a verb."], "answer": "To compare exactly two nouns.", "explanation": "Comparative adjectives are used to compare two nouns (e.g., 'bigger')."},
  {"id": 427, "topic": "Module 5: Parts of Speech I", "question": "What form is 'happiest' an example of?", "options": ["Positive adjective", "Comparative adjective", "Superlative adjective", "Adverb of manner"], "answer": "Superlative adjective", "explanation": "Superlative adjectives indicate the highest degree when comparing more than two nouns."},
  {"id": 428, "topic": "Module 5: Parts of Speech I", "question": "Where can adjectives be placed in a sentence?", "options": ["Only at the very beginning.", "Only after the noun.", "Before the noun they modify or after a linking verb.", "Only inside a prepositional phrase."], "answer": "Before the noun they modify or after a linking verb.", "explanation": "Adjectives can be placed before the noun they modify or after a linking verb like 'is' or 'was'."},
  {"id": 429, "topic": "Module 5: Parts of Speech I", "question": "Which of the following describes an indefinite pronoun?", "options": ["It points to a specific noun.", "It asks a direct question.", "It refers to non-specific people or things.", "It links a relative clause."], "answer": "It refers to non-specific people or things.", "explanation": "Indefinite pronouns refer to non-specific people or things (e.g., anyone, someone, all, both)."},
  {"id": 430, "topic": "Module 5: Parts of Speech I", "question": "What does a reflexive pronoun end in?", "options": ["-ing", "-ed", "-self or -selves", "-ly"], "answer": "-self or -selves", "explanation": "Reflexive pronouns end in '-self' or '-selves' and are used when the subject and object are the same."},
  {"id": 431, "topic": "Module 5: Parts of Speech I", "question": "What defines a lexical (main) verb?", "options": ["It only helps other verbs.", "It carries the primary meaning of the action or state in a clause.", "It is always used in the passive voice.", "It replaces a noun."], "answer": "It carries the primary meaning of the action or state in a clause.", "explanation": "Lexical (main) verbs carry the primary meaning of the action or state in a clause."},
  {"id": 432, "topic": "Module 5: Parts of Speech I", "question": "How is a compound noun defined?", "options": ["A noun referring to a group.", "A noun made up of two or more existing words.", "A noun that cannot be seen.", "A noun representing an idea."], "answer": "A noun made up of two or more existing words.", "explanation": "A compound noun is a noun made up of two or more existing words (e.g., copycat)."},
  {"id": 433, "topic": "Module 6: Parts of Speech II", "question": "Which of the following is an Adverb of Frequency?", "options": ["Quickly", "Outside", "Always", "Very"], "answer": "Always", "explanation": "Adverbs of Frequency tell how often an action happens (e.g., always, never, often)."},
  {"id": 434, "topic": "Module 6: Parts of Speech II", "question": "What function do conjunctions serve in a sentence?", "options": ["They describe nouns.", "They indicate action.", "They connect words, phrases, or clauses.", "They express sudden emotion."], "answer": "They connect words, phrases, or clauses.", "explanation": "Conjunctions are words used to connect words, phrases, or clauses, helping to build complex sentences."},
  {"id": 435, "topic": "Module 6: Parts of Speech II", "question": "Which acronym helps remember coordinating conjunctions?", "options": ["SMART", "FANBOYS", "CRAAP", "NATO"], "answer": "FANBOYS", "explanation": "Coordinating conjunctions connect elements of equal grammatical importance and are remembered by FANBOYS (for, and, nor, but, or, yet, so)."},
  {"id": 436, "topic": "Module 6: Parts of Speech II", "question": "What is the role of a subordinating conjunction?", "options": ["To link two independent clauses equally.", "To connect a dependent clause to an independent clause.", "To express surprise.", "To modify an adjective."], "answer": "To connect a dependent clause to an independent clause.", "explanation": "Subordinating conjunctions connect a dependent clause to an independent clause (e.g., because, although)."},
  {"id": 437, "topic": "Module 6: Parts of Speech II", "question": "Which is an example of a correlative conjunction pair?", "options": ["And / But", "Because / Since", "Either / Or", "With / Without"], "answer": "Either / Or", "explanation": "Correlative conjunctions work in pairs to connect grammatically similar elements (e.g., either/or, neither/nor)."},
  {"id": 438, "topic": "Module 6: Parts of Speech II", "question": "What part of speech is used to express sudden bursts of emotion or feeling?", "options": ["Adverb", "Preposition", "Conjunction", "Interjection"], "answer": "Interjection", "explanation": "Interjections are words or phrases used to express sudden or strong emotion or feeling."},
  {"id": 439, "topic": "Module 6: Parts of Speech II", "question": "Where are interjections typically placed in a sentence?", "options": ["At the very end.", "In the middle, separating verbs.", "Usually at the beginning of a sentence.", "Before every noun."], "answer": "Usually at the beginning of a sentence.", "explanation": "Interjections are usually placed at the beginning of a sentence and followed by an exclamation mark or comma."},
  {"id": 440, "topic": "Module 6: Parts of Speech II", "question": "What type of article is 'the'?", "options": ["Indefinite article", "Definite article", "Zero article", "Possessive article"], "answer": "Definite article", "explanation": "The article 'the' is the definite article, used for specific nouns known to the listener."},
  {"id": 441, "topic": "Module 6: Parts of Speech II", "question": "Why would you use the indefinite article 'a' or 'an'?", "options": ["To refer to a specific, unique item.", "When the noun is specific and known to the reader.", "When the noun is general, non-specific, or mentioned for the first time.", "With uncountable nouns only."], "answer": "When the noun is general, non-specific, or mentioned for the first time.", "explanation": "Indefinite articles (a, an) are used when the noun is non-specific, general, or mentioned for the first time."},
  {"id": 442, "topic": "Module 6: Parts of Speech II", "question": "What dictates whether you use 'a' or 'an' before a word?", "options": ["The spelling of the word.", "The sound of the word that immediately follows the article.", "The length of the word.", "Whether the word is a noun or adjective."], "answer": "The sound of the word that immediately follows the article.", "explanation": "The choice between 'a' and 'an' depends on the sound of the word that immediately follows the article, not the spelling."},
  {"id": 443, "topic": "Module 6: Parts of Speech II", "question": "Which of these phrases correctly demonstrates the 'zero article' rule?", "options": ["The cars have the accelerators.", "Cars have accelerators.", "A cars have accelerators.", "An happiness is contagious."], "answer": "Cars have accelerators.", "explanation": "The zero article is used with generic nouns when talking about plural or uncountable nouns in a general sense."},
  {"id": 444, "topic": "Module 6: Parts of Speech II", "question": "Which type of preposition is used in the phrase 'across the street'?", "options": ["Preposition of Time", "Preposition of Manner", "Preposition of Direction/Movement", "Preposition of Cause"], "answer": "Preposition of Direction/Movement", "explanation": "Direction/Movement prepositions show how something is moving or which way it is going (e.g., across, into)."},
  {"id": 445, "topic": "Module 6: Parts of Speech II", "question": "Which type of preposition is used in the phrase 'at 5 PM'?", "options": ["Preposition of Time", "Preposition of Place", "Preposition of Direction", "Preposition of Purpose"], "answer": "Preposition of Time", "explanation": "Prepositions of time indicate when something happened (e.g., at, on, in)."},
  {"id": 446, "topic": "Module 6: Parts of Speech II", "question": "What is the grammatical relationship of an interjection to the rest of the sentence?", "options": ["It modifies the main verb.", "It acts as the subject.", "It is grammatically independent.", "It connects two clauses."], "answer": "It is grammatically independent.", "explanation": "Interjections are grammatically independent of the rest of the sentence."},
  {"id": 447, "topic": "Module 6: Parts of Speech II", "question": "What emotion does the interjection 'Ouch!' express?", "options": ["Joy", "Surprise", "Sudden pain", "Disgust"], "answer": "Sudden pain", "explanation": "The interjection 'Ouch!' expresses sudden pain."},
  {"id": 448, "topic": "Module 7: Aspects of Grammar", "question": "What is the grammatical rank scale?", "options": ["A way to grade essays.", "A hierarchical ordering of linguistic units from smallest to largest.", "A tool for measuring vocabulary size.", "A method to calculate reading speed."], "answer": "A hierarchical ordering of linguistic units from smallest to largest.", "explanation": "The grammatical rank scale is a hierarchical ordering of linguistic units, from the smallest to the largest."},
  {"id": 449, "topic": "Module 7: Aspects of Grammar", "question": "What is the term for the process of combining words to create new ones, like 'copycat'?", "options": ["Clipping", "Blending", "Compounding", "Conversion"], "answer": "Compounding", "explanation": "Word formation includes compounding (combining words)."},
  {"id": 450, "topic": "Module 7: Aspects of Grammar", "question": "What is an acronym?", "options": ["A word formed by clipping the end of another word.", "A word formed from the initial letters of other words and pronounced as a word.", "A word borrowed from another language.", "A word whose class has changed without adding an affix."], "answer": "A word formed from the initial letters of other words and pronounced as a word.", "explanation": "Word formation processes include acronymy, forming a word from initial letters and pronouncing it as a word."},
  {"id": 451, "topic": "Module 7: Aspects of Grammar", "question": "Which grammatical unit consists of a group of words without a subject or predicate?", "options": ["Clause", "Sentence", "Phrase", "Morpheme"], "answer": "Phrase", "explanation": "A phrase is a group of words without a subject or a predicate, but functions as a component of a sentence."},
  {"id": 452, "topic": "Module 7: Aspects of Grammar", "question": "What is the core element of a noun phrase?", "options": ["The modifier", "The qualifier", "The headword", "The preposition"], "answer": "The headword", "explanation": "In a noun phrase (MHQ), the headword (H) is the core noun."},
  {"id": 453, "topic": "Module 7: Aspects of Grammar", "question": "What function does a noun clause serve when it answers 'who' or 'what' receives the action of a verb?", "options": ["Subject of a Verb", "Object of a Verb", "Subject Complement", "Object Complement"], "answer": "Object of a Verb", "explanation": "A noun clause functions as the Object of a Verb when it answers who or what receives the action."},
  {"id": 454, "topic": "Module 7: Aspects of Grammar", "question": "What kind of clause is introduced by relative pronouns like 'who', 'which', or 'that'?", "options": ["Noun Clause", "Adverbial Clause", "Adjectival (Relative) Clause", "Main Clause"], "answer": "Adjectival (Relative) Clause", "explanation": "An adjectival/relative clause is usually introduced by relative pronouns."},
  {"id": 455, "topic": "Module 7: Aspects of Grammar", "question": "Which of the following is an example of an Adverbial Clause of Condition?", "options": ["I will go if it stops raining.", "I left because I was tired.", "He runs as if he is flying.", "I will wait until you arrive."], "answer": "I will go if it stops raining.", "explanation": "Adverbial Clauses of Condition express a condition and use words like 'if' or 'unless'."},
  {"id": 456, "topic": "Module 7: Aspects of Grammar", "question": "How many main clauses are in a simple sentence?", "options": ["Zero", "One", "Two", "Three or more"], "answer": "One", "explanation": "A simple sentence consists of exactly one main clause that expresses a complete thought."},
  {"id": 457, "topic": "Module 7: Aspects of Grammar", "question": "Which sentence type gives a command or makes a request?", "options": ["Declarative", "Interrogative", "Exclamatory", "Imperative"], "answer": "Imperative", "explanation": "An imperative sentence is a statement that gives command, request or directives."},
  {"id": 458, "topic": "Module 1: Goal Setting and Time Management", "question": "What is one way to ensure you do not take on more than is necessary?", "options": ["Always say yes to everyone.", "Learn to say 'No' when necessary.", "Ignore your schedule.", "Delegate all your personal tasks."], "answer": "Learn to say 'No' when necessary.", "explanation": "Time management requires you to never take on more than is necessary; learn to say no."},

  {"id": 464, "topic": "Module 1: Goal Setting and Time Management", "question": "Why should you NOT hurry up to do things faster?", "options": ["Hurrying up is not always the best way of doing a thing faster because it leads to errors.", "Because it takes too much energy.", "Because it makes you look unprofessional.", "Because time slows down when you hurry."], "answer": "Hurrying up is not always the best way of doing a thing faster because it leads to errors.", "explanation": "Hurrying up is not always the best way of doing a thing faster, as it can compromise quality and cause mistakes."},

  {"id": 473, "topic": "Module 2: Introduction to 21st Century Literacies", "question": "Which of these is a key difference between Web 1.0 and Web 2.0?", "options": ["Web 1.0 was interactive; Web 2.0 is static.", "Web 2.0 allows users to be active creators of content, rather than just passive consumers.", "Web 1.0 was only for smartphones.", "Web 2.0 does not use the internet."], "answer": "Web 2.0 allows users to be active creators of content, rather than just passive consumers.", "explanation": "The emergence of Web 2.0 technologies shifted users from being passive consumers to becoming active creators of digital content."},
