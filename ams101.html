  { "id": 177, "question": "Theory Y assumes that employees are:", "options": ["Lazy", "Creative and seek responsibility", "Incapable of learning", "Only motivated by fear"], "answer": "Creative and seek responsibility", "explanation": "Theory Y assumes people naturally want to do a good job if given the chance." },
  { "id": 178, "question": "Maslow’s hierarchy of needs begins with:", "options": ["Physiological needs", "Safety needs", "Social needs", "Self-actualization"], "answer": "Physiological needs", "explanation": "The most basic needs are biological, like food, water, and sleep." },
  { "id": 179, "question": "The highest level of Maslow’s hierarchy is:", "options": ["Safety", "Belonging", "Self-actualization", "Esteem"], "answer": "Self-actualization", "explanation": "This is the desire to become everything one is capable of becoming." },
  { "id": 180, "question": "Herzberg’s two-factor theory includes:", "options": ["Theory X and Y", "Hygiene factors and motivators", "Maslow's hierarchy", "Technical and human skills"], "answer": "Hygiene factors and motivators", "explanation": "Hygiene factors prevent unhappiness, but only motivators create true satisfaction." },
  { "id": 181, "question": "Hygiene factors (Herzberg) prevent:", "options": ["Innovation", "Dissatisfaction", "Promotion", "Hard work"], "answer": "Dissatisfaction", "explanation": "Things like pay and policy won't make people 'happy,' but if they are bad, they make people 'unhappy'." },
  { "id": 182, "question": "Motivators (Herzberg) lead to:", "options": ["Dissatisfaction", "Satisfaction and high performance", "Lower wages", "Boredom"], "answer": "Satisfaction and high performance", "explanation": "Factors like recognition and growth are what actually inspire people to excel." },
  { "id": 183, "question": "Planning involves:", "options": ["Checking what happened in the past", "Setting goals and deciding how to achieve them", "Cleaning the office", "Firing underperformers"], "answer": "Setting goals and deciding how to achieve them", "explanation": "Planning is the forward-looking function of management." },
  { "id": 184, "question": "Organizing involves:", "options": ["Buying new computers", "Assigning tasks and allocating resources", "Giving a speech", "Measuring performance"], "answer": "Assigning tasks and allocating resources", "explanation": "Organizing is about putting the 'puzzle pieces' (people and tools) in the right places." },
  { "id": 185, "question": "Controlling involves:", "options": ["Monitoring performance and taking corrective action", "Telling people exactly what to do every second", "Setting initial goals", "Hiring new staff"], "answer": "Monitoring performance and taking corrective action", "explanation": "Controlling is checking if the plan is working and fixing it if it isn't." },
  { "id": 186, "question": "The first step in the decision-making process is:", "options": ["Evaluating alternatives", "Identifying the problem", "Choosing a solution", "Implementing a plan"], "answer": "Identifying the problem", "explanation": "You cannot find a solution if you don't know what you are trying to solve." },
  { "id": 187, "question": "\"Synergy\" means:", "options": ["Working alone", "The whole is greater than the sum of its parts", "One plus one equals zero", "A type of machine lubricant"], "answer": "The whole is greater than the sum of its parts", "explanation": "Synergy occurs when teamwork produces results that individuals couldn't achieve alone." },
  { "id": 188, "question": "Organizational culture is:", "options": ["The types of food eaten at the office", "The shared values and beliefs of the organization", "The building's architecture", "The company's bank balance"], "answer": "The shared values and beliefs of the organization", "explanation": "Culture is the 'personality' of the workplace." },
  { "id": 189, "question": "Which of the following best describes the relationship between leadership and motivation?", "options": ["Leadership and motivation are unrelated", "Effective leadership creates conditions that inspire intrinsic motivation in followers", "Motivation is solely a product of financial incentives", "Leadership decreases motivation by increasing employee pressure"], "answer": "Effective leadership creates conditions that inspire intrinsic motivation in followers", "explanation": "Leadership is the catalyst that activates motivation." },
  { "id": 190, "question": "The concept that 'followers promote what the leader desires' suggests that effective leadership results in:", "options": ["Forced compliance", "Genuine follower commitment and internalization of organizational goals", "External control mechanisms", "Dependency on financial rewards"], "answer": "Genuine follower commitment and internalization of organizational goals", "explanation": "Successful leadership makes the organization's goals feel like the follower's personal goals." },
  { "id": 191, "question": "Which level of management requires a balance of all three skills — technical, human, and conceptual?", "options": ["Entry-level only", "Top management only", "Middle management", "First-line supervisors only"], "answer": "Middle management", "explanation": "Middle managers bridge the gap between high-level strategy and low-level technical work." },
  { "id": 192, "question": "In Likert's System-1, subordinates are described as having:", "options": ["Full trust and autonomy", "Equal say in decision-making", "No trust from management", "Complete freedom of action"], "answer": "No trust from management", "explanation": "The exploitive style is based on total control because the manager doesn't trust the staff." },
  { "id": 193, "question": "Which of the following best represents how democratic leadership improves organizational decisions?", "options": ["The leader's experience alone ensures quality", "Diverse perspectives from multiple participants result in more informed and balanced decisions", "Decisions are always unanimous", "External consultants improve all decisions"], "answer": "Diverse perspectives from multiple participants result in more informed and balanced decisions", "explanation": "Multiple viewpoints catch errors that a single person might miss." },
  { "id": 194, "question": "Which of the following best represents how a manager's focus differs from a leader's focus?", "options": ["Focus on long-range vision", "Focus on innovation", "Focus on the bottom line and immediate financial results", "Focus on transformation"], "answer": "Focus on the bottom line and immediate financial results", "explanation": "Managers are typically held accountable for near-term metrics and outputs." },
  { "id": 195, "question": "Which of the following reflects a leader's 'long-range view' in practice?", "options": ["Focusing on this month's sales targets", "Investing in employee development for future organizational capacity", "Monitoring daily operational metrics", "Reacting to short-term market fluctuations"], "answer": "Investing in employee development for future organizational capacity", "explanation": "Developing people is a long-term investment that yields results years into the future." },
  { "id": 196, "question": "The \"Span of Control\" refers to:", "options": ["The number of subordinates a manager can effectively supervise", "The power a CEO has over the board", "The physical area of a factory", "The length of a project's timeline"], "answer": "The number of subordinates a manager can effectively supervise", "explanation": "It determines how many people report directly to a single manager." },
  { "id": 197, "question": "Decentralization is the:", "options": ["Closing of branch offices", "Distribution of decision-making authority throughout the organization", "Hiring of remote workers", "Consolidation of power at the headquarters"], "answer": "Distribution of decision-making authority throughout the organization", "explanation": "Decentralization pushes power down to the people closest to the action." },
  { "id": 198, "question": "A \"Flat\" organizational structure has:", "options": ["Many floors in the building", "Few levels of hierarchy and a wide span of control", "Strict military ranks", "Only one employee"], "answer": "Few levels of hierarchy and a wide span of control", "explanation": "Flat structures have very few 'middle managers' between the top and bottom." },
  { "id": 199, "question": "Ethics in management refers to:", "options": ["Maximizing profit at all costs", "Moral principles that govern a manager's behavior", "Following only the legal minimum requirements", "Ignoring the environmental impact of business"], "answer": "Moral principles that govern a manager's behavior", "explanation": "Ethical management involves doing what is 'right' even when it isn't required by law." },
  { "id": 200, "question": "The goal of effective leadership in any organization is to:", "options": ["Maximize individual leader power", "Ensure strict compliance with rules", "Achieve organizational goals through inspired, willing effort of followers", "Replace management with direct supervision"], "answer": "Achieve organizational goals through inspired, willing effort of followers", "explanation": "Willing effort is the final proof of true leadership." },
  
  { "id": 201, "question": "Which of the following is the primary focus of Section B in the management course?", "options": ["A. Leadership styles", "B. Motivation and group dynamics", "C. Financial accounting", "D. Marketing strategy"], "answer": "B", "explanation": "Section B typically transitions from individual leadership to the psychological aspects of motivation and collective group behavior." },
  { "id": 202, "question": "Motivation is best described as:", "options": ["A. A fixed personality trait", "B. The inner drive that directs and sustains behavior toward a goal", "C. A formal set of rules and regulations", "D. The physical strength of an employee"], "answer": "B", "explanation": "Motivation is the psychological process that gives purpose and direction to behavior." },
  { "id": 203, "question": "In the context of management, 'Intrinsic Motivation' comes from:", "options": ["A. Salary and bonuses", "B. Threat of dismissal", "C. Personal satisfaction and the enjoyment of the work itself", "D. Company cars and perks"], "answer": "C", "explanation": "Intrinsic motivation is internal; it is the natural satisfaction derived from performing the task itself." },
  { "id": 204, "question": "Extrinsic motivation is driven by:", "options": ["A. Internal growth", "B. External rewards such as pay, recognition, or avoiding punishment", "C. A sense of duty", "D. Creative passion"], "answer": "B", "explanation": "Extrinsic motivators are external factors provided by the organization to encourage performance." },
  { "id": 205, "question": "According to Maslow’s Hierarchy, which needs must be satisfied before social needs become dominant?", "options": ["A. Self-actualization", "B. Esteem and recognition", "C. Physiological and Safety needs", "D. Growth and development"], "answer": "C", "explanation": "Maslow’s theory is progressive; basic survival and security needs must be met before social belonging becomes a priority." },
  { "id": 206, "question": "A manager who believes employees must be coerced, controlled, or threatened with punishment to work is following:", "options": ["A. Theory Y", "B. Theory X", "C. The Human Relations approach", "D. Systems Theory"], "answer": "B", "explanation": "Theory X assumes employees are naturally lazy and require external control to be productive." },
  { "id": 207, "question": "Which theory suggests that satisfaction and dissatisfaction are not opposite ends of the same scale?", "options": ["A. Maslow's Hierarchy", "B. Vroom's Expectancy Theory", "C. Herzberg's Two-Factor Theory", "D. Adam's Equity Theory"], "answer": "C", "explanation": "Herzberg argued that factors leading to satisfaction (motivators) are distinct from those preventing dissatisfaction (hygiene factors)." },
  { "id": 208, "question": "In Herzberg's theory, which of the following is considered a 'Hygiene Factor'?", "options": ["A. Achievement", "B. Growth", "C. Working conditions", "D. Responsibility"], "answer": "C", "explanation": "Hygiene factors, such as working conditions and salary, prevent dissatisfaction but do not necessarily inspire high-level motivation." },
  { "id": 209, "question": "Which of the following is a 'Motivator' according to Herzberg?", "options": ["A. Company policy", "B. Supervision", "C. Recognition for accomplishment", "D. Interpersonal relations"], "answer": "C", "explanation": "Motivators are intrinsic to the job and lead to positive satisfaction and higher performance." },
  { "id": 210, "question": "The 'ERG' in Alderfer's motivation theory stands for:", "options": ["A. Effort, Reward, Growth", "B. Existence, Relatedness, and Growth", "C. Energy, Resource, Goal", "D. Efficiency, Reliability, Gain"], "answer": "B", "explanation": "Alderfer condensed Maslow's five levels into three categories: Existence, Relatedness, and Growth." },
  { "id": 211, "question": "McClelland’s Need Theory identifies three needs. Which of the following is NOT one of them?", "options": ["A. Need for Achievement", "B. Need for Affiliation", "C. Need for Safety", "D. Need for Power"], "answer": "C", "explanation": "McClelland focused on secondary psychological needs: Achievement (nAch), Affiliation (nAff), and Power (nPow)." },
  { "id": 212, "question": "High achievers (nAch) prefer tasks that have:", "options": ["A. Very low risk", "B. High risk with high rewards", "C. Intermediate risk and provide immediate feedback", "D. No feedback"], "answer": "C", "explanation": "High achievers enjoy challenges but want a realistic chance of success and immediate feedback." },
  { "id": 213, "question": "Vroom’s Expectancy Theory formula is:", "options": ["A. Motivation = Effort × Reward", "B. Motivation = Expectancy × Instrumentality × Valence", "C. Motivation = Input ÷ Output", "D. Motivation = Skill + Opportunity"], "answer": "B", "explanation": "This multiplicative formula suggests that if any component is zero, motivation is zero." },
  { "id": 214, "question": "In Expectancy Theory, 'Valence' refers to:", "options": ["A. The probability that effort leads to performance", "B. The belief that performance leads to a reward", "C. The value or importance an individual places on a particular reward", "D. The physical energy of the employee"], "answer": "C", "explanation": "Valence is the degree of attraction or desire an individual has for the outcome." },
  { "id": 215, "question": "Equity Theory (Stacy Adams) suggests that people are motivated by:", "options": ["A. Absolute levels of pay", "B. Perceptions of fairness relative to others", "C. Fear of failure", "D. Innate personality traits"], "answer": "B", "explanation": "People compare their ratio of inputs and outcomes to those of others to judge fairness." },
  { "id": 216, "question": "A 'Reference Group' in Equity Theory is:", "options": ["A. The board of directors", "B. Others with whom an individual compares their own input-outcome ratio", "C. The customers of the firm", "D. A group of technical experts"], "answer": "B", "explanation": "Comparison is the core of equity theory; referents are the people we measure ourselves against." },
  { "id": 217, "question": "Goal-Setting Theory suggests that goals should be:", "options": ["A. Vague and easy", "B. Specific and challenging", "C. Impossible to achieve", "D. Set only by management without employee input"], "answer": "B", "explanation": "Specific, difficult (but attainable) goals lead to higher performance than 'do your best' goals." },
  { "id": 218, "question": "Reinforcement Theory is based on the idea that behavior is a function of:", "options": ["A. Its consequences", "B. Innate drives", "C. Strategic planning", "D. Organizational structure"], "answer": "A", "explanation": "Developed by B.F. Skinner, this theory posits that behavior followed by positive consequences is likely to be repeated." },
  { "id": 219, "question": "What is 'Negative Reinforcement'?", "options": ["A. Giving a punishment", "B. Withdrawing an unpleasant consequence when a desired behavior occurs", "C. Ignoring a behavior", "D. Reducing pay"], "answer": "B", "explanation": "Negative reinforcement encourages behavior by removing an unpleasant stimulus when the employee does well." },
  { "id": 220, "question": "What is 'Extinction' in reinforcement theory?", "options": ["A. Firing an employee", "B. Providing a bonus", "C. Withholding reinforcement to decrease the frequency of an undesired behavior", "D. Setting a new deadline"], "answer": "C", "explanation": "If a behavior is not reinforced, it eventually fades away or goes 'extinct'." },
  { "id": 221, "question": "Job Enrichment involves:", "options": ["A. Giving an employee more tasks of the same level", "B. Increasing the depth of a job by giving more responsibility and control", "C. Moving an employee from one job to another", "D. Increasing the salary only"], "answer": "B", "explanation": "Enrichment is vertical expansion; it adds meaning and autonomy to the role." },
  { "id": 222, "question": "Job Enlargement involves:", "options": ["A. Adding more tasks of a similar nature to a job", "B. Increasing responsibility", "C. A promotion to management", "D. Reducing the working hours"], "answer": "A", "explanation": "Enlargement is horizontal expansion; it increases the variety of tasks to reduce boredom." },
  { "id": 223, "question": "A 'Group' in organizational behavior is defined as:", "options": ["A. Any collection of people in a building", "B. Two or more individuals who interact and are interdependent to achieve objectives", "C. A list of employees on a payroll", "D. Competitors in the same market"], "answer": "B", "explanation": "Interaction and mutual goals are the defining characteristics of a formal or informal group." },
  { "id": 224, "question": "A 'Formal Group' is one that is:", "options": ["A. Formed by friendships", "B. Defined by the organization's structure with designated work assignments", "C. Created during lunch breaks", "D. Based on common hobbies"], "answer": "B", "explanation": "Formal groups are officially created by management to perform specific organizational tasks." },
  { "id": 225, "question": "An 'Informal Group' arises from:", "options": ["A. Organizational charts", "B. Strategic planning sessions", "C. Social contact and common interests among employees", "D. Legal requirements"], "answer": "C", "explanation": "Informal groups are natural social groupings that form based on shared values or friendships." },
  { "id": 226, "question": "The first stage of group development is:", "options": ["A. Storming", "B. Norming", "C. Forming", "D. Performing"], "answer": "C", "explanation": "In the Forming stage, members get to know each other and establish ground rules." },
  { "id": 227, "question": "The 'Storming' stage of group development is characterized by:", "options": ["A. High performance", "B. Intragroup conflict and competition for roles", "C. Calm agreement", "D. Group disbandment"], "answer": "B", "explanation": "During Storming, members test boundaries and conflict often arises over leadership and direction." },
  { "id": 228, "question": "The 'Norming' stage is when:", "options": ["A. The group breaks up", "B. Close relationships develop and the group demonstrates cohesiveness", "C. Conflicts are at their highest", "D. The task is finally completed"], "answer": "B", "explanation": "Norming is the stage where the group settles into a rhythm and establishes common expectations." },
  { "id": 229, "question": "The 'Performing' stage is characterized by:", "options": ["A. Socializing only", "B. High task orientation and focus on achieving results", "C. Role confusion", "D. Identifying the problem"], "answer": "B", "explanation": "In the Performing stage, the group's energy is channeled into the actual work at hand." },
  { "id": 230, "question": "Group 'Cohesiveness' refers to:", "options": ["A. The size of the group", "B. The degree to which members are attracted to each other and motivated to stay in the group", "C. The group's budget", "D. The technical skills of the group"], "answer": "B", "explanation": "Cohesiveness is the 'social glue' that keeps the group together." },
  { "id": 231, "question": "What is 'Groupthink'?", "options": ["A. Efficient brainstorming", "B. A phenomenon where the desire for harmony results in irrational decision-making", "C. A type of computer software", "D. A successful team-building exercise"], "answer": "B", "explanation": "Groupthink occurs when pressure to agree prevents critical evaluation of alternative ideas." },
  { "id": 232, "question": "Social Loafing is:", "options": ["A. Working harder in a group", "B. The tendency for individuals to expend less effort when working collectively than when working individually", "C. A type of social networking", "D. Being the leader of a social group"], "answer": "B", "explanation": "This happens when individual accountability is lost in a group setting." },
  { "id": 233, "question": "A 'Team' differs from a 'Group' because in a team:", "options": ["A. There is no leader", "B. Performance is simply the sum of individual contributions", "C. Efforts result in a level of performance that is greater than the sum of individual inputs", "D. Members do not interact"], "answer": "C", "explanation": "Teams aim for collective performance and mutual accountability to produce synergy." },
  { "id": 234, "question": "In a 'Self-Managed Team', members:", "options": ["A. Have no supervisor and take on traditional management responsibilities", "B. Only manage their own personal schedules", "C. Are all managers", "D. Work in isolation"], "answer": "A", "explanation": "Self-managed teams handle their own planning and quality control without direct oversight." },
  { "id": 235, "question": "Communication is defined as:", "options": ["A. Talking to yourself", "B. The transfer and understanding of meaning", "C. Sending an email without receiving a reply", "D. A company newsletter"], "answer": "B", "explanation": "Communication requires both the transmission and the accurate understanding of the message." },
  { "id": 236, "question": "The 'Source' or 'Sender' in the communication process:", "options": ["A. Decodes the message", "B. Initiates the message by encoding a thought", "C. Acts as the channel", "D. Provides the feedback"], "answer": "B", "explanation": "The sender is the person who has the information or idea they wish to convey." },
  { "id": 237, "question": "Encoding involves:", "options": ["A. Translating thoughts into a symbolic form", "B. Reading a message", "C. Listening to a speech", "D. Deleting an email"], "answer": "A", "explanation": "Encoding is the process of putting the idea into a medium that can be transmitted." },
  { "id": 238, "question": "The 'Channel' is:", "options": ["A. The person who receives the message", "B. The medium through which the message travels", "C. The noise in the background", "D. The feedback loop"], "answer": "B", "explanation": "Channels include face-to-face talk, emails, phone calls, or written memos." },
  { "id": 239, "question": "Decoding is the process of:", "options": ["A. Creating a message", "B. Selecting a channel", "C. Translating the received symbols into a meaningful thought", "D. Distorting the message"], "answer": "C", "explanation": "Decoding is performed by the receiver to make sense of the incoming symbols." },
  { "id": 240, "question": "'Noise' in communication refers to:", "options": ["A. Only loud sounds", "B. Factors that distort the clarity of the message", "C. High volume speech", "D. Music in the office"], "answer": "B", "explanation": "Noise can be physical, psychological, or semantic factors that disrupt communication." },
  { "id": 241, "question": "The 'Feedback' loop in communication:", "options": ["A. Distorts the message", "B. Checks the success of the communication", "C. Is the initial thought", "D. Always happens at the start"], "answer": "B", "explanation": "Feedback confirms whether the message was received as intended." },
  { "id": 242, "question": "Non-verbal communication includes:", "options": ["A. Spoken words", "B. Written memos", "C. Body language, facial expressions, and tone of voice", "D. Reports"], "answer": "C", "explanation": "Non-verbal cues often carry more meaning than the actual words spoken." },
  { "id": 243, "question": "Downward communication flows from:", "options": ["A. Subordinates to superiors", "B. Superiors to subordinates", "C. Peers at the same level", "D. Customers to the CEO"], "answer": "B", "explanation": "This includes instructions, feedback on performance, and organizational policies." },
  { "id": 244, "question": "Upward communication provides:", "options": ["A. Orders to the staff", "B. Feedback to higher-ups about performance and ideas", "C. Strategic plans", "D. Job assignments"], "answer": "B", "explanation": "Upward flow allows management to understand employee sentiment and issues." },
  { "id": 245, "question": "Lateral (Horizontal) communication occurs between:", "options": ["A. Bosses and workers", "B. Members of the same work group or same level", "C. Different organizations", "D. The company and the media"], "answer": "B", "explanation": "Lateral communication is essential for coordination between departments." },
  { "id": 246, "question": "The 'Grapevine' is the organization's:", "options": ["A. Formal email system", "B. Informal communication network", "C. Physical plant layout", "D. Chain of command"], "answer": "B", "explanation": "The grapevine is the unofficial network of rumors and informal information." },
  { "id": 247, "question": "A barrier to communication called 'Filtering' is:", "options": ["A. Using a water filter", "B. Purposely manipulating information so it will be seen more favorably", "C. Listening carefully", "D. Translating a language"], "answer": "B", "explanation": "Filtering involves telling the receiver what they want to hear to avoid trouble." },
  { "id": 248, "question": "Selective Perception means:", "options": ["A. Seeing everything clearly", "B. Receivers projecting their own needs into the message as they decode it", "C. Selecting a new channel", "D. Having perfect vision"], "answer": "B", "explanation": "We 'hear' what we want or expect to hear based on our own background." },
  { "id": 249, "question": "Information Overload occurs when:", "options": ["A. There is no information", "B. The information inflow exceeds an individual's processing capacity", "C. The internet is slow", "D. A report is too short"], "answer": "B", "explanation": "Too much data leads to stress and the inability to make effective decisions." },
  { "id": 250, "question": "Which of the following is a 'semantic' barrier to communication?", "options": ["A. Distrust of the sender", "B. Differences in the meaning and usage of words", "C. A loud radio", "D. An angry boss"], "answer": "B", "explanation": "Semantic barriers arise when people use different definitions for words or jargon." },
  { "id": 251, "question": "Organizational Conflict is:", "options": ["A. Always bad", "B. A process where one party perceives another has negatively affected something they care about", "C. Physical fighting in the office", "D. A disagreement between nations"], "answer": "B", "explanation": "Conflict is perception-based and involves goals, values, or interests." },
  { "id": 252, "question": "The 'Traditional View' of conflict is that it is:", "options": ["A. Natural and inevitable", "B. Harmful and must be avoided", "C. Necessary for group performance", "D. A sign of high innovation"], "answer": "B", "explanation": "Early management theories viewed conflict as a sign of poor management." },
  { "id": 253, "question": "The 'Interactionist View' of conflict suggests that:", "options": ["A. Conflict should be eliminated immediately", "B. A minimal level of conflict is necessary to keep a group viable", "C. Only task conflict is okay", "D. Conflict is a waste of time"], "answer": "B", "explanation": "This view encourages constructive conflict that prevents group stagnation." },
  { "id": 254, "question": "'Functional Conflict' is conflict that:", "options": ["A. Destroys the group", "B. Supports the goals of the group and improves performance", "C. Is purely personal", "D. Results in lawsuits"], "answer": "B", "explanation": "Constructive conflict leads to better ideas and solutions." },
  { "id": 255, "question": "'Dysfunctional Conflict' is conflict that:", "options": ["A. Helps productivity", "B. Hinders group performance", "C. Is about technical tasks", "D. Is settled quickly"], "answer": "B", "explanation": "Destructive conflict wastes energy and creates hostility without benefit." },
  { "id": 256, "question": "Task Conflict relates to:", "options": ["A. Personalities", "B. The content and goals of the work", "C. How the work gets done", "D. Who sits where in the office"], "answer": "B", "explanation": "Task conflict is disagreement over 'what' the group is trying to achieve." },
  { "id": 257, "question": "Relationship Conflict relates to:", "options": ["A. Strategic goals", "B. Interpersonal incompatibilities and friction", "C. Methodologies", "D. Resource allocation"], "answer": "B", "explanation": "This is almost always dysfunctional as it focuses on personal dislike." },
  { "id": 258, "question": "Process Conflict relates to:", "options": ["A. What is being done", "B. How the work gets done", "C. Personal values", "D. The company's brand"], "answer": "B", "explanation": "Process conflict is a dispute over delegation and methods used to complete a task." },
  { "id": 259, "question": "A 'Competing' conflict-handling intention is:", "options": ["A. Win-Win", "B. I win, you lose (High assertiveness, low cooperation)", "C. Both lose", "D. Avoiding the issue"], "answer": "B", "explanation": "In competing, one person seeks to satisfy their own interests regardless of others." },
  { "id": 260, "question": "An 'Avoiding' conflict-handling intention is:", "options": ["A. Confronting the problem", "B. Withdrawing from or suppressing the conflict", "C. Yielding to others", "D. Splitting the difference"], "answer": "B", "explanation": "Avoiding is characterized by being unassertive and uncooperative." },
  { "id": 261, "question": "A 'Collaborating' conflict-handling intention aims for:", "options": ["A. Total victory", "B. A Win-Win solution that fully satisfies all parties", "C. Giving up everything", "D. A quick temporary fix"], "answer": "B", "explanation": "Collaboration involves open sharing of information to find a creative solution for all." },
  { "id": 262, "question": "An 'Accommodating' intention is when a party:", "options": ["A. Fights for their rights", "B. Places the opponent's interests above their own", "C. Ignores the situation", "D. Negotiates a trade-off"], "answer": "B", "explanation": "Accommodating is high cooperation but low assertiveness ('I lose, you win')." },
  { "id": 263, "question": "'Compromising' involves:", "options": ["A. Full satisfaction for both", "B. Each party giving up something", "C. One party dominating", "D. Total avoidance"], "answer": "B", "explanation": "Compromising is a mid-point where neither party gets everything, but both get something." },
  { "id": 264, "question": "Negotiation is:", "options": ["A. A demand only", "B. A process in which parties exchange goods/services and attempt to agree on a rate", "C. A court hearing", "D. A polite conversation"], "answer": "B", "explanation": "Negotiation is the primary tool for resolving conflict over resource allocation." },
  { "id": 265, "question": "'Distributive Bargaining' is characterized as:", "options": ["A. Win-Win", "B. Win-Lose (A fixed pie of resources)", "C. Infinite resources", "D. Cooperative"], "answer": "B", "explanation": "In distributive bargaining, any gain I make is a loss for you." },
  { "id": 266, "question": "'Integrative Bargaining' aims for:", "options": ["A. Destroying the opponent", "B. Win-Win (Expanding the pie)", "C. Taking everything", "D. Losing on purpose"], "answer": "B", "explanation": "Integrative bargaining seeks long-term relationship building and mutual benefit." },
  { "id": 267, "question": "BATNA stands for:", "options": ["A. Best Alternative to a Negotiated Agreement", "B. Better Always Than Never Agreeing", "C. Basic Agreement Toward New Alliances", "D. Buying All Technical New Assets"], "answer": "A", "explanation": "Your BATNA is your walk-away point; the lowest value you will accept." },
  { "id": 268, "question": "Power (in Section B) is defined as:", "options": ["A. Electricity", "B. The capacity that A has to influence the behavior of B so B acts in accordance with A’s wishes", "C. The company's bank account", "D. High intelligence"], "answer": "B", "explanation": "Power is about dependency; the more B depends on A, the more power A has over B." },
  { "id": 269, "question": "The most important aspect of power is that it is a function of:", "options": ["A. Knowledge", "B. Dependency", "C. Salary", "D. Height"], "answer": "B", "explanation": "If you control something that others need, they are dependent on you, giving you power." },
  { "id": 270, "question": "Expert Power is base on:", "options": ["A. Fear", "B. Influence wielded as a result of expertise, special skill, or knowledge", "C. Formal title", "D. Liking the person"], "answer": "B", "explanation": "Specialists often have power because others need their unique skills." },
  { "id": 271, "question": "Referent Power is based on:", "options": ["A. Fear", "B. Identification with a person who has desirable traits", "C. Rewards", "D. A contract"], "answer": "B", "explanation": "It is essentially charisma power; people follow you because they admire you." },
  { "id": 272, "question": "The 'Legitimate Power' comes from:", "options": ["A. Technical expertise", "B. The formal structural position in an organization", "C. Friendship", "D. Skill at sports"], "answer": "B", "explanation": "It is the power people accept because of a person's rank in the hierarchy." },
  { "id": 273, "question": "Influence Tactics include 'Rational Persuasion', which is:", "options": ["A. Using threats", "B. Using logical arguments and factual evidence", "C. Using flattery", "D. Asking for a favor based on friendship"], "answer": "B", "explanation": "Rational persuasion is generally the most effective tactic across organizational levels." },
  { "id": 274, "question": "The influence tactic 'Ingratiation' involves:", "options": ["A. Using logic", "B. Using flattery, praise, or friendly behavior", "C. Using force", "D. Citing rules"], "answer": "B", "explanation": "Ingratiation is being extra nice to someone before making a request." },
  { "id": 275, "question": "The influence tactic 'Pressure' involves:", "options": ["A. Logical debate", "B. Using warnings, repeated demands, and threats", "C. Asking nicely", "D. Offering a reward"], "answer": "B", "explanation": "Pressure is often the least effective tactic and can cause resentment." },
  { "id": 276, "question": "Organizational Politics refers to:", "options": ["A. Voting for the president", "B. Activities that influence the distribution of advantages in the organization", "C. Following the handbook strictly", "D. Government regulations"], "answer": "B", "explanation": "Politics is 'power in action'; it involves building coalitions and self-promotion." },
  { "id": 277, "question": "Political behavior is more likely when:", "options": ["A. Resources are abundant", "B. Resources are scarce and roles are ambiguous", "C. Everything is clear and documented", "D. There is only one employee"], "answer": "B", "explanation": "Uncertainty and limited budgets cause people to fight for resources." },
  { "id": 278, "question": "Impression Management (IM) is the process by which:", "options": ["A. Machines are fixed", "B. Individuals attempt to control the impression others form of them", "C. Data is stored", "D. Goals are set"], "answer": "B", "explanation": "IM techniques include self-promotion and excuses to maintain a positive image." },
  { "id": 279, "question": "Organizational Culture is often described as:", "options": ["A. The dress code", "B. The shared values and beliefs that shape how members think and act", "C. The company's logo", "D. The layout of the cafeteria"], "answer": "B", "explanation": "Culture is the 'social glue' and the personality of the organization." },
  { "id": 280, "question": "A 'Dominant Culture' is:", "options": ["A. A culture only for managers", "B. The core values shared by a majority of the organization’s members", "C. A culture based on force", "D. The culture of the competitors"], "answer": "B", "explanation": "The dominant culture gives an organization its distinct personality." },
  { "id": 281, "question": "'Subcultures' are:", "options": ["A. Cultures that oppose the main one", "B. Minicultures within an organization, defined by department or geography", "C. Cultures that don't matter", "D. Cultures of former employees"], "answer": "B", "explanation": "Subcultures form around shared work experiences or specific professional backgrounds." },
  { "id": 282, "question": "A 'Strong Culture' is characterized by:", "options": ["A. High physical strength of employees", "B. Core values that are intensely held and widely shared", "C. Lots of rules in a book", "D. High employee turnover"], "answer": "B", "explanation": "In strong cultures, behavior is guided by shared values rather than strict supervision." },
  { "id": 283, "question": "Which of the following is NOT a primary function of organizational culture?", "options": ["A. Boundary-defining role", "B. Conveys a sense of identity", "C. Facilitates commitment to self-interest", "D. Facilitates commitment to the collective"], "answer": "C", "explanation": "Culture's role is to facilitate commitment to something larger than the self." },
  { "id": 284, "question": "Culture is transmitted to employees through:", "options": ["A. Stories, rituals, and symbols", "B. Genetic inheritance", "C. Only through written contracts", "D. Magic"], "answer": "A", "explanation": "Rituals and symbols reinforce the culture's values to the workforce." },
  { "id": 285, "question": "Socialization is the process that:", "options": ["A. Fires employees", "B. Adapts employees to the organization's culture", "C. Promotes people to CEO", "D. Pays the salaries"], "answer": "B", "explanation": "Socialization helps new hires learn 'how we do things around here'." },
  { "id": 286, "question": "A 'Spiritual Organization' culture is one that:", "options": ["A. Is purely religious", "B. Recognizes that people have an inner life nourished by meaningful work", "C. Ignores profits", "D. Only hires certain groups"], "answer": "B", "explanation": "Workplace spirituality focuses on purpose, ethics, and community." },
  { "id": 287, "question": "Resistance to change is:", "options": ["A. Always malicious", "B. A natural human tendency based on fear of the unknown and habit", "C. Only found in lazy employees", "D. Non-existent in modern firms"], "answer": "B", "explanation": "Change threatens the 'comfort zone' and established ways of working." },
  { "id": 288, "question": "An individual source of resistance to change is 'Habit', which means:", "options": ["A. Liking new things", "B. Relying on programmed responses to handle life’s complexities", "C. Having a hobby", "D. Working overtime"], "answer": "B", "explanation": "To cope with many daily decisions, we rely on habits. Change disrupts these." },
  { "id": 289, "question": "An organizational source of resistance to change is 'Structural Inertia', which means:", "options": ["A. Being too fast", "B. Built-in mechanisms to produce stability that act against change", "C. Having no structure", "D. Hiring new people"], "answer": "B", "explanation": "Organizations are built for stability, making them naturally resist change." },
  { "id": 290, "question": "Lewin's Three-Step Model for change consists of:", "options": ["A. Start, Middle, End", "B. Unfreezing, Movement, Refreezing", "C. Hiring, Training, Firing", "D. Planning, Doing, Checking"], "answer": "B", "explanation": "You must break old patterns (Unfreeze), implement change (Movement), and make it permanent (Refreeze)." },
  { "id": 291, "question": "In Lewin’s model, 'Unfreezing' involves:", "options": ["A. Increasing the temperature", "B. Overcoming the pressures of individual resistance", "C. Making things cold", "D. Ignoring the past"], "answer": "B", "explanation": "Unfreezing prepares the organization by showing that the current state is not sustainable." },
  { "id": 292, "question": "In Lewin’s model, 'Refreezing' means:", "options": ["A. Stopping the change", "B. Stabilizing a change intervention by balancing driving and restraining forces", "C. Going back to old ways", "D. Freezing the company assets"], "answer": "B", "explanation": "Without refreezing, employees will naturally drift back to old habits." },
  { "id": 293, "question": "A 'Learning Organization' is one that has:", "options": ["A. A large library", "B. Developed the continuous capacity to adapt and change", "C. Only students as employees", "D. No experience"], "answer": "B", "explanation": "Learning organizations treat failure as a lesson and are constantly evolving." },
  { "id": 294, "question": "Stress is best defined as:", "options": ["A. Just being busy", "B. A condition where one is confronted with an uncertain but important opportunity/demand", "C. Sleeping too much", "D. Having no work"], "answer": "B", "explanation": "Stress requires both uncertainty and importance to affect an individual." },
  { "id": 295, "question": "'Challenge Stressors' are:", "options": ["A. Only bad for you", "B. Stressors associated with workload, task pressure, and time urgency", "C. Stressors that prevent you from working", "D. Stressors caused by enemies"], "answer": "B", "explanation": "Some stress (eustress) can be positive if it pushes you to achieve a goal." },
  { "id": 296, "question": "'Hindrance Stressors' are:", "options": ["A. Helpful for performance", "B. Stressors that keep you from reaching your goals", "C. Easy to manage", "D. Part of the job description"], "answer": "B", "explanation": "These are negative stressors that block progress, such as office politics." },
  { "id": 297, "question": "A physiological symptom of stress could be:", "options": ["A. Procrastination", "B. Increased blood pressure and heart rate", "C. Irritability", "D. Lower productivity"], "answer": "B", "explanation": "Physiological symptoms are the bodily reactions to the 'fight or flight' response." },
  { "id": 298, "question": "A behavioral symptom of stress could be:", "options": ["A. Headaches", "B. Changes in productivity, absence, and turnover", "C. Anxiety", "D. High cholesterol"], "answer": "B", "explanation": "Behavioral symptoms are visible actions people take when stressed." },
  { "id": 299, "question": "Type A personality is characterized by:", "options": ["A. Calm and relaxed nature", "B. Constant struggle to accomplish more in less time", "C. Dislike for competition", "D. Patience"], "answer": "B", "explanation": "Type A individuals are often highly stressed due to competitiveness and urgency." },
  { "id": 300, "question": "Which management level is primarily responsible for establishing an organization’s strategy and culture?", "options": ["A. First-line supervisors", "B. Middle management", "C. Top management", "D. Operational staff"], "answer": "C", "explanation": "Top-level executives set the vision and ethical tone for the entire company." },
  { "id": 301, "question": "The 'Unity of Command' principle suggests that:", "options": ["A. An employee should receive orders from only one superior", "B. All employees should have the same salary", "C. The CEO should make every decision", "D. Teams should never have leaders"], "answer": "A", "explanation": "This principle prevents conflicting instructions and ensures clear accountability within the hierarchy." },
  { "id": 302, "question": "Span of Control refers to:", "options": ["A. The length of a manager's career", "B. The number of subordinates a manager can efficiently and effectively direct", "C. The geographic area a company covers", "D. The power a CEO has over the board"], "answer": "B", "explanation": "A wider span of control means more subordinates per manager, leading to a flatter organizational structure." },
  { "id": 303, "question": "Centralization is the degree to which:", "options": ["A. Decision-making is concentrated at a single point in the organization", "B. Employees work in the same building", "C. The company is located in a capital city", "D. All tasks are manual"], "answer": "A", "explanation": "In centralized organizations, top managers make the key decisions with little input from lower levels." },
  { "id": 304, "question": "Decentralization occurs when:", "options": ["A. The company goes bankrupt", "B. Decision-making is pushed down to the managers closest to the action", "C. Employees work from home", "D. There are no managers"], "answer": "B", "explanation": "Decentralization allows for quicker problem-solving and higher employee engagement in the decision process." },
  { "id": 305, "question": "Departmentalization by 'Function' groups jobs by:", "options": ["A. The territory served", "B. The type of product manufactured", "C. The activities performed (e.g., Engineering, Accounting, HR)", "D. The specific customer reached"], "answer": "C", "explanation": "Functional departmentalization is the most common way to organize, grouping experts by their specialized skills." },
  { "id": 306, "question": "A Matrix Structure combines which two forms of departmentalization?", "options": ["A. Function and Product", "B. Customer and Geography", "C. Top management and Staff", "D. Formal and Informal"], "answer": "A", "explanation": "The matrix structure creates a dual chain of command, allowing for specialized focus on both functional expertise and project goals." },
  { "id": 307, "question": "In a Matrix Structure, employees typically report to:", "options": ["A. Only one boss", "B. Two bosses (a functional manager and a product/project manager)", "C. The entire team", "D. No one"], "answer": "B", "explanation": "This dual reporting relationship is the defining characteristic of the matrix design." },
  { "id": 308, "question": "Virtual Organizations are characterized by:", "options": ["A. Having thousands of physical offices", "B. Outsourcing major business functions and being highly centralized", "C. Having no internet connection", "D. Strict manual labor"], "answer": "B", "explanation": "Virtual (or modular) organizations maintain a small core and use networks to perform other primary functions." },
  { "id": 309, "question": "The 'Mechanistic Model' of organizational design is characterized by:", "options": ["A. Low formalization and high flexibility", "B. Extensive departmentalization, high formalization, and centralization", "C. No hierarchy", "D. Informal communication"], "answer": "B", "explanation": "The mechanistic model is similar to a bureaucracy, focusing on high standardization and clear chains of command." },
  { "id": 310, "question": "The 'Organic Model' of organizational design is characterized by:", "options": ["A. High specialization", "B. Cross-functional teams, low formalization, and decentralization", "C. Strict rules", "D. Centralized power"], "answer": "B", "explanation": "Organic structures are flexible and adaptive, suited for dynamic environments and innovation." },
  { "id": 311, "question": "The 'Scalar Chain' refers to:", "options": ["A. The weight of products", "B. The line of authority from top management to the lowest ranks", "C. The physical stairs in an office", "D. The salary scale"], "answer": "B", "explanation": "Fayol’s scalar chain ensures that communication follows a clear, uninterrupted line of authority." },
  { "id": 312, "question": "What is 'Job Specialization'?", "options": ["A. Doing every task in the company", "B. Dividing work activities into separate job tasks", "C. Hiring only experts", "D. Working alone"], "answer": "B", "explanation": "Specialization allows workers to become highly efficient at specific parts of a complex process." },
  { "id": 313, "question": "A 'Boundaryless Organization' seeks to:", "options": ["A. Build more walls", "B. Eliminate the chain of command and replace departments with empowered teams", "C. Close the business", "D. Move to a new country"], "answer": "B", "explanation": "This design removes vertical and horizontal barriers to increase collaboration and speed." },
  { "id": 314, "question": "Organizational Behavior (OB) is the study of:", "options": ["A. Financial markets", "B. How individuals, groups, and structure affect behavior within organizations", "C. Mechanical engineering", "D. Chemistry"], "answer": "B", "explanation": "OB applies knowledge about people and groups to make organizations work more effectively." },
  { "id": 315, "question": "The 'Human Relations Movement' began largely due to:", "options": ["A. The Industrial Revolution", "B. The Hawthorne Studies", "C. World War II", "D. The invention of the computer"], "answer": "B", "explanation": "The Hawthorne Studies highlighted that social factors and manager attention affect productivity more than physical conditions." },
  { "id": 316, "question": "Managerial Roles were categorized into three groups by Mintzberg. Which is NOT one of them?", "options": ["A. Interpersonal", "B. Informational", "C. Decisional", "D. Technical"], "answer": "D", "explanation": "While technical 'skills' are important, Mintzberg’s 'roles' focus on Interpersonal, Informational, and Decisional activities." },
  { "id": 317, "question": "The 'Figurehead' role is part of which category of Mintzberg's roles?", "options": ["A. Informational", "B. Decisional", "C. Interpersonal", "D. Technical"], "answer": "C", "explanation": "As a figurehead, the manager performs symbolic legal or social duties." },
  { "id": 318, "question": "The 'Disturbance Handler' role is part of which category?", "options": ["A. Interpersonal", "B. Informational", "C. Decisional", "D. Structural"], "answer": "C", "explanation": "Managers in this role take corrective action when the organization faces unexpected crises." },
  { "id": 319, "question": "According to Katz, 'Human Skills' are the ability to:", "options": ["A. Work well with other people", "B. Fix a machine", "C. Create a strategic vision", "D. Write code"], "answer": "A", "explanation": "Human skills involve communication, motivation, and conflict resolution with individuals and groups." },
  { "id": 320, "question": "Conceptual Skills are most important for:", "options": ["A. Lower-level managers", "B. Technical staff", "C. Top-level managers", "D. New interns"], "answer": "C", "explanation": "Top managers need the mental ability to analyze complex situations and see the 'big picture'." },
  { "id": 321, "question": "Systematic Study in OB means:", "options": ["A. Relying on gut feelings", "B. Looking at relationships and attributing causes and effects based on scientific evidence", "C. Reading the news daily", "D. Asking friends for advice"], "answer": "B", "explanation": "Systematic study replaces intuition with data-driven insights into human behavior." },
  { "id": 322, "question": "A 'Contingency Variable' in OB refers to:", "options": ["A. A fixed rule", "B. Situational factors that moderate the relationship between two variables", "C. The price of oil", "D. Employee names"], "answer": "B", "explanation": "OB recognizes that 'it depends'—what works in one situation might not work in another due to specific circumstances." },
  { "id": 323, "question": "Workforce Diversity refers to:", "options": ["A. Hiring only young people", "B. Organizations becoming more heterogeneous in terms of gender, race, and age", "C. Having different types of furniture", "D. Selling products in different countries"], "answer": "B", "explanation": "Diversity management focuses on leveraging the unique perspectives of a varied workforce." },
  { "id": 324, "question": "Total Quality Management (TQM) is driven by:", "options": ["A. The CEO's ego", "B. Constant attainment of customer satisfaction through continuous improvement", "C. Cutting costs at any price", "D. Reducing staff"], "answer": "B", "explanation": "TQM involves every employee in the search for better ways to serve the customer." },
  { "id": 325, "question": "An 'Ethical Dilemma' is a situation in which:", "options": ["A. The law is clear", "B. Individuals are required to define right and wrong conduct", "C. No decision needs to be made", "D. Profits are guaranteed"], "answer": "B", "explanation": "Managers face dilemmas when competing values make the 'right' choice unclear." },
  { "id": 326, "question": "The 'Productivity' of an employee is a combination of:", "options": ["A. Salary and hours", "B. Effectiveness and Efficiency", "C. Age and experience", "D. Luck and timing"], "answer": "B", "explanation": "Productivity measures how well goals are achieved (effectiveness) at the lowest cost (efficiency)." },
  { "id": 327, "question": "Absenteeism is defined as:", "options": ["A. Quitting a job", "B. The failure to report to work", "C. Working slowly", "D. Helping a coworker"], "answer": "B", "explanation": "High absenteeism rates are costly and indicate low employee morale or health issues." },
  { "id": 328, "explanation": "Turnover is the voluntary or involuntary permanent withdrawal from an organization.", "id": 328, "options": ["A. True", "B. False"], "question": "Is the following statement True or False: 'Turnover is the voluntary or involuntary permanent withdrawal from an organization.'", "answer": "A" },
  { "id": 329, "question": "Organizational Citizenship Behavior (OCB) is:", "options": ["A. Doing only what is in the job description", "B. Discretionary behavior that is not part of formal requirements but promotes the organization", "C. Following the law", "D. Voting in company elections"], "answer": "B", "explanation": "OCB includes helping colleagues, volunteering for extra tasks, and speaking positively about the firm." },
  { "id": 330, "question": "Job Satisfaction is an employee's:", "options": ["A. Skill level", "B. General attitude toward their job", "C. Years of service", "D. Relationship with the union"], "answer": "B", "explanation": "Higher job satisfaction usually correlates with better performance and lower turnover." },
  { "id": 331, "question": "An 'Attitude' consists of three components. Which of the following is NOT one of them?", "options": ["A. Cognitive", "B. Affective", "C. Behavioral", "D. Financial"], "answer": "D", "explanation": "Attitudes are made of what we think (Cognitive), feel (Affective), and how we act (Behavioral)." },
  { "id": 332, "question": "The 'Cognitive' component of an attitude is:", "options": ["A. The emotional part", "B. The opinion or belief segment", "C. The intention to behave", "D. The physical action"], "answer": "B", "explanation": "Cognition is the 'head'—the information or logic behind an attitude." },
  { "id": 333, "question": "The 'Affective' component of an attitude is:", "options": ["A. The logical reason", "B. The emotional or feeling segment", "C. The salary level", "D. The final output"], "answer": "B", "explanation": "Affect is the 'heart'—the feelings of like or dislike." },
  { "id": 334, "question": "The 'Behavioral' component of an attitude is:", "options": ["A. The feeling", "B. An intention to behave in a certain way toward someone or something", "C. The belief", "D. The job title"], "answer": "B", "explanation": "This component represents the action that follows the thought and feeling." },
  { "id": 335, "question": "Cognitive Dissonance is:", "options": ["A. Agreement between attitudes and behavior", "B. Any incompatibility between two or more attitudes or between behavior and attitudes", "C. A type of hearing loss", "D. High level of intelligence"], "answer": "B", "explanation": "Dissonance creates discomfort, leading individuals to try to reduce the inconsistency." },
  { "id": 336, "question": "Employee Engagement is defined as:", "options": ["A. Getting married to a coworker", "B. An individual's involvement, satisfaction, and enthusiasm for their work", "C. Having a contract", "D. Attending meetings"], "answer": "B", "explanation": "Engaged employees are passionate about their work and feel a deep connection to their company." },
  { "id": 337, "question": "Personality is the:", "options": ["A. Same as character", "B. Growth and development of a person's whole psychological system", "C. Way a person dresses", "D. Level of education"], "answer": "B", "explanation": "Personality is the sum total of ways an individual reacts to and interacts with others." },
  { "id": 338, "question": "The Myers-Briggs Type Indicator (MBTI) classifies people into how many types?", "options": ["A. 4", "B. 8", "C. 16", "D. 32"], "answer": "C", "explanation": "MBTI uses four pairs of attributes (E/I, S/N, T/F, J/P) to identify 16 distinct personality types." },
  { "id": 339, "question": "In the Big Five Personality Model, 'Extraversion' refers to:", "options": ["A. Being organized", "B. Being sociable, talkative, and assertive", "C. Being imaginative", "D. Being anxious"], "answer": "B", "explanation": "Extraverts gain energy from social interaction." },
  { "id": 340, "question": "In the Big Five Model, 'Agreeableness' refers to being:", "options": ["A. Good-natured, cooperative, and trusting", "B. Calm and self-confident", "C. Responsible and dependable", "D. Creative"], "answer": "A", "explanation": "Highly agreeable people value harmony and are helpful to others." },
  { "id": 341, "question": "In the Big Five Model, 'Conscientiousness' is the measure of:", "options": ["A. Emotional stability", "B. Reliability and responsibility", "C. Openness to new ideas", "D. Number of friends"], "answer": "B", "explanation": "Conscientiousness is often the strongest predictor of job performance." },
  { "id": 342, "question": "In the Big Five Model, 'Emotional Stability' (Neuroticism) refers to:", "options": ["A. Being curious", "B. A person's ability to withstand stress", "C. Working in a group", "D. Following orders"], "answer": "B", "explanation": "People with low emotional stability tend to be anxious, nervous, and insecure." },
  { "id": 343, "question": "In the Big Five Model, 'Openness to Experience' refers to:", "options": ["A. Staying in the same job forever", "B. Range of interests and fascination with novelty", "C. Being very polite", "D. Keeping secrets"], "answer": "B", "explanation": "Open people are creative, curious, and artistically sensitive." },
  { "id": 344, "question": "The 'Dark Triad' of personality includes Machiavellianism, Psychopathy, and:", "options": ["A. Heroism", "B. Narcissism", "C. Altruism", "D. Optimism"], "answer": "B", "explanation": "These three socially undesirable traits are often studied in organizational behavior for their impact on management." },
  { "id": 345, "question": "A 'Machiavellian' individual is one who:", "options": ["A. Is very kind", "B. Is pragmatic, maintains emotional distance, and believes ends can justify means", "C. Is always honest", "D. Has no ambition"], "answer": "B", "explanation": "Machiavellianism is characterized by manipulation and a focus on self-interest." },
  { "id": 346, "question": "Self-Monitoring refers to:", "options": ["A. Checking your own pulse", "B. An individual’s ability to adjust behavior to external, situational factors", "C. Writing a diary", "D. Fixing your own mistakes"], "answer": "B", "explanation": "High self-monitors are 'social chameleons' who can adapt their behavior to fit the context." },
  { "id": 347, "question": "Type B personalities are generally:", "options": ["A. Aggressive and hurried", "B. Easy-going, relaxed, and patient", "C. Very wealthy", "D. Good at math"], "answer": "B", "explanation": "Unlike Type A, Type B individuals feel less time pressure and are less competitive." },
  { "id": 348, "question": "Perception is a process by which individuals:", "options": ["A. Eat food", "B. Organize and interpret sensory impressions to give meaning to their environment", "C. Drive cars", "D. Study for exams"], "answer": "B", "explanation": "What we perceive can be substantially different from objective reality." },
  { "id": 349, "question": "Attribution Theory suggests that when we observe behavior, we attempt to determine whether it was:", "options": ["A. Good or bad", "B. Internally or externally caused", "C. Expensive or cheap", "D. Loud or quiet"], "answer": "B", "explanation": "We attribute behavior to the person's character (internal) or the situation (external)." },
  { "id": 350, "question": "The 'Fundamental Attribution Error' is the tendency to:", "options": ["A. Blame ourselves for everything", "B. Underestimate external factors and overestimate internal factors when judging others", "C. Forget things", "D. Be too nice"], "answer": "B", "explanation": "We often assume someone is 'lazy' (internal) rather than considering they might be 'sick' (external)." },
  { "id": 351, "question": "Self-Serving Bias is the tendency for individuals to:", "options": ["A. Help others", "B. Attribute their successes to internal factors and blame failures on external factors", "C. Be very humble", "D. Buy gifts for themselves"], "answer": "B", "explanation": "It is a protective mechanism that helps maintain self-esteem." },
  { "id": 352, "question": "'Halo Effect' occurs when we draw a general impression about an individual based on:", "options": ["A. A long history of data", "B. A single characteristic (e.g., intelligence or appearance)", "C. Their resume only", "D. A background check"], "answer": "B", "explanation": "One positive trait leads us to assume the person has other positive traits." },
  { "id": 353, "question": "'Contrast Effects' happen when our reaction to one person is influenced by:", "options": ["A. The weather", "B. Other people we have recently encountered", "C. Our mood", "D. The person's clothes"], "answer": "B", "explanation": "An average candidate looks great if the previous three candidates were terrible." },
  { "id": 354, "question": "Stereotyping is:", "options": ["A. Making a photocopy", "B. Judging someone on the basis of one’s perception of the group to which that person belongs", "C. Listening to the radio", "D. Being very careful"], "answer": "B", "explanation": "Stereotyping is a mental shortcut that can lead to unfair prejudice and discrimination." },
  { "id": 355, "question": "The 'Rational Decision-Making Model' assumes the decision maker has:", "options": ["A. No information", "B. Complete information and can identify all relevant options in an unbiased manner", "C. Only one choice", "D. A crystal ball"], "answer": "B", "explanation": "While rarely fully possible, this model serves as a benchmark for logical choosing." },
  { "id": 356, "question": "Bounded Rationality means we make decisions by:", "options": ["A. Flipping a coin", "B. Constructing simplified models that extract essential features without all the complexity", "C. Asking a boss", "D. Guessing"], "answer": "B", "explanation": "Human minds cannot process all information, so we simplify problems to a level we can understand." },
  { "id": 357, "question": "Satisficing involves:", "options": ["A. Finding the absolute best solution", "B. Seeking a solution that is satisfactory and sufficient (good enough)", "C. Complaining", "D. Doing nothing"], "answer": "B", "explanation": "In bounded rationality, we choose the first option that meets our minimum criteria." },
  { "id": 358, "question": "Intuitive Decision-Making is:", "options": ["A. Based on complex math", "B. An unconscious process created out of distilled experience", "C. Always wrong", "D. Taught in textbooks"], "answer": "B", "explanation": "Intuition is fast and affectively charged, relying on patterns recognized by the brain over time." },
  { "id": 359, "question": "Anchoring Bias is the tendency to:", "options": ["A. Sail a boat", "B. Fixate on initial information and fail to adequately adjust for subsequent information", "C. Change your mind too often", "D. Follow the crowd"], "answer": "B", "explanation": "First impressions or initial price quotes 'anchor' our subsequent judgments." },
  { "id": 360, "question": "Confirmation Bias is:", "options": ["A. Checking a flight", "B. Seeking out information that reaffirms past choices and discounting contradictory information", "C. Being very confident", "D. Asking for permission"], "answer": "B", "explanation": "We see what we want to see and ignore evidence that proves us wrong." },
  { "id": 361, "question": "Availability Bias is the tendency for people to base judgments on:", "options": ["A. Future predictions", "B. Information that is readily available (recent or vivid)", "C. Scientific journals", "D. Historical records"], "answer": "B", "explanation": "People fear plane crashes more than car crashes because plane crashes are more vivid in the news." },
  { "id": 362, "question": "Escalation of Commitment refers to:", "options": ["A. Getting promoted", "B. Staying with a decision even when there is clear evidence it’s wrong", "C. Quitting early", "D. Marriage"], "answer": "B", "explanation": "This is 'throwing good money after bad' to avoid admitting a mistake." },
  { "id": 363, "question": "Risk Aversion is the tendency to:", "options": ["A. Love gambling", "B. Prefer a sure gain of a moderate amount over a riskier outcome with a higher payoff", "C. Ignore danger", "D. Start a new business"], "answer": "B", "explanation": "Most people prefer certainty, especially when threatened with a loss." },
  { "id": 364, "question": "Hindsight Bias is the tendency to:", "options": ["A. Predict the future", "B. Falsely believe we could have predicted the outcome of an event after it is already known", "C. Forget the past", "D. Use a mirror"], "answer": "B", "explanation": "Also known as the 'I-knew-it-all-along' effect." },
  { "id": 365, "question": "The 'Utilitarian' criterion for ethics focuses on:", "options": ["A. Following rules", "B. Providing the greatest good for the greatest number", "C. Protecting individual rights", "D. Being honest"], "answer": "B", "explanation": "Utilitarianism focuses on outcomes and consequences to determine morality." },
  { "id": 366, "question": "A 'Whistle-blower' is someone who:", "options": ["A. Works as a referee", "B. Reports unethical practices by their employer to outsiders", "C. Plays music", "D. Promotes the company"], "answer": "B", "explanation": "Whistle-blowers are often protected by law to encourage transparency." },
  { "id": 367, "question": "Creativity is the ability to:", "options": ["A. Follow instructions perfectly", "B. Produce novel and useful ideas", "C. Paint a picture", "D. Read quickly"], "answer": "B", "explanation": "In business, creativity must be both original and applicable to the organization’s needs." },
  { "id": 368, "question": "The 'Three-Component Model of Creativity' includes Expertise, Creative-thinking skills, and:", "options": ["A. High salary", "B. Intrinsic task motivation", "C. A nice office", "D. Good luck"], "answer": "B", "explanation": "You must know the field, think flexibly, and actually want to do the work." },
  { "id": 369, "question": "Power Distance is the degree to which:", "options": ["A. People live far from work", "B. People in a country accept that power in institutions is distributed unequally", "C. The internet is fast", "D. Electricity is available"], "answer": "B", "explanation": "In high power distance cultures, large inequalities of power are tolerated and expected." },
  { "id": 370, "question": "Individualism vs. Collectivism refers to:", "options": ["A. The number of people in a country", "B. The degree to which people prefer to act as individuals or members of a group", "C. Political parties", "D. Tax rates"], "answer": "B", "explanation": "Individualistic cultures (like the US) value personal achievement; collectivistic ones value group harmony." },
  { "id": 371, "question": "Masculinity vs. Femininity in Hofstede's terms refers to:", "options": ["A. The ratio of men to women", "B. Achievement/Power vs. Relationships/Quality of life", "C. Gender equality laws", "D. Fashion choices"], "answer": "B", "explanation": "Masculine cultures value competition; feminine cultures value caring and modesty." },
  { "id": 372, "question": "Uncertainty Avoidance is the degree to which:", "options": ["A. People like to travel", "B. People prefer structured over unstructured situations", "C. People tell the truth", "D. Weather is predictable"], "answer": "B", "explanation": "High uncertainty avoidance cultures have many rules to minimize anxiety about the future." },
  { "id": 373, "question": "Long-term Orientation vs. Short-term Orientation focuses on:", "options": ["A. How long people live", "B. Devotion to traditional values vs. acceptance of change and 'now'", "C. The length of a contract", "D. Office hours"], "answer": "B", "explanation": "Long-term cultures value thrift and persistence; short-term ones value tradition and social obligations." },
  { "id": 374, "question": "A 'Role' in an organization is:", "options": ["A. An actor in a play", "B. A set of expected behavior patterns attributed to someone occupying a given position", "C. A wheel", "D. A loaf of bread"], "answer": "B", "explanation": "Roles define what we should do and how others expect us to behave." },
  { "id": 375, "question": "Role Conflict occurs when:", "options": ["A. An individual is confronted by divergent role expectations", "B. A person has no job", "C. Two people want the same job", "D. The boss is angry"], "answer": "A", "explanation": "For example, a manager might find conflict between being a supportive mentor and a tough disciplinarian." },
  { "id": 376, "question": "Norms are:", "options": ["A. A man's name", "B. Acceptable standards of behavior shared by members that tell them what they ought to do", "C. Laws written by the government", "D. Mathematical averages"], "answer": "B", "explanation": "Norms are unwritten rules that exert powerful influence on group behavior." },
  { "id": 377, "question": "Status is a:", "options": ["A. Socially defined position or rank given to groups or group members by others", "B. Post on social media", "C. Type of car", "D. Degree of health"], "answer": "A", "explanation": "Status helps determine power and influence within a group." },
  { "id": 378, "question": "The 'Ringelmann Effect' is another name for:", "options": ["A. Groupthink", "B. Social Loafing", "C. Synergy", "D. Motivation"], "answer": "B", "explanation": "It refers to the decrease in individual effort as group size increases." },
  { "id": 379, "question": "Brainstorming is an idea-generation process that specifically encourages:", "options": ["A. Critical evaluation of every idea", "B. Any and all alternatives while withholding criticism", "C. Long silences", "D. Only logical ideas"], "answer": "B", "explanation": "The goal is to generate a high volume of ideas by removing the fear of being judged." },
  { "id": 380, "question": "The Nominal Group Technique differs from brainstorming because:", "options": ["A. It is done online", "B. Members meet formally but operate independently during the initial stage", "C. It is much louder", "D. It has no leader"], "answer": "B", "explanation": "This technique prevents stronger members from dominating the discussion." },
  { "id": 381, "question": "A 'Problem-Solving Team' usually consists of:", "options": ["A. 50-100 people", "B. 5 to 12 employees from the same department who meet to improve quality/efficiency", "C. People from different companies", "D. Only the CEO and secretaries"], "answer": "B", "explanation": "These teams discuss ways to improve work processes but rarely have the authority to implement them." },
  { "id": 382, "question": "A 'Cross-Functional Team' is made up of:", "options": ["A. People of the same age", "B. Employees from about the same hierarchical level but from different work areas", "C. People who speak different languages", "D. Athletes"], "answer": "B", "explanation": "These teams bring together diverse expertise to tackle complex, organization-wide projects." },
  { "id": 383, "question": "A 'Virtual Team' uses:", "options": ["A. Only physical letters", "B. Computer technology to tie together physically dispersed members", "C. Imaginary people", "D. Only face-to-face meetings"], "answer": "B", "explanation": "Virtual teams allow global collaboration but face challenges with trust and non-verbal cues." },
  { "id": 384, "question": "Team 'Efficacy' is:", "options": ["A. The team's budget", "B. The team's collective belief that they can succeed at their task", "C. The team's average age", "D. The team's physical location"], "answer": "B", "explanation": "Teams with high efficacy are more resilient and perform better." },
  { "id": 385, "question": "Relationship Conflict in teams is almost always:", "options": ["A. Productive", "B. Dysfunctional", "C. Required", "D. Entertaining"], "answer": "B", "explanation": "Personal friction distracts from the task and lowers team performance." },
  { "id": 386, "question": "The 'Controlling' function of management involves:", "options": ["A. Issuing orders constantly", "B. Monitoring activities to ensure they are being accomplished as planned", "C. Firing everyone", "D. Hiring new staff"], "answer": "B", "explanation": "Control ensures that the organization is moving toward its goals and identifies deviations." },
  { "id": 387, "question": "The first step in the Control Process is:", "options": ["A. Measuring actual performance", "B. Correcting deviations", "C. Measuring the budget", "D. Firing the manager"], "answer": "A", "explanation": "You cannot control what you have not measured." },
  { "id": 388, "question": "The second step in the Control Process is:", "options": ["A. Comparing actual performance against a standard", "B. Buying new equipment", "C. Giving a speech", "D. Changing the plan"], "answer": "A", "explanation": "Comparison tells you if there is a 'gap' between reality and the goal." },
  { "id": 389, "question": "The third step in the Control Process is:", "options": ["A. Setting new goals", "B. Taking managerial action to correct deviations", "C. Increasing salaries", "D. Closing the department"], "answer": "B", "explanation": "This involves either fixing the performance or adjusting the standard if it was unrealistic." },
  { "id": 390, "question": "Management by Exception (MBE) is a control technique where managers focus on:", "options": ["A. Everything happening in the office", "B. Only significant deviations from the plan", "C. Only their favorite employees", "D. Technical issues only"], "answer": "B", "explanation": "MBE saves time by letting routine matters handle themselves and alerting managers only to problems." },
  { "id": 391, "question": "Concurrent Control takes place:", "options": ["A. After the work is done", "B. While an activity is in progress", "C. Before the work starts", "D. Only during the night"], "answer": "B", "explanation": "A computer monitoring a production line in real-time is a form of concurrent control." },
  { "id": 392, "question": "Feedback Control takes place:", "options": ["A. Before the action", "B. During the action", "C. After the activity is done", "D. Never"], "answer": "C", "explanation": "The primary disadvantage of feedback control is that the damage is already done." },
  { "id": 393, "question": "Feedforward Control is designed to:", "options": ["A. Correct past mistakes", "B. Prevent anticipated problems before they occur", "C. Punish employees", "D. Review yearly reports"], "answer": "B", "explanation": "Preventative maintenance on a machine is a form of feedforward control." },
  { "id": 394, "question": "The 'Balanced Scorecard' looks at performance from four perspectives. Which is NOT one of them?", "options": ["A. Financial", "B. Customer", "C. Internal Processes", "D. Social Media Likes"], "answer": "D", "explanation": "The fourth perspective is Learning and Growth (innovation)." },
  { "id": 395, "question": "Organizational Effectiveness is a measure of:", "options": ["A. How many employees are present", "B. How appropriate organizational goals are and how well they are being met", "C. The company's stock price only", "D. The size of the office"], "answer": "B", "explanation": "Effectiveness is 'doing the right things'." },
  { "id": 396, "question": "Ratio Analysis in control is used to:", "options": ["A. Measure weight", "B. Evaluate financial performance and health", "C. Count people", "D. Determine time of day"], "answer": "B", "explanation": "Ratios (like liquidity or profitability) allow for comparison against competitors or past years." },
  { "id": 397, "question": "Economic Value Added (EVA) is a financial tool that measures:", "options": ["A. Gross sales", "B. Corporate wealth after the cost of capital is subtracted from operating profits", "C. The total value of a building", "D. The number of products sold"], "answer": "B", "explanation": "EVA determines if a company is truly creating value for shareholders." },
  { "id": 398, "question": "Bureaucratic Control relies on:", "options": ["A. Shared values", "B. Formal rules, regulations, and authority", "C. Employee empowerment", "D. Gossip"], "answer": "B", "explanation": "It emphasizes standardization and strict adherence to hierarchy." },
  { "id": 399, "question": "Clan Control relies on:", "options": ["A. Strict manuals", "B. Shared values, traditions, and beliefs", "C. High pay", "D. Security guards"], "answer": "B", "explanation": "Clan control is typical in organizations with strong cultures and high trust." },
  { "id": 400, "question": "The ultimate purpose of the control function is to:", "options": ["A. Catch people doing things wrong", "B. Ensure that organizational goals are reached", "C. Increase the amount of paperwork", "D. Show who is the boss"], "answer": "B", "explanation": "Control is the link back to planning; without it, you never know if your plans were successful." },
  
  { "id": 401, "question": "The 'Tannenbaum-Schmidt Leadership Continuum' shows the relationship between:", "options": ["A. Age and experience", "B. Level of authority used by the manager and freedom available to non-managers", "C. Salary and productivity", "D. Number of employees and office size"], "answer": "B", "explanation": "This model illustrates how leadership styles range from boss-centered to subordinate-centered based on decision-making power." },
  { "id": 402, "question": "According to the Managerial Grid, a (1,9) style is known as:", "options": ["A. Impoverished Management", "B. Country Club Management", "C. Team Management", "D. Authority-Compliance Management"], "answer": "B", "explanation": "Country Club Management reflects high concern for people but low concern for production/tasks." },
