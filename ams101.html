<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS 101 CBT Portal</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea580c;
            --border: rgba(0,0,0,0.07);
            --share-gradient: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #7c3aed 100%);
        }
        .dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; min-height: 100vh; }

        nav {
            background: var(--card-bg); padding: 0.9rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--primary); }

        main { padding: 2rem 5%; max-width: 960px; margin: 0 auto; }

        #resume-banner {
            display: none; background: var(--card-bg);
            border: 1.5px solid var(--success); border-radius: 14px;
            padding: 1rem 1.2rem; margin-bottom: 1.2rem;
            box-shadow: 0 2px 10px rgba(22,163,74,0.1);
        }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 1rem; text-align: center; border: 1.5px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.1rem; }
        .box {
            background: var(--card-bg); padding: 1.5rem 1rem; border-radius: 14px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(30,64,175,0.12); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; line-height: 1.4; }
        .box p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
        .box-random { background: linear-gradient(135deg, #1e40af, #3b82f6) !important; color: white !important; border: none !important; }
        .box-random p { color: rgba(255,255,255,0.8) !important; }

        #setup-screen { text-align: center; background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 360px; }
        .setup-group label { font-weight: 600; font-size: 0.88rem; color: var(--text); display: block; margin-bottom: 7px; }
        .setup-input { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 9px; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 1rem; background: rgba(0,0,0,0.02); padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 15px; padding: 0 4px; flex-wrap: wrap; gap: 10px; }
        .q-counter { font-size: 1rem; color: var(--text); }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer { color: var(--danger); background: rgba(220,38,38,0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; }

        .question-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1.5px solid var(--border); }
        #question-text { line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; word-wrap: break-word; }

        .option-btn {
            display: block; width: 100%; padding: 0.95rem 1.1rem; margin: 0.65rem 0;
            border: 2px solid #e2e8f0; border-radius: 10px; background: var(--card-bg);
            color: var(--text); text-align: left; cursor: pointer;
            font-size: 0.97rem; transition: background 0.15s, border-color 0.15s; line-height: 1.5;
        }
        .option-btn:not(:disabled):hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn.selected { background: #e0f2fe !important; border-color: #3b82f6 !important; color: #0369a1 !important; }
        .option-btn.correct  { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong    { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; }
        .explanation-box { background: rgba(30,64,175,0.07); border-left: 4px solid var(--primary); padding: 1rem; border-radius: 6px; margin-top: 10px; font-weight: 400; font-size: 0.88rem; line-height: 1.6; color: var(--text); }
        .dark-mode .explanation-box { background: rgba(30,64,175,0.15); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn { padding: 0.8rem 1.6rem; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem; }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .result-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(8px); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .result-modal-content { background: var(--card-bg); padding: 40px 28px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; color: var(--text); box-shadow: 0 25px 60px rgba(0,0,0,0.45); animation: bounceIn 0.55s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes bounceIn { 0% { opacity:0; transform:scale(0.78) translateY(30px); } 100% { opacity:1; transform:scale(1) translateY(0); } }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        .score-display { background: rgba(37,99,235,0.06); border: 2px dashed rgba(37,99,235,0.2); border-radius: 18px; padding: 18px; margin: 18px 0; }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
        .btn-review { background: rgba(30,64,175,0.08); color: var(--primary); border: 1.5px solid rgba(30,64,175,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.3rem; }
            .result-modal-content { padding: 28px 18px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
    <div><i class="fa-solid fa-sitemap"></i> AMS 101 Practice Portal</div>
    <div style="font-size:0.9rem; font-weight:600; color:var(--text-muted); letter-spacing:0.3px;">by Resolute Femi</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#64748b; padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <div id="dashboard-wrap">
        <div id="resume-banner"></div>
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title" style="margin-bottom:1.8rem; color:var(--primary); font-size:1.3rem;"></h2>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group checkbox-group">
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-questions" checked> Shuffle Questions
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-options" checked> Shuffle Options (A, B, C, D)
            </label>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Exit Review
                </button>
                <span id="timer">30:00</span>
            </div>
        </div>

        <div class="question-card">
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <button class="btn" id="next-btn" onclick="move(1)">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 14px; font-size:1.5rem;">Outstanding!</h2>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>

        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>

        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()">
                <i class="fa-solid fa-magnifying-glass"></i> Review Answers
            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Dashboard
            </button>
        </div>
    </div>
</div>

  { "id": 23, "question": "Technical skills involve the ability to:", "options": ["View the organization in strategic terms", "Understand interpersonal relationships", "Know and apply technical aspects of operations and machinery", "Plan long-term organizational strategy"], "answer": "Know and apply technical aspects of operations and machinery", "explanation": "Technical skills are the 'know-how' related to specific processes or tools." },
  { "id": 24, "question": "Conceptual skills are MOST critical at which level of management?", "options": ["First-line supervisory level", "Operational level", "Top management level", "Entry-level management"], "answer": "Top management level", "explanation": "Top leaders need to see the 'big picture' and understand how the whole organization fits together." },
  { "id": 25, "question": "As managers move higher in an organization, which skill becomes increasingly important?", "options": ["Technical skill", "Physical skill", "Conceptual skill", "Operational skill"], "answer": "Conceptual skill", "explanation": "Senior roles require more abstract thinking and strategy than hands-on technical work." },
  { "id": 26, "question": "Human skills are concerned with:", "options": ["Strategic long-term planning", "Operation of machinery and tools", "Interpersonal relationships and obtaining willing cooperation from others", "Legal compliance and regulatory requirements"], "answer": "Interpersonal relationships and obtaining willing cooperation from others", "explanation": "Human skills allow a manager to lead, communicate, and resolve conflict effectively." },
  { "id": 27, "question": "Conceptual skills involve the ability to:", "options": ["Operate machinery efficiently", "Manage interpersonal conflicts", "View the organization in strategic terms and understand long-term implications", "Follow technical standard operating procedures"], "answer": "View the organization in strategic terms and understand long-term implications", "explanation": "It is the ability to understand complex situations and see the organization as a unified whole." },
  { "id": 28, "question": "Lower-level managers spend more time on which type of skill?", "options": ["Conceptual skill", "Strategic skill", "Technical skill", "Administrative skill"], "answer": "Technical skill", "explanation": "Supervisors deal directly with the work being done, requiring high technical proficiency." },
  { "id": 29, "question": "Which leadership style involves concentrating power and authority within the leader and expecting high compliance from subordinates?", "options": ["Democratic leadership", "Laissez-faire leadership", "Autocratic leadership", "Consultative leadership"], "answer": "Autocratic leadership", "explanation": "In this style, the leader makes all decisions and expects followers to obey without question." },
  { "id": 30, "question": "Communication in autocratic leadership primarily flows:", "options": ["From subordinates to manager", "Horizontally among peers", "In all directions equally", "From manager to subordinates"], "answer": "From manager to subordinates", "explanation": "It is one-way communication: the leader gives orders, and the followers receive them." },
  { "id": 31, "question": "A benevolent autocrat is best described as a leader who:", "options": ["Equally shares decision-making with all subordinates", "Listens to followers before making their own decisions", "Gives complete freedom to subordinates", "Follows a purely democratic approach"], "answer": "Listens to followers before making their own decisions", "explanation": "A benevolent autocrat cares about the followers' input but still retains ultimate decision-making power." },
  { "id": 32, "question": "Which of the following is a primary disadvantage of autocratic leadership?", "options": ["Decisions take too long", "Low morale among subordinates whose views are not considered", "Lack of organizational direction", "Excessive delegation of authority"], "answer": "Low morale among subordinates whose views are not considered", "explanation": "Employees often feel undervalued and demotivated when they have no voice in the workplace." },
  { "id": 33, "question": "Democratic or participative leadership is characterized by:", "options": ["Leader making all decisions independently", "Subordinates having complete freedom without leader involvement", "Leader consulting subordinates and encouraging participation in decision-making", "Strict hierarchical control and one-way communication"], "answer": "Leader consulting subordinates and encouraging participation in decision-making", "explanation": "This style involves collaboration and sharing the decision-making process." },
  { "id": 34, "question": "Which leadership style typically results in higher quality decisions due to greater subordinate input?", "options": ["Autocratic", "Exploitive-authoritative", "Democratic or participative", "Laissez-faire"], "answer": "Democratic or participative", "explanation": "Tapping into the collective intelligence of the group often leads to more informed outcomes." },
  { "id": 35, "question": "A major disadvantage of democratic leadership is:", "options": ["Low morale among employees", "Lack of employee participation", "Slower decision-making", "Excessive use of coercive power"], "answer": "Slower decision-making", "explanation": "Consulting with others and reaching a consensus takes more time than issuing a single order." },
  { "id": 36, "question": "Laissez-faire leadership is also called:", "options": ["Autocratic leadership", "Free rein leadership", "Participative leadership", "Exploitive leadership"], "answer": "Free rein leadership", "explanation": "It comes from the French term 'allow to do,' where the leader steps back and lets the group lead themselves." },
  { "id": 37, "question": "In laissez-faire leadership, the leader's primary role is to:", "options": ["Make all key decisions", "Closely supervise all employee activities", "Provide information when requested and act as a contact between departments", "Enforce strict organizational discipline"], "answer": "Provide information when requested and act as a contact between departments", "explanation": "The leader acts more like a resource or consultant than a traditional 'boss'." },
  { "id": 38, "question": "Which leadership style is MOST likely to result in lack of group cohesiveness and potential chaos?", "options": ["Democratic leadership", "Autocratic leadership", "Consultative leadership", "Laissez-faire leadership"], "answer": "Laissez-faire leadership", "explanation": "Without direction, a group can become uncoordinated or work in conflicting directions." },
  { "id": 39, "question": "Which leadership style is most appropriate in emergency situations requiring quick decisions?", "options": ["Laissez-faire", "Democratic", "Autocratic", "Free rein"], "answer": "Autocratic", "explanation": "When speed is vital, a single person taking charge is more effective than group discussion." },
  { "id": 40, "question": "Free-rein or laissez-faire leadership is most effective in which type of work setting?", "options": ["Mass production factories requiring strict compliance", "Emergency response situations", "Research and Development where professionals work autonomously", "Customer service environments requiring rapid responses"], "answer": "Research and Development where professionals work autonomously", "explanation": "Highly skilled experts often perform better when they are given the freedom to innovate." },
  { "id": 41, "question": "In democratic leadership, policy is determined by:", "options": ["The leader alone", "The group assisted by the leader", "External consultants", "Top management only"], "answer": "The group assisted by the leader", "explanation": "The leader facilitates the discussion, but the group ultimately shapes the policy." },
  { "id": 42, "question": "In autocratic leadership, future courses of action are:", "options": ["Discussed and agreed upon by the group", "Left to individual discretion", "Dictated by the manager one at a time without revealing future plans", "Determined through formal strategic planning sessions"], "answer": "Dictated by the manager one at a time without revealing future plans", "explanation": "Keeping subordinates in the dark about the 'big picture' maintains the leader's power and control." },
  { "id": 43, "question": "Mc Murry argued for 'benevolent autocracy' because:", "options": ["Employees always prefer participative management", "Most top managers have hard-driving, autocratic personalities and significant decisions must be made by top management", "Democratic management always leads to better results", "Subordinates are fully capable of self-direction"], "answer": "Most top managers have hard-driving, autocratic personalities and significant decisions must be made by top management", "explanation": "It acknowledges that some organizations and leaders operate best with a firm but caring hand." },
  { "id": 44, "question": "Participation may sometimes be interpreted by employees as:", "options": ["An increase in workload", "Their right to veto managerial decisions", "A reduction in their job security", "An indicator of organizational weakness"], "answer": "Their right to veto managerial decisions", "explanation": "If not managed well, employees may wrongly assume that participation means they have the final say." },
  { "id": 45, "question": "Which of the following correctly describes the autocratic leader's approach to praise and criticism?", "options": ["Objective and group-oriented", "Absent no praise or criticism given", "Personal in nature, keeping subordinates at a distance", "Equally distributed among all team members"], "answer": "Personal in nature, keeping subordinates at a distance", "explanation": "Feedback in an autocratic setting is often subjective and used to maintain the leader's status." },
  { "id": 46, "question": "Prof Rensis Likert conducted his leadership studies at which university?", "options": ["Harvard University", "Yale University", "University of Michigan", "Stanford University"], "answer": "University of Michigan", "explanation": "Likert's famous research on management systems originated at the University of Michigan." },
  { "id": 47, "question": "Likert's model of management consists of how many systems?", "options": ["Two", "Three", "Four", "Five"], "answer": "Four", "explanation": "Likert identified four distinct management styles ranging from exploitive to participative." },
  { "id": 48, "question": "Which of Likert's systems is characterized by highly autocratic management, no trust in subordinates, and motivation through fear and punishment?", "options": ["System-2: Benevolent-authoritative", "System-3: Consultative", "System-4: Participative", "System-1: Exploitive-authoritative"], "answer": "System-1: Exploitive-authoritative", "explanation": "This is the most rigid and authoritarian of Likert's four systems." },
  { "id": 49, "question": "In Likert's System-2 (Benevolent-authoritative), decision-making authority is:", "options": ["Fully delegated to all employees", "Limited and delegated to a minimum extent", "Shared equally across all levels", "Completely absent"], "answer": "Limited and delegated to a minimum extent", "explanation": "While slightly more open than System 1, control remains very much at the top." },
  { "id": 50, "question": "System-3 in Likert's model is called:", "options": ["Exploitive-authoritative", "Benevolent-authoritative", "Consultative", "Participative"], "answer": "Consultative", "explanation": "Managers in this system seek input from subordinates but make the final decisions themselves." },
  { "id": 51, "question": "Which of Likert's systems involves substantial but not full trust in subordinates?", "options": ["System-1", "System-2", "System-3", "System-4"], "answer": "System-3", "explanation": "There is a significant amount of trust, but it hasn't reached the complete partnership level of System 4." },
  { "id": 52, "question": "Moving from System-1 to System-4 in Likert's model represents a shift from:", "options": ["Democratic to autocratic management", "Technical to human skill focus", "Autocratic and exploitive to participative and group-centred management", "Financial to strategic management focus"], "answer": "Autocratic and exploitive to participative and group-centred management", "explanation": "The scale moves from controlling individuals to empowering the whole group." },
  { "id": 53, "question": "In System-1 of Likert's model, communication flows:", "options": ["In all directions freely", "Primarily downward only", "Primarily upward only", "Horizontally between peers"], "answer": "Primarily downward only", "explanation": "This system relies on orders being pushed from the top down." },
  { "id": 54, "question": "Which of Likert's systems involves the highest degree of group participation, mutual trust, and shared decision-making?", "options": ["System-1", "System-2", "System-3", "System-4"], "answer": "System-4", "explanation": "System 4 (Participative) is considered the ideal system for employee engagement and productivity." },
  { "id": 55, "question": "Likert's model is primarily used to understand:", "options": ["Financial performance metrics", "Patterns and styles of managerial leadership and their effect on human behaviour", "Technical production processes", "Organizational legal compliance"], "answer": "Patterns and styles of managerial leadership and their effect on human behaviour", "explanation": "It focuses on the 'human' side of management and how style affects the workplace climate." },
  { "id": 56, "question": "The Trait Theory of Leadership is also called:", "options": ["Path-goal theory", "Situational theory", "Great man's theory or attribute theory", "Transformational theory"], "answer": "Great man's theory or attribute theory", "explanation": "This older theory suggests that leaders are born with specific traits that others lack." },
  { "id": 57, "question": "Davis identified that effective leaders tend to have a higher degree of _______ than their followers.", "options": ["Physical strength", "Financial wealth", "Intelligence", "Social connections"], "answer": "Intelligence", "explanation": "Research suggests leaders often possess slightly higher cognitive abilities than those they lead." },
  { "id": 58, "question": "'Social maturity and breadth' as a leadership trait refers to:", "options": ["A preference for social isolation", "Emotional maturity and a broad range of interests", "Narrow technical specialization", "Focus on short-term interpersonal gains"], "answer": "Emotional maturity and a broad range of interests", "explanation": "Leaders need emotional stability and the ability to see things from many perspectives." },
  { "id": 59, "question": "Leaders with 'inner motivation and achievement drives':", "options": ["Depend heavily on external rewards for motivation", "Seek out new goals once they achieve the previous one", "Avoid setting challenging objectives", "Rely on subordinates to set their goals"], "answer": "Seek out new goals once they achieve the previous one", "explanation": "Great leaders are self-driven and constantly push for higher levels of success." },
  { "id": 60, "question": "Which of the following is a task-related characteristic identified by Stogdill in effective leaders?", "options": ["Height and physical appearance", "Achievement drive, persistence, and initiative", "Cooperativeness and interpersonal skills", "Social maturity and breadth"], "answer": "Achievement drive, persistence, and initiative", "explanation": "These traits are focused on getting the actual work done and overcoming obstacles." },
  { "id": 61, "question": "Cooperativeness, interpersonal skills, and administrative ability are categorized by Stogdill as:", "options": ["Physical traits", "Personality traits", "Task-related characteristics", "Social drives"], "answer": "Social drives", "explanation": "These traits allow a leader to work effectively within the social structure of the group." },
  { "id": 62, "question": "A major limitation of the Trait Theory of Leadership is that:", "options": ["It provides too much guidance on leadership development", "It gives no guidance on how much of any trait a leader should have", "It focuses only on physical traits", "It applies universally to all cultures"], "answer": "It gives no guidance on how much of any trait a leader should have", "explanation": "The theory identifies traits but fails to explain the 'mix' or degree needed for success." },
  { "id": 63, "question": "Most of the traits identified in successful leaders by Stogdill are actually:", "options": ["Genetically inherited characteristics", "Financially determined", "Patterns of behaviour rather than fixed traits", "Exclusively physical attributes"], "answer": "Patterns of behaviour rather than fixed traits", "explanation": "This suggests that leadership is about how you act, which can be learned, rather than just how you are born." },
  { "id": 64, "question": "Davis found leadership characteristics to be more prevalent in:", "options": ["Entry-level workers", "Lower-level supervisors", "Middle and upper-level managers", "Temporary employees"], "answer": "Middle and upper-level managers", "explanation": "Those who rise to higher management usually exhibit more distinct leadership traits." },
  { "id": 65, "question": "Which of the following is a personality trait identified by Stogdill?", "options": ["Achievement drive", "Persistence", "Cooperativeness", "Enthusiasm and self-confidence"], "answer": "Enthusiasm and self-confidence", "explanation": "Personality traits describe the internal temperament of the leader." },
  { "id": 66, "question": "The 'human relations attitude' as a leadership trait means the leader:", "options": ["Prefers working alone", "Understands that to accomplish tasks, they must be considerate of others", "Focuses solely on financial relations", "Maintains strict professional distance from subordinates"], "answer": "Understands that to accomplish tasks, they must be considerate of others", "explanation": "This attitude recognizes that tasks are completed through people, requiring empathy and respect." },
  { "id": 67, "question": "Why is Trait Theory considered inconclusive?", "options": ["It was never empirically tested", "Not all leaders possess all traits, and there is no guidance on the degree of each trait needed", "It only applies to military leaders", "It focuses exclusively on lower-level management"], "answer": "Not all leaders possess all traits, and there is no guidance on the degree of each trait needed", "explanation": "There are many 'great' leaders who don't fit the standard trait profile, making the theory unreliable." },
  { "id": 68, "question": "Contingency or situational leadership recognizes that:", "options": ["Autocratic leadership is universally superior", "The best leadership style depends on the specific situation", "Democratic leadership always produces the best results", "Leadership traits are fixed and cannot change"], "answer": "The best leadership style depends on the specific situation", "explanation": "This modern approach says that the 'best' way to lead changes based on the context." },
  { "id": 69, "question": "Path-goal theory of leadership focuses on:", "options": ["Identifying personality traits of effective leaders", "How leaders can assist followers in defining and achieving their goals", "Classifying leaders into autocratic and democratic types", "The relationship between management systems and financial performance"], "answer": "How leaders can assist followers in defining and achieving their goals", "explanation": "A leader's job is to clarify the path and remove obstacles for their team." },
  { "id": 70, "question": "Transformational leadership primarily involves:", "options": ["Maintaining current organizational systems without change", "Inspiring, motivating, and transforming followers to achieve beyond expected performance", "Focusing only on short-term operational goals", "Establishing strict hierarchical control mechanisms"], "answer": "Inspiring, motivating, and transforming followers to achieve beyond expected performance", "explanation": "Transformational leaders change both the organization and the people within it." },
  { "id": 71, "question": "Charismatic leadership is associated with:", "options": ["Strict rule enforcement", "Financial incentive systems", "A leader's exceptional personal qualities that inspire devotion and commitment in followers", "Formal authority and hierarchical control"], "answer": "A leader's exceptional personal qualities that inspire devotion and commitment in followers", "explanation": "Charisma is a personal 'magnetism' that draws people toward a leader." },
  { "id": 72, "question": "Which of the following best describes the Managerial Grid approach to leadership?", "options": ["It classifies leaders based on physical traits", "It plots leadership styles based on concern for people and concern for production", "It focuses only on motivational needs of employees", "It establishes a hierarchy of leadership systems"], "answer": "It plots leadership styles based on concern for people and concern for production", "explanation": "The grid (developed by Blake and Mouton) balances the need for results with the need for people." },
  { "id": 73, "question": "Good leadership requires that an organization's practices include which of the following?", "options": ["Closed communication systems and centralized decision-making", "Appropriate reward systems, freedom of action, recognition, and open communication", "Strict supervision and limited employee autonomy", "Exclusive focus on financial incentives"], "answer": "Appropriate reward systems, freedom of action, recognition, and open communication", "explanation": "These factors create a healthy organizational climate where leadership can thrive." },
  { "id": 74, "question": "A leader who works in identical conditions as subordinates and does not show signs of tiredness is demonstrating:", "options": ["Autocratic authority", "Laissez-faire detachment", "Appropriate leadership style and genuine involvement with the team", "Technical skill application"], "answer": "Appropriate leadership style and genuine involvement with the team", "explanation": "Leading by example is one of the most powerful ways to influence others." },
  { "id": 75, "question": "Willing obedience from subordinates is achieved when a leader:", "options": ["Uses fear and coercion", "Fulfills the desires, wants, and needs of followers", "Maintains strict formal authority", "Provides only financial incentives"], "answer": "Fulfills the desires, wants, and needs of followers", "explanation": "When people feel their needs are being met, they are more likely to follow willingly." },
  { "id": 76, "question": "A leader should identify each individual's capabilities and inspire them. This relates to which ingredient?", "options": ["Ability to use power effectively", "Leadership style", "Ability to comprehend", "Ability to inspire"], "answer": "Ability to inspire", "explanation": "Inspiration is about seeing the potential in others and helping them reach it." },
  { "id": 77, "question": "In terms of organizational goal achievement, leadership is MOST effective when followers work:", "options": ["Only under direct supervision", "Willingly and with zeal toward group goals", "Primarily for financial rewards", "Following rigid procedural rules"], "answer": "Willingly and with zeal toward group goals", "explanation": "Enthusiastic participation leads to better results than forced compliance." },
  { "id": 78, "question": "An appropriate leadership style must be selected based on:", "options": ["The leader's personal preferences alone", "External market conditions only", "Organizational climate, environment, and the needs of subordinates", "The organization's financial performance"], "answer": "Organizational climate, environment, and the needs of subordinates", "explanation": "A leader must adapt their style to fit the specific world they are leading in." },
  { "id": 79, "question": "Which of the following best describes a leader's reconciliatory approach?", "options": ["Maintaining strict hierarchical control", "Seeking to bring conflicting parties together and find mutually acceptable solutions", "Avoiding all conflicts", "Delegating all conflict resolution to HR"], "answer": "Seeking to bring conflicting parties together and find mutually acceptable solutions", "explanation": "Reconciliation is about fixing relationships and finding a path forward for the team." },
  { "id": 80, "question": "Line authority allows a leader to:", "options": ["Develop technical expertise", "Conduct strategic planning", "Influence and direct subordinates through the organizational hierarchy", "Manage external stakeholders"], "answer": "Influence and direct subordinates through the organizational hierarchy", "explanation": "Line authority is the formal 'vertical' power to give instructions to subordinates." },
  { "id": 81, "question": "Which type of organizational structure does System-1 (Exploitive-authoritative) management characterize?", "options": ["Flat, decentralized", "Matrix organization", "Traditional, centralized with hierarchical pyramid", "Network organization"], "answer": "Traditional, centralized with hierarchical pyramid", "explanation": "Rigid, top-down structures are where exploitive-authoritative styles are usually found." },
  { "id": 82, "question": "The contribution of Warren and Benin to leadership theory was primarily in:", "options": ["Identifying financial determinants of leadership", "Distinguishing between managerial and leadership characteristics", "Developing the path-goal theory", "Establishing Likert's four systems"], "answer": "Distinguishing between managerial and leadership characteristics", "explanation": "They helped define why leading people is fundamentally different from managing tasks." },
  { "id": 83, "question": "For leadership to be effective in an organization, what must the leader identify?", "options": ["Financial targets only", "External competitors", "Motivational needs, desires, and aspirations of subordinates", "Technical production requirements"], "answer": "Motivational needs, desires, and aspirations of subordinates", "explanation": "You cannot lead effectively if you don't know what drives your people." },
  { "id": 84, "question": "When a leader evolves techniques to lead toward a win-win strategy under difficult conditions, they are demonstrating:", "options": ["Autocratic control", "Technical expertise", "Strategic and adaptive leadership", "Laissez-faire detachment"], "answer": "Strategic and adaptive leadership", "explanation": "Being able to change tactics to find a solution that benefits everyone is a mark of a great leader." },
  { "id": 85, "question": "The concept of 'benevolent autocracy' argues that:", "options": ["Employees should always participate in all decisions", "A compassionate but firm leadership approach is best in certain organizational contexts", "All authority should be distributed equally", "Technical skills are the primary driver of leadership success"], "answer": "A compassionate but firm leadership approach is best in certain organizational contexts", "explanation": "Sometimes a group needs clear direction, but it must be delivered with care for the people." },
  { "id": 86, "question": "A leader who is loyal to subordinates and follows an appropriate leadership style is exercising:", "options": ["Exploitive authority", "Technical management", "Sound and effective leadership", "Laissez-faire detachment"], "answer": "Sound and effective leadership", "explanation": "Loyalty to followers builds the trust necessary for effective leadership." },
  { "id": 87, "question": "The difference between autocratic and democratic leadership in task assignment is that in democratic leadership:", "options": ["The manager dictates tasks one at a time", "Members can work with whomever they choose", "No tasks are assigned", "Tasks are determined purely by technical requirements"], "answer": "Members can work with whomever they choose", "explanation": "Democratic styles allow for more autonomy in how work is structured and with whom people collaborate." },
  { "id": 88, "question": "In laissez-faire leadership, who bears the primary responsibility for determining techniques and processes?", "options": ["The leader alone", "The organizational hierarchy", "Individual members or the group itself", "External consultants"], "answer": "Individual members or the group itself", "explanation": "The leader steps out of the way and lets the experts decide how to get the job done." },
  { "id": 89, "question": "Leadership that promotes individual growth and freedom of action for goal setting is associated with:", "options": ["Autocratic leadership", "System-1 management", "Laissez-faire leadership", "Benevolent-authoritative leadership"], "answer": "Laissez-faire leadership", "explanation": "By providing complete freedom, this style forces individuals to grow and set their own direction." },
  { "id": 90, "question": "Which statement correctly contrasts autocratic and laissez-faire leadership?", "options": ["Both give equal freedom to subordinates", "Autocratic centralizes decision-making while laissez-faire gives full freedom to subordinates", "Both encourage equal participation in decision-making", "Laissez-faire is more authoritarian than autocratic"], "answer": "Autocratic centralizes decision-making while laissez-faire gives full freedom to subordinates", "explanation": "They are at opposite ends of the spectrum regarding leader control versus follower freedom." },
  { "id": 91, "question": "A participative leader differs from a laissez-faire leader in that the participative leader:", "options": ["Gives complete freedom without involvement", "Actively consults and remains involved in decision-making with subordinates", "Makes all decisions independently", "Avoids any form of communication"], "answer": "Actively consults and remains involved in decision-making with subordinates", "explanation": "A participative leader is part of the team, whereas a laissez-faire leader is largely absent." },
  { "id": 92, "question": "Which of the following correctly reflects Mc Murry's view on security-seeking employees?", "options": ["All employees desire to participate in decision-making", "Many employees in large bureaucracies are security seekers who do not wish to share in decision-making", "Security seekers are always the most productive employees", "Security needs are irrelevant to leadership effectiveness"], "answer": "Many employees in large bureaucracies are security seekers who do not wish to share in decision-making", "explanation": "Some people prefer the safety of being told what to do rather than the pressure of making decisions." },
  { "id": 93, "question": "Which leadership style is most associated with innovation and creativity in subordinates?", "options": ["Exploitive-authoritative", "Autocratic", "Democratic or participative", "Benevolent-authoritative"], "answer": "Democratic or participative", "explanation": "When people have a voice, they are more likely to share new and creative ideas." },
  { "id": 94, "question": "Davis's four leadership characteristics apply most strongly to:", "options": ["Entry-level supervisors", "Middle and upper-level managers", "Technical specialists", "External consultants"], "answer": "Middle and upper-level managers", "explanation": "These roles are where complex leadership traits are most vital for organizational success." },
  { "id": 95, "question": "The physical traits identified by Stogdill include:", "options": ["Aggressiveness and enthusiasm", "Cooperativeness and interpersonal skills", "Achievement drive and persistence", "Energy, appearance, and height"], "answer": "Energy, appearance, and height", "explanation": "Stogdill's early research looked at how physical characteristics might correlate with leadership roles." },
  { "id": 96, "question": "Which of the following leadership theories emphasizes that there is no single best way to lead?", "options": ["Trait theory", "Great man's theory", "Situational or contingency leadership theory", "Transformational theory"], "answer": "Situational or contingency leadership theory", "explanation": "This theory states that effectiveness is all about the 'fit' between style and situation." },
  { "id": 97, "question": "In the context of democratic leadership, the quality of decisions is described as:", "options": ["Lower than in autocratic leadership", "Equal to autocratic leadership", "Better compared to autocratic leadership due to subordinate involvement", "Irrelevant to organizational performance"], "answer": "Better compared to autocratic leadership due to subordinate involvement", "explanation": "More perspectives and 'buy-in' from the group generally lead to better executed and sounder choices." },
  { "id": 98, "question": "In Likert's System-2, the manager's approach to upward communication is:", "options": ["Fully open and encouraged", "Completely suppressed", "Minimum but with some input from subordinates allowed", "Equal in both directions"], "answer": "Minimum but with some input from subordinates allowed", "explanation": "In System 2, information mainly flows down, with only tiny amounts allowed back up." },
  { "id": 99, "question": "Leadership instills which of the following values in an organization?", "options": ["Passive compliance and avoidance of risk", "Honesty, calculated risk-taking, and genuine concern for employees and customers", "Strict adherence to financial targets only", "Avoidance of all organizational conflict"], "answer": "Honesty, calculated risk-taking, and genuine concern for employees and customers", "explanation": "Great leaders build a culture that values people and ethical growth." },
  { "id": 100, "question": "The goal of effective leadership in any organization is to:", "options": ["Maximize individual leader power", "Ensure strict compliance with rules", "Achieve organizational goals through inspired, willing effort of followers", "Replace management with direct supervision"], "answer": "Achieve organizational goals through inspired, willing effort of followers", "explanation": "The ultimate test of leadership is whether the group successfully reaches its goals with passion and commitment." },
  { "id": 101, "question": "When a leader maintains an open communication system and informal, cordial behaviour, they are:", "options": ["Avoiding managerial responsibilities", "Creating a conducive organizational climate for motivation and performance", "Applying autocratic principles", "Undermining formal organizational hierarchy"], "answer": "Creating a conducive organizational climate for motivation and performance", "explanation": "Openness and cordiality build trust, which is a foundational element for a high-performance work environment." },
  { "id": 102, "question": "Stogdill's research on leadership traits showed that adaptability and aggressiveness are categorized as:", "options": ["Social drives", "Physical traits", "Task-related characteristics", "Personality traits"], "answer": "Personality traits", "explanation": "Stogdill identified internal behavioral dispositions like adaptability as part of the leader's personality profile." },
  { "id": 103, "question": "The concept that leadership involves 'bringing people to a high pitch of devotion to duty' suggests:", "options": ["Coercive control", "Financial incentivization", "Deep intrinsic motivation and inspiration", "Strict performance monitoring"], "answer": "Deep intrinsic motivation and inspiration", "explanation": "Devotion to duty implies that followers are internally moved to perform at their best, rather than being forced." },
  { "id": 104, "question": "Which of the following reflects the contingency approach to leadership?", "options": ["There is one universally best leadership style", "The same style should be used regardless of context", "Managers should adapt their leadership style to fit different situations", "Financial performance determines leadership effectiveness"], "answer": "Managers should adapt their leadership style to fit different situations", "explanation": "The contingency approach states that leadership effectiveness is 'contingent' upon matching the right style to the right situation." },
  { "id": 105, "question": "In which type of organization are democratic leadership practices most widely used?", "options": ["Highly mechanized production facilities", "Military emergency operations", "Professional and knowledge-based organizations", "Organizations requiring rapid decisions"], "answer": "Professional and knowledge-based organizations", "explanation": "In knowledge-work, the leader relies on the expertise of subordinates, making a participative/democratic style essential." },
  { "id": 106, "question": "A leader who uses power very little and gives subordinates full independence is practicing:", "options": ["Autocratic leadership", "Democratic leadership", "Benevolent-authoritative leadership", "Laissez-faire leadership"], "answer": "Laissez-faire leadership", "explanation": "Laissez-faire (Free-rein) is characterized by a hands-off approach where the group makes most decisions." },
  { "id": 107, "question": "Which of the following correctly describes Likert's System-1 approach to decision-making?", "options": ["All employees participate equally", "Decision-making is shared between management and subordinates", "Decision-making is concentrated at the top level only", "Decisions are made by external consultants"], "answer": "Decision-making is concentrated at the top level only", "explanation": "System-1 is exploitive-authoritative, meaning all power and decisions flow strictly from the top down." },
  { "id": 108, "question": "Leadership is often described as 'human in nature' because it:", "options": ["Relies on machines", "Relies on interpersonal relationships and influence rather than just systems", "Is strictly about financial systems", "Ignores the needs of followers"], "answer": "Relies on interpersonal relationships and influence rather than just systems", "explanation": "Unlike technical management, leadership is fundamentally about the psychological and social interaction between people." },
  { "id": 109, "question": "Which of the following is NOT a core ingredient of leadership?", "options": ["Ability to use power effectively", "Ability to inspire", "Financial accounting expertise", "Ability to comprehend human needs"], "answer": "Financial accounting expertise", "explanation": "Accounting is a specific technical skill, whereas power, inspiration, and empathy are universal leadership 'ingredients'." },
  { "id": 110, "question": "A leader's 'ability to comprehend' refers to:", "options": ["Understanding technical blueprints", "Understanding that people have different motivating forces at different times", "Memorizing organizational bylaws", "Ignoring subordinate expectations"], "answer": "Understanding that people have different motivating forces at different times", "explanation": "A leader must realize that what motivates one person today might not motivate another tomorrow." },
  { "id": 111, "question": "The 'ability to inspire' in leadership involves:", "options": ["Issuing threats", "Motivating followers to apply their full capabilities to a project", "Reducing employee benefits", "Micromanaging daily tasks"], "answer": "Motivating followers to apply their full capabilities to a project", "explanation": "Inspiration makes followers want to give their maximum effort toward a shared vision." },
  { "id": 112, "question": "Which leadership style is most likely to result in the highest employee satisfaction in a research lab?", "options": ["Autocratic", "Exploitive", "Laissez-faire or Free-rein", "Dictatorial"], "answer": "Laissez-faire or Free-rein", "explanation": "Experts in R&D value autonomy and the freedom to explore ideas without constant interference." },
  { "id": 113, "question": "An autocratic leader typically makes decisions:", "options": ["Alone, without consulting subordinates", "Through group voting", "By delegating to junior staff", "Only after a consensus is reached"], "answer": "Alone, without consulting subordinates", "explanation": "Autocracy is defined by centralized authority where the leader's word is final." },
  { "id": 114, "question": "The 'benevolent-authoritative' system (System 2) is characterized by:", "options": ["Total lack of trust", "A condescending confidence and trust in subordinates", "Full shared decision making", "Complete employee autonomy"], "answer": "A condescending confidence and trust in subordinates", "explanation": "System-2 is 'paternalistic'—the leader is kind but still maintains absolute control." },
  { "id": 115, "question": "In Likert’s System 3 (Consultative), the flow of communication is:", "options": ["Downward only", "Upward only", "Both vertical and horizontal, but major decisions are made at the top", "Non-existent"], "answer": "Both vertical and horizontal, but major decisions are made at the top", "explanation": "Communication is more open, but the leader still holds the 'veto' and final decision power." },
  { "id": 116, "question": "Which of Likert’s systems is considered the most effective for long-term organizational success?", "options": ["System-1: Exploitive-authoritative", "System-2: Benevolent-authoritative", "System-3: Consultative", "System-4: Participative"], "answer": "System-4: Participative", "explanation": "System-4 fosters the highest levels of trust and commitment, leading to sustainable long-term performance." },
  { "id": 117, "question": "Trait theory suggests that leaders are:", "options": ["Born with certain innate qualities", "Trained in 2 weeks", "Selected by random lottery", "Created by financial wealth only"], "answer": "Born with certain innate qualities", "explanation": "The 'Great Man' theory posits that leadership is a set of inherent biological/personality traits." },
  { "id": 118, "question": "A criticism of the Great Man theory is that:", "options": ["It is too modern", "It ignores the influence of the situation on leadership effectiveness", "It focuses too much on teamwork", "It prioritizes technology over people"], "answer": "It ignores the influence of the situation on leadership effectiveness", "explanation": "Someone with 'leader traits' might succeed in one context but fail in another; the theory ignores this." },
  { "id": 119, "question": "Fiedler’s contingency model proposes that leadership effectiveness depends on:", "options": ["Physical height", "The match between leadership style and the degree of situational control", "The leader's age", "The number of employees"], "answer": "The match between leadership style and the degree of situational control", "explanation": "Fiedler believed that leaders have a fixed style and must be placed in situations that favor that style." },
  { "id": 120, "question": "In the Managerial Grid, a (1,9) style represents:", "options": ["High task, high people", "Low concern for people, low concern for production", "High concern for people, low concern for production", "Maximum efficiency"], "answer": "High concern for people, low concern for production", "explanation": "Often called 'Country Club' management, it focuses on keeping people happy at the expense of output." },
  { "id": 121, "question": "A (9,1) leadership style on the Managerial Grid is:", "options": ["Task-oriented or Authority-Compliance", "Country Club management", "Impoverished management", "Team management"], "answer": "Task-oriented or Authority-Compliance", "explanation": "This style prioritizes production and treats people as mere tools or 'cogs' in the machine." },
  { "id": 122, "question": "The (9,9) style on the Managerial Grid is known as:", "options": ["Laissez-faire", "Dictatorial", "Team Management", "Middle-of-the-road"], "answer": "Team Management", "explanation": "(9,9) is the ideal on the grid, representing high commitment to both the people and the mission." },
  { "id": 123, "question": "Path-Goal theory suggests that a leader’s job is to:", "options": ["Block subordinate progress", "Clear the path for subordinates to reach their goals", "Assign blame for failures", "Maintain strict isolation"], "answer": "Clear the path for subordinates to reach their goals", "explanation": "The leader acts as a guide, providing the support and resources needed to make the 'path' to the goal easy." },
  { "id": 124, "question": "Transformational leaders focus on:", "options": ["Maintaining the status quo", "Changing the organization’s culture and the followers' values", "Short term hourly goals only", "Reducing communication"], "answer": "Changing the organization’s culture and the followers' values", "explanation": "Transformation implies deep change in how people think and what they believe about their work." },
  { "id": 125, "question": "Transactional leadership is based on:", "options": ["Charisma", "Exchanges between the leader and followers (rewards for performance)", "Religious devotion", "Physical strength"], "answer": "Exchanges between the leader and followers (rewards for performance)", "explanation": "It is a 'contractual' relationship: 'If you do this work, I will give you this reward'." },
  { "id": 126, "question": "Charismatic leaders influence others through:", "options": ["Legal contracts", "Their personal charm and magnetic personality", "Financial debt", "Technical manuals"], "answer": "Their personal charm and magnetic personality", "explanation": "Followers are drawn to the leader's personality and are willing to follow them because of it." },
  { "id": 127, "question": "Servant leadership emphasizes:", "options": ["Serving the leader's own needs", "Putting the needs of followers first", "Strict military discipline", "Profit maximization at all costs"], "answer": "Putting the needs of followers first", "explanation": "The servant leader believes that by helping employees grow, the organization naturally succeeds." },
  { "id": 128, "question": "Situational leadership theory was developed by:", "options": ["Henri Fayol", "Hersey and Blanchard", "Frederick Taylor", "Abraham Maslow"], "answer": "Hersey and Blanchard", "explanation": "They argued that leaders must adjust their style based on the 'maturity' or readiness of the followers." },
  { "id": 129, "question": "According to situational leadership, if a follower is 'unable and unwilling,' the leader should use a:", "options": ["Telling style", "Selling style", "Participating style", "Delegating style"], "answer": "Telling style", "explanation": "When readiness is low, the leader must provide specific directions and closely supervise performance." },
  { "id": 130, "question": "If a follower is 'able and willing,' the leader should use a:", "options": ["Telling style", "Selling style", "Participating style", "Delegating style"], "answer": "Delegating style", "explanation": "High-readiness followers require very little supervision or direction." },
  { "id": 131, "question": "Power is defined as:", "options": ["The formal authority only", "The ability to influence the behavior of others", "The right to fire employees", "The budget allocated to a manager"], "answer": "The ability to influence the behavior of others", "explanation": "Power is the actual capacity to get things done, regardless of whether it is formal or informal." },
  { "id": 132, "question": "Legitimate power is also known as:", "options": ["Positional power", "Personal power", "Technical power", "Social power"], "answer": "Positional power", "explanation": "It is the power that comes specifically from the 'position' or office a person holds." },
  { "id": 133, "question": "Expert power comes from:", "options": ["A high salary", "Specialized knowledge or skills", "A tall physical stature", "Having many friends"], "answer": "Specialized knowledge or skills", "explanation": "People follow an expert because they believe that person knows more than they do about the task." },
  { "id": 134, "question": "Referent power is based on:", "options": ["Financial assets", "Followers' identification with or liking of the leader", "Legal documents", "Strict rules"], "answer": "Followers' identification with or liking of the leader", "explanation": "It is based on the follower's desire to be like the leader or be associated with them." },
  { "id": 135, "question": "Coercive power relies on:", "options": ["Kindness", "Fear and the threat of punishment", "Sharing rewards", "Expert advice"], "answer": "Fear and the threat of punishment", "explanation": "Coercion is about forcing compliance through negative consequences." },
  { "id": 136, "question": "Reward power is the ability to:", "options": ["Grant favors or provide incentives", "Withhold information", "Ignore the team", "Force obedience"], "answer": "Grant favors or provide incentives", "explanation": "This power stems from the leader's control over things that the subordinates value." },
  { "id": 137, "question": "Which of the following is a characteristic of a 'Manager' but NOT a 'Leader'?", "options": ["Innovates", "Administers and maintains", "Develops", "Challenges the status quo"], "answer": "Administers and maintains", "explanation": "Managers focus on upkeep and order; leaders focus on change and innovation." },
  { "id": 138, "question": "A 'Leader' is someone who:", "options": ["Relies on control", "Accepts the status quo", "Innovates and develops", "Has a short-range view"], "answer": "Innovates and develops", "explanation": "Leaders are creators of new paths and ideas rather than just maintainers of old ones." },
  { "id": 139, "question": "Which of the following demonstrates the ‘ability to use power effectively’ in leadership?", "options": ["Using only one type of power", "Strategically combining expert, referent, reward, and coercive power", "Ignoring power altogether", "Using power for personal gain"], "answer": "Strategically combining expert, referent, reward, and coercive power", "explanation": "An effective leader knows which type of power to 'pull' depending on the situation and person." },
  { "id": 140, "question": "In democratic leadership, role formation and task assignment are:", "options": ["Ignored", "Dictated by the leader", "Jointly determined through group discussion", "Randomly assigned"], "answer": "Jointly determined through group discussion", "explanation": "Involvement in the process ensures better 'buy-in' and use of individual strengths." },
  { "id": 141, "question": "A leader who does not reveal future plans and dictates tasks one at a time is practicing:", "options": ["Laissez-faire leadership", "Democratic leadership", "Autocratic leadership", "Strategic leadership"], "answer": "Autocratic leadership", "explanation": "Withholding information is a common tactic to maintain total control and dependency." },
  { "id": 142, "question": "Which of the following is associated with ‘long-range view’ in leadership?", "options": ["Daily task monitoring", "Strategic planning and visionary thinking", "Weekly financial reporting", "Immediate problem solving"], "answer": "Strategic planning and visionary thinking", "explanation": "Leaders look years ahead to ensure the organization is moving in the right direction." },
  { "id": 143, "question": "The text identifies that a successful leader has the ability to:", "options": ["Avoid all difficult situations", "Turn a hopeless situation into a winning one", "Always blame subordinates", "Never change their style"], "answer": "Turn a hopeless situation into a winning one", "explanation": "Resilience and the ability to pivot during a crisis are hallmarks of great leadership." },
  { "id": 144, "question": "Leadership effectiveness is measured by:", "options": ["How much the leader is paid", "Goal achievement and follower satisfaction", "The number of hours worked", "How many subordinates are fired"], "answer": "Goal achievement and follower satisfaction", "explanation": "Success is found when the mission is accomplished AND the people feel motivated." },
  { "id": 145, "question": "A leader who 'does the right thing' is focusing on:", "options": ["Effectiveness", "Efficiency", "Compliance", "Tradition"], "answer": "Effectiveness", "explanation": "Effectiveness means choosing the correct goal or path to take." },
  { "id": 146, "question": "A manager who 'does things right' is focusing on:", "options": ["Strategy", "Efficiency", "Vision", "Innovation"], "answer": "Efficiency", "explanation": "Efficiency is about performing a task correctly and with minimal waste." },
  { "id": 147, "question": "Which leadership style is best for a team of highly skilled experts?", "options": ["Autocratic", "Exploitive", "Consultative", "Laissez-faire"], "answer": "Laissez-faire", "explanation": "Experts perform best when they are trusted with the autonomy to use their skills." },
  { "id": 148, "question": "Which leadership style is best for a crisis?", "options": ["Autocratic", "Democratic", "Laissez-faire", "Free-rein"], "answer": "Autocratic", "explanation": "In a crisis, fast decisions and clear commands are more important than consensus." },
  { "id": 149, "question": "Democratic leadership is also known as:", "options": ["Dictatorial leadership", "Participative leadership", "Exploitive leadership", "Passive leadership"], "answer": "Participative leadership", "explanation": "Participation is the core mechanic of the democratic style." },
  { "id": 150, "question": "In System 1 (Likert), motivation is achieved through:", "options": ["Rewards and praise", "Fear, threats, and punishment", "Group participation", "Social events"], "answer": "Fear, threats, and punishment", "explanation": "This is a 'negative' motivation style used in exploitive environments." },
  { "id": 151, "question": "In System 4 (Likert), motivation is achieved through:", "options": ["Punishment", "Micromanagement", "Economic rewards and involvement", "Silent treatment"], "answer": "Economic rewards and involvement", "explanation": "Followers are motivated by being part of the process and receiving fair compensation." },
  { "id": 152, "question": "Leadership theories are studied in organizational behaviour primarily because:", "options": ["It is a required elective", "Leadership is one of the most important aspects of human behaviour", "It helps in tax preparation", "It explains machine maintenance"], "answer": "Leadership is one of the most important aspects of human behaviour", "explanation": "Human behavior is what drives organizations; leadership is the 'engine' of that behavior." },
  { "id": 153, "question": "A leader who ‘asks what and why’ is demonstrating:", "options": ["Lack of knowledge", "Critical and questioning leadership thinking", "Insubordination", "Passive compliance"], "answer": "Critical and questioning leadership thinking", "explanation": "Great leaders don't just follow orders; they seek to understand the purpose behind every action." },
  { "id": 154, "question": "The effectiveness of leadership is ultimately measured by:", "options": ["The leader's degree", "The extent to which followers achieve organizational goals willingly", "The leader's physical appearance", "How many meetings are held"], "answer": "The extent to which followers achieve organizational goals willingly", "explanation": "Willing effort is the 'magic ingredient' that distinguishes leadership from simple coercion." },
  { "id": 155, "question": "Which of the following reflects good organizational practices?", "options": ["Closed communication and secrets", "Recognition, reward systems, and open communication", "Strict punishment for every mistake", "Favoritism"], "answer": "Recognition, reward systems, and open communication", "explanation": "These practices create a positive culture where leadership can flourish." },
  { "id": 156, "question": "A leader in a democratic setting ensures that:", "options": ["No one else speaks", "Subordinates participate in decision-making", "Only the leader's ideas are used", "Decisions are made in secret"], "answer": "Subordinates participate in decision-making", "explanation": "Shared decision-making is the hallmark of the democratic setting." },
  { "id": 157, "question": "The concept of leadership focusing on ‘people’ implies:", "options": ["Ignoring the business entirely", "Human motivation is central to organizational success", "Avoiding technology", "Prioritizing hobbies over work"], "answer": "Human motivation is central to organizational success", "explanation": "If people are motivated and aligned, the business results will follow." },
  { "id": 158, "question": "The MOST appropriate behaviour when a leader has found the best solution is:", "options": ["To force it immediately", "Consulting subordinates to gain their buy-in", "Keeping it a secret", "Waiting for someone else to suggest it"], "answer": "Consulting subordinates to gain their buy-in", "explanation": "Even if the solution is perfect, people won't execute it well if they don't feel involved." },
  { "id": 159, "question": "Subordinates ‘promote what the leader desires’ when the leader has:", "options": ["A high salary", "Inspirational leadership that earns commitment", "A loud voice", "The ability to fire everyone"], "answer": "Inspirational leadership that earns commitment", "explanation": "Inspiration aligns the follower's desires with the leader's vision." },
  { "id": 160, "question": "A leader who uses the same style regardless of the situation is likely to:", "options": ["Be always successful", "Experience suboptimal performance", "Be respected by everyone", "Save a lot of time"], "answer": "Experience suboptimal performance", "explanation": "A 'one-size-fits-all' approach fails when the environment or team readiness changes." },
  { "id": 161, "question": "Which of the following is an advantage of having a leader rather than just a manager?", "options": ["Better paperwork management", "Greater ability to inspire and innovate", "Faster filing", "Strict rule enforcement"], "answer": "Greater ability to inspire and innovate", "explanation": "Leaders bring the 'spirit' and 'vision' that routine management lacks." },
  { "id": 162, "question": "Likert's model is valuable because it:", "options": ["Helps with math", "Classifies leadership styles from authoritarian to participative", "Explains planetary motion", "Predicts the weather"], "answer": "Classifies leadership styles from authoritarian to participative", "explanation": "It provides a clear framework for analyzing how a manager interacts with their team." },
  { "id": 163, "question": "A leader ‘inspiring trust’ is best shown by:", "options": ["Making lots of promises", "Consistent and ethical behavior", "Acting superior", "Changing their mind often"], "answer": "Consistent and ethical behavior", "explanation": "Trust is earned over time through predictable, moral actions." },
  { "id": 164, "question": "The primary goal of a leader is to:", "options": ["Be the most popular person", "Influence others toward goal achievement", "Avoid all work", "Create as many rules as possible"], "answer": "Influence others toward goal achievement", "explanation": "The 'reason for being' for any leader is getting the group across the finish line." },
  { "id": 165, "question": "Leadership is a:", "options": ["One-time event", "Continuous process", "Document only", "Physical object"], "answer": "Continuous process", "explanation": "Leadership doesn't stop; it requires daily maintenance and influence." },
  { "id": 166, "question": "A leader's 'conceptual skill' is the ability to:", "options": ["Write code", "See the organization as a whole", "Fix a machine", "Speak many languages"], "answer": "See the organization as a whole", "explanation": "It is the 'big picture' thinking required at the highest levels of leadership." },
  { "id": 167, "question": "Human skills are most important at:", "options": ["Top management only", "Middle management only", "All levels of management", "Lower levels only"], "answer": "All levels of management", "explanation": "No matter how high you go, you are still working with human beings." },
  { "id": 168, "question": "Technical skills are most important at:", "options": ["Lower levels of management", "Middle management", "Top management", "The Board of Directors"], "answer": "Lower levels of management", "explanation": "Supervisors need to know how the actual 'work' is done to guide those doing it." },
  { "id": 169, "question": "Conceptual skills are most important at:", "options": ["The lowest level", "Middle management", "Top levels of management", "External vendors"], "answer": "Top levels of management", "explanation": "Top leaders deal with abstract strategies rather than hands-on tasks." },
  { "id": 170, "question": "Management is the process of:", "options": ["Getting things done through others", "Doing everything yourself", "Avoiding all responsibility", "Working in isolation"], "answer": "Getting things done through others", "explanation": "The essence of management is using resources (including people) to achieve results." },
  { "id": 171, "question": "The 14 principles of management were developed by:", "options": ["Abraham Maslow", "Henri Fayol", "Frederick Taylor", "Max Weber"], "answer": "Henri Fayol", "explanation": "Fayol's principles form the backbone of classical management theory." },
  { "id": 172, "question": "The 'Unity of Command' principle means:", "options": ["Everyone is in charge", "An employee should receive orders from only one superior", "The team should work in unison", "There is only one mission"], "answer": "An employee should receive orders from only one superior", "explanation": "Receiving orders from multiple bosses causes confusion and conflict." },
  { "id": 173, "question": "The 'Scalar Chain' refers to:", "options": ["The manufacturing line", "The line of authority from top management to the lowest ranks", "A type of physical chain", "The pay scale of employees"], "answer": "The line of authority from top management to the lowest ranks", "explanation": "It describes the 'ladder' of hierarchy within an organization." },
  { "id": 174, "question": "Scientific Management was pioneered by:", "options": ["Henri Fayol", "Frederick Taylor", "Elton Mayo", "Douglas McGregor"], "answer": "Frederick Taylor", "explanation": "Taylor focused on optimizing efficiency through 'science' and time-motion studies." },
  { "id": 175, "question": "The 'Hawthorne Studies' highlighted the importance of:", "options": ["Better lighting only", "Social and psychological factors at work", "Faster machines", "Higher pay for everyone"], "answer": "Social and psychological factors at work", "explanation": "These studies showed that feeling cared for and noticed increases productivity more than physical changes." },
  { "id": 176, "question": "Theory X assumes that employees are:", "options": ["Hardworking and creative", "Inherently lazy and dislike work", "Always happy at the office", "Self-motivated"], "answer": "Inherently lazy and dislike work", "explanation": "Theory X managers believe they must force or bribe people to work." },
