  { "id": 403, "question": "The (9,9) style on the Managerial Grid is considered the most effective because it represents:", "options": ["A. High concern for both people and production", "B. Minimum effort to get work done", "C. Efficiency in operations only", "D. Total focus on social needs"], "answer": "A", "explanation": "Team Management (9,9) seeks to achieve high performance through committed people and mutual trust." },
  { "id": 404, "question": "Fiedler’s Contingency Model proposes that effective group performance depends on the match between:", "options": ["A. Education and salary", "B. The leader’s style and the degree to which the situation gives control to the leader", "C. Age and gender", "D. Location and technology"], "answer": "B", "explanation": "Fiedler believed a leader's style is fixed, so the situation must be changed or a new leader assigned to fit the context." },
  { "id": 405, "question": "In Fiedler's model, the 'Least Preferred Coworker' (LPC) questionnaire determines if a leader is:", "options": ["A. Smart or slow", "B. Task-oriented or relationship-oriented", "C. Introverted or extraverted", "D. Experienced or novice"], "answer": "B", "explanation": "A high LPC score indicates a relationship-oriented leader; a low score indicates a task-oriented leader." },
  { "id": 406, "question": "Situational Leadership Theory (SLT) focuses on the 'readiness' of:", "options": ["A. The CEO", "B. The followers", "C. The competitors", "D. The economy"], "answer": "B", "explanation": "SLT argues that leaders should adjust their style based on the competence and commitment of their subordinates." },
  { "id": 407, "question": "Path-Goal Theory suggests that a leader's job is to:", "options": ["A. Set impossible goals", "B. Assist followers in attaining goals and provide the necessary direction/support", "C. Do the work for the employees", "D. Focus only on their own career"], "answer": "B", "explanation": "Leaders clarify the path to help followers move from where they are to the achievement of work goals." },
  { "id": 408, "question": "A 'Directive Leader' in Path-Goal Theory is most effective when:", "options": ["A. Tasks are highly structured", "B. Tasks are ambiguous or stressful", "C. Employees are highly experienced", "D. No goals exist"], "answer": "B", "explanation": "Directive leadership provides guidance that reduces uncertainty for followers facing complex or unclear tasks." },
  { "id": 409, "question": "Leader-Member Exchange (LMX) Theory argues that leaders create:", "options": ["A. Equal relationships with all", "B. 'In-groups' and 'out-groups'", "C. No relationships", "D. Strict legal contracts only"], "answer": "B", "explanation": "LMX suggests leaders develop closer, higher-trust relationships with a small group of subordinates (the in-group)." },
  { "id": 410, "question": "A 'Charismatic Leader' influences followers through:", "options": ["A. Fear and punishment", "B. Heroic or extraordinary leadership abilities", "C. Detailed technical manuals", "D. High salaries only"], "answer": "B", "explanation": "Charisma relies on vision, risk-taking, and sensitive behavior toward follower needs." },
  { "id": 411, "question": "Transformational Leaders inspire followers to:", "options": ["A. Work for their own self-interests", "B. Transcend their own self-interests for the good of the organization", "C. Quit their jobs", "D. Only follow the rules"], "answer": "B", "explanation": "Transformational leadership shifts the focus toward a collective vision and higher-order growth." },
  { "id": 412, "question": "Transactional Leaders guide followers toward goals by:", "options": ["A. Changing their personalities", "B. Clarifying role and task requirements", "C. Telling stories", "D. Ignoring mistakes"], "answer": "B", "explanation": "Transactional leadership is based on an exchange: the leader provides rewards for the follower's performance." },
  { "id": 413, "question": "Authentic Leaders are those who:", "options": ["A. Use fake names", "B. Know who they are, what they believe in, and act on those values openly", "C. Are always angry", "D. Never make decisions"], "answer": "B", "explanation": "Authenticity builds trust by showing consistency between values and actions." },
  { "id": 414, "question": "Servant Leadership focuses on:", "options": ["A. Increasing the leader's power", "B. Opportunities to help followers grow and achieve their goals", "C. Making employees clean the office", "D. Minimizing company costs"], "answer": "B", "explanation": "Servant leaders go beyond self-interest and focus on the needs of their followers." },
  { "id": 415, "question": "Trust is defined in management as:", "options": ["A. A legal contract", "B. A positive expectation that another will not act opportunistically", "C. Blind faith", "D. Having no secrets"], "answer": "B", "explanation": "Trust is the foundation of leadership and requires integrity, benevolence, and ability." },
  { "id": 416, "question": "The primary goal of Human Resource Management (HRM) is to:", "options": ["A. Fire as many people as possible", "B. Maximize the value of the organization’s human capital", "C. Organize social parties", "D. Manage the company’s bank account"], "answer": "B", "explanation": "HRM aims to ensure the right people are in the right place at the right time." },
  { "id": 417, "question": "Job Analysis is the process of:", "options": ["A. Hiring a new person", "B. Defining the jobs within the organization and the behaviors necessary to perform them", "C. Calculating payroll", "D. Designing a logo"], "answer": "B", "explanation": "Job analysis results in two documents: the job description and the job specification." },
  { "id": 418, "question": "A 'Job Description' is a written statement describing:", "options": ["A. The qualifications needed", "B. What a job holder does, how it is done, and why it is done", "C. The salary range", "D. The history of the company"], "answer": "B", "explanation": "The description focuses on the job's tasks, duties, and responsibilities." },
  { "id": 419, "question": "A 'Job Specification' states the:", "options": ["A. Company's goals", "B. Minimum qualifications that a person must possess to perform a given job successfully", "C. Working hours", "D. Office location"], "answer": "B", "explanation": "The specification focuses on the person—their education, experience, and skills." },
  { "id": 420, "question": "Recruitment is the process of:", "options": ["A. Choosing the best candidate", "B. Locating, identifying, and attracting capable applicants", "C. Firing unproductive staff", "D. Promoting employees"], "answer": "B", "explanation": "Recruitment seeks to build a pool of qualified candidates for a vacancy." },
  { "id": 421, "question": "Decruitment involves:", "options": ["A. Hiring more people", "B. Techniques for reducing the organization's workforce", "C. Improving social life", "D. Selling products"], "answer": "B", "explanation": "Decruitment options include layoffs, transfers, early retirement, or attrition." },
  { "id": 422, "question": "Selection is the process of:", "options": ["A. Finding many applicants", "B. Screening job applicants to ensure the most appropriate are hired", "C. Writing a job description", "D. Conducting an orientation"], "answer": "B", "explanation": "Selection is an exercise in prediction: identifying who will be successful on the job." },
  { "id": 423, "question": "A 'Realistic Job Preview' (RJP) includes:", "options": ["A. Only the good parts of a job", "B. Both positive and negative information about the job and the company", "C. A movie about the company", "D. A high salary offer"], "answer": "B", "explanation": "RJPs reduce turnover by ensuring applicants have accurate expectations before joining." },
  { "id": 424, "question": "Employee Orientation aims to:", "options": ["A. Test the employee's skills", "B. Introduce a new employee to the job and the organization", "C. Interview for a second time", "D. Promote the employee"], "answer": "B", "explanation": "Orientation helps reduce the anxiety of starting a new role and facilitates socialization." },
  { "id": 425, "question": "Performance Management System is a process of:", "options": ["A. Paying employees on time", "B. Establishing performance standards and appraising performance to facilitate goal attainment", "C. Organizing training only", "D. Watching employees constantly"], "answer": "B", "explanation": "It provides feedback and helps determine rewards, training needs, and promotions." },
  { "id": 426, "question": "The '360-Degree Appraisal' involves feedback from:", "options": ["A. Only the boss", "B. Only the employee", "C. The boss, peers, subordinates, and sometimes customers", "D. The government"], "answer": "C", "explanation": "360-degree feedback provides a comprehensive view of an employee's performance from all angles." },
  { "id": 427, "question": "Work-Life Balance initiatives are designed to:", "options": ["A. Make people work 24/7", "B. Help employees manage the boundaries between their work and personal lives", "C. Reduce the number of holidays", "D. Increase the commute time"], "answer": "B", "explanation": "Flex-time, telecommuting, and childcare support are common work-life balance tools." },
  { "id": 428, "question": "Sexual Harassment is defined as:", "options": ["A. Any friendly conversation", "B. Unwelcome conduct of a sexual nature that affects an individual’s employment", "C. Hiring more women", "D. Having a dress code"], "answer": "B", "explanation": "It creates a hostile work environment and is both an ethical and legal violation." },
  { "id": 429, "question": "The primary focus of 'Labor Relations' is the relationship between:", "options": ["A. The company and the environment", "B. Management and organized labor (unions)", "C. Managers and their families", "D. The company and its investors"], "answer": "B", "explanation": "Labor relations involves collective bargaining, grievances, and contract administration." },
  { "id": 430, "question": "Collective Bargaining is:", "options": ["A. An individual asking for a raise", "B. The process of negotiation between representatives of a union and management", "C. A sale in a shop", "D. A court case"], "answer": "B", "explanation": "The result is typically a contract covering wages, hours, and working conditions." },
  { "id": 431, "question": "Innovation is the process of:", "options": ["A. Coming up with an idea only", "B. Taking a creative idea and turning it into a useful product, service, or method", "C. Following the status quo", "D. Reducing the price of an old product"], "answer": "B", "explanation": "Creativity is the spark; innovation is the implementation of that spark." },
  { "id": 432, "question": "A 'Change Agent' is someone who:", "options": ["A. Sells clothes", "B. Acts as a catalyst and assumes the responsibility for managing the change process", "C. Blocks new ideas", "D. Collects taxes"], "answer": "B", "explanation": "Change agents can be internal managers or external consultants." },
  { "id": 433, "question": "Economic stressors of stress include:", "options": ["A. Family problems", "B. Changes in the business cycle creating economic uncertainties", "C. Loud neighbors", "D. New technology"], "answer": "B", "explanation": "Concerns about job security or inflation fall under economic stressors." },
  { "id": 434, "question": "The 'Perception' of stress means that:", "options": ["A. Stress is the same for everyone", "B. What is stressful for one person may not be stressful for another", "C. Stress is invisible", "D. Stress is only in the mind"], "answer": "B", "explanation": "An individual's appraisal of a situation determines how much stress they experience." },
  { "id": 435, "question": "Which of the following is a symptom of 'Burnout'?", "options": ["A. High energy", "B. Emotional exhaustion, depersonalization, and reduced personal accomplishment", "C. Sudden wealth", "D. Better vision"], "answer": "B", "explanation": "Burnout results from chronic workplace stress that has not been successfully managed." },
  { "id": 436, "question": "Knowledge Management involves:", "options": ["A. Reading books only", ",B. Cultivating a learning culture where organizational members systematically gather and share knowledge", "C. Keeping secrets from competitors", "D. Using only manual tools"], "answer": "B", "explanation": "It aims to use intellectual capital for competitive advantage." },
  { "id": 437, "question": "In the communication process, 'Medium' is another word for:", "options": ["A. Sender", "B. Channel", "C. Feedback", "D. Noise"], "answer": "B", "explanation": "The medium is the vehicle used to carry the message (e.g., text, voice, video)." },
  { "id": 438, "question": "Which of the following is an example of 'Oral Communication'?", "options": ["A. An email", "B. A face-to-face discussion", "C. A formal report", "D. A billboard"], "answer": "B", "explanation": "Oral communication allows for immediate feedback and non-verbal cues." },
  { "id": 439, "question": "The 'Wheel Network' in communication is characterized by:", "options": ["A. Everyone talking to everyone", "B. All communication flowing through a central leader", "C. A circle of friends", "D. No communication at all"], "answer": "B", "explanation": "The wheel network is common in centralized groups with a strong leader." },
  { "id": 440, "question": "The 'All-Channel Network' is best for:", "options": ["A. High-speed simple tasks", "B. Complex tasks requiring high levels of member interaction and creativity", "C. Situations with a strict hierarchy", "D. Giving orders only"], "answer": "B", "explanation": "It allows all group members to communicate actively with each other." },
  { "id": 441, "question": "Body Language is a form of:", "options": ["A. Verbal communication", "B. Non-verbal communication", "C. Written communication", "D. Telepathic communication"], "answer": "B", "explanation": "Gestures, posture, and facial expressions often convey more than words." },
  { "id": 442, "question": "Which is the most 'rich' communication channel?", "options": ["A. A formal report", "B. A text message", "C. Face-to-face conversation", "D. An email"], "answer": "C", "explanation": "Face-to-face is highest in channel richness because it provides multiple cues (words, tone, body language)." },
  { "id": 443, "question": "Communication 'Apprehension' is:", "options": ["A. Being a great speaker", "B. Undue tension and anxiety about oral or written communication", "C. Understanding a message perfectly", "D. Being very loud"], "answer": "B", "explanation": "People with this condition may avoid situations where they have to speak or interact." },
  { "id": 444, "question": "A 'High-Context Culture' (like Japan) relies heavily on:", "options": ["A. Written contracts only", "B. Non-verbal and subtle situational cues in communication", "C. Explicit verbal messages", "D. Formal rules"], "answer": "B", "explanation": "In high-context cultures, what is *not* said is often as important as what *is* said." },
  { "id": 445, "question": "A 'Low-Context Culture' (like the US or Germany) relies on:", "options": ["A. Body language", "B. Spoken and written words to convey meaning", "C. Personal relationships", "D. Status levels"], "answer": "B", "explanation": "Communication is direct, precise, and explicit in low-context cultures." },
  { "id": 446, "question": "The 'Chain of Command' is:", "options": ["A. A literal chain in a factory", "B. The continuous line of authority that extends from upper organizational levels to the lowest", "C. The list of all employees", "D. A computer network"], "answer": "B", "explanation": "It clarifies who reports to whom within the organization." },
  { "id": 447, "question": "Work Specialization is also known as:", "options": ["A. Division of labor", "B. Employee empowerment", "C. Centralization", "D. Groupthink"], "answer": "A", "explanation": "It is the degree to which tasks in an organization are subdivided into separate jobs." },
  { "id": 448, "question": "Formalization refers to the degree to which:", "options": ["A. Employees wear uniforms", "B. Jobs within the organization are standardized", "C. People are polite to each other", "D. The office is decorated"], "answer": "B", "explanation": "High formalization means there are explicit job descriptions and many rules/procedures." },
  { "id": 449, "question": "A 'Simple Structure' is characterized by:", "options": ["A. High formalization", "B. Low departmentalization, wide spans of control, and centralized authority", "C. Many layers of management", "D. A huge HR department"], "answer": "B", "explanation": "Simple structures are typical in small businesses where the owner and manager are the same person." },
  { "id": 450, "question": "A Bureaucracy is characterized by:", "options": ["A. Creative chaos", "B. Highly routine operating tasks achieved through specialization and formal rules", "C. No rules", "D. Decentralized decision-making"], "answer": "B", "explanation": "Bureaucracy excels at performing standardized activities in a highly efficient manner." },
  { "id": 451, "question": "Team-Based Structures break down:", "options": ["A. The entire company", "B. Departmental barriers and decentralize decision-making", "C. The building walls", "D. The legal status of the firm"], "answer": "B", "explanation": "Organizations use teams to be more flexible and responsive to change." },
  { "id": 452, "question": "The 'Ambidextrous Organization' is one that:", "options": ["A. Uses both hands", "B. Is able to exploit current opportunities while exploring new ones", "C. Has two CEOs", "D. Operates in two countries"], "answer": "B", "explanation": "This requires balancing efficiency (for today) and innovation (for tomorrow)." },
  { "id": 453, "question": "Environmental 'Uncertainty' is a threat because it:", "options": ["A. Makes the weather bad", "B. Disrupts organizational efficiency and planning", "C. Costs no money", "D. Increases employee happiness"], "answer": "B", "explanation": "The more dynamic and complex the environment, the more organic the structure should be." },
  { "id": 454, "question": "Internal Equity in compensation means:", "options": ["A. Paying as much as the competitors", "B. Paying fairly based on the value of the job within the organization", "C. Giving everyone the same pay", "D. Paying according to age"], "answer": "B", "explanation": "Job evaluation is used to establish the relative worth of different jobs internally." },
  { "id": 455, "question": "External Equity in compensation means:", "options": ["A. Paying according to internal rules", "B. Paying at a rate comparable to what other organizations pay for similar jobs", "C. Paying only foreigners", "D. Paying with different currencies"], "answer": "B", "explanation": "Market surveys help organizations remain competitive in attracting talent." },
  { "id": 456, "question": "Variable-Pay Programs base a portion of an employee’s pay on:", "options": ["A. How long they have lived in the city", "B. Some individual or organizational measure of performance", "C. Their hair color", "D. The number of hours they sleep"], "answer": "B", "explanation": "Piece-rate, bonuses, and profit-sharing are types of variable pay." },
  { "id": 457, "question": "A 'Social Loafer' is most likely to be found in:", "options": ["A. Individual assignments", "B. Groups where individual contribution is not measured", "C. Highly competitive environments", "D. Solitary work"], "answer": "B", "explanation": "Groups must implement individual accountability to prevent social loafing." },
  { "id": 458, "question": "Conflict over 'Who does what' is known as:", "options": ["A. Task conflict", "B. Process conflict", "C. Relationship conflict", "D. Strategic conflict"], "answer": "B", "explanation": "Process conflict focuses on delegation and the mechanics of task completion." },
  { "id": 459, "question": "Organizational Politics is often called:", "options": ["A. 'Self-serving behavior'", "B. 'Team building'", "C. 'Charitable work'", "D. 'Technical support'"], "answer": "A", "explanation": "While it can be used for good, politics usually involves pushing one’s own agenda." },
  { "id": 460, "question": "In the Conflict Process, the stage where conflict is visible through behavior is:", "options": ["A. Cognition", "B. Intentions", "C. Manifestation", "D. Outcomes"], "answer": "C", "explanation": "Manifest conflict includes statements, actions, and reactions of the conflicting parties." },
  { "id": 461, "question": "Mediation is a method of conflict resolution where a third party:", "options": ["A. Dictates a solution", "B. Facilitates a negotiated solution by using reasoning and persuasion", "C. Fires both people", "D. Ignores the problem"], "answer": "B", "explanation": "A mediator does not have the authority to impose a settlement." },
  { "id": 462, "question": "Arbitration is a method where a third party:", "options": ["A. Only listens", "B. Has the authority to dictate an agreement", "C. Tells jokes", "D. Offers a suggestion only"], "answer": "B", "explanation": "Arbitration is more formal than mediation and the decision is usually binding." },
  { "id": 463, "question": "Conciliation is a trusted third party who provides:", "options": ["A. Money", "B. An informal communication link between the parties", "C. A legal ruling", "D. Technical expertise"], "answer": "B", "explanation": "Conciliators help rebuild the relationship and bridge the communication gap." },
  { "id": 464, "question": "Distributive Bargaining is often called:", "options": ["A. Win-Win bargaining", "B. Zero-sum bargaining", "C. Cooperative bargaining", "D. Infinite bargaining"], "answer": "B", "explanation": "It is zero-sum because one person's gain is the other person's exact loss." },
  { "id": 465, "question": "In negotiation, the 'Target Point' is:", "options": ["A. The lowest acceptable offer", "B. The result a person would like to achieve", "C. The opponent's secret price", "D. The date of the meeting"], "answer": "B", "explanation": "Each negotiator has a target point and a resistance point (the minimum acceptable)." },
  { "id": 466, "question": "Power based on identification with a person who has desirable resources or personal traits is:", "options": ["A. Coercive Power", "B. Referent Power", "C. Legitimate Power", "D. Reward Power"], "answer": "B", "explanation": "If I like and admire you, you can exercise power over me because I want to please you." },
  { "id": 467, "question": "Legitimate Power is most closely related to:", "options": ["A. Charisma", "B. Authority", "C. Knowledge", "D. Fear"], "answer": "B", "explanation": "Legitimate power comes with the position in the organizational hierarchy." },
  { "id": 468, "question": "Coercive Power depends on:", "options": ["A. Fear of the negative results from failing to comply", "B. Hope for a bonus", "C. Respect for expertise", "D. Personal friendship"], "answer": "A", "explanation": "It relies on the application (or threat) of physical or psychological sanctions." },
  { "id": 469, "question": "Reward Power is the opposite of:", "options": ["A. Expert Power", "B. Coercive Power", "C. Referent Power", "D. Legitimate Power"], "answer": "B", "explanation": "While coercive power uses punishment, reward power uses positive benefits." },
  { "id": 470, "question": "Information Power comes from:", "options": ["A. Being strong", "B. Having access to and control over important data", "C. Being the oldest", "D. Working in HR only"], "answer": "B", "explanation": "Those who control the flow of information can influence the decisions of others." },
  { "id": 471, "question": "A 'Political Map' in an organization helps you understand:", "options": ["A. The physical layout of the building", "B. Relationships and power dynamics among key decision-makers", "C. The route to the nearest city", "D. The history of the country"], "answer": "B", "explanation": "Mapping helps you identify who has influence and who is allied with whom." },
  { "id": 472, "question": "Defensive Behaviors in politics are used to:", "options": ["A. Attack others", "B. Avoid action, avoid blame, or avoid change", "C. Build a better team", "D. Increase profits"], "answer": "B", "explanation": "Examples include 'playing safe', 'stalling', or 'buffing' (documenting everything to avoid blame)." },
  { "id": 473, "question": "Organizational Culture is learned by employees through 'Rituals', which are:", "options": ["A. Religious ceremonies", "B. Repetitive sequences of activities that express and reinforce core values", "C. Reading the company manual", "D. Daily gym sessions"], "answer": "B", "explanation": "Rituals like annual award ceremonies reinforce what the organization values most." },
  { "id": 474, "question": "Material Symbols (or Artifacts) include:", "options": ["A. Only money", "B. Office layout, attire, and types of cars provided to executives", "C. The company's patent list", "D. Employee names"], "answer": "B", "explanation": "Symbols convey who is important and the degree of egalitarianism in the firm." },
  { "id": 475, "question": "Ethical Cultures are characterized by:", "options": ["A. High risk tolerance and low aggressiveness", "B. High risk tolerance, low to moderate aggressiveness, and focus on means as well as outcomes", "C. Only focusing on the final profit", "D. Strict punishment for all mistakes"], "answer": "B", "explanation": "Managers in ethical cultures are expected to be visible role models of integrity." },
  { "id": 476, "question": "Positive Organizational Culture emphasizes:", "options": ["A. Catching people failing", "B. Building on employee strengths and rewarding more than punishing", "C. Paying the highest salaries in the world", "D. Working on weekends"], "answer": "B", "explanation": "It focuses on human vitality and growth rather than just fixing problems." },
  { "id": 477, "question": "Workplace Spirituality recognizes that people have an inner life that is:", "options": ["A. None of the company's business", "B. Nourished by meaningful work that takes place in the context of community", "C. Only for Sundays", "D. Based on magic"], "answer": "B", "explanation": "Spiritual organizations value sense of purpose, trust, and openness." },
  { "id": 478, "question": "Forces for Change include 'Nature of the Workforce', which means:", "options": ["A. More trees in the office", "B. Changes in multiculturalism, aging population, and skill levels", "C. Higher gravity", "D. Fewer people working"], "answer": "B", "explanation": "As the workforce demographic changes, organizations must adapt their HR practices." },
  { "id": 479, "question": "Forces for Change include 'Technology', which:", "options": ["A. Makes things slower", "B. Changes the way we process information and manufacture goods", "C. Is only for young people", "D. Never changes"], "answer": "B", "explanation": "Technological advancements like AI or automation force organizations to reinvent themselves." },
  { "id": 480, "question": "Forces for Change include 'Economic Shocks', such as:", "options": ["A. A sunny day", "B. Global recessions or stock market crashes", "C. A company party", "D. A new employee joining"], "answer": "B", "explanation": "Sudden economic shifts require immediate and often drastic organizational adjustments." },
  { "id": 481, "question": "Forces for Change include 'Competition', which means:", "options": ["A. Fighting with coworkers", "B. Global competitors and mergers/acquisitions", "C. Playing football", "D. Having no rivals"], "answer": "B", "explanation": "To survive, companies must change to match or beat the offerings of rivals." },
  { "id": 482, "question": "Resistance to change can be 'Overt', meaning:", "options": ["A. Hidden and secret", "B. Open and easily recognized (e.g., strikes or complaints)", "C. Only in the mind", "D. Positive"], "answer": "B", "explanation": "Overt resistance is easier to deal with because it is out in the open." },
  { "id": 483, "question": "Resistance to change can be 'Implicit', meaning:", "options": ["A. Loud and clear", "B. Subtle (e.g., loss of loyalty, increased errors, absenteeism)", "C. Very fast", "D. Helpful"], "answer": "B", "explanation": "Implicit resistance is more dangerous because it is harder to identify and manage." },
  { "id": 484, "question": "One way to overcome resistance to change is 'Education and Communication', which:", "options": ["A. Forces people to change", "B. Helps employees see the logic of the change", "C. Pays people to change", "D. Fires those who don't change"], "answer": "B", "explanation": "This assumes that resistance is based on misinformation or poor communication." },
  { "id": 485, "question": "Overcoming resistance through 'Participation' involves:", "options": ["A. Forcing people to watch", "B. Bringing those opposed into the decision process", "C. Giving people money", "D. Telling people what to do"], "answer": "B", "explanation": "People find it difficult to resist a change decision they helped to make." },
  { "id": 486, "question": "Overcoming resistance through 'Coercion' involves:", "options": ["A. Using logic", "B. Using direct threats or force", "C. Being very friendly", "D. Asking for advice"], "answer": "B", "explanation": "Coercion is fast but can lead to long-term resentment and low morale." },
  { "id": 487, "question": "Organizational Development (OD) is a collection of planned-change interventions that seek to improve:", "options": ["A. The company's building", "B. Organizational effectiveness and employee well-being", "C. Only the profit margin", "D. The computer systems only"], "answer": "B", "explanation": "OD is based on humanistic-democratic values and social science knowledge." },
  { "id": 488, "question": "Sensitivity Training (or T-groups) is an OD technique for:", "options": ["A. Learning technical skills", "B. Changing behavior through unstructured group interaction", "C. Learning how to use a machine", "D. Improving physical health"], "answer": "B", "explanation": "It helps members become more aware of their own behavior and how others perceive them." },
  { "id": 489, "question": "Survey Feedback is an OD tool that uses:", "options": ["A. Personal interviews only", "B. Questionnaires to identify discrepancies among member perceptions", "C. Secret cameras", "D. Financial reports"], "answer": "B", "explanation": "The data from surveys is used to trigger discussion and plan for change." },
  { "id": 490, "question": "Process Consultation (PC) is when a consultant helps a manager to:", "options": ["A. Do the manager's job", "B. Perceive, understand, and act upon process events", "C. Buy new software", "D. Fire employees"], "answer": "B", "explanation": "The consultant doesn't solve the problem but helps the manager learn to solve it." },
  { "id": 491, "question": "Team Building is an OD activity that uses:", "options": ["A. High-interaction group activities to increase trust and openness", "B. Construction tools to build an office", "C. Only competitive sports", "D. Lectures on history"], "answer": "A", "explanation": "Team building focuses on improving interpersonal relations and task accomplishment." },
  { "id": 492, "question": "Appreciative Inquiry (AI) focuses on:", "options": ["A. Finding what is wrong with the company", "B. Identifying the unique qualities and special strengths of an organization", "C. Complaining about the boss", "D. Reducing the budget"], "answer": "B", "explanation": "AI is a positive approach to change that builds on what is already working well." },
  { "id": 493, "question": "The 'Discovery' stage of Appreciative Inquiry involves:", "options": ["A. Planning for the future", "B. Identifying what people think are the organization’s strengths", "C. Writing a new contract", "D. Fixing a broken machine"], "answer": "B", "explanation": "This is the first step, where the 'best of what is' is uncovered." },
  { "id": 494, "question": "Stressors are:", "options": ["A. People who are stressed", "B. Factors that cause stress", "C. Medicines for stress", "D. Goals for the year"], "answer": "B", "explanation": "Stressors can be environmental, organizational, or personal." },
  { "id": 495, "question": "Role Overload occurs when:", "options": ["A. An employee has nothing to do", "B. An employee is expected to do more than time permits", "C. An employee has two jobs", "D. The role is too easy"], "answer": "B", "explanation": "Role overload is a significant organizational stressor." },
  { "id": 496, "question": "Role Ambiguity occurs when:", "options": ["A. Expectations are too clear", "B. Role expectations are not clearly understood", "C. An employee is promoted", "D. The boss is away"], "answer": "B", "explanation": "When people don't know what they are supposed to do, stress levels rise." },
  { "id": 497, "question": "Psychological symptoms of stress include:", "options": ["A. Weight loss", "B. Tension, anxiety, irritability, and boredom", "C. Broken bones", "D. High blood sugar"], "answer": "B", "explanation": "These are internal emotional states caused by stressful conditions." },
  { "id": 498, "question": "Individual approaches to managing stress include:", "options": ["A. Changing company policy", "B. Time management, physical exercise, and relaxation techniques", "C. Hiring a new assistant", "D. Quitting the job immediately"], "answer": "B", "explanation": "Individuals can take personal responsibility for reducing their own stress levels." },
  { "id": 499, "question": "Organizational approaches to managing stress include:", "options": ["A. Ignoring employee health", "B. Improved selection, goal setting, and job redesign", "C. Making everyone work harder", "D. Removing all coffee from the office"], "answer": "B", "explanation": "Organizations can reduce stress by clarifying roles and providing social support." },
  { "id": 500, "question": "Wellness Programs are organizationally supported programs that focus on:", "options": ["A. Making the company rich", "B. The employee’s total physical and mental condition", "C. Only the company's legal safety", "D. Selling health products"], "answer": "B", "explanation": "Wellness programs provide workshops on smoking cessation, weight control, and stress management." },
  { "id": 501, "question": "The 'Ohio State Studies' identified two dimensions of leader behavior: Initiating Structure and:", "options": ["A. Consideration", "B. Production Orientation", "C. Laissez-faire", "D. Motivation"], "answer": "A", "explanation": "Consideration refers to the extent to which a leader has job relationships characterized by mutual trust and respect for employees' ideas." },
  { "id": 502, "question": "A leader who is high in 'Initiating Structure' is likely to:", "options": ["A. Focus on employee feelings", "B. Assign group members to particular tasks and emphasize deadlines", "C. Let employees do whatever they want", "D. Avoid making any decisions"], "answer": "B", "explanation": "Initiating structure is the extent to which a leader defines and structures their role and those of subordinates to attain goals." },
  { "id": 503, "question": "The 'University of Michigan' studies identified two dimensions: Employee-oriented and:", "options": ["A. Country Club-oriented", "B. Production-oriented", "C. Task-oriented", "D. Power-oriented"], "answer": "B", "explanation": "Production-oriented leaders tend to emphasize the technical or task aspects of the job." },
  { "id": 504, "question": "In the Managerial Grid, the (5,5) style is known as:", "options": ["A. Team Management", "B. Middle-of-the-Road Management", "C. Impoverished Management", "D. Paternalism"], "answer": "B", "explanation": "This style reflects adequate organizational performance by balancing the necessity to get work out with maintaining morale." },
  { "id": 505, "question": "Fiedler’s 'Leader-Member Relations' refers to:", "options": ["A. The amount of money a leader makes", "B. The degree of confidence, trust, and respect members have in their leader", "C. The number of meetings held per week", "D. The physical distance between desks"], "answer": "B", "explanation": "This is one of three situational factors that determine leadership effectiveness in Fiedler's model." },
  { "id": 506, "question": "In Fiedler's model, 'Task Structure' is the degree to which:", "options": ["A. Job assignments are procedurized", "B. The office is clean", "C. The leader is liked", "D. Employees are specialized"], "answer": "A", "explanation": "High task structure means jobs are clearly defined and structured with little ambiguity." },
  { "id": 507, "question": "According to Fiedler, task-oriented leaders perform best in situations that are:", "options": ["A. Highly favorable or highly unfavorable", "B. Moderately favorable", "C. Only unfavorable", "D. Always constant"], "answer": "A", "explanation": "Relationship-oriented leaders perform better in moderately favorable situations." },
  { "id": 508, "question": "In Situational Leadership Theory, 'Telling' (High Task-Low Relationship) is best for followers who are:", "options": ["A. Able and willing", "B. Unable and unwilling", "C. Able but unwilling", "D. Experts"], "answer": "B", "explanation": "Followers who lack ability and commitment require specific, clear directions." },
  { "id": 509, "question": "In Situational Leadership Theory, 'Delegating' is best for followers who are:", "options": ["A. New to the job", "B. Able and willing", "C. Confused", "D. Angry"], "answer": "B", "explanation": "Experienced and committed followers need little direction or emotional support." },
  { "id": 510, "question": "Path-Goal Theory identifies 'Participative Leadership' as:", "options": ["A. Setting challenging goals", "B. Consulting with followers and using their suggestions before making a decision", "C. Giving orders only", "D. Letting followers do everything"], "answer": "B", "explanation": "This style involves subordinates in the decision-making process to increase engagement." },
  { "id": 511, "question": "In Path-Goal Theory, 'Achievement-Oriented' leadership involves:", "options": ["A. Being very friendly", "B. Setting challenging goals and expecting followers to perform at their highest level", "C. Doing the task for the group", "D. Focusing only on rewards"], "answer": "B", "explanation": "This style shows confidence in the followers' abilities to achieve high-level goals." },
  { "id": 512, "question": "Visionary Leadership is the ability to create and articulate a vision that is:", "options": ["A. Realistic, credible, and attractive", "B. Impossible and scary", "C. Only about the past", "D. Kept secret from employees"], "answer": "A", "explanation": "A visionary leader describes a future that improves upon the present situation." },
  { "id": 513, "question": "The 'Integrity' dimension of trust refers to:", "options": ["A. Technical knowledge", "B. Honesty and truthfulness", "C. High salary", "D. Physical strength"], "answer": "B", "explanation": "Integrity is the most critical dimension when someone assesses another’s trustworthiness." },
  { "id": 514, "question": "The 'Benevolence' dimension of trust means the trusted person:", "options": ["A. Is very smart", "B. Has your interests at heart", "C. Follows all rules", "D. Is the boss"], "answer": "B", "explanation": "Benevolence means the person is kind and supportive, rather than self-centered." },
  { "id": 515, "question": "The 'Ability' dimension of trust refers to an individual's:", "options": ["A. Mood", "B. Technical and interpersonal knowledge and skills", "C. Height", "D. Family background"], "answer": "B", "explanation": "You are unlikely to trust someone to perform a task if you don't believe they are capable of doing it." },
  { "id": 516, "question": "A 'Mentor' is a senior employee who:", "options": ["A. Fires people", "B. Sponsors and supports a less-experienced employee", "C. Only does their own work", "D. Reports to the CEO only"], "answer": "B", "explanation": "Mentoring provides both career functions (coaching) and psychosocial functions (counseling)." },
  { "id": 517, "question": "The 'Glass Ceiling' refers to:", "options": ["A. A type of office design", "B. Invisible barriers that prevent women and minorities from rising to upper-level positions", "C. A very high salary", "D. Clear communication"], "answer": "B", "explanation": "It describes the subtle discrimination that limits career advancement for certain groups." },
  { "id": 518, "question": "Which of the following is NOT a traditional management function?", "options": ["A. Planning", "B. Organizing", "C. Leading", "D. Networking"], "answer": "D", "explanation": "The four functions are Planning, Organizing, Leading, and Controlling." },
  { "id": 519, "question": "Employee 'Empowerment' involves:", "options": ["A. Taking away responsibilities", "B. Increasing the decision-making discretion of workers", "C. Making everyone a manager", "D. Increasing the work hours"], "answer": "B", "explanation": "Empowerment gives employees more control over their work and how they do it." },
  { "id": 520, "question": "Job Rotation is an example of:", "options": ["A. Firing people in a circle", "B. Periodic shifting of an employee from one task to another", "C. Turning the office chairs", "D. Only working at night"], "answer": "B", "explanation": "Job rotation reduces boredom and increases the variety of skills an employee possesses." },
  { "id": 521, "question": "Job Enrichment increases the degree to which a worker:", "options": ["A. Makes money", "B. Controls the planning, execution, and evaluation of the work", "C. Moves to different offices", "D. Works alone"], "answer": "B", "explanation": "Enrichment adds 'depth' to a job by giving the worker more autonomy." },
  { "id": 522, "question": "Flex-time allows employees to:", "options": ["A. Work whenever they want without limit", "B. Vary their work hours within certain limits", "C. Never come to the office", "D. Exercise during work"], "answer": "B", "explanation": "Flex-time helps employees balance work and personal responsibilities." },
  { "id": 523, "question": "Telecommuting refers to:", "options": ["A. Flying to work", "B. Working from home via a computer link to the office", "C. Driving a long distance", "D. Working in a call center"], "answer": "B", "explanation": "It provides flexibility and can reduce overhead costs for the organization." },
  { "id": 524, "question": "A 'Quality Circle' is a work group that meets regularly to:", "options": ["A. Eat lunch", "B. Discuss and solve problems in the workplace", "C. Criticize the boss", "D. Play games"], "answer": "B", "explanation": "Quality circles are a form of employee involvement typically found in manufacturing." },
  { "id": 525, "question": "Profit-Sharing Plans distribute compensation based on:", "options": ["A. The employee's age", "B. An established formula designed around a company's profitability", "C. Individual sales only", "D. The number of hours worked"], "answer": "B", "explanation": "These plans align employee interests with the overall financial success of the firm." },
  { "id": 526, "question": "Employee Stock Ownership Plan (ESOP) allows employees to:", "options": ["A. Buy the whole company", "B. Acquire stock, often at below-market prices, as part of their benefits", "C. Sell the company's equipment", "D. Manage the stock market"], "answer": "B", "explanation": "ESOPs aim to increase employee commitment by making them partial owners." },
  { "id": 527, "question": "A 'Gainsharing' plan is based on:", "options": ["A. Total company profits", "B. Productivity improvements in a specific group or facility", "C. Individual behavior", "D. Luck"], "answer": "B", "explanation": "Unlike profit sharing, gainsharing rewards specific operational improvements regardless of overall profit." },
  { "id": 528, "question": "Skill-Based Pay sets pay levels on the basis of:", "options": ["A. Job title", "B. How many skills employees have or how many jobs they can do", "C. Seniority", "D. Education degree only"], "answer": "B", "explanation": "This encourages employees to learn more and be more flexible." },
  { "id": 529, "question": "Intrinsic Rewards include:", "options": ["A. Money", "B. Employee recognition programs and personal growth", "C. Bonuses", "D. Health insurance"], "answer": "B", "explanation": "Intrinsic rewards come from within the individual or the nature of the work itself." },
  { "id": 530, "question": "The 'Communication Process' begins with the:", "options": ["A. Receiver", "B. Sender", "C. Message", "D. Feedback"], "answer": "B", "explanation": "The sender initiates a message by encoding a thought." },
  { "id": 531, "question": "Encoding is the process of:", "options": ["A. Reading a message", "B. Converting a message into symbolic form", "C. Translating a code", "D. Hearing a sound"], "answer": "B", "explanation": "The sender must encode the message so it can be transmitted through a channel." },
  { "id": 532, "question": "Decoding is the process of:", "options": ["A. Writing a message", "B. Retranslating a sender's message", "C. Sending an email", "D. Speaking loudly"], "answer": "B", "explanation": "The receiver decodes the symbols to understand the meaning." },
  { "id": 533, "question": "The 'Grapevine' is the organization's:", "options": ["A. Formal communication network", "B. Informal communication network", "C. Email system", "D. Legal department"], "answer": "B", "explanation": "The grapevine is fast, highly influential, and often used to spread rumors." },
  { "id": 534, "question": "Filtering in communication refers to:", "options": ["A. Using a water filter", "B. A sender's purposely manipulating information so it will be seen more favorably by the receiver", "C. Blocking all spam", "D. Listening carefully"], "answer": "B", "explanation": "Filtering often happens when employees tell their bosses only what they think the bosses want to hear." },
  { "id": 535, "question": "Selective Perception is when:", "options": ["A. Everyone sees things the same way", "B. Receivers see and hear based on their needs, motivations, and experience", "C. The boss chooses who talks", "D. Information is lost"], "answer": "B", "explanation": "We interpret what we see based on our own background and interests." },
  { "id": 536, "question": "Information Overload occurs when:", "options": ["A. There is no information", "B. Information inflow exceeds an individual's processing capacity", "C. Information is very technical", "D. The internet is slow"], "answer": "B", "explanation": "Overload leads to stress and poor decision-making as people ignore or forget information." },
  { "id": 537, "question": "Jargon is:", "options": ["A. A type of dance", "B. Specialized terminology or technical language that members of a group use", "C. A foreign language", "D. Rude behavior"], "answer": "B", "explanation": "Jargon can facilitate communication within a group but create barriers for those outside it." },
  { "id": 538, "question": "Active Listening involves:", "options": ["A. Hearing but not thinking", "B. Listening for full meaning without making premature judgments", "C. Talking while the other person is talking", "D. Recording the conversation"], "answer": "B", "explanation": "Active listening requires concentration, empathy, and feedback." },
  { "id": 539, "question": "Upward Communication flows to:", "options": ["A. Subordinates", "B. A higher level in the organization", "C. People at the same level", "D. Customers only"], "answer": "B", "explanation": "It is used to provide feedback to higher-ups and inform them of progress or problems." },
  { "id": 540, "question": "Lateral (Horizontal) Communication occurs between:", "options": ["A. Boss and employee", "B. Members of the same work group or at the same level", "C. Two different companies", "D. Parents and children"], "answer": "B", "explanation": "It helps coordinate tasks and solve problems between departments." },
  { "id": 541, "question": "The 'Laissez-faire' leader is one who:", "options": ["A. Is very strict", "B. Generally gives the group complete freedom to make decisions", "C. Makes every single choice", "D. Motivates through fear"], "answer": "B", "explanation": "This is a 'hands-off' approach to leadership." },
  { "id": 542, "question": "Autocratic Leadership style involves:", "options": ["A. Group decision-making", "B. Centralized authority and low participation", "C. No leadership at all", "D. Asking for opinions"], "answer": "B", "explanation": "The leader makes decisions unilaterally and expects obedience." },
  { "id": 543, "question": "Democratic Leadership style involves:", "options": ["A. Only one person choosing", "B. Subordinate participation and delegating authority", "C. No rules", "D. Random decisions"], "answer": "B", "explanation": "Democratic leaders use consultation and encourage input from group members." },
  { "id": 544, "question": "Legitimate Power is also known as:", "options": ["A. Expert Power", "B. Authority", "C. Persuasion", "D. Coercion"], "answer": "B", "explanation": "It is the power a person receives as a result of their position in the formal hierarchy." },
  { "id": 545, "question": "Expert Power is influence based on:", "options": ["A. Age", "B. Special skills or knowledge", "C. Physical strength", "D. Friendliness"], "answer": "B", "explanation": "As jobs become more specialized, we become more dependent on experts." },
  { "id": 546, "question": "Political Behavior in organizations consists of activities that are:", "options": ["A. Part of the formal job description", "B. Not required as part of the formal role but influence the distribution of advantages", "C. Only related to government elections", "D. Always illegal"], "answer": "B", "explanation": "Politics is the 'extra-role' behavior used to gain or maintain influence." },
  { "id": 547, "question": "The 'Impression Management' (IM) process is when people attempt to:", "options": ["A. Manage the company's budget", "B. Control the impressions others form of them", "C. Learn new technical skills", "D. Print documents"], "answer": "B", "explanation": "Techniques include flattery, excuses, and self-promotion." },
  { "id": 548, "question": "The 'Storming' stage of group development is characterized by:", "options": ["A. Calm cooperation", "B. Intragroup conflict as members resist constraints and vie for leadership", "C. Disbanding the group", "D. High performance"], "answer": "B", "explanation": "Members accept the existence of the group but resist the control it imposes on individuality." },
  { "id": 549, "question": "The 'Norming' stage is when:", "options": ["A. Conflict starts", "B. Close relationships develop and the group demonstrates cohesiveness", "C. The work is finished", "D. The leader is fired"], "answer": "B", "explanation": "In this stage, the group structure solidifies and expectations of behavior are established." },
  { "id": 550, "question": "The 'Performing' stage is when the group is:", "options": ["A. Just getting to know each other", "B. Fully functional and focused on the task at hand", "C. Complaining about the work", "D. Taking a break"], "answer": "B", "explanation": "Energy has moved from getting to know each other to performing the task." },
  { "id": 551, "question": "Groupthink is a phenomenon in which:", "options": ["A. Everyone thinks differently", "B. The norm for consensus overrides the realistic appraisal of alternative courses of action", "C. The group is very smart", "D. Decisions are made quickly and accurately"], "answer": "B", "explanation": "Groupthink suppresses dissent and can lead to disastrous decisions." },
  { "id": 552, "question": "Groupshift is the tendency for group members to:", "options": ["A. Move to a new room", "B. Shift toward a more extreme position (either riskier or more cautious) after discussion", "C. Change their job titles", "D. Leave the meeting early"], "answer": "B", "explanation": "The group's decision is usually more extreme than the average of individual members' positions." },
  { "id": 553, "question": "Social Loafing is most likely to occur as group size:", "options": ["A. Decreases", "B. Increases", "C. Stays the same", "D. Becomes zero"], "answer": "B", "explanation": "When the group is large, individuals may feel their lack of effort won't be noticed." },
  { "id": 554, "question": "Functional Conflict is conflict that:", "options": ["A. Destroys the group", "B. Supports the goals of the group and improves its performance", "C. Is based on personal dislike", "D. Stops all work"], "answer": "B", "explanation": "Constructive conflict can stimulate creativity and prevent groupthink." },
  { "id": 555, "question": "Dysfunctional Conflict is conflict that:", "options": ["A. Helps the group", "B. Hinders group performance", "C. Is always quiet", "D. Is solved quickly"], "answer": "B", "explanation": "Uncontrolled personal friction is destructive and lowers organizational effectiveness." },
  { "id": 556, "question": "The 'Avoiding' style of conflict management is:", "options": ["A. Aggressive", "B. Unassertive and uncooperative (withdrawing)", "C. Very helpful", "D. Focusing on a win-win"], "answer": "B", "explanation": "Avoiding is appropriate when the issue is trivial or when a cooling-off period is needed." },
  { "id": 557, "question": "The 'Collaborating' style of conflict management seeks:", "options": ["A. To win at any cost", "B. A win-win solution that fully satisfies all parties", "C. To give up everything", "D. To ignore the problem"], "answer": "B", "explanation": "Collaboration involves open communication and a search for an integrative solution." },
  { "id": 558, "question": "The 'Compromising' style of conflict management involves:", "options": ["A. No one getting anything", "B. Each party giving up something to reach a solution", "C. One party winning completely", "D. Using a judge"], "answer": "B", "explanation": "Compromise is a middle-ground approach where no one wins or loses completely." },
  { "id": 559, "question": "Integrative Bargaining seeks a settlement that can create a:", "options": ["A. Win-lose situation", "B. Win-win solution", "C. Total loss for both", "D. Long argument"], "answer": "B", "explanation": "It focuses on long-term relationships and finding mutually beneficial outcomes." },
  { "id": 560, "question": "BATNA stands for:", "options": ["A. Best Alternative To a Negotiated Agreement", "B. Big Authority Toward New Actions", "C. Better Agreement Than No Agreement", "D. Basic Analysis of Technical Negotiated Areas"], "answer": "A", "explanation": "Your BATNA determines the lowest value you will accept in a negotiation." },
  { "id": 561, "question": "A 'Strong Culture' is one where:", "options": ["A. People are physically strong", "B. Core values are intensely held and widely shared", "C. There are many managers", "D. The building is made of stone"], "answer": "B", "explanation": "Strong cultures create high behavioral consistency and loyalty." },
  { "id": 562, "question": "The primary disadvantage of a strong culture is:", "options": ["A. High turnover", "B. Resistance to change and lack of diversity", "C. Low productivity", "D. Too much money spent"], "answer": "B", "explanation": "Strong cultures can become 'rigid' and prevent the organization from adapting to new environments." },
  { "id": 563, "question": "Socialization is the process that:", "options": ["A. Only happens at parties", "B. Adapts employees to the organization's culture", "C. Encourages people to talk all day", "D. Promotes everyone to the top"], "answer": "B", "explanation": "It ensures that new employees understand the norms and values of the firm." },
  { "id": 564, "question": "Institutionalization occurs when an organization:", "options": ["A. Is founded", "B. Takes on a life of its own, apart from its members, and acquires immortality", "C. Goes bankrupt", "D. Changes its name"], "answer": "B", "explanation": "The organization is valued for itself, not just for the products or services it produces." },
  { "id": 565, "question": "Innovation-Nurturing cultures tend to have:", "options": ["A. High formalization", "B. Low vertical differentiation and loose controls", "C. Only one manager", "D. Very old equipment"], "answer": "B", "explanation": "Flexibility and lack of rigid rules encourage employees to experiment." },
  { "id": 566, "question": "Double-Loop Learning occurs when:", "options": ["A. You make the same mistake twice", "B. Errors are corrected by modifying the organization's objectives, policies, and standard routines", "C. Two people learn together", "D. You repeat a training course"], "answer": "B", "explanation": "It involves questioning the underlying assumptions of the organization." },
  { "id": 567, "question": "Single-Loop Learning occurs when:", "options": ["A. Only one person learns", "B. Errors are corrected using past routines and present policies", "C. You learn only one thing", "D. You ignore the error"], "answer": "B", "explanation": "It focuses on fixing problems without changing the overall system." },
  { "id": 568, "question": "The 'Learning Organization' is one that has developed the capacity to:", "options": ["A. Send everyone to school", "B. Continuously learn, adapt, and change", "C. Build a large library", "D. Hire only teachers"], "answer": "B", "explanation": "Learning organizations view change as a constant and necessary process." },
  { "id": 569, "question": "The 'Unfreezing' stage in Lewin’s change model involves:", "options": ["A. Making everything cold", "B. Overcoming the pressures of individual resistance and group conformity", "C. Staying the same", "D. Starting a fire"], "answer": "B", "explanation": "Unfreezing prepares the organization for change by destabilizing the status quo." },
  { "id": 570, "question": "The 'Refreezing' stage in Lewin’s model involves:", "options": ["A. Going back to old ways", "B. Stabilizing a change intervention by balancing driving and restraining forces", "C. Stopping all work", "D. Turning off the air conditioning"], "answer": "B", "explanation": "Refreezing ensures the new change becomes the permanent new norm." },
  { "id": 571, "question": "Driving Forces are those that:", "options": ["A. Hinder change", "B. Direct behavior away from the status quo", "C. Keep things the same", "D. Reduce the budget"], "answer": "B", "explanation": "Driving forces push for change to happen." },
  { "id": 572, "question": "Restraining Forces are those that:", "options": ["A. Push for change", "B. Hinder movement from the existing equilibrium", "C. Encourage innovation", "D. Increase productivity"], "answer": "B", "explanation": "Restraining forces represent the resistance to the change process." },
  { "id": 573, "question": "Kotter's Eight-Step Plan for change begins with:", "options": ["A. Creating a new name", "B. Establishing a sense of urgency", "C. Firing the manager", "D. Giving everyone a bonus"], "answer": "B", "explanation": "Without urgency, people won't feel the need to change." },
  { "id": 574, "question": "Action Research is a change process based on:", "options": ["A. Guessing", "B. Systematic collection of data and then selection of a change action based on what the data indicates", "C. Only physical actions", "D. Reading old books"], "answer": "B", "explanation": "It follows a scientific approach: Diagnosis, Analysis, Feedback, Action, and Evaluation." },
  { "id": 575, "question": "Intergroup Development is an OD intervention that seeks to change:", "options": ["A. The company's name", "B. Attitudes, stereotypes, and perceptions that groups have of each other", "C. The office furniture", "D. Individual personalities only"], "answer": "B", "explanation": "It focuses on improving coordination and cooperation between different departments." },
  { "id": 576, "question": "Idea Champions are individuals who:", "options": ["A. Win a sports game", "B. Actively and enthusiastically promote an innovation and build support for it", "C. Criticize new ideas", "D. Do nothing"], "answer": "B", "explanation": "Champions overcome resistance and ensure the innovation is implemented." },
  { "id": 577, "question": "Physiological symptoms of stress include:", "options": ["A. Boredom", "B. Changes in metabolism, increased heart and breathing rates, and headaches", "C. Fear of the future", "D. Forgetfulness"], "answer": "B", "explanation": "Stress can have direct, negative impacts on physical health." },
  { "id": 578, "question": "Behavioral symptoms of stress include:", "options": ["A. Anxiety", "B. Changes in productivity, absenteeism, and sleep disorders", "C. High blood pressure", "D. Irritability"], "answer": "B", "explanation": "These are observable actions that indicate a person is under stress." },
  { "id": 579, "question": "Workplace 'Incivility' refers to:", "options": ["A. Polite behavior", "B. Low-intensity deviant behavior with ambiguous intent to harm others (e.g., rudeness)", "C. Physical violence", "D. Strict adherence to rules"], "answer": "B", "explanation": "Incivility can erode trust and lower morale over time." },
  { "id": 580, "question": "Job Embeddedness refers to:", "options": ["A. Being stuck in a job", "B. The collection of influences that keep people in their present jobs", "C. Losing a job", "D. Hating a job"], "answer": "B", "explanation": "It includes links to the community, fit with the job, and what they would sacrifice if they left." },
  { "id": 581, "question": "Total Quality Management (TQM) is most effective when:", "options": ["A. Only the boss cares", "B. Every employee is committed to continuous improvement", "C. No one follows rules", "D. Costs are cut regardless of quality"], "answer": "B", "explanation": "TQM requires a culture-wide commitment to excellence." },
  { "id": 582, "question": "The 'General Manager' is responsible for:", "options": ["A. Only one department", "B. Complex organizational units that include multiple functional areas", "C. Only hiring people", "D. Filing documents"], "answer": "B", "explanation": "A general manager oversees an entire division or plant and all its functions." },
  { "id": 583, "question": "Organizational Politics is often used to:", "options": ["A. Clean the office", "B. Influence decision-making and resource allocation", "C. Help everyone equally", "D. Follow all laws strictly"], "answer": "B", "explanation": "While often viewed negatively, it is a natural part of group dynamics." },
  { "id": 584, "question": "A 'Flat' organization has:", "options": ["A. Many layers of management", "B. Few levels of management and a wide span of control", "C. No employees", "D. A circular building"], "answer": "B", "explanation": "Flat structures encourage faster communication and more employee autonomy." },
  { "id": 585, "question": "A 'Tall' organization has:", "options": ["A. Wide spans of control", "B. Many layers of management and narrow spans of control", "C. No managers", "D. Only one level"], "answer": "B", "explanation": "Tall structures can lead to slower decision-making and communication distortions." },
  { "id": 586, "question": "The 'Scalar Chain' principle suggests that:", "options": ["A. Communication should jump across departments", "B. There should be a clear, unbroken line of authority from the top to the bottom", "C. Hierarchy is useless", "D. Everyone is equal"], "answer": "B", "explanation": "This ensures that everyone knows who their direct superior is." },
  { "id": 587, "question": "Functional Departmentalization groups employees by:", "options": ["A. Their age", "B. Their specialty or task (e.g., Marketing, Finance)", "C. Their location", "D. The customer they serve"], "answer": "B", "explanation": "It is efficient because it puts people with similar skills together." },
  { "id": 588, "question": "Product Departmentalization groups employees by:", "options": ["A. Their salary", "B. The specific product line they work on", "C. Their gender", "D. The time they start work"], "answer": "B", "explanation": "This increases accountability for the success of a particular product." },
  { "id": 589, "question": "Geographic Departmentalization groups employees by:", "options": ["A. Their height", "B. Territory or regional area", "C. Their education", "D. Their favorite food"], "answer": "B", "explanation": "This is useful for organizations that serve customers across large distances." },
  { "id": 590, "question": "Customer Departmentalization groups employees by:", "options": ["A. The type of customers they serve (e.g., retail vs. wholesale)", "B. Their personal names", "C. The machines they use", "D. Their office floor"], "answer": "A", "explanation": "It allows the organization to better meet the unique needs of different customer types." },
  { "id": 591, "question": "The 'Span of Control' is becoming:", "options": ["A. Narrower", "B. Wider", "C. Disappearing", "D. Constant"], "answer": "B", "explanation": "Modern organizations use wider spans to reduce costs and empower employees." },
  { "id": 592, "question": "The 'Grapevine' is usually:", "options": ["A. 100% accurate", "B. Partly accurate but carries significant weight", "C. Totally false", "D. Controlled by the CEO"], "answer": "B", "explanation": "Research shows about 75% of grapevine information is accurate." },
  { "id": 593, "question": "The primary role of the 'Controlling' function is to:", "options": ["A. Punish employees", "B. Ensure that activities are being accomplished as planned", "C. Write new plans", "D. Organize meetings"], "answer": "B", "explanation": "Control is the final step in the management process." },
  { "id": 594, "question": "Performance Standards are:", "options": ["A. The actual results", "B. The goals or targets against which performance is measured", "C. The rewards given", "D. The rules in the manual"], "answer": "B", "explanation": "Standards must be measurable and clearly communicated." },
  { "id": 595, "question": "The 'Management' process is:", "options": ["A. A one-time event", "B. An ongoing and interrelated set of activities", "C. Only for rich people", "D. Not necessary for small firms"], "answer": "B", "explanation": "Management is a continuous cycle of planning, organizing, leading, and controlling." },
  { "id": 596, "question": "Efficiency is 'doing things right', while Effectiveness is:", "options": ["A. 'Doing things fast'", "B. 'Doing the right things'", "C. 'Doing things alone'", "D. 'Doing things cheaply'"], "answer": "B", "explanation": "Effectiveness is about goal attainment; efficiency is about resource usage." },
  { "id": 597, "question": "A 'Threat' in SWOT analysis is:", "options": ["A. An internal weakness", "B. An external factor that creates risk or causes damage to the organization", "C. A positive external trend", "D. A new employee"], "answer": "B", "explanation": "SWOT stands for Strengths, Weaknesses, Opportunities, and Threats." },
  { "id": 598, "question": "The four management functions collectively achieve which primary organizational purpose?", "options": ["A. Maximizing individual managerial authority", "B. Eliminating all organizational conflict", "C. Enabling organizations to use resources effectively and efficiently to achieve goals and satisfy customers", "D. Focusing exclusively on financial targets"], "answer": "C", "explanation": "Management exists to transform inputs into outputs that provide value." },
  { "id": 599, "question": "Which of the following CORRECTLY identifies the primary contribution of Henri Fayol to management theory?", "options": ["A. Developing the ERG Theory of motivation", "B. Creating the Managerial Grid", "C. Identifying 14 universal principles of management to improve organizational efficiency", "D. Developing Likert's four systems of management"], "answer": "C", "explanation": "Fayol was a pioneer in Administrative Management theory." },
  { "id": 600, "question": "Effective leadership, motivation, and management together contribute to organizational success by:", "options": ["A. Operating independently", "B. Driving financial performance alone", "C. Creating vision, sustaining effort, and providing structures to channel energies toward goals", "D. Relying only on strict control and supervision"], "answer": "C", "explanation": "Success requires an integrated approach that addresses both people and processes." }
