<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renance AI | OpenAI Powered</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
      {
        "imports": {
          "openai": "https://esm.run/openai"
        }
      }
    </script>
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --accent: #10a37f; --text: #c9d1d9; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; margin: 0; }
        aside { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; flex-direction: column; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; }
        .bot { background: #21262d; align-self: flex-start; border: 1px solid var(--border); }
        .user { background: var(--accent); color: white; align-self: flex-end; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); background: var(--bg); }
        .input-box { display: flex; gap: 10px; background: #0d1117; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .loading { color: #8b949e; font-size: 0.85rem; margin-top: 5px; }
    </style>
</head>
<body>

    <aside>
        <h2 style="color: white;">Renance AI</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Powered by OpenAI</p>
        <button onclick="location.reload()" style="background: #30363d; margin-top: 20px;">New Chat</button>
    </aside>

    <main>
        <div id="chat-container">
            <div class="message bot">Welcome back! I am your updated Renance AI. How can I help with your studies today?</div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Ask anything...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </main>

    <script type="module">
        import OpenAI from "openai";

        // CONFIGURATION
        const OPENAI_API_KEY = "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";
        
        const openai = new OpenAI({
            apiKey: OPENAI_API_KEY,
            dangerouslyAllowBrowser: true // ONLY for local development!
        });

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function askAI() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            const loadingMsg = appendMessage("Thinking...", 'bot loading');

            try {
                const completion = await openai.chat.completions.create({
                    model: "gpt-4o-mini", 
                    messages: [
                        { role: "system", content: "You are Renance AI, a brilliant academic tutor for FUTA university students. You explain complex topics simply and provide step-by-step solutions for math and science." },
                        { role: "user", content: text }
                    ],
                });

                const aiResponse = completion.choices[0].message.content;
                loadingMsg.innerHTML = formatText(aiResponse);
                loadingMsg.classList.remove('loading');
            } catch (error) {
                console.error(error);
                loadingMsg.innerHTML = "Error: Make sure your OpenAI account has a balance (min $5). Check console for details.";
            }
        }

        function appendMessage(content, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function formatText(text) {
            return text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        sendBtn.addEventListener('click', askAI);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') askAI(); });
    </script>
</body>
</html>
