<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTA Practice Portal | My Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f1f5f9;
            --sidebar: #0f172a;
            --card-bg: #ffffff;
            --primary-accent: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --glass: rgba(15, 23, 42, 0.95);
            --success: #10b981;
        }

        .dark-mode {
            --bg-body: #0f172a;
            --sidebar: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-accent: #60a5fa;
            --glass: rgba(2, 6, 23, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        body { background-color: var(--bg-body); display: flex; min-height: 100vh; color: var(--text-main); overflow-x: hidden; }

        /* --- SHARED PREMIUM SIDEBAR --- */
        nav {
            width: 280px; background: var(--glass); backdrop-filter: blur(12px);
            color: white; padding: 1.5rem; display: flex; flex-direction: column;
            position: fixed; left: 0; top: 0; height: 100vh; z-index: 2000;
            transform: translateX(0); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: 700; color: #f8fafc; }
        .nav-close { display: none; cursor: pointer; color: var(--text-muted); }

        .nav-menu-content { flex-grow: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 16px;
            text-decoration: none; color: #94a3b8; border-radius: 12px;
            margin-bottom: 8px; transition: 0.3s; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-item.active { color: var(--primary-accent); border: 1px solid rgba(96, 165, 250, 0.2); }

        .nav-footer {
            padding-top: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: space-between;
        }
        .mini-avatar {
            width: 38px; height: 38px; background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; color: white;
        }

        /* --- PROFILE CONTENT --- */
        main { flex-grow: 1; margin-left: 280px; padding: 3rem; max-width: 1000px; width: 100%; }
        
        .mobile-top-bar {
            display: none; position: fixed; top: 0; left: 0; right: 0;
            background: var(--sidebar); color: white; padding: 1rem 1.5rem;
            z-index: 1500; justify-content: space-between; align-items: center;
        }

        .profile-header { 
            background: var(--card-bg); padding: 2.5rem; border-radius: 24px; 
            border: 1px solid var(--border-color); display: flex; align-items: center; 
            gap: 2rem; margin-bottom: 2rem; box-shadow: 0 4px 20px -10px rgba(0,0,0,0.05);
        }
        .profile-avatar-large { 
            width: 100px; height: 100px; background: linear-gradient(135deg, #2563eb, #7c3aed); 
            border-radius: 24px; display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; font-weight: 800; color: white; 
        }

        .info-card { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border-color); position: relative; }
        .info-group { margin-bottom: 2rem; }
        .info-group label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 700; }
        .info-value { font-size: 1.1rem; color: var(--text-main); font-weight: 600; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        
        .edit-input { display: none; width: 100%; padding: 12px; border: 2px solid var(--primary-accent); border-radius: 10px; font-size: 1rem; background: transparent; color: var(--text-main); outline: none; }

        .edit-btn { position: absolute; top: 2.5rem; right: 2.5rem; padding: 10px 20px; background: var(--primary-accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .save-btn { display: none; background: var(--success); }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); text-decoration: none; z-index: 1000; }

        @media (max-width: 1024px) {
            nav { transform: translateX(-100%); }
            nav.open { transform: translateX(0); }
            main { margin-left: 0; padding: 6rem 1.5rem 2rem; }
            .mobile-top-bar { display: flex; }
            .nav-close { display: block; }
            .profile-header { flex-direction: column; text-align: center; }
            .edit-btn { position: static; margin-bottom: 2rem; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="mobile-top-bar">
        <i data-lucide="menu" id="btn-toggle-nav"></i>
        <span style="font-weight: 700;">MY PROFILE</span>
        <i data-lucide="moon" id="btn-toggle-theme"></i>
    </div>

    <nav id="sidebar">
        <div class="nav-header">
            <div class="logo-area"><i data-lucide="graduation-cap"></i><span>FUTA PORTAL</span></div>
            <i data-lucide="x" class="nav-close" id="btn-close-nav"></i>
        </div>
        
        <div class="nav-menu-content">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a>
            <a href="Tips.html" class="nav-item"><i data-lucide="lightbulb"></i> <span>Study Tips</span></a>
            <a href="about.html" class="nav-item"><i data-lucide="info"></i> <span>About Portal</span></a>
            <a href="#" class="nav-item active"><i data-lucide="user"></i> <span>My Profile</span></a>
        </div>

        <div class="nav-footer">
            <div class="mini-profile" style="display: flex; align-items: center; gap: 10px;">
                <div class="mini-avatar" id="navInitials">??</div>
                <div class="mini-info">
                    <p id="navUserName" style="font-size: 0.85rem; font-weight: 600;">Student</p>
                    <small style="color: #64748b; font-size: 0.7rem;">Verified</small>
                </div>
            </div>
            <i data-lucide="log-out" id="btn-logout" style="cursor: pointer; color: #ef4444;"></i>
        </div>
    </nav>


    <main>
        <div class="profile-header">
            <div class="profile-avatar-large" id="p_initials">??</div>
            <div>
                <h1 id="p_top_name">Student Name</h1>
                <p id="p_top_matric" style="color: var(--text-muted); font-weight: 500;">Matric: ---</p>
            </div>
        </div>

        <div class="info-card">
            <button class="edit-btn" id="editBtn">
                <i data-lucide="edit-3" size="16"></i> Edit Profile
            </button>
            <button class="edit-btn save-btn" id="saveBtn">
                <i data-lucide="save" size="16"></i> Save Changes
            </button>

            <h3 style="margin-bottom: 2rem; font-weight: 800; letter-spacing: -0.5px;">Account Details</h3>
            
            <div class="info-group">
                <label>Full Name</label>
                <div class="info-value" id="val_name">---</div>
                <input type="text" class="edit-input" id="input_name">
            </div>

            <div class="info-group">
                <label>Department</label>
                <div class="info-value" id="val_dept">---</div>
                <input type="text" class="edit-input" id="input_dept">
            </div>

            <div class="info-group">
                <label>Matric Number</label>
                <div class="info-value" id="val_matric">---</div>
                <input type="text" class="edit-input" id="input_matric" placeholder="e.g. CSC/25/2024">
            </div>
        </div>
    </main>

    <a href="https://wa.me/2347046203544" class="wa-float" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>

    <script src="dist/ui-core.js"></script>
    <script src="dist/profile.js"></script>
</body>
</html>
