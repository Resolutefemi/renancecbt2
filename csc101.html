    function initDashboard() {
        const board = document.getElementById('dashboard');
        board.innerHTML = '';
        const totalQuestions = MASTER_POOL.length;
        const parts = Math.ceil(totalQuestions / 50);

        const rand = document.createElement('div');
        rand.className = 'box box-random';
        rand.innerHTML = `<i class="fa-solid fa-shuffle"></i><h3>Random Mode</h3><p>Full Shuffle</p>`;
        rand.onclick = () => openSetup('random', 0);
        board.appendChild(rand);

        for (let i = 1; i <= parts; i++) {
            const card = document.createElement('div');
            const start = (i - 1) * 50 + 1;
            const end = Math.min(i * 50, totalQuestions);
            card.className = 'box';
            card.innerHTML = `<i class="fa-solid fa-book-open"></i><h3>Part ${i}</h3><p>Q${start} - Q${end}</p>`;
            card.onclick = () => openSetup('part', i);
            board.appendChild(card);
        }
    }

    function openSetup(mode, partNum) {
        window.examMode = mode;
        window.partNum = partNum;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('setup-title').innerText = mode === 'random' ? "Random Exam Setup" : `COS 101: Part ${partNum}`;
        document.getElementById('random-settings').style.display = (mode === 'random') ? 'block' : 'none';
    }

    function startExam() {
        const timeInput = document.getElementById('t-limit').value;
        timeRemaining = timeInput * 60;

        if (window.examMode === 'random') {
            const qty = document.getElementById('q-count').value;
            currentExamData = [...MASTER_POOL].sort(() => 0.5 - Math.random()).slice(0, qty);
        } else {
            const start = (window.partNum - 1) * 50;
            currentExamData = MASTER_POOL.slice(start, start + 50);
        }

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;
        
        runTimer();
        renderQuestion();
    }

    function runTimer() {
        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeRemaining--;
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeRemaining <= 0) showResults();
        }, 1000);
    }

    function renderQuestion() {
        const q = currentExamData[currentIndex];
        const hasAnswered = userAnswers.hasOwnProperty(currentIndex);
        
        document.getElementById('cur-idx').innerText = currentIndex + 1;
        document.getElementById('question-text').innerText = q.q;
        
        const optBox = document.getElementById('options-box');
        const feedbackArea = document.getElementById('feedback-area');
        optBox.innerHTML = '';
        feedbackArea.innerHTML = '';
        
        q.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = `option-btn`;
            const letter = String.fromCharCode(65 + index); // A, B, C, D...
            
            if (hasAnswered) {
                if (index === q.ans) {
                    btn.classList.add('correct');
                } else if (userAnswers[currentIndex] === index) {
                    btn.classList.add('wrong');
                }
                btn.disabled = true;
            }

            btn.innerHTML = `<strong>${letter}.</strong> ${option}`;
            btn.onclick = () => { 
                if (!hasAnswered) {
                    userAnswers[currentIndex] = index; 
                    saveState(); 
                    renderQuestion();
                }
            };
            optBox.appendChild(btn);
        });

        if (hasAnswered) {
            const isCorrect = userAnswers[currentIndex] === q.ans;

            feedbackArea.innerHTML = `
                <div class="feedback-container">
                    <div class="feedback-status" style="border-color: ${isCorrect ? '#22c55e' : '#ef4444'}; background: ${isCorrect ? '#dcfce7' : '#fee2e2'}; color: ${isCorrect ? '#166534' : '#991b1b'}">

                    </div>
                </div>
            `;

        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').style.display = (currentIndex === currentExamData.length - 1) ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = (currentIndex === currentExamData.length - 1) ? 'block' : 'none';
    }

    function move(dir) {
        if(currentIndex + dir >= 0 && currentIndex + dir < currentExamData.length) {
            currentIndex += dir;
            renderQuestion();
        }

    function saveState() {
        const state = { currentExamData, userAnswers, currentIndex, timeRemaining };
