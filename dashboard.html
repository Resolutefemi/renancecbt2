<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Resolute Femi">
    <title>RENANCE CBT | Dashboard</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="dist/ui-core.js"></script>
    <script type="module" src="dist/dashboard.js"></script>

    <style>
        main {
            padding: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-glow);
            color: var(--accent);
            font-size: 1.5rem;
        }

        .stat-info h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .stat-info p {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .semester-tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0.4rem;
            border-radius: 14px;
        }

        .sem-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sem-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-main);
            outline: none;
            font-family: inherit;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .course-card {
            padding: 1.5rem;
            border-radius: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .course-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .course-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }

        .course-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            transition: transform 0.2s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            main { padding: 1.5rem; }
            .header-top h1 { font-size: 1.8rem; }
            .course-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main class="animate-fade">
        <div class="header-top">
            <div>
                <h1 id="welcomeText">Welcome Back, Student</h1>
                <p>Select a course to begin your CBT practice session.</p>
            </div>
            <button class="btn btn-primary" id="btn-share-portal">
                <i class="fa-solid fa-share-nodes"></i> Share Portal
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card glass animate-slide" style="animation-delay: 0.1s">
                <div class="icon-box"><i class="fa-solid fa-chart-line"></i></div>
                <div class="stat-info">
                    <h3>Tests Taken</h3>
                    <p id="testsTakenEl">0</p>
                </div>
            </div>
            <div class="stat-card glass animate-slide" style="animation-delay: 0.2s">
                <div class="icon-box" style="background: rgba(16, 185, 129, 0.1); color: #10b981;"><i class="fa-solid fa-award"></i></div>
                <div class="stat-info">
                    <h3>Avg Score</h3>
                    <p id="avgScoreEl">0%</p>
                </div>
            </div>
        </div>

        <div class="section-header">
            <div class="semester-tabs glass">
                <button id="sem1Btn" class="sem-btn">First Sem</button>
                <button id="sem2Btn" class="sem-btn">Second Sem</button>
            </div>
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="courseSearch" class="search-input" placeholder="Search course code or name...">
            </div>
        </div>

        <div class="course-grid" id="courseGrid">
            <!-- Courses injected here -->
        </div>
    </main>

    <a href="https://wa.me/2347046203544" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

</body>
</html>
