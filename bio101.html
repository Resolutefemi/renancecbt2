<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO 101 CBT Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #16a34a;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #14532d;
            --text-muted: #4b7a5f;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea580c;
            --border: rgba(22,163,74,0.15);
            --share-gradient: linear-gradient(135deg, #14532d 0%, #16a34a 55%, #4ade80 100%);
        }
        .dark-mode {
            --bg: #052e16;
            --card-bg: #14532d;
            --text: #dcfce7;
            --text-muted: #86efac;
            --border: rgba(74,222,128,0.12);
        }

        * { box-sizing: border-box; }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; min-height: 100vh; }

        nav {
            background: var(--card-bg);
            padding: 0.9rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(22,163,74,0.10);
            position: sticky; top: 0; z-index: 100;
            gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--primary); }

        main { padding: 2rem 5%; max-width: 960px; margin: 0 auto; }

        
        #resume-banner {
            display: none;
            background: var(--card-bg);
            border: 1.5px solid var(--success);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 10px rgba(22,163,74,0.1);
        }

        
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 12px; padding: 1rem;
            text-align: center; border: 1.5px solid var(--border);
            box-shadow: 0 2px 6px rgba(22,163,74,0.06);
        }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

        
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .box {
            background: var(--card-bg); padding: 1.5rem 1rem; border-radius: 14px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px rgba(22,163,74,0.06);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(22,163,74,0.15); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; }
        .box p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
        .box-random { background: linear-gradient(135deg, #16a34a, #4ade80) !important; color: white !important; border: none !important; }
        .box-random p { color: rgba(255,255,255,0.85) !important; }

        
        #setup-screen { text-align: center; background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 4px 20px rgba(22,163,74,0.08); }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 360px; }
        .setup-group label { font-weight: 600; font-size: 0.88rem; color: var(--text); display: block; margin-bottom: 7px; }
        .setup-input { width: 100%; padding: 11px 14px; border: 2px solid #bbf7d0; border-radius: 9px; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 1rem; background: rgba(22,163,74,0.04); padding: 14px; border-radius: 10px; border: 1px solid #bbf7d0; }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        
        .quiz-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 15px; padding: 0 4px; flex-wrap: wrap; gap: 10px; }
        .q-counter { font-size: 1rem; color: var(--text); }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer { color: var(--danger); background: rgba(220,38,38,0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; }

        .question-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(22,163,74,0.08); border: 1.5px solid var(--border); }
        #question-text { line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; }

        .option-btn {
            display: block; width: 100%; padding: 0.95rem 1.1rem;
            margin: 0.65rem 0; border: 2px solid #bbf7d0; border-radius: 10px;
            background: var(--card-bg); color: var(--text); text-align: left;
            cursor: pointer; font-size: 0.97rem; transition: background 0.15s, border-color 0.15s; line-height: 1.5;
        }
        .option-btn:not(:disabled):hover { background: #f0fdf4; border-color: #86efac; }
        .option-btn.selected { background: #dcfce7 !important; border-color: #16a34a !important; color: #14532d !important; }
        .option-btn.correct  { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong    { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn { padding: 0.8rem 1.6rem; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem; }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        
        .result-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            backdrop-filter: blur(8px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .result-modal-content {
            background: var(--card-bg); padding: 40px 28px; border-radius: 24px;
            width: 100%; max-width: 420px; text-align: center; color: var(--text);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            animation: bounceIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0%   { opacity: 0; transform: scale(0.78) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .score-display { background: rgba(22,163,74,0.06); border: 2px dashed rgba(22,163,74,0.25); border-radius: 18px; padding: 18px; margin: 18px 0; }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(22,163,74,0.3); }
        .btn-review { background: rgba(22,163,74,0.08); color: var(--primary); border: 1.5px solid rgba(22,163,74,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        
        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.3rem; }
            .result-modal-content { padding: 28px 18px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <div><i class="fa-solid fa-leaf"></i> BIO 101 Practice Portal</div>
        <div style="font-size:0.9rem; font-weight:600; color:var(--text-muted); letter-spacing:0.3px;">by Resolute Femi</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#4b7a5f; padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <div id="dashboard-wrap">
        <div id="resume-banner"></div>
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title" style="margin-bottom:1.8rem; color:var(--primary); font-size:1.3rem;"></h2>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group checkbox-group">
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-questions" checked> Shuffle Questions
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-options" checked> Shuffle Options (A, B, C, D)
            </label>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="background:#64748b; display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Home
                </button>
                <span id="timer">00:00</span>
            </div>
        </div>

        <div class="question-card">
            <p id="question-text"></p>
            <div id="options-wrap"></div>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)" id="prev-btn">
                <i class="fa-solid fa-arrow-left"></i> Prev
            </button>
            <button class="btn" onclick="move(1)" id="next-btn">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 4px; font-size:1.4rem;"></h2>
        <p id="resultFeedback" style="color:var(--text-muted); font-size:0.9rem; margin:0 0 8px;"></p>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Avg</div></div>
            </div>
        </div>

        <div id="save-status"></div>

        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()" style="display:none;">
                <i class="fa-solid fa-magnifying-glass"></i> Review Answers
            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Back Home
            </button>
        </div>
    </div>
</div>

<script>
const COURSE_CODE = 'BIO101';
const STORAGE_KEY = 'bio101_session';


let ALL_QUESTIONS = [];


let currentExamData = [];
let userAnswers     = {};
let currentIndex    = 0;
let timeRemaining   = 0;
let timerId         = null;
let activeMode      = 'practice';
let examSelectionType = 'random';
let partNum         = 1;
let isReviewMode    = false;


window.onload = async () => {
    try {
        const response = await fetch('questions/BIO101.json');
        ALL_QUESTIONS = await response.json();
    } catch (e) { console.error("Failed to load questions", e); }
    buildDashboard();
    checkResume();
    loadStats();
};

function buildDashboard() {
    const dash = document.getElementById('dashboard');
    dash.innerHTML = '';

    const totalQ = ALL_QUESTIONS.length;
    const partSize = 60;
    const numParts = Math.ceil(totalQ / partSize);

    const randomBox = document.createElement('div');
    randomBox.className = 'box box-random';
    randomBox.innerHTML = `<i class="fa-solid fa-shuffle" style="font-size:2rem;"></i><h3>Random Mix</h3><p>${totalQ} Questions</p>`;
    randomBox.onclick = () => showSetup('random');
    dash.appendChild(randomBox);

    for (let p = 1; p <= numParts; p++) {
        const start = (p - 1) * partSize + 1;
        const end   = Math.min(p * partSize, totalQ);
        const box   = document.createElement('div');
        box.className = 'box';
        box.innerHTML = `<i class="fa-solid fa-book-open" style="font-size:2rem; color:var(--primary);"></i><h3>Part ${p}</h3><p>Q${start} – Q${end}</p>`;
        box.onclick = () => showSetup('part', p);
        dash.appendChild(box);
    }
}

function showSetup(type, pNum = 1) {
    examSelectionType = type;
    partNum = pNum;
    document.getElementById('dashboard-wrap').style.display = 'none';
    document.getElementById('setup-screen').style.display   = 'block';
    document.getElementById('random-settings').style.display = type === 'random' ? 'block' : 'none';

    if (type === 'random') {
        document.getElementById('setup-title').innerText = '🔀 Random Mix Setup';
    } else {
        const size = 60;
        const start = (pNum - 1) * size + 1;
        const end   = Math.min(pNum * size, ALL_QUESTIONS.length);
        document.getElementById('setup-title').innerText = `📖 Part ${pNum} (Q${start}–Q${end})`;
    }
}
document.addEventListener('keydown', (e) => {

    if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;

    if (document.getElementById('quiz-interface').style.display === 'none') return;

    const key = e.key.toUpperCase();

    if (['A', 'B', 'C', 'D'].includes(key)) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {

            if (btn.innerText.trim().startsWith(key + '.')) {
                btn.click();
            }
        });
        return;
    }

    
    if (key === 'N') { move(1); return; }

   
    if (key === 'P') { move(-1); return; }

});
function goHome() {
    clearInterval(timerId);
    document.getElementById('dashboard-wrap').style.display  = 'block';
    document.getElementById('setup-screen').style.display    = 'none';
    document.getElementById('quiz-interface').style.display  = 'none';
    document.getElementById('quizResultModal').style.display = 'none';

    isReviewMode = false;
    checkResume();
    loadStats();
}


function startExam() {
    activeMode  = document.getElementById('quiz-mode').value;
    const mins  = parseInt(document.getElementById('t-limit').value) || 30;
    const shuffQ = document.getElementById('shuffle-questions').checked;
    const shuffO = document.getElementById('shuffle-options').checked;
    timeRemaining = mins * 60;

    let pool;
    if (examSelectionType === 'random') {
        const qty = parseInt(document.getElementById('q-count').value) || 50;
        pool = shuffle([...ALL_QUESTIONS]).slice(0, Math.min(qty, ALL_QUESTIONS.length));
    } else {
        const size  = 60;
        const start = (partNum - 1) * size;
        pool = [...ALL_QUESTIONS].slice(start, start + size);
    }

    if (shuffQ) pool = shuffle(pool);

    currentExamData = pool.map(q => {
        const keys = ['A', 'B', 'C', 'D'];
        const values = keys.map(k => q.options[k]);
        const answer = q.options[q.answer];

        if (shuffO) {
            const zipped = keys.map((k, i) => ({ label: k, val: values[i] }));
            const shuffled = shuffle(zipped);
            const newOpts = {};
            shuffled.forEach((item, i) => { newOpts[keys[i]] = item.val; });
            const newAnswer = keys[shuffled.findIndex(s => s.val === answer)];
            return { question: q.question, options: newOpts, answer: newAnswer, explanation: q.explanation || '' };
        }

        return { question: q.question, options: q.options, answer: q.answer, explanation: q.explanation || '' };
    });

    userAnswers  = {};
    currentIndex = 0;
    isReviewMode = false;

    document.getElementById('setup-screen').style.display   = 'none';
    document.getElementById('quiz-interface').style.display = 'block';
    document.getElementById('total-idx').innerText = currentExamData.length;
    document.getElementById('submit-btn').style.display     = activeMode === 'exam' ? 'block' : 'none';
    document.getElementById('finish-review-btn').style.display = 'none';

    const timerEl = document.getElementById('timer');
    timerEl.style.background = 'rgba(220,38,38,0.08)';
    timerEl.style.color      = 'var(--danger)';

    runTimer();
    renderQuestion();
    saveState();
}


function runTimer() {
    clearInterval(timerId);
    updateTimerDisplay();
    timerId = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        saveState();
        if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
    }, 1000);
}

function updateTimerDisplay() {
    const m = Math.floor(timeRemaining / 60);
    const s = timeRemaining % 60;
    document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const el = document.getElementById('timer');
    if (timeRemaining <= 120) { el.style.background = 'rgba(220,38,38,0.18)'; el.style.color = '#dc2626'; }
    else if (timeRemaining <= 300) { el.style.background = 'rgba(234,88,12,0.12)'; el.style.color = '#ea580c'; }
}


function renderQuestion() {
    const q        = currentExamData[currentIndex];
    const answered = userAnswers[currentIndex];
    document.getElementById('cur-idx').innerText  = currentIndex + 1;
    document.getElementById('question-text').innerText = q.question;

    const optWrap  = document.getElementById('options-wrap');
    const feedArea = document.getElementById('feedback-area');
    optWrap.innerHTML = '';
    feedArea.innerHTML = '';

    Object.entries(q.options).forEach(([key, val]) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = `${key}. ${val}`;
        btn.onclick = () => handleAnswer(key);

        if (answered) {
            btn.disabled = true;
            if (key === q.answer) btn.classList.add('correct');
            if (key === answered && answered !== q.answer) btn.classList.add('wrong');
        }
        optWrap.appendChild(btn);
    });

    const expHtml = q.explanation
        ? `<br><span style="font-weight:400; font-size:0.88rem;">💡 ${q.explanation}</span>` : '';

    if (answered && activeMode === 'practice') {
        const ok = answered === q.answer;
        feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok ? '#dcfce7' : '#fee2e2'}; color:${ok ? '#166534' : '#991b1b'}; border:1px solid ${ok ? '#22c55e' : '#ef4444'}">
            ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '. ' + q.options[q.answer] + '</strong>'}${expHtml}</div>`;
    }

    if (isReviewMode && !answered) {
        feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3;color:#854d0e;border:1px solid #fde047;">
            ⚠ Not answered. Correct: <strong>${q.answer}. ${q.options[q.answer]}</strong>${expHtml}</div>`;
    }

    const isLast = currentIndex === currentExamData.length - 1;
    document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
    document.getElementById('submit-btn').style.display        = isReviewMode ? 'none' : (activeMode === 'exam' ? 'block' : 'none');
    document.getElementById('finish-review-btn').style.display = isReviewMode ? 'block' : 'none';
}

function handleAnswer(key) {
    if (userAnswers[currentIndex] !== undefined) return;
    userAnswers[currentIndex] = key;
    renderQuestion();
    saveState();

    if (activeMode === 'practice') {
        const isLast = currentIndex === currentExamData.length - 1;
        if (!isLast) {
            setTimeout(() => { currentIndex++; renderQuestion(); }, 1000);
        } else {
            setTimeout(() => showResults(true), 1200);
        }
    }
}

function move(d) {
    const n = currentIndex + d;
    if (n >= 0 && n < currentExamData.length) { currentIndex = n; renderQuestion(); }
}


function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        currentExamData, userAnswers, currentIndex,
        timeRemaining, activeMode, examSelectionType, partNum,
        savedAt: Date.now()
    }));
}

function checkResume() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) { document.getElementById('resume-btn').style.display = 'none'; return; }
    const s = JSON.parse(saved);
    const mins = Math.floor((Date.now() - s.savedAt) / 60000);
    if (mins > 180) { localStorage.removeItem(STORAGE_KEY); return; }

    document.getElementById('resume-btn').style.display = 'inline-flex';
    const banner = document.getElementById('resume-banner');
    banner.style.display = 'block';
    banner.innerHTML = `<strong>📌 Unfinished Session</strong> — ${s.currentExamData.length} questions, ${Object.keys(s.userAnswers).length} answered. 
        <button class="btn" style="margin-left:12px; padding:6px 14px; font-size:0.85rem;" onclick="resumeExam()">Resume</button>
        <button class="btn" style="background:#64748b; margin-left:6px; padding:6px 14px; font-size:0.85rem;" onclick="discardSession()">Discard</button>`;
}

function discardSession() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('resume-banner').style.display = 'none';
    document.getElementById('resume-btn').style.display    = 'none';
}

function resumeExam() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const s = JSON.parse(saved);

    currentExamData   = s.currentExamData;
    userAnswers       = s.userAnswers;
    currentIndex      = s.currentIndex;
    timeRemaining     = s.timeRemaining;
    activeMode        = s.activeMode || 'practice';
    examSelectionType = s.examSelectionType || 'random';
    partNum           = s.partNum || 1;
    isReviewMode      = false;

    document.getElementById('dashboard-wrap').style.display  = 'none';
    document.getElementById('resume-banner').style.display   = 'none';
    document.getElementById('setup-screen').style.display    = 'none';
    document.getElementById('quizResultModal').style.display = 'none';
    document.getElementById('resume-btn').style.display      = 'none';
    document.getElementById('quiz-interface').style.display  = 'block';
    document.getElementById('total-idx').innerText           = currentExamData.length;
    document.getElementById('submit-btn').style.display      = activeMode === 'exam' ? 'block' : 'none';

    const timerEl = document.getElementById('timer');
    timerEl.style.background = 'rgba(220,38,38,0.08)';
    timerEl.style.color      = 'var(--danger)';

    runTimer();
    renderQuestion();
}


function showResults(forced = false) {
    const answered = Object.keys(userAnswers).length;
    if (!forced && answered < currentExamData.length) {
        if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return;
    }

    clearInterval(timerId);
    localStorage.removeItem(STORAGE_KEY);

    let score = 0;
    currentExamData.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
    const total = currentExamData.length;
    const pct   = Math.round((score / total) * 100);

    document.getElementById('finalScoreText').innerText = pct;
    document.getElementById('modalCorrect').innerText   = score;
    document.getElementById('modalTotal').innerText     = total;
    document.getElementById('modalReviewBtn').style.display = activeMode === 'practice' ? 'none' : 'flex';

    const stats = JSON.parse(localStorage.getItem('bio101_stats')) || { tests: 0, total: 0 };
    stats.tests++;
    stats.total += pct;
    localStorage.setItem('bio101_stats', JSON.stringify(stats));
    const avg = Math.round(stats.total / stats.tests);
    document.getElementById('modalAvg').innerText = avg + '%';

    if (pct >= 70) {
        document.getElementById('resultIcon').innerText     = '🏆';
        document.getElementById('resultGreeting').innerText = 'Outstanding! 🌟';
        document.getElementById('resultFeedback').innerText = 'Excellent work! Keep it up!';
        confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
    } else if (pct >= 50) {
        document.getElementById('resultIcon').innerText     = '👍';
        document.getElementById('resultGreeting').innerText = 'Good Job!';
        document.getElementById('resultFeedback').innerText = 'Almost there — aim for 70%+!';
    } else {
        document.getElementById('resultIcon').innerText     = '💪';
        document.getElementById('resultGreeting').innerText = 'Keep Trying!';
        document.getElementById('resultFeedback').innerText = 'Review your notes and try again!';
    }

    document.getElementById('quiz-interface').style.display  = 'none';
    document.getElementById('quizResultModal').style.display = 'flex';
    document.getElementById('save-status').innerText = '✅ Score saved locally!';
    loadStats();
}

function enterReviewMode() {
    document.getElementById('quizResultModal').style.display = 'none';
    document.getElementById('quiz-interface').style.display  = 'block';
    isReviewMode = true;
    currentIndex = 0;
    document.getElementById('timer').innerText         = 'REVIEW';
    document.getElementById('timer').style.background = '#dcfce7';
    document.getElementById('timer').style.color      = '#16a34a';
    renderQuestion();
}


function loadStats() {
    const s = JSON.parse(localStorage.getItem('bio101_stats'));
    const bar = document.getElementById('stats-bar');
    if (!s) { bar.style.display = 'none'; return; }
    bar.style.display = 'grid';
    const avg = Math.round(s.total / s.tests);
    bar.innerHTML = `
        <div class="stat-card"><div class="stat-val">${s.tests}</div><div class="stat-lbl">Tests Taken</div></div>
        <div class="stat-card"><div class="stat-val">${avg}%</div><div class="stat-lbl">Average Score</div></div>
        <div class="stat-card"><div class="stat-val">${ALL_QUESTIONS.length}</div><div class="stat-lbl">Total Questions</div></div>
    `;
}


function shareQuizResult() {
    const score   = document.getElementById('finalScoreText').innerText;
    const section = examSelectionType === 'random' ? 'a random mix' : `Part ${partNum}`;
    const text    = `I just scored ${score}% on BIO 101 (${section})! 🌱\n\nPractice Biology CBT questions now! 📚🔥`;
    try {
        if (navigator.share) navigator.share({ title: `My BIO101 Score`, text });
        else { navigator.clipboard.writeText(text); alert('Score copied to clipboard! 📋'); }
    } catch (_) {}
}


function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}


buildDashboard();
loadStats();
checkResume();
</script>
</body>
</html>
