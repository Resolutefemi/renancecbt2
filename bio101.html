  { question: "Which is WRONG in respect to bryophytes?", options: { A: "Water is essential for fertilization", B: "Presence of archegonia", C: "Presence of ciliated sperms", D: "Presence of autotrophic independent sporophyte" }, answer: "D", explanation: "In bryophytes, the sporophyte is NOT independent — it is nutritionally dependent on the gametophyte." },
  { question: "Which of the following is diploid in moss plants?", options: { A: "Spore", B: "Leaves", C: "Spore mother cell", D: "Gametes" }, answer: "C", explanation: "The spore mother cell (sporocyte) is diploid (2n) and undergoes meiosis to produce haploid spores." },
  { question: "Bryophytes differ from pteridophytes in being:", options: { A: "Non-vascular", B: "Seeded", C: "Vascular", D: "Sporophytic" }, answer: "A", explanation: "Bryophytes lack true vascular tissue (xylem and phloem), while pteridophytes are vascular plants." },
  { question: "Alternation of generation is exhibited by:", options: { A: "Bryophytes", B: "Pteridophytes", C: "Gymnosperms", D: "All plants" }, answer: "D", explanation: "All plants exhibit alternation of generations, alternating between a haploid gametophyte and a diploid sporophyte phase." },
  { question: "Endosperm in gymnosperms is formed:", options: { A: "At the time of fertilization", B: "Before fertilization", C: "After fertilization", D: "Along with the development of embryo" }, answer: "B", explanation: "In gymnosperms, the endosperm (female gametophyte tissue) is formed before fertilization, unlike angiosperms where it forms after." },
  { question: "Phloem of gymnosperms differs from angiosperms in:", options: { A: "Having parenchyma", B: "Having no companion cells", C: "Having no sieve tubes", D: "Having no sclerenchyma" }, answer: "B", explanation: "Gymnosperm phloem lacks companion cells (which are characteristic of angiosperm phloem); they have albuminous cells instead." },

  /* ─── 103 ADDITIONAL QUESTIONS ─── */
  { question: "Which of the following macromolecules serves as the primary genetic material in most organisms?", options: { A: "RNA", B: "DNA", C: "Protein", D: "Lipid" }, answer: "B", explanation: "DNA (deoxyribonucleic acid) stores and transmits genetic information in most living organisms." },
  { question: "The process of copying DNA to produce an identical strand is called:", options: { A: "Translation", B: "Transcription", C: "Replication", D: "Transduction" }, answer: "C", explanation: "DNA replication is the process by which a cell duplicates its DNA before cell division." },
  { question: "In RNA, the base adenine pairs with:", options: { A: "Thymine", B: "Guanine", C: "Cytosine", D: "Uracil" }, answer: "D", explanation: "In RNA, uracil (U) replaces thymine (T) and pairs with adenine (A)." },
  { question: "The term 'genotype' refers to:", options: { A: "The physical appearance of an organism", B: "The genetic makeup of an organism", C: "The environment of an organism", D: "The behavior of an organism" }, answer: "B", explanation: "Genotype refers to the complete set of genes an organism carries, whether expressed or not." },
  { question: "The term 'phenotype' refers to:", options: { A: "The physical appearance of an organism", B: "The genetic makeup of an organism", C: "The number of chromosomes", D: "The habitat of an organism" }, answer: "A", explanation: "Phenotype is the observable characteristics of an organism, resulting from its genotype and environment." },
  { question: "Mendel's Law of Segregation states that:", options: { A: "Two genes always stay together", B: "Genes for two traits assort independently", C: "Each organism carries two alleles for each trait, which separate during gamete formation", D: "Mutations occur at random" }, answer: "C", explanation: "The Law of Segregation states that paired alleles separate during meiosis so each gamete gets only one allele for each trait." },
  { question: "Which blood type is considered the universal donor?", options: { A: "A", B: "B", C: "AB", D: "O" }, answer: "D", explanation: "Blood type O negative (O−) is the universal donor for red blood cells because it lacks A, B, and Rh antigens." },
  { question: "Which blood type is considered the universal recipient?", options: { A: "A", B: "B", C: "AB", D: "O" }, answer: "C", explanation: "Blood type AB positive (AB+) is the universal recipient, as it can accept blood from all other types." },
  { question: "Crossing over in meiosis occurs during:", options: { A: "Prophase I", B: "Metaphase I", C: "Anaphase I", D: "Telophase I" }, answer: "A", explanation: "Crossing over (exchange of segments between homologous chromosomes) occurs during Prophase I of meiosis." },
  { question: "Which type of mutation results in all subsequent codons being misread?", options: { A: "Missense mutation", B: "Nonsense mutation", C: "Frameshift mutation", D: "Silent mutation" }, answer: "C", explanation: "Frameshift mutations occur when bases are inserted or deleted, shifting the reading frame of all downstream codons." },
  { question: "The central dogma of molecular biology states:", options: { A: "RNA → DNA → Protein", B: "DNA → RNA → Protein", C: "Protein → DNA → RNA", D: "DNA → Protein → RNA" }, answer: "B", explanation: "The central dogma describes the flow of genetic information: DNA is transcribed to RNA, which is then translated to protein." },
  { question: "Which organelle is responsible for the light reactions of photosynthesis?", options: { A: "Stroma", B: "Thylakoid membrane", C: "Matrix", D: "Inner mitochondrial membrane" }, answer: "B", explanation: "The light-dependent reactions occur in the thylakoid membrane where chlorophyll captures light energy." },
  { question: "Which molecule serves as the primary electron carrier in photosynthesis?", options: { A: "ATP", B: "NADH", C: "NADPH", D: "FAD" }, answer: "C", explanation: "NADPH is the primary reducing agent (electron carrier) produced during the light reactions of photosynthesis." },
  { question: "The Calvin cycle (dark reactions) occurs in the:", options: { A: "Thylakoid membrane", B: "Stroma of the chloroplast", C: "Inner mitochondrial membrane", D: "Cytoplasm" }, answer: "B", explanation: "The Calvin cycle uses ATP and NADPH from light reactions to fix CO₂ into glucose in the stroma." },
  { question: "Which of the following is the final electron acceptor in aerobic respiration?", options: { A: "NAD⁺", B: "FAD", C: "Oxygen", D: "Pyruvate" }, answer: "C", explanation: "In the electron transport chain, oxygen is the final electron acceptor, forming water." },
  { question: "How many ATP molecules are produced per glucose molecule in aerobic cellular respiration?", options: { A: "2", B: "4", C: "32-38", D: "18" }, answer: "C", explanation: "Complete aerobic oxidation of one glucose molecule yields approximately 32-38 ATP molecules." },
  { question: "Glycolysis occurs in the:", options: { A: "Mitochondrial matrix", B: "Cytoplasm", C: "Nucleus", D: "Endoplasmic reticulum" }, answer: "B", explanation: "Glycolysis, the first stage of respiration, occurs in the cytoplasm and does not require oxygen." },
  { question: "The Krebs cycle (citric acid cycle) occurs in the:", options: { A: "Cytoplasm", B: "Nucleus", C: "Mitochondrial matrix", D: "Thylakoid" }, answer: "C", explanation: "The Krebs cycle takes place in the mitochondrial matrix, producing CO₂, NADH, FADH₂, and ATP." },
  { question: "Which process produces 2 ATP molecules per glucose and does not require oxygen?", options: { A: "Aerobic respiration", B: "Glycolysis", C: "Krebs cycle", D: "Oxidative phosphorylation" }, answer: "B", explanation: "Glycolysis produces a net gain of 2 ATP molecules and does not require oxygen." },
  { question: "Osmosis is defined as:", options: { A: "Movement of solutes from low to high concentration", B: "Movement of water across a selectively permeable membrane from high to low water potential", C: "Active transport of ions against a concentration gradient", D: "Movement of large particles through the cell membrane" }, answer: "B", explanation: "Osmosis is the passive diffusion of water molecules across a semipermeable membrane from higher to lower water potential." },
  { question: "Active transport differs from passive transport in that active transport:", options: { A: "Moves substances with the concentration gradient", B: "Requires energy (ATP)", C: "Does not require carrier proteins", D: "Only moves water molecules" }, answer: "B", explanation: "Active transport moves substances against their concentration gradient and requires ATP energy." },
  { question: "A solution that causes a cell to shrink due to water loss is called:", options: { A: "Hypotonic", B: "Isotonic", C: "Hypertonic", D: "Tonic" }, answer: "C", explanation: "A hypertonic solution has a higher solute concentration than the cell, so water moves out by osmosis, causing the cell to shrink." },
  { question: "Mitosis produces:", options: { A: "Two haploid daughter cells", B: "Four haploid daughter cells", C: "Two diploid daughter cells identical to the parent", D: "Four diploid daughter cells" }, answer: "C", explanation: "Mitosis produces two genetically identical diploid daughter cells used in growth and repair." },
  { question: "Meiosis produces:", options: { A: "Two diploid daughter cells", B: "Four haploid daughter cells", C: "Two haploid daughter cells", D: "Four diploid daughter cells" }, answer: "B", explanation: "Meiosis produces four non-identical haploid cells (gametes) through two rounds of division." },
  { question: "The process by which mRNA is decoded to produce a protein is called:", options: { A: "Replication", B: "Transcription", C: "Translation", D: "Transduction" }, answer: "C", explanation: "Translation is the process at the ribosome where the mRNA sequence is read to assemble a polypeptide." },
  { question: "A codon consists of how many nucleotides?", options: { A: "2", B: "3", C: "4", D: "5" }, answer: "B", explanation: "A codon is a sequence of three nucleotides in mRNA that codes for a specific amino acid or stop signal." },
  { question: "Which of the following is an example of a sex-linked trait in humans?", options: { A: "ABO blood type", B: "Sickle cell anemia", C: "Red-green color blindness", D: "Cystic fibrosis" }, answer: "C", explanation: "Red-green color blindness is caused by genes on the X chromosome and is more prevalent in males." },
  { question: "The Hardy-Weinberg principle applies when:", options: { A: "Population size is small", B: "Mutations occur frequently", C: "Mating is non-random", D: "Population is large, random mating, no mutation, no migration, no selection" }, answer: "D", explanation: "The Hardy-Weinberg equilibrium assumes ideal conditions: large population, random mating, no mutation, migration, or natural selection." },
  { question: "Which of the following types of selection reduces variation in a population by favoring the average phenotype?", options: { A: "Directional selection", B: "Disruptive selection", C: "Stabilizing selection", D: "Sexual selection" }, answer: "C", explanation: "Stabilizing selection favors intermediate phenotypes and reduces the frequency of extreme variants." },
  { question: "Reproductive isolation between two populations can lead to:", options: { A: "Gene flow", B: "Speciation", C: "Genetic drift", D: "Bottleneck effect" }, answer: "B", explanation: "When gene flow between populations stops due to reproductive isolation, they may diverge genetically, eventually becoming separate species." },
  { question: "Which of the following is NOT a characteristic of living organisms?", options: { A: "Reproduction", B: "Response to stimuli", C: "Made entirely of metal", D: "Growth and development" }, answer: "C", explanation: "Living organisms are made of organic molecules (cells), not metal. All other options are properties of life." },
  { question: "Homeostasis refers to:", options: { A: "Movement of organisms from one place to another", B: "The ability to maintain a stable internal environment", C: "The process of growth", D: "Reproduction by asexual means" }, answer: "B", explanation: "Homeostasis is the regulation of internal conditions (temperature, pH, glucose) to maintain a stable, balanced state." },
  { question: "Which level of ecological organization includes all organisms of different species in an area and their physical environment?", options: { A: "Population", B: "Community", C: "Ecosystem", D: "Biome" }, answer: "C", explanation: "An ecosystem includes all living organisms (biotic) and their physical environment (abiotic) in a defined area." },
  { question: "Which of the following correctly describes a food chain?", options: { A: "Energy flows from consumers to producers", B: "Energy flows from producers to consumers", C: "Nutrients flow from carnivores to herbivores", D: "Decomposers are at the top of the food chain" }, answer: "B", explanation: "In a food chain, energy flows from producers (plants) to primary consumers (herbivores) and then to higher consumers." },
  { question: "Which ecological term describes an organism that feeds on dead organic matter?", options: { A: "Producer", B: "Herbivore", C: "Carnivore", D: "Decomposer" }, answer: "D", explanation: "Decomposers (bacteria and fungi) break down dead organic matter, recycling nutrients back into the ecosystem." },
  { question: "What is the term for the place where an organism lives?", options: { A: "Niche", B: "Habitat", C: "Ecosystem", D: "Community" }, answer: "B", explanation: "A habitat is the specific environment where an organism lives and finds the resources it needs." },
  { question: "An ecological niche refers to:", options: { A: "The physical location of an organism", B: "The role and position a species occupies in its environment", C: "The number of individuals in a population", D: "The type of food an organism eats" }, answer: "B", explanation: "A niche encompasses all aspects of an organism's role: what it eats, where it lives, when it's active, and how it interacts with other species." },
  { question: "Which type of symbiosis benefits both organisms involved?", options: { A: "Commensalism", B: "Parasitism", C: "Mutualism", D: "Competition" }, answer: "C", explanation: "Mutualism is a symbiotic relationship where both organisms benefit, e.g., bees and flowers." },
  { question: "In commensalism, one organism benefits while the other:", options: { A: "Is harmed", B: "Is neither harmed nor benefited", C: "Also benefits", D: "Dies" }, answer: "B", explanation: "Commensalism involves one organism benefiting while the other is neither helped nor harmed." },
  { question: "Which of the following is an example of a mutualistic relationship?", options: { A: "Tapeworm in a human gut", B: "A remora fish attached to a shark", C: "Nitrogen-fixing bacteria in root nodules of legumes", D: "A cuckoo laying eggs in a warbler's nest" }, answer: "C", explanation: "Rhizobium bacteria fix nitrogen for legume plants while the plant provides carbohydrates for the bacteria — a classic mutualism." },
  { question: "Which gas is primarily responsible for the greenhouse effect?", options: { A: "Oxygen", B: "Nitrogen", C: "Carbon dioxide", D: "Hydrogen" }, answer: "C", explanation: "CO₂ traps heat in the atmosphere by absorbing infrared radiation re-emitted from Earth's surface." },
  { question: "The nitrogen cycle involves which of the following processes?", options: { A: "Nitrogen fixation, nitrification, denitrification", B: "Photosynthesis, respiration, transpiration", C: "Oxidation, reduction, hydrolysis", D: "Condensation, evaporation, precipitation" }, answer: "A", explanation: "Key steps in the nitrogen cycle include fixation (N₂ to NH₃), nitrification (NH₃ to NO₃⁻), and denitrification (NO₃⁻ back to N₂)." },
  { question: "Which hormone regulates blood glucose levels in the body?", options: { A: "Adrenaline", B: "Insulin", C: "Thyroxine", D: "Estrogen" }, answer: "B", explanation: "Insulin (produced by the pancreatic beta cells) lowers blood glucose by facilitating glucose uptake into cells." },
  { question: "Diabetes mellitus type 1 is caused by:", options: { A: "Insulin resistance", B: "Destruction of insulin-producing beta cells", C: "Excess glucagon production", D: "Poor dietary habits alone" }, answer: "B", explanation: "Type 1 diabetes is an autoimmune condition where the immune system destroys pancreatic beta cells, stopping insulin production." },
  { question: "Which part of the brain controls breathing and heart rate?", options: { A: "Cerebrum", B: "Cerebellum", C: "Medulla oblongata", D: "Thalamus" }, answer: "C", explanation: "The medulla oblongata (brainstem) regulates vital autonomic functions including respiration, heart rate, and blood pressure." },
  { question: "The functional unit of the kidney is called:", options: { A: "Alveolus", B: "Nephron", C: "Neuron", D: "Sarcomere" }, answer: "B", explanation: "The nephron is the structural and functional unit of the kidney responsible for filtering blood and forming urine." },
  { question: "Gas exchange in the lungs occurs in the:", options: { A: "Bronchi", B: "Trachea", C: "Alveoli", D: "Bronchioles" }, answer: "C", explanation: "Alveoli are tiny air sacs with thin walls richly supplied with capillaries where O₂ and CO₂ exchange occurs." },
  { question: "The process by which plants absorb water from the soil through roots is primarily through:", options: { A: "Active transport only", B: "Osmosis", C: "Diffusion of glucose", D: "Transpiration pull" }, answer: "B", explanation: "Water moves from soil into root hair cells by osmosis (high water potential in soil → lower water potential in root cells)." },
  { question: "Xylem tissue in plants is responsible for:", options: { A: "Transport of sugar solution (phloem sap)", B: "Upward transport of water and dissolved minerals", C: "Gaseous exchange", D: "Photosynthesis" }, answer: "B", explanation: "Xylem is the vascular tissue that transports water and dissolved mineral salts from roots to leaves." },
  { question: "Phloem tissue in plants is responsible for:", options: { A: "Water transport from roots to leaves", B: "Mechanical support", C: "Transport of sugars and organic compounds", D: "Gaseous exchange" }, answer: "C", explanation: "Phloem transports photosynthetic products (sugars) from leaves (source) to other parts of the plant (sink)." },
  { question: "Stomata are primarily used for:", options: { A: "Water absorption", B: "Gaseous exchange and transpiration", C: "Support and protection", D: "Mineral absorption" }, answer: "B", explanation: "Stomata are pores in leaves that allow CO₂ in for photosynthesis and O₂ and water vapor out, and are regulated by guard cells." },
  { question: "Which plant hormone promotes cell elongation and is involved in phototropism?", options: { A: "Cytokinin", B: "Gibberellin", C: "Abscisic acid", D: "Auxin" }, answer: "D", explanation: "Auxin (IAA) promotes elongation of stem cells and accumulates on the shaded side of a stem, causing the plant to bend toward light." },
  { question: "Which plant hormone promotes fruit ripening?", options: { A: "Ethylene", B: "Auxin", C: "Cytokinin", D: "Gibberellin" }, answer: "A", explanation: "Ethylene is a gaseous plant hormone that promotes fruit ripening, leaf abscission, and senescence." },
  { question: "What is the name of the process by which plants convert light energy into chemical energy?", options: { A: "Chemosynthesis", B: "Photosynthesis", C: "Cellular respiration", D: "Fermentation" }, answer: "B", explanation: "Photosynthesis is the process in which plants, algae, and some bacteria use light energy to convert CO₂ and H₂O into glucose and O₂." },
  { question: "The overall equation for photosynthesis is:", options: { A: "6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂", B: "C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + energy", C: "6O₂ + 6H₂O → C₆H₁₂O₆ + CO₂", D: "C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂" }, answer: "A", explanation: "The equation 6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂ summarizes photosynthesis." },
  { question: "Plasmids are:", options: { A: "Large chromosomal DNA molecules", B: "Small circular DNA molecules found mainly in bacteria", C: "RNA molecules used in translation", D: "Membrane-bound organelles" }, answer: "B", explanation: "Plasmids are small, circular, double-stranded DNA molecules found in bacteria that replicate independently of chromosomal DNA." },
  { question: "Which enzyme is used to cut DNA at specific sequences in recombinant DNA technology?", options: { A: "DNA polymerase", B: "Ligase", C: "Restriction endonuclease", D: "Helicase" }, answer: "C", explanation: "Restriction endonucleases (restriction enzymes) cut DNA at specific palindromic sequences, generating fragments for cloning." },
  { question: "PCR stands for:", options: { A: "Protein Chain Reaction", B: "Polymerase Chain Reaction", C: "Polynucleotide Cloning Reaction", D: "Primary Cell Replication" }, answer: "B", explanation: "PCR (Polymerase Chain Reaction) is a technique used to amplify specific DNA sequences in vitro." },
  { question: "Which scientist first described the double helix structure of DNA?", options: { A: "Gregor Mendel", B: "Charles Darwin", C: "James Watson and Francis Crick", D: "Louis Pasteur" }, answer: "C", explanation: "Watson and Crick, using X-ray diffraction data from Rosalind Franklin, proposed the double helix model of DNA in 1953." },
  { question: "What is the term for an organism with two different alleles for a particular gene?", options: { A: "Homozygous", B: "Hemizygous", C: "Heterozygous", D: "Polyploid" }, answer: "C", explanation: "A heterozygous organism carries two different alleles (e.g., Aa) for a gene at a given locus." },
  { question: "What is the term for an organism with two identical alleles for a particular gene?", options: { A: "Homozygous", B: "Hemizygous", C: "Heterozygous", D: "Diploid" }, answer: "A", explanation: "A homozygous organism carries two identical alleles (e.g., AA or aa) for a gene." },
  { question: "In a monohybrid cross between two heterozygotes (Aa × Aa), what is the expected phenotypic ratio?", options: { A: "1:1", B: "1:2:1", C: "3:1", D: "9:3:3:1" }, answer: "C", explanation: "A cross of Aa × Aa yields AA : Aa : aa = 1:2:1 genotypically, and dominant : recessive = 3:1 phenotypically." },
  { question: "Which type of immunity involves the production of antibodies by B cells?", options: { A: "Cell-mediated immunity", B: "Humoral (antibody-mediated) immunity", C: "Innate immunity", D: "Passive immunity" }, answer: "B", explanation: "Humoral immunity involves B lymphocytes that differentiate into plasma cells and produce specific antibodies." },
  { question: "Antibodies are produced by which cells?", options: { A: "T cells", B: "Red blood cells", C: "Plasma cells (activated B cells)", D: "Natural killer cells" }, answer: "C", explanation: "Plasma cells, derived from activated B lymphocytes, are the primary producers of antibodies." },
  { question: "Which of the following is an autoimmune disease?", options: { A: "Influenza", B: "Malaria", C: "Rheumatoid arthritis", D: "AIDS" }, answer: "C", explanation: "Rheumatoid arthritis is an autoimmune disease where the immune system attacks the synovial joints." },
  { question: "HIV attacks which type of immune cells?", options: { A: "B cells", B: "Red blood cells", C: "CD4+ T helper cells", D: "Neutrophils" }, answer: "C", explanation: "HIV (Human Immunodeficiency Virus) targets and destroys CD4+ T helper cells, progressively weakening the immune system." },
  { question: "What is the role of a vaccine?", options: { A: "Directly kill pathogens in the body", B: "Replace damaged immune cells", C: "Stimulate the immune system to develop memory against a specific pathogen", D: "Suppress the immune response" }, answer: "C", explanation: "Vaccines introduce antigens (weakened or dead pathogens or their parts) to stimulate the immune system to form memory cells without causing disease." },
  { question: "Which type of white blood cell is responsible for engulfing and digesting pathogens?", options: { A: "Lymphocyte", B: "Erythrocyte", C: "Phagocyte (neutrophil/macrophage)", D: "Thrombocyte" }, answer: "C", explanation: "Phagocytes (neutrophils and macrophages) engulf and destroy pathogens through phagocytosis." },
  { question: "Which molecule carries amino acids to the ribosome during translation?", options: { A: "mRNA", B: "rRNA", C: "tRNA", D: "snRNA" }, answer: "C", explanation: "Transfer RNA (tRNA) carries specific amino acids to the ribosome, matching anticodons to mRNA codons." },
  { question: "The site of ribosomal RNA (rRNA) assembly in the nucleus is the:", options: { A: "Nuclear pore", B: "Nucleolus", C: "Chromatin", D: "Nuclear envelope" }, answer: "B", explanation: "The nucleolus is the site within the nucleus where rRNA is synthesized and ribosomal subunits are assembled." },
  { question: "Which enzyme synthesizes RNA from a DNA template?", options: { A: "DNA polymerase", B: "RNA polymerase", C: "Ligase", D: "Helicase" }, answer: "B", explanation: "RNA polymerase binds to the promoter region of a gene and synthesizes a complementary RNA strand from the DNA template." },
  { question: "The sequence of amino acids in a protein is determined by:", options: { A: "The sequence of nucleotides in DNA/mRNA", B: "The pH of the cell", C: "The type of membrane lipids", D: "The amount of ATP available" }, answer: "A", explanation: "The nucleotide sequence in a gene (via mRNA codons) determines the order of amino acids in a polypeptide." },
  { question: "Which of the following is an example of a frameshift mutation?", options: { A: "Substitution of one nucleotide", B: "Insertion of one nucleotide", C: "No change in the reading frame", D: "Substitution that codes for the same amino acid" }, answer: "B", explanation: "Insertion (or deletion) of one nucleotide shifts the reading frame of all subsequent codons, usually producing a non-functional protein." },
  { question: "What is the term for the movement of alleles from one population to another?", options: { A: "Mutation", B: "Genetic drift", C: "Gene flow", D: "Natural selection" }, answer: "C", explanation: "Gene flow is the transfer of alleles between populations through migration, increasing or decreasing allele frequencies." },
  { question: "What is the bottleneck effect?", options: { A: "When a large population grows rapidly", B: "When a small group of individuals establish a new population", C: "When a population dramatically decreases, reducing genetic diversity", D: "When natural selection favors extreme phenotypes" }, answer: "C", explanation: "The bottleneck effect occurs when a catastrophic event drastically reduces population size, resulting in loss of genetic variation." },
  { question: "What is the founder effect?", options: { A: "When genetic drift occurs in a large population", B: "When a small group colonizes a new area, carrying only a fraction of the original population's alleles", C: "When natural selection eliminates deleterious alleles", D: "When mutation rates increase" }, answer: "B", explanation: "The founder effect occurs when a small group separates from a larger population to establish a new colony, often with reduced genetic diversity." },
  { question: "The theory of evolution by natural selection was jointly proposed by:", options: { A: "Darwin and Wallace", B: "Darwin and Mendel", C: "Wallace and Lamarck", D: "Darwin and Huxley" }, answer: "A", explanation: "Charles Darwin and Alfred Russel Wallace independently developed the theory of evolution by natural selection and jointly presented it in 1858." },
  { question: "Analogous structures are those that:", options: { A: "Share a common ancestor", B: "Perform similar functions but have different evolutionary origins", C: "Are found in the same species", D: "Have identical genetic sequences" }, answer: "B", explanation: "Analogous structures (e.g., wings of insects and birds) perform similar functions but evolved independently (convergent evolution)." },
  { question: "Homologous structures are those that:", options: { A: "Perform the same function in different organisms", B: "Share a common ancestral origin, even if their functions differ", C: "Are found only in vertebrates", D: "Are identical in appearance" }, answer: "B", explanation: "Homologous structures (e.g., the forelimbs of mammals) have the same basic anatomy inherited from a common ancestor, though they may now serve different functions." },
  { question: "Vestigial structures are best explained by:", options: { A: "Convergent evolution", B: "Genetic mutation", C: "Evolutionary history (descent with modification)", D: "Disruptive selection" }, answer: "C", explanation: "Vestigial structures (e.g., human appendix) are reduced remnants of structures that had a function in an ancestor, explained by evolutionary descent." },
  { question: "The molecular evidence supporting evolution includes:", options: { A: "Similarities in DNA and protein sequences among related species", B: "Differences in habitat among species", C: "The same phenotype in different populations", D: "Geographic isolation alone" }, answer: "A", explanation: "Closely related species share more similar DNA and protein sequences, providing molecular evidence for common ancestry." },
  { question: "Which of the following represents the correct definition of adaptive radiation?", options: { A: "Evolution of a single ancestral species into many different forms adapted to different environments", B: "Migration of organisms to new areas", C: "Convergent evolution of similar traits in unrelated species", D: "Reduction in diversity due to habitat loss" }, answer: "A", explanation: "Adaptive radiation is the rapid diversification of a single ancestral lineage into many species occupying different ecological niches, e.g., Darwin's finches." },
  { question: "What is coevolution?", options: { A: "Two species evolving independently in the same environment", B: "Reciprocal evolutionary change in interacting species", C: "One species going extinct while another thrives", D: "The evolution of body size over time" }, answer: "B", explanation: "Coevolution refers to the process whereby two or more species exert selective pressure on each other, each driving the other's evolution (e.g., flowers and pollinators)." },
  { question: "Which type of speciation occurs when populations are geographically separated?", options: { A: "Sympatric speciation", B: "Allopatric speciation", C: "Parapatric speciation", D: "Peripatric speciation" }, answer: "B", explanation: "Allopatric speciation occurs when a geographic barrier separates a population, preventing gene flow and allowing divergence." },
  { question: "Which of the following is NOT a property of enzymes?", options: { A: "They are biological catalysts", B: "They are consumed in chemical reactions", C: "They lower activation energy", D: "They are usually proteins" }, answer: "B", explanation: "Enzymes are not consumed in the reactions they catalyze; they are regenerated and can be reused." },
  { question: "The active site of an enzyme:", options: { A: "Is where substrates bind", B: "Is the entire enzyme surface", C: "Is made of lipids", D: "Changes permanently after each reaction" }, answer: "A", explanation: "The active site is the specific region of an enzyme where the substrate binds and the chemical reaction occurs." },
  { question: "Enzyme activity can be reduced by:", options: { A: "Optimal temperature and pH", B: "Increased substrate concentration", C: "High temperatures that denature the enzyme", D: "Presence of cofactors" }, answer: "C", explanation: "High temperatures disrupt hydrogen bonds and other interactions maintaining enzyme structure, leading to denaturation and loss of activity." },
  { question: "What is a competitive inhibitor?", options: { A: "A molecule that binds to the active site and blocks substrate entry", B: "A molecule that destroys the enzyme permanently", C: "A molecule that binds to the substrate", D: "A molecule that activates the enzyme" }, answer: "A", explanation: "Competitive inhibitors have a similar shape to the substrate and compete for binding at the active site, reducing enzyme activity." },
  { question: "An allosteric inhibitor affects enzyme activity by:", options: { A: "Competing for the active site", B: "Binding to a site other than the active site, changing the enzyme's shape", C: "Degrading the enzyme protein", D: "Increasing substrate concentration" }, answer: "B", explanation: "Allosteric inhibitors bind to a regulatory (allosteric) site, inducing a conformational change that reduces the enzyme's affinity for its substrate." },
  { question: "Proteins are made up of chains of:", options: { A: "Nucleotides", B: "Fatty acids", C: "Amino acids", D: "Monosaccharides" }, answer: "C", explanation: "Proteins are polymers of amino acids linked by peptide bonds." },
  { question: "The four levels of protein structure are:", options: { A: "Primary, secondary, tertiary, quaternary", B: "Primary, intermediate, tertiary, final", C: "Linear, folded, globular, fibrous", D: "Hydrogen, ionic, covalent, disulfide" }, answer: "A", explanation: "Proteins are organized into primary (amino acid sequence), secondary (alpha helices/beta sheets), tertiary (3D folding), and quaternary (multi-subunit) structures." },
  { question: "Which bonds are primarily responsible for maintaining the secondary structure of proteins?", options: { A: "Peptide bonds", B: "Disulfide bonds", C: "Hydrogen bonds", D: "Ionic bonds" }, answer: "C", explanation: "Hydrogen bonds between backbone amide and carbonyl groups stabilize alpha helices and beta-pleated sheets." },
  { question: "Carbohydrates are made up of:", options: { A: "Amino acids", B: "Fatty acids and glycerol", C: "Monosaccharides (simple sugars)", D: "Nucleotides" }, answer: "C", explanation: "Carbohydrates are polymers of monosaccharides (e.g., glucose, fructose) linked by glycosidic bonds." },
  { question: "The primary function of lipids in the cell membrane is:", options: { A: "To provide structural support and form the bilayer", B: "To catalyze chemical reactions", C: "To carry genetic information", D: "To transport oxygen" }, answer: "A", explanation: "Phospholipids form the bilayer of cell membranes, with hydrophilic heads facing water and hydrophobic tails forming the interior." },
  { question: "Nucleic acids are made up of:", options: { A: "Amino acids", B: "Monosaccharides", C: "Nucleotides", D: "Fatty acids" }, answer: "C", explanation: "Nucleic acids (DNA and RNA) are polymers of nucleotides, each consisting of a sugar, phosphate group, and nitrogenous base." },
  { question: "Which of the following is an example of a disaccharide?", options: { A: "Glucose", B: "Starch", C: "Sucrose", D: "Cellulose" }, answer: "C", explanation: "Sucrose (table sugar) is a disaccharide composed of glucose and fructose linked by a glycosidic bond." },
  { question: "Which of the following is a polysaccharide used for energy storage in animals?", options: { A: "Starch", B: "Cellulose", C: "Glycogen", D: "Sucrose" }, answer: "C", explanation: "Glycogen is the form of glucose storage in animals, primarily stored in the liver and muscles." },
  { question: "Cellulose differs from starch in that cellulose:", options: { A: "Is more easily digested by humans", B: "Has beta-glycosidic linkages between glucose units", C: "Contains fructose instead of glucose", D: "Is a lipid, not a carbohydrate" }, answer: "B", explanation: "Cellulose is made of glucose monomers linked by beta-1,4-glycosidic bonds, which humans cannot digest (no cellulase enzyme)." },
  { question: "The process of endocytosis involves:", options: { A: "Secretion of materials from the cell", B: "Uptake of materials into the cell via membrane folding", C: "Transport of ions against a gradient", D: "Diffusion of small molecules through the membrane" }, answer: "B", explanation: "Endocytosis is the process where the cell membrane engulfs material and forms an internal vesicle, bringing substances into the cell." },
  { question: "Which of the following is a purine base found in DNA?", options: { A: "Thymine", B: "Cytosine", C: "Adenine", D: "Uracil" }, answer: "C", explanation: "Purines (adenine and guanine) have a double-ring structure. Pyrimidines (thymine, cytosine, uracil) have single rings." },
  { question: "The anticodon is found on:", options: { A: "mRNA", B: "rRNA", C: "tRNA", D: "DNA" }, answer: "C", explanation: "The anticodon is a three-nucleotide sequence on tRNA that is complementary to a specific mRNA codon." },
  { question: "Which of the following is a posttranslational modification?", options: { A: "Splicing of pre-mRNA", B: "Addition of a 5' cap to mRNA", C: "Phosphorylation of a protein", D: "Polyadenylation of mRNA" }, answer: "C", explanation: "Post-translational modifications (e.g., phosphorylation, glycosylation) alter proteins after they are synthesized to regulate their activity." },
  { question: "Which type of RNA carries genetic information from DNA to the ribosome?", options: { A: "tRNA", B: "rRNA", C: "mRNA", D: "miRNA" }, answer: "C", explanation: "Messenger RNA (mRNA) carries the genetic information from DNA in the nucleus to the ribosome in the cytoplasm for translation." },
  { question: "The fluid mosaic model of the plasma membrane describes:", options: { A: "A rigid, fixed structure of lipids and proteins", B: "A dynamic bilayer with proteins that can move laterally", C: "A membrane composed entirely of proteins", D: "A structure with no lipid component" }, answer: "B", explanation: "The fluid mosaic model (Singer & Nicolson, 1972) describes the plasma membrane as a fluid phospholipid bilayer with mobile embedded proteins." },
  { question: "Apoptosis is the term for:", options: { A: "Uncontrolled cell division", B: "Programmed cell death", C: "Cell differentiation", D: "Cell growth" }, answer: "B", explanation: "Apoptosis is a regulated process of cell self-destruction important in development, immune function, and tissue homeostasis." },
  { question: "Cancer is characterized by:", options: { A: "Controlled cell death", B: "Uncontrolled cell division and growth", C: "Reduced metabolic rate", D: "Loss of mitochondria" }, answer: "B", explanation: "Cancer involves unregulated cell proliferation where cells ignore normal growth signals and may invade other tissues (metastasize)." }
];

/* ══════════════════════════════════
   STATE VARIABLES
══════════════════════════════════ */
let currentExamData = [];
let userAnswers     = {};
let currentIndex    = 0;
let timeRemaining   = 0;
let timerId         = null;
let activeMode      = 'practice';
let examSelectionType = 'random';
let partNum         = 1;
let isReviewMode    = false;

/* ══════════════════════════════════
   DASHBOARD BUILDER
══════════════════════════════════ */
function buildDashboard() {
    const dash = document.getElementById('dashboard');
    dash.innerHTML = '';

    const totalQ = ALL_QUESTIONS.length;
    const partSize = 60;
    const numParts = Math.ceil(totalQ / partSize);

    // Random mix
    const randomBox = document.createElement('div');
    randomBox.className = 'box box-random';
    randomBox.innerHTML = `<i class="fa-solid fa-shuffle" style="font-size:2rem;"></i><h3>Random Mix</h3><p>${totalQ} Questions</p>`;
    randomBox.onclick = () => showSetup('random');
    dash.appendChild(randomBox);

    // Parts
    for (let p = 1; p <= numParts; p++) {
        const start = (p - 1) * partSize + 1;
        const end   = Math.min(p * partSize, totalQ);
        const box   = document.createElement('div');
        box.className = 'box';
        box.innerHTML = `<i class="fa-solid fa-book-open" style="font-size:2rem; color:var(--primary);"></i><h3>Part ${p}</h3><p>Q${start} – Q${end}</p>`;
        box.onclick = () => showSetup('part', p);
        dash.appendChild(box);
    }
}

function showSetup(type, pNum = 1) {
    examSelectionType = type;
    partNum = pNum;
    document.getElementById('dashboard-wrap').style.display = 'none';
    document.getElementById('setup-screen').style.display   = 'block';
    document.getElementById('random-settings').style.display = type === 'random' ? 'block' : 'none';

    if (type === 'random') {
        document.getElementById('setup-title').innerText = '🔀 Random Mix Setup';
    } else {
        const size = 60;
        const start = (pNum - 1) * size + 1;
        const end   = Math.min(pNum * size, ALL_QUESTIONS.length);
        document.getElementById('setup-title').innerText = `📖 Part ${pNum} (Q${start}–Q${end})`;
    }
}
document.addEventListener('keydown', (e) => {

    // Don't fire if user is typing in an input or select
    if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;

    // Only works during an active quiz
    if (document.getElementById('quiz-interface').style.display === 'none') return;

    const key = e.key.toUpperCase();

    // A, B, C, D — find the matching button and click it
    if (['A', 'B', 'C', 'D'].includes(key)) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            // each button starts with "A." or "B." etc
            if (btn.innerText.trim().startsWith(key + '.')) {
                btn.click();
            }
        });
        return;
    }

    
    if (key === 'N') { move(1); return; }

   
    if (key === 'P') { move(-1); return; }

});
function goHome() {
    clearInterval(timerId);
    document.getElementById('dashboard-wrap').style.display  = 'block';
    document.getElementById('setup-screen').style.display    = 'none';
    document.getElementById('quiz-interface').style.display  = 'none';
    document.getElementById('quizResultModal').style.display = 'none';

    isReviewMode = false;
    checkResume();
    loadStats();
}

/* ══════════════════════════════════
   EXAM START
══════════════════════════════════ */
function startExam() {
    activeMode  = document.getElementById('quiz-mode').value;
    const mins  = parseInt(document.getElementById('t-limit').value) || 30;
    const shuffQ = document.getElementById('shuffle-questions').checked;
    const shuffO = document.getElementById('shuffle-options').checked;
    timeRemaining = mins * 60;

    let pool;
    if (examSelectionType === 'random') {
        const qty = parseInt(document.getElementById('q-count').value) || 50;
        pool = shuffle([...ALL_QUESTIONS]).slice(0, Math.min(qty, ALL_QUESTIONS.length));
    } else {
        const size  = 60;
        const start = (partNum - 1) * size;
        pool = [...ALL_QUESTIONS].slice(start, start + size);
    }

    if (shuffQ) pool = shuffle(pool);

    currentExamData = pool.map(q => {
        const keys = ['A', 'B', 'C', 'D'];
        const values = keys.map(k => q.options[k]);
        const answer = q.options[q.answer];

        if (shuffO) {
            const zipped = keys.map((k, i) => ({ label: k, val: values[i] }));
            const shuffled = shuffle(zipped);
            const newOpts = {};
            shuffled.forEach((item, i) => { newOpts[keys[i]] = item.val; });
            const newAnswer = keys[shuffled.findIndex(s => s.val === answer)];
            return { question: q.question, options: newOpts, answer: newAnswer, explanation: q.explanation || '' };
        }

        return { question: q.question, options: q.options, answer: q.answer, explanation: q.explanation || '' };
    });

    userAnswers  = {};
    currentIndex = 0;
    isReviewMode = false;

    document.getElementById('setup-screen').style.display   = 'none';
    document.getElementById('quiz-interface').style.display = 'block';
    document.getElementById('total-idx').innerText = currentExamData.length;
    document.getElementById('submit-btn').style.display     = activeMode === 'exam' ? 'block' : 'none';
    document.getElementById('finish-review-btn').style.display = 'none';

    const timerEl = document.getElementById('timer');
    timerEl.style.background = 'rgba(220,38,38,0.08)';
    timerEl.style.color      = 'var(--danger)';

    runTimer();
    renderQuestion();
    saveState();
}

/* ══════════════════════════════════
   TIMER
══════════════════════════════════ */
function runTimer() {
    clearInterval(timerId);
    updateTimerDisplay();
    timerId = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        saveState();
        if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
    }, 1000);
}

function updateTimerDisplay() {
    const m = Math.floor(timeRemaining / 60);
    const s = timeRemaining % 60;
    document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const el = document.getElementById('timer');
    if (timeRemaining <= 120) { el.style.background = 'rgba(220,38,38,0.18)'; el.style.color = '#dc2626'; }
    else if (timeRemaining <= 300) { el.style.background = 'rgba(234,88,12,0.12)'; el.style.color = '#ea580c'; }
}

/* ══════════════════════════════════
   RENDER QUESTION
══════════════════════════════════ */
function renderQuestion() {
    const q        = currentExamData[currentIndex];
    const answered = userAnswers[currentIndex];
    document.getElementById('cur-idx').innerText  = currentIndex + 1;
    document.getElementById('question-text').innerText = q.question;

    const optWrap  = document.getElementById('options-wrap');
    const feedArea = document.getElementById('feedback-area');
    optWrap.innerHTML = '';
    feedArea.innerHTML = '';

    Object.entries(q.options).forEach(([key, val]) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = `${key}. ${val}`;
        btn.onclick = () => handleAnswer(key);

        if (answered) {
            btn.disabled = true;
            if (key === q.answer) btn.classList.add('correct');
            if (key === answered && answered !== q.answer) btn.classList.add('wrong');
        }
        optWrap.appendChild(btn);
    });

    const expHtml = q.explanation
        ? `<br><span style="font-weight:400; font-size:0.88rem;">💡 ${q.explanation}</span>` : '';

    if (answered && activeMode === 'practice') {
        const ok = answered === q.answer;
        feedArea.innerHTML = `<div class="feedback-msg" style="background:${ok ? '#dcfce7' : '#fee2e2'}; color:${ok ? '#166534' : '#991b1b'}; border:1px solid ${ok ? '#22c55e' : '#ef4444'}">
            ${ok ? '✔ Correct!' : '✘ Incorrect. Answer: <strong>' + q.answer + '. ' + q.options[q.answer] + '</strong>'}${expHtml}</div>`;
    }

    if (isReviewMode && !answered) {
        feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3;color:#854d0e;border:1px solid #fde047;">
            ⚠ Not answered. Correct: <strong>${q.answer}. ${q.options[q.answer]}</strong>${expHtml}</div>`;
    }

    const isLast = currentIndex === currentExamData.length - 1;
    document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
    document.getElementById('submit-btn').style.display        = isReviewMode ? 'none' : (activeMode === 'exam' ? 'block' : 'none');
    document.getElementById('finish-review-btn').style.display = isReviewMode ? 'block' : 'none';
}

function handleAnswer(key) {
    if (userAnswers[currentIndex] !== undefined) return;
    userAnswers[currentIndex] = key;
    renderQuestion();
    saveState();

    if (activeMode === 'practice') {
        const isLast = currentIndex === currentExamData.length - 1;
        if (!isLast) {
            setTimeout(() => { currentIndex++; renderQuestion(); }, 1000);
        } else {
            setTimeout(() => showResults(true), 1200);
        }
    }
}

function move(d) {
    const n = currentIndex + d;
    if (n >= 0 && n < currentExamData.length) { currentIndex = n; renderQuestion(); }
}

/* ══════════════════════════════════
   SAVE / RESUME
══════════════════════════════════ */
function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        currentExamData, userAnswers, currentIndex,
        timeRemaining, activeMode, examSelectionType, partNum,
        savedAt: Date.now()
    }));
}

function checkResume() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) { document.getElementById('resume-btn').style.display = 'none'; return; }
    const s = JSON.parse(saved);
    const mins = Math.floor((Date.now() - s.savedAt) / 60000);
    if (mins > 180) { localStorage.removeItem(STORAGE_KEY); return; }

    document.getElementById('resume-btn').style.display = 'inline-flex';
    const banner = document.getElementById('resume-banner');
    banner.style.display = 'block';
    banner.innerHTML = `<strong>📌 Unfinished Session</strong> — ${s.currentExamData.length} questions, ${Object.keys(s.userAnswers).length} answered. 
        <button class="btn" style="margin-left:12px; padding:6px 14px; font-size:0.85rem;" onclick="resumeExam()">Resume</button>
        <button class="btn" style="background:#64748b; margin-left:6px; padding:6px 14px; font-size:0.85rem;" onclick="discardSession()">Discard</button>`;
}

function discardSession() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('resume-banner').style.display = 'none';
    document.getElementById('resume-btn').style.display    = 'none';
}

function resumeExam() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const s = JSON.parse(saved);

    currentExamData   = s.currentExamData;
    userAnswers       = s.userAnswers;
    currentIndex      = s.currentIndex;
    timeRemaining     = s.timeRemaining;
    activeMode        = s.activeMode || 'practice';
    examSelectionType = s.examSelectionType || 'random';
    partNum           = s.partNum || 1;
    isReviewMode      = false;

    document.getElementById('dashboard-wrap').style.display  = 'none';
    document.getElementById('resume-banner').style.display   = 'none';
    document.getElementById('setup-screen').style.display    = 'none';
    document.getElementById('quizResultModal').style.display = 'none';
    document.getElementById('resume-btn').style.display      = 'none';
    document.getElementById('quiz-interface').style.display  = 'block';
    document.getElementById('total-idx').innerText           = currentExamData.length;
    document.getElementById('submit-btn').style.display      = activeMode === 'exam' ? 'block' : 'none';

    const timerEl = document.getElementById('timer');
    timerEl.style.background = 'rgba(220,38,38,0.08)';
    timerEl.style.color      = 'var(--danger)';

    runTimer();
    renderQuestion();
}

/* ══════════════════════════════════
   SHOW RESULTS
══════════════════════════════════ */
function showResults(forced = false) {
    const answered = Object.keys(userAnswers).length;
    if (!forced && answered < currentExamData.length) {
        if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return;
    }

    clearInterval(timerId);
    localStorage.removeItem(STORAGE_KEY);

    let score = 0;
    currentExamData.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
    const total = currentExamData.length;
    const pct   = Math.round((score / total) * 100);

    document.getElementById('finalScoreText').innerText = pct;
    document.getElementById('modalCorrect').innerText   = score;
    document.getElementById('modalTotal').innerText     = total;
    document.getElementById('modalReviewBtn').style.display = activeMode === 'practice' ? 'none' : 'flex';

    // Update cumulative avg
    const stats = JSON.parse(localStorage.getItem('bio101_stats')) || { tests: 0, total: 0 };
    stats.tests++;
    stats.total += pct;
    localStorage.setItem('bio101_stats', JSON.stringify(stats));
    const avg = Math.round(stats.total / stats.tests);
    document.getElementById('modalAvg').innerText = avg + '%';

    if (pct >= 70) {
        document.getElementById('resultIcon').innerText     = '🏆';
        document.getElementById('resultGreeting').innerText = 'Outstanding! 🌟';
        document.getElementById('resultFeedback').innerText = 'Excellent work! Keep it up!';
        confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
    } else if (pct >= 50) {
        document.getElementById('resultIcon').innerText     = '👍';
        document.getElementById('resultGreeting').innerText = 'Good Job!';
        document.getElementById('resultFeedback').innerText = 'Almost there — aim for 70%+!';
    } else {
        document.getElementById('resultIcon').innerText     = '💪';
        document.getElementById('resultGreeting').innerText = 'Keep Trying!';
        document.getElementById('resultFeedback').innerText = 'Review your notes and try again!';
    }

    document.getElementById('quiz-interface').style.display  = 'none';
    document.getElementById('quizResultModal').style.display = 'flex';
    document.getElementById('save-status').innerText = '✅ Score saved locally!';
    loadStats();
}

function enterReviewMode() {
    document.getElementById('quizResultModal').style.display = 'none';
    document.getElementById('quiz-interface').style.display  = 'block';
    isReviewMode = true;
    currentIndex = 0;
    document.getElementById('timer').innerText         = 'REVIEW';
    document.getElementById('timer').style.background = '#dcfce7';
    document.getElementById('timer').style.color      = '#16a34a';
    renderQuestion();
}

/* ══════════════════════════════════
   STATS
══════════════════════════════════ */
function loadStats() {
    const s = JSON.parse(localStorage.getItem('bio101_stats'));
    const bar = document.getElementById('stats-bar');
    if (!s) { bar.style.display = 'none'; return; }
    bar.style.display = 'grid';
    const avg = Math.round(s.total / s.tests);
    bar.innerHTML = `
        <div class="stat-card"><div class="stat-val">${s.tests}</div><div class="stat-lbl">Tests Taken</div></div>
        <div class="stat-card"><div class="stat-val">${avg}%</div><div class="stat-lbl">Average Score</div></div>
        <div class="stat-card"><div class="stat-val">${ALL_QUESTIONS.length}</div><div class="stat-lbl">Total Questions</div></div>
    `;
}

/* ══════════════════════════════════
   SHARE
══════════════════════════════════ */
function shareQuizResult() {
    const score   = document.getElementById('finalScoreText').innerText;
    const section = examSelectionType === 'random' ? 'a random mix' : `Part ${partNum}`;
    const text    = `I just scored ${score}% on BIO 101 (${section})! 🌱\n\nPractice Biology CBT questions now! 📚🔥`;
    try {
        if (navigator.share) navigator.share({ title: `My BIO101 Score`, text });
        else { navigator.clipboard.writeText(text); alert('Score copied to clipboard! 📋'); }
    } catch (_) {}
}

/* ══════════════════════════════════
   UTILITIES
══════════════════════════════════ */
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
buildDashboard();
loadStats();
checkResume();
</script>
