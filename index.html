<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENANCE — Create Account</title>
<link rel="shortcut icon" href="logo.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabinet+Grotesk:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#070a12;--blue:#2563eb;--glow:#3b82f6;--cyan:#06b6d4;
  --ink:#f8fafc;--muted:rgba(148,163,184,.55);
  --card:rgba(8,12,22,.9);--border:rgba(59,130,246,.15);
}
html{height:100%;overflow:hidden}
body{height:100%;background:var(--b);font-family:'Cabinet Grotesk',sans-serif;color:var(--ink);overflow:hidden;cursor:none}

/* CURSOR (Hidden on mobile) */
#cur{position:fixed;width:10px;height:10px;background:var(--glow);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .15s,height .15s}
#cur-ring{position:fixed;width:40px;height:40px;border:1.5px solid rgba(59,130,246,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s}

/* CANVAS & GRAIN */
#c{position:fixed;inset:0;z-index:0}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);animation:scan-d 10s linear infinite}
@keyframes scan-d{0%{background-position:0 0}100%{background-position:0 400px}}
.grain{position:fixed;inset:-200%;z-index:2;width:400%;height:400%;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:g .7s steps(1) infinite}
@keyframes g{0%{transform:translate(0,0)}20%{transform:translate(-5%,-10%)}40%{transform:translate(-15%,5%)}60%{transform:translate(7%,-25%)}80%{transform:translate(-5%,25%)}100%{transform:translate(0,0)}}

/* LAYOUT */
.layout{position:relative;z-index:10;display:flex;justify-content:center;align-items:center;height:100vh;padding:20px;overflow:hidden}

/* CARD WITH PREMIUM GLASS & GLARE */
.card{position:relative;width:100%;max-width:420px;margin:auto;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 32px 30px;backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);transform-style:preserve-3d;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 40px 100px rgba(0,0,0,.85),0 0 80px rgba(37,99,235,.08);animation:slideUp 1s cubic-bezier(.16,1,.3,1) both;overflow:hidden;}
@keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Spinning conic border on hover */
.card-border-wrap {position:absolute;inset:-1px;border-radius:25px;overflow:hidden;z-index:-2;}
.card-border {position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from var(--a,0deg),transparent 20%,rgba(59,130,246,.7) 40%,rgba(6,182,212,.5) 50%,transparent 60%);animation:spin-border 4s linear infinite;}
@keyframes spin-border {100%{transform:rotate(360deg)}}
.card::after{content:'';position:absolute;inset:1px;border-radius:23px;background:var(--card);z-index:-1}

/* Interactive Glare */
.glare{position:absolute;inset:0;border-radius:24px;background:radial-gradient(500px circle at var(--mx,50%) var(--my,50%),rgba(59,130,246,.07),transparent 55%);pointer-events:none;z-index:5;mix-blend-mode:overlay}

/* HEADER */
.flogo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
.gem{width:34px;height:34px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.82rem;color:#fff;box-shadow:0 4px 20px rgba(37,99,235,.55);position:relative}
.gem::after{content:'';position:absolute;inset:0;border-radius:9px;box-shadow:0 0 40px rgba(59,130,246,.6);animation:pulse 2s infinite alternate}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.lname{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.12em;line-height:1;background:linear-gradient(to right,#fff,#94a3b8);-webkit-background-clip:text;color:transparent}
.ltag{font-size:.55rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan);display:block;margin-top:2px}

.ftitle{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;line-height:1;margin-bottom:6px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.2)}
.fsub{text-align:center;font-size:.8rem;font-weight:300;color:var(--muted);margin-bottom:12px}

/* ── MULTI-STEP WIZARD STYLES ── */
.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 30px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; transition: background 0.4s; }
.step-dot.active { background: var(--cyan); box-shadow: 0 0 8px rgba(6,182,212,0.5); }

.form-window { overflow: hidden; width: 100%; position: relative; }
.form-track { display: flex; width: 200%; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
.step-pane { width: 50%; padding: 0 4px; flex-shrink: 0; }

/* FIELDS */
.f{margin-bottom:14px;position:relative;z-index:10}
.fl{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(148,163,184,.5);display:flex;justify-content:space-between;margin-bottom:6px;padding-left:4px;transition:color .3s}
.f:focus-within .fl{color:var(--cyan)}

.iw{position:relative;display:flex;align-items:center}
.ic{position:absolute;left:16px;font-size:.85rem;color:rgba(148,163,184,.28);transition:color .3s,transform .3s;pointer-events:none}
.f:focus-within .ic{color:var(--cyan);transform:scale(1.1) translateY(-1px)}
.icr{position:absolute;right:16px;left:auto;cursor:pointer;pointer-events:all;padding:10px}

input,select{width:100%;height:46px;background:rgba(12,18,34,.65);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:0 42px;font-size:.9rem;font-family:'Cabinet Grotesk',sans-serif;color:var(--ink);outline:none;transition:all .3s ease;-webkit-appearance:none}
select{cursor:pointer}
select option{background:#070a12;color:#f8fafc}
input::placeholder{color:rgba(148,163,184,.22);font-weight:300}
input:focus,select:focus{border-color:rgba(59,130,246,.5);background:rgba(17,27,52,.75);box-shadow:0 0 0 3px rgba(37,99,235,.1), inset 0 1px 0 rgba(255,255,255,.05)}

/* Signup specific input layout */
.pr{display:flex;gap:8px}
.cw{flex-shrink:0;position:relative}
.cw select{width:90px;padding:0 6px 0 12px;font-size:.8rem;pointer-events:none;color:var(--ink);background:rgba(12,18,34,.8)} 
.sw::after{content:'\f107';font-family:'Font Awesome 6 Free';font-weight:900;position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(148,163,184,.3);font-size:.7rem;pointer-events:none}
.sw{position:relative}
.sw select{padding-right:38px}

.str{display:flex;gap:4px;margin-top:6px}
.sg{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.05);transition:background .4s,box-shadow .4s}
.err{font-size:.65rem;color:#f87171;padding-left:4px;margin-top:4px;display:none;animation:fi .2s ease}

/* BUTTONS */
.btn-row { display: flex; gap: 10px; margin-top: 20px; z-index: 10; position: relative; }
.btn{position:relative;flex:1;height:50px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e40af,#2563eb,#3b82f6);font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.15em;color:#fff;cursor:pointer;overflow:hidden;transition:transform .1s,box-shadow .3s;box-shadow:0 6px 28px rgba(37,99,235,.45),0 0 0 1px rgba(96,165,250,.18)}
.btn.secondary { background: rgba(255,255,255,0.05); box-shadow: 0 0 0 1px rgba(255,255,255,0.1); color: var(--muted); flex: 0.4; }
.btn.secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
.btxt{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.btn.secondary .btxt { text-shadow: none; }
.btn:hover:not(.secondary){box-shadow:0 12px 40px rgba(37,99,235,.65),0 0 0 1px rgba(96,165,250,.3)}
.btn:active{transform:scale(0.96)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:scale(1);}

.lr{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted);font-weight:300;position:relative;z-index:10}
.lr a{color:var(--glow);font-weight:700;text-decoration:none;position:relative;padding:8px 4px}
.lr a::after{content:'';position:absolute;bottom:4px;left:0;right:0;height:2px;background:var(--glow);transform:scaleX(0);transform-origin:right;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.lr a:hover::after{transform:scaleX(1);transform-origin:left}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(18px);background:rgba(8,12,24,.96);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(24px);border-radius:100px;padding:12px 26px;font-size:.8rem;font-weight:600;color:var(--ink);opacity:0;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(16,185,129,.35);color:#34d399}
#toast.bad{border-color:rgba(239,68,68,.35);color:#f87171}

/* MOBILE FIXES & CANVAS KILL-SWITCH */
@media (max-width: 768px) {
  #cur, #cur-ring, #c { display: none !important; } /* Canvas totally hidden on mobile */
  body { cursor: auto; }
  .card { padding: 28px 20px 24px; border-radius: 20px; }
  .ftitle { font-size: 1.8rem; margin-bottom: 2px; }
  .fsub { font-size: 0.75rem; margin-bottom: 16px; }
  input, select { font-size: 16px !important; height: 44px; } /* Prevents iOS Zoom */
  .f { margin-bottom: 12px; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scan"></div>
<div class="grain"></div>
<div id="cur"></div>
<div id="cur-ring"></div>
<div id="toast"></div>

<div class="layout">
  <div class="card" id="card">
    <div class="card-border-wrap"><div class="card-border"></div></div>
    <div class="glare" id="glare"></div>

    <div class="flogo">
      <div class="gem"><i class="fa-solid fa-graduation-cap"></i></div>
      <div><div class="lname">RENANCE CBT</div><span class="ltag">learning never ends</span></div>
    </div>
    
    <div class="ftitle" id="glitch-text" data-value="CREATE ACCOUNT">CREATE ACCOUNT</div>
    <div class="fsub">Join the FUTA CBT simulation platform.</div>

    <div class="step-indicator">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
    </div>

    <form id="sf" novalidate>
      <div class="form-window">
        <div class="form-track" id="formTrack">
          
          <div class="step-pane">
            <div class="f">
              <label class="fl">Full Name</label>
              <div class="iw"><i class="fa-solid fa-user ic"></i><input type="text" id="fullname" placeholder="Bamidele Joseph" required></div>
              <div class="err" id="e-name">Enter your full name</div>
            </div>

            <div class="f">
              <label class="fl">Email Address</label>
              <div class="iw"><i class="fa-solid fa-envelope ic"></i><input type="email" id="email" placeholder="student@futa.edu.ng" required></div>
              <div class="err" id="e-email">Enter a valid email</div>
            </div>

            <div class="f">
              <label class="fl">Password</label>
              <div class="iw">
                <i class="fa-solid fa-lock ic"></i>
                <input type="password" id="password" placeholder="Min 8 characters" required>
                <i class="fa-solid fa-eye ic icr" id="togPw"></i>
              </div>
              <div class="str"><div class="sg" id="s1"></div><div class="sg" id="s2"></div><div class="sg" id="s3"></div><div class="sg" id="s4"></div></div>
              <div class="err" id="e-pw">Minimum 8 characters</div>
            </div>

            <div class="btn-row">
              <button type="button" class="btn" id="nextBtn">
                <span class="btxt">NEXT STEP <i class="fa-solid fa-arrow-right"></i></span>
              </button>
            </div>
          </div>

          <div class="step-pane">
            <div class="f">
              <label class="fl">Phone Number</label>
              <div class="pr">
                <div class="cw"><select id="code" tabindex="-1"><option value="+234">+234 🇳🇬</option></select></div>
                <div class="iw" style="flex:1"><i class="fa-solid fa-mobile-screen-button ic" style="left:10px"></i><input type="tel" id="phone" placeholder="08012345678" style="padding-left:32px"></div>
              </div>
              <div class="err" id="e-phone">Enter a valid number</div>
            </div>

            <div class="f">
              <label class="fl">Faculty / School</label>
              <div class="sw">
                <select id="faculty" required>
                  <option value="" disabled selected>Select your faculty</option>
                  <option value="SOC">School of Computing (SOC)</option>
                  <option value="SLIT">School of Logistics & Innovation Tech</option>
                  <option value="SPS">School of Physical Sciences</option>
                  <option value="SESE">School of Electrical Systems Eng</option>
                  <option value="SIMME">School of Infrastructure & Mfg</option>
                  <option value="SET">School of Environmental Tech</option>
                  <option value="SAAT">School of Agric & Agric Tech</option>
                  <option value="SEMS">School of Earth & Mineral Sci</option>
                  <option value="SLS">School of Life Sciences</option>
                  <option value="CHS">College of Health Sciences</option>
                  <option value="GNS">General Studies</option>
                </select>
              </div>
              <div class="err" id="e-fac">Select your faculty</div>
            </div>

            <div class="f">
              <label class="fl">Department</label>
              <div class="sw"><select id="dept" required><option value="" disabled selected>Select faculty first</option></select></div>
              <div class="err" id="e-dept">Select your department</div>
            </div>

            <div class="btn-row">
              <button type="button" class="btn secondary" id="backBtn">
                <span class="btxt"><i class="fa-solid fa-arrow-left"></i></span>
              </button>
              <button type="submit" class="btn" id="subBtn">
                <span class="btxt"><i class="fa-solid fa-user-plus"></i> REGISTER</span>
              </button>
            </div>
          </div>

        </div>
      </div>
    </form>

    <div class="lr">Already have an account? <a href="login.html">Sign in here</a></div>
  </div>
</div>

<script>
/* ── SUPABASE INITIALIZATION ── */
const SUPABASE_URL = 'https://ubxsywaxdvkhiqepcvmq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVieHN5d2F4ZHZraGlxZXBjdm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5ODcwMDAsImV4cCI6MjA4NzU2MzAwMH0.gkR3Aud3LRLNyNwpDHJTT0vIrWCnQkSBkFSaFjQ5qy4';
if (!window._sb) window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const db = window._sb;

/* ── TOAST NOTIFICATION ── */
function toast(m, t=''){
  const el = document.getElementById('toast');
  el.textContent = m;
  el.className = 'show ' + t;
  clearTimeout(el._);
  el._ = setTimeout(() => el.className = '', 4000);
}

/* ── MULTI-STEP WIZARD LOGIC ── */
const track = document.getElementById('formTrack');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');

function se(id,show){
  const el=document.getElementById('e-'+id);
  if(el)el.style.display=show?'block':'none';
}

document.getElementById('nextBtn').addEventListener('click', () => {
  let ok = true;
  const fn = document.getElementById('fullname').value.trim();
  const em = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  
  if(!fn){se('name',1);ok=false} else {se('name',0)}
  if(!re.test(em)){se('email',1);ok=false} else {se('email',0)}
  if(pw.length<8){se('pw',1);ok=false} else {se('pw',0)}

  if(ok) {
    track.style.transform = 'translateX(-50%)';
    dot1.classList.remove('active');
    dot2.classList.add('active');
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  track.style.transform = 'translateX(0)';
  dot2.classList.remove('active');
  dot1.classList.add('active');
});

/* ── FACULTY & DEPARTMENTS LOGIC (EXPANDED JSON) ── */
const depts = {
  SOC: [
    'Software Engineering (SEN)',
    'Computer Science (CSC)',
    'Cybersecurity (CYS)',
    'Data Science (DSC)',
    'Information Systems (IFS)',
    'Information Technology (IFT)'
  ],
  SLIT: [
    'Financial Technology (FinTech)',
    'Business Information Technology (BIT)',
    'Entrepreneurship Management Technology (EMT)',
    'Logistics and Transport Technology (LTT)',
    'Maritime Technology and Logistics (MTL)',
    'Project Management Technology (PMT)',
    'Securities and Investment Management Technology (SIMT)',
    'Supply Chain Management (SCM)'
  ],
  SPS: [
    'Educational Technology (EDT)',
    'Library and Information Science (LIS)',
    'Physics (PHY)',
    'Mathematics (MTH)',
    'Chemistry (CHE)',
    'Statistics (STA)'
  ],
  SESE: [
    'Computer Engineering (CPE)',
    'Electrical and Electronics Engineering (EEE)',
    'Information and Communication Engineering (ICE)',
    'Mechatronics Engineering (MCE)',
    'Biomedical Engineering (BME)'
  ],
  SIMME: [
    'Mechanical Engineering (MEE)',
    'Civil and Environmental Engineering (CVE)',
    'Agricultural Engineering (AGE)',
    'Chemical Engineering (CHE)',
    'Industrial and Production Engineering (IPE)',
    'Metallurgical and Materials Engineering (MME)',
    'Mining Engineering (MNE)'
  ],
  SET: [
    'Architecture (ARC)',
    'Building (BDG)',
    'Environmental Management (EVM)',
    'Estate Management (ESM)',
    'Industrial Design (IDD)',
    'Quantity Surveying (QSV)',
    'Surveying and Geoinformatics (SVG)',
    'Urban and Regional Planning (URP)'
  ],
  SAAT: [
    'Agricultural and Resource Economics (ARE)',
    'Agricultural Extension and Communication Technology (AEC)',
    'Animal Production and Health (APH)',
    'Crop, Soil and Pest Management (CSP)',
    'Ecotourism and Wildlife Management (EWM)',
    'Fisheries and Aquaculture Technology (FAT)',
    'Food Science and Technology (FST)',
    'Forestry and Wood Technology (FWT)',
    'Nutrition and Dietetics (NUD)'
  ],
  SEMS: [
    'Applied Geology (AGY)',
    'Applied Geophysics (AGP)',
    'Marine Science and Technology (MST)',
    'Meteorology and Climate Science (MET)',
    'Remote Sensing and Geoscience Information Systems (RSG)'
  ],
  SLS: [
    'Biochemistry (BCH)',
    'Biology (BIO)',
    'Biotechnology (BTH)',
    'Microbiology (MCB)'
  ],
  CHS: [
    'Medicine and Surgery (MBBS)',
    'Nursing Science (NSC)',
    'Human Anatomy (ANA)',
    'Physiology (PHS)',
    'Medical Laboratory Science (MLS)',
    'Public Health (PUH)'
  ],
  GNS: [
    'General Studies (GNS)'
  ]
};

document.getElementById('faculty').addEventListener('change',function(){
  const s = document.getElementById('dept');
  s.innerHTML = '<option value="" disabled selected>Select department</option>';
  const selectedFaculty = this.value;
  
  if (depts[selectedFaculty]) {
    depts[selectedFaculty].forEach(d => {
      const o = document.createElement('option');
      o.value = d;
      o.textContent = d;
      s.appendChild(o);
    });
  }
  se('fac', false);
});

/* ── SUPABASE FORM SUBMISSION ── */
document.getElementById('sf').addEventListener('submit', async function(e){
  e.preventDefault();
  let ok = true;
  
  const fn = document.getElementById('fullname').value.trim();
  const em = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const cd = document.getElementById('code').value;
  const phNum = document.getElementById('phone').value.trim();
  const ph = cd + phNum;
  const fa = document.getElementById('faculty').value;
  const de = document.getElementById('dept').value;
  
  if(phNum.length < 7){se('phone',1);ok=false} else {se('phone',0)}
  if(!fa){se('fac',1);ok=false} else {se('fac',0)}
  if(!de){se('dept',1);ok=false} else {se('dept',0)}

  if(ok) {
    const btn = document.getElementById('subBtn');
    const btxt = btn.querySelector('.btxt');
    
    btn.disabled = true;
    btxt.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> CREATING...';
    
    try {
      const { data: authData, error: authError } = await db.auth.signUp({
        email: em,
        password: pw
      });
      if (authError) throw authError;
      
      const uid = authData.user?.id;
      if (uid) {
        const { error: dbError } = await db.from('students').insert([{
          id: uid, fullname: fn, email: em, faculty: fa, department: de, phone: ph
        }]);
        if (dbError) throw dbError;
      }
      
      btxt.innerHTML = '<i class="fa-solid fa-check"></i> SUCCESS';
      btn.style.background = '#10b981';
      btn.style.boxShadow = '0 0 30px rgba(16,185,129,0.5)';
      
      toast('🎉 Account created! Redirecting to login...', 'ok');
      setTimeout(() => window.location.href = 'login.html', 2000);
      
    } catch (err) {
      console.error(err);
      toast('❌ ' + (err.message || 'Something went wrong. Please try again.'), 'bad');
      btn.disabled = false;
      btxt.innerHTML = '<i class="fa-solid fa-user-plus"></i> REGISTER';
    }
  }
});

/* ── CANVAS FLUID BLOBS + NEON TRAIL (DESKTOP ONLY) ── */
const cv=document.getElementById('c');
const ct=cv.getContext('2d');
let W,H;
function rs(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
rs();window.addEventListener('resize',rs);

// Total Kill-Switch for Mobile CPU
let isAnimating = window.innerWidth > 768;
window.addEventListener('resize', () => {
  rs();
  const wasAnimating = isAnimating;
  isAnimating = window.innerWidth > 768;
  if (!wasAnimating && isAnimating) loop(); 
});

const blobs=Array.from({length:7},(_,i)=>({
  x:Math.random()*W,y:Math.random()*H,
  vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,
  r:160+Math.random()*200,
  ph:Math.random()*Math.PI*2,
  sp:.0025+Math.random()*.004
}));

let mx=W/2,my=H/2;
const trail=[];

function updateTrail(x, y) {
  mx=x; my=y;
  trail.push({x:x,y:y});
  if(trail.length>24)trail.shift();
}

window.addEventListener('mousemove',e=>updateTrail(e.clientX, e.clientY));

let fr=0;
function loop(){
  if (!isAnimating) return; // Hard stop if on mobile
  
  fr++;
  ct.clearRect(0,0,W,H);

  // blobs
  blobs.forEach((b,i)=>{
    b.x+=b.vx+Math.sin(fr*b.sp+b.ph)*.35;
    b.y+=b.vy+Math.cos(fr*b.sp+b.ph*1.4)*.28;
    if(b.x<-b.r)b.x=W+b.r;if(b.x>W+b.r)b.x=-b.r;
    if(b.y<-b.r)b.y=H+b.r;if(b.y>H+b.r)b.y=-b.r;
    const dx=b.x-mx,dy=b.y-my,d=Math.sqrt(dx*dx+dy*dy);
    if(d<280){b.x+=(dx/d)*.7;b.y+=(dy/d)*.7}
    const pr=b.r+Math.sin(fr*.0008+b.ph)*28;
    const hue=i%2===0?'210,100%,55%':'195,90%,50%';
    const alpha=i<3?.055:.035;
    const g=ct.createRadialGradient(b.x,b.y,0,b.x,b.y,pr);
    g.addColorStop(0,`hsla(${hue},${alpha})`);
    g.addColorStop(.6,`hsla(${hue},${alpha*.3})`);
    g.addColorStop(1,'transparent');
    ct.beginPath();ct.arc(b.x,b.y,pr,0,Math.PI*2);
    ct.fillStyle=g;ct.fill();
  });

  // inter-blob lines
  for(let i=0;i<blobs.length;i++)for(let j=i+1;j<blobs.length;j++){
    const dx=blobs[i].x-blobs[j].x,dy=blobs[i].y-blobs[j].y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<380){
      ct.beginPath();ct.moveTo(blobs[i].x,blobs[i].y);ct.lineTo(blobs[j].x,blobs[j].y);
      ct.strokeStyle=`rgba(59,130,246,${(1-d/380)*.028})`;ct.lineWidth=1;ct.stroke();
    }
  }

  // cursor neon trail
  if(trail.length>1){
    for(let i=1;i<trail.length;i++){
      const a=i/trail.length;
      ct.beginPath();ct.moveTo(trail[i-1].x,trail[i-1].y);ct.lineTo(trail[i].x,trail[i].y);
      ct.strokeStyle=`rgba(59,130,246,${a*.22})`;ct.lineWidth=a*2.5;ct.lineCap='round';ct.stroke();
    }
    if(trail.length){
      const tip=trail[trail.length-1];
      const tg=ct.createRadialGradient(tip.x,tip.y,0,tip.x,tip.y,18);
      tg.addColorStop(0,'rgba(59,130,246,.35)');tg.addColorStop(1,'transparent');
      ct.beginPath();ct.arc(tip.x,tip.y,18,0,Math.PI*2);ct.fillStyle=tg;ct.fill();
    }
  }

  requestAnimationFrame(loop);
}
if (isAnimating) loop(); // Start the loop ONLY if on desktop

/* ── UTILITIES ── */
document.getElementById('togPw').addEventListener('click',function(e){
  e.preventDefault(); 
  const p=document.getElementById('password'),t=p.type==='text';
  p.type=t?'password':'text';
  this.classList.toggle('fa-eye',t); this.classList.toggle('fa-eye-slash',!t);
});

document.getElementById('password').addEventListener('input',function(){
  const v=this.value;let s=0;
  if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const c=['#ef4444','#f59e0b','#10b981','#3b82f6'],g=['rgba(239,68,68,.4)','rgba(245,158,11,.4)','rgba(16,185,129,.4)','rgba(59,130,246,.4)'];
  [1,2,3,4].forEach(i=>{
    const sg=document.getElementById('s'+i);
    if(i<=s){sg.style.background=c[s-1];sg.style.boxShadow=`0 0 6px ${g[s-1]}`}
    else{sg.style.background='rgba(255,255,255,.05)';sg.style.boxShadow='none'}
  });
});

/* CUSTOM CURSOR UPDATE (Desktop Only) */
const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
let rx=0,ry=0;
window.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
});
(function animateRing(){
  if(isAnimating) {
    rx+=(mx-rx)*0.15; ry+=(my-ry)*0.15;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
  }
  requestAnimationFrame(animateRing);
})();
document.querySelectorAll('input,select,button,a,.icr').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    ring.style.width='50px'; ring.style.height='50px'; 
    ring.style.borderColor='rgba(59,130,246,0.8)';
  });
  el.addEventListener('mouseleave',()=>{
    ring.style.width='36px'; ring.style.height='36px'; 
    ring.style.borderColor='rgba(6,182,212,0.6)';
  });
});

/* 3D TILT & GLARE EFFECT (Desktop Only) */
const card=document.getElementById('card'), glare=document.getElementById('glare');
card.addEventListener('mousemove',e=>{
  if (!isAnimating) return;
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left; const y = e.clientY - rect.top;
  const cx = rect.width/2; const cy = rect.height/2;
  const rotateX = ((y - cy) / cy) * -5; 
  const rotateY = ((x - cx) / cx) * 5;
  
  card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  glare.style.setProperty('--mx', (x/rect.width*100)+'%');
  glare.style.setProperty('--my', (y/rect.height*100)+'%');
});
card.addEventListener('mouseleave',()=>{
  if (!isAnimating) return;
  card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
  card.style.transition = 'transform 0.5s ease';
  setTimeout(()=>card.style.transition='', 500);
});
</script>
