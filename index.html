<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="rust.css">
    <title>Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <form id="signupForm">
            <h1>Signup</h1>
            
            <div class="input-box">
                <input type="text" name="fullname" id="fullname" placeholder="Full Name" required>
                <i class="fa-solid fa-user-tag"></i>
            </div>

            <div class="input-box">
                <input type="text" name="matric" id="matric" placeholder="Matric No. (ABC/25/1234)" required pattern="[A-Z]{3}/[0-9]{2}/[0-9]{4}">
                <i class="fa-solid fa-user"></i>
            </div>
            
            <div class="input-box">
                <input type="password" name="password" id="password" placeholder="Password" required/>
                <i class="fa-solid fa-eye" id="togglePassword" style="cursor: pointer;"></i>
            </div>

            <div class="input-box" style="display: flex; align-items: center; border: 2px solid rgba(255, 255, 255, .2); border-radius: 40px; padding: 0 20px; background: transparent;">
                <select name="countryCode" id="countryCode" style="background: transparent; color: #fff; border: none; outline: none; font-size: 16px; cursor: pointer;">
                    <option value="+234" style="color: black;">+234 (NG)</option>
                    <option value="+233" style="color: black;">+233 (GH)</option>
                    <option value="+1" style="color: black;">+1 (US)</option>
                </select>
                <span style="color: rgba(255, 255, 255, .3); margin: 0 10px;">|</span>
                <input type="tel" name="phone" id="phone" placeholder="Phone No." required 
                       style="background: transparent; border: none; outline: none; color: #fff; width: 100%; height: 50px; font-size: 16px;">
                <i class="fa-solid fa-mobile-screen-button"></i>
            </div>
    
            <div class="input-box">
                <input type="email" name="email" id="email" placeholder="Email" required>
                <i class="fa-solid fa-paper-plane"></i>
            </div>

            <div class="input-box">
                <input type="text" name="department" id="dep" placeholder="Department" required>
                <i class="fa-solid fa-building"></i>
            </div>

            <button type="submit" class="btn" id="submitBtn">Register</button>

            <div class="register-link">
                <p>Already have an account? <a href="login.html"><strong>Login</strong></a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        
        const SUPABASE_URL = 'https://ubxsywaxdvkhiqepcvmq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVieHN5d2F4ZHZraGlxZXBjdm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5ODcwMDAsImV4cCI6MjA4NzU2MzAwMH0.gkR3Aud3LRLNyNwpDHJTT0vIrWCnQkSBkFSaFjQ5qy4';
        if (!window._sb) window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const db = window._sb;

        
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pass = document.getElementById('password');
            if (pass.type === 'password') {
                pass.type = 'text';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                pass.type = 'password';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });

        
        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Processing... ⏳";
            submitBtn.disabled = true;

            const fullname    = document.getElementById('fullname').value.trim();
            const matric      = document.getElementById('matric').value.trim();
            const password    = document.getElementById('password').value;
            const email       = document.getElementById('email').value.trim();
            const department  = document.getElementById('dep').value.trim();
            const countryCode = document.getElementById('countryCode').value;
            const phone       = countryCode + document.getElementById('phone').value.trim();

            try {
                
                const { data: authData, error: authError } = await db.auth.signUp({
                    email: email,
                    password: password,
                });

                if (authError) throw authError;

                
                const userId = authData.user ? authData.user.id : null;

                if (userId) {
                    
                    const { error: dbError } = await db
                        .from('students')
                        .insert([{
                            id: userId,
                            fullname: fullname,
                            matric: matric,
                            email: email,
                            department: department,
                            phone: phone
                        }]);

                    if (dbError) throw dbError;
                }

                
                alert('Registration Successful! 🎉');
                window.location.href = 'login.html';

            } catch (err) {
                console.error("Signup Error:", err);
                alert('Signup Failed ❌\n\n' + (err.message || "Unknown error. Open browser console (F12) for details."));
                submitBtn.innerText = "Register";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
