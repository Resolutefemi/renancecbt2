<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="rust.css">
    <title>Signup</title>
    <link rel="" href="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <form id="signupForm">
            <h1>Signup</h1>
            
            <div class="input-box">
                <input type="text" name="fullname" id="fullname" placeholder="Full Name" required>
                <i class="fa-solid fa-user-tag"></i>
            </div>

            <div class="input-box">
                <input type="text" name="matric" id="matric" placeholder="Matric No. (ABC/25/1234)" required pattern="[A-Z]{3}/[0-9]{2}/[0-9]{4}">
                <i class="fa-solid fa-user"></i>
            </div>
            
            <div class="input-box">
                <input type="password" name="password" id="password" placeholder="Password" required/>
                <i class="fa-solid fa-eye" id="togglePassword" style="margin-left: -30px; cursor: pointer;"></i>
            </div>

            <div class="input-box" style="display: flex; align-items: center; border: 2px solid rgba(255, 255, 255, .2); border-radius: 40px; padding: 0 20px; background: transparent;">
                <select name="countryCode" id="countryCode" style="background: transparent; color: #fff; border: none; outline: none; font-size: 16px; cursor: pointer;">
                    <option value="+234" style="color: black;">+234 (NG)</option>
                    <option value="+233" style="color: black;">+233 (GH)</option>
                    <option value="+1" style="color: black;">+1 (US)</option>
                </select>
                <span style="color: rgba(255, 255, 255, .3); margin: 0 10px;">|</span>
                <input type="tel" name="phone" id="phone" placeholder="Phone No." required 
                       style="background: transparent; border: none; outline: none; color: #fff; width: 100%; height: 50px; font-size: 16px;">
                <i class="fa-solid fa-mobile-screen-button"></i>
            </div>
    
            <div class="input-box">
                <input type="email" name="email" id="email" placeholder="Email" required>
                <i class="fa-solid fa-paper-plane"></i>
            </div>

            <div class="input-box">
                <input type="text" name="department" id="dep" placeholder="Department" required>
                <i class="fa-solid fa-building"></i>
            </div>

            <button type="submit" class="btn" id="submitBtn">Register</button>

            <div class="register-link">
                <p>Already have an account? <a href="login.html"><strong>Login</strong></a></p>
            </div>
        </form>
    </div>

    <script>
        // Toggle Password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pass = document.getElementById('password');
            pass.type = pass.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Saving Account...";
            submitBtn.disabled = true;

            const formData = new FormData(this);
            const userData = Object.fromEntries(formData.entries());

            // 1. SAVE LOCALLY (For Dashboard sync)
            localStorage.setItem('studentName', userData.fullname);
            localStorage.setItem('studentDept', userData.department);
            localStorage.setItem('user', JSON.stringify(userData));

            // 2. GOOGLE SHEETS BACKEND
            const googleScriptURL = "https://script.google.com/macros/s/AKfycbzi_gmAaK5O5qFQVKeNXkuBLHfO15flL443EmrR5q0eSl9oajuOPbpsYuEPJSxwWwIy/exec";

            fetch(googleScriptURL, {
                method: "POST",
                mode: "no-cors", // Required for Google Scripts
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: userData.fullname,
                    matric: userData.matric,
                    dept: userData.department,
                    password: userData.password,
                    phone: userData.countryCode + userData.phone,
                    email: userData.email
                })
            })
            .then(() => {
                alert('Registration Successful!');
                window.location.href = 'login.html';
            })
            .catch(err => {
                console.error("Error:", err);
                alert("Storage error. Please try again.");
                submitBtn.innerText = "Register";
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
