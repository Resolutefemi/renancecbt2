<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Unavailable | FUTA Practice Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #60a5fa;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        .content { text-align: center; padding: 2rem; max-width: 500px; }
        
        .icon-circle {
            width: 80px; height: 80px; background: rgba(96, 165, 250, 0.1);
            color: var(--accent); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; margin: 0 auto 2rem;
            border: 1px solid var(--border);
        }

        h1 { font-size: 2rem; margin-bottom: 1rem; letter-spacing: -1px; }
        p { color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            padding: 12px 24px; border-radius: 12px; font-weight: 600;
            text-decoration: none; cursor: pointer; transition: 0.3s;
            font-size: 0.95rem; border: none;
        }

        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        .badge {
            display: inline-block; padding: 4px 12px; background: rgba(245, 158, 11, 0.1);
            color: #f59e0b; border-radius: 20px; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="icon-circle">
            <i data-lucide="construction" size="40"></i>
        </div>
        
        <span class="badge">Under Development</span>
        <h1>Module Coming Soon</h1>
        <p>
            We are currently compiling the latest FUTA past questions and optimizing the CBT interface for this course. Check back shortly!
        </p>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="notifyMe()">Notify Me When Ready</button>
            <a href="dashboard.html" class="btn btn-outline">Return to Dashboard</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function notifyMe() {
            alert("We've noted your interest! You'll receive an alert once this course is live.");
        }
    </script>
</body>
</html>
