<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE 105 CBT Portal</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0f4c2a;
            --primary-light: #1a7a45;
            --accent: #d4a017;
            --bg: #f5f0e8;
            --card-bg: #fdfaf4;
            --text: #1a1a1a;
            --text-muted: #6b6355;
            --success: #1a7a45;
            --danger: #c0392b;
            --border: rgba(15,76,42,0.12);
            --input-bg: #fff;
            --share-gradient: linear-gradient(135deg, #0f4c2a 0%, #1a7a45 55%, #d4a017 100%);
            --font-main: 'Sora', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        .dark-mode {
            --bg: #0d1f14;
            --card-bg: #142010;
            --text: #eef4ee;
            --text-muted: #8aab8a;
            --border: rgba(100,200,120,0.12);
            --input-bg: #1a2e1c;
            --primary: #2aaa5e;
            --primary-light: #3dcc78;
            --accent: #e8b830;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(15,76,42,0.06) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(212,160,23,0.06) 0%, transparent 50%);
        }

        nav {
            background: var(--card-bg);
            padding: 0.85rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 20px rgba(15,76,42,0.08);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 2px solid var(--accent);
            gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { display: flex; flex-direction: column; }
        .nav-brand .brand-title {
            font-weight: 800; font-size: 1.05rem; color: var(--primary);
            letter-spacing: -0.5px;
        }
        .nav-brand .brand-sub {
            font-size: 0.75rem; font-weight: 600;
            color: var(--accent); letter-spacing: 0.5px;
            font-family: var(--font-mono);
        }

        main { padding: 2rem 5%; max-width: 980px; margin: 0 auto; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 14px; padding: 1rem;
            text-align: center; border: 1.5px solid var(--border);
            box-shadow: 0 2px 12px rgba(15,76,42,0.05);
        }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); font-family: var(--font-mono); }
        .stat-card .stat-lbl { font-size: 0.73rem; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.3px; text-transform: uppercase; }

        /* ── DASHBOARD ── */
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 1rem; }
        .box {
            background: var(--card-bg); padding: 1.6rem 1rem; border-radius: 16px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 10px rgba(15,76,42,0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 28px rgba(15,76,42,0.14); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; line-height: 1.4; }
        .box p { font-size: 0.82rem; color: var(--text-muted); font-family: var(--font-mono); }
        .box-random {
            background: linear-gradient(135deg, #0f4c2a, #1a7a45) !important;
            color: white !important; border: none !important;
        }
        .box-random p { color: rgba(255,255,255,0.75) !important; }
        .box-random h3 { color: white !important; }

        /* ── SETUP SCREEN ── */
        #setup-screen {
            text-align: center; background: var(--card-bg);
            padding: 3rem 2rem; border-radius: 20px;
            border: 1.5px solid var(--border);
            box-shadow: 0 6px 30px rgba(15,76,42,0.08);
        }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 380px; }
        .setup-group label { font-weight: 700; font-size: 0.85rem; color: var(--text); display: block; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .setup-input {
            width: 100%; padding: 11px 14px; border: 2px solid rgba(15,76,42,0.15);
            border-radius: 10px; font-size: 0.95rem; font-family: var(--font-main);
            background: var(--input-bg); color: var(--text); outline: none; transition: border-color 0.2s;
        }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group {
            display: flex; flex-direction: column; gap: 12px; margin-top: 1rem;
            background: rgba(15,76,42,0.04); padding: 14px; border-radius: 12px;
            border: 1px solid var(--border);
        }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 600; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        /* ── QUIZ INTERFACE ── */
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 700; margin-bottom: 16px; padding: 0 2px;
            flex-wrap: wrap; gap: 10px;
        }
        .q-counter { font-size: 0.95rem; color: var(--text); font-family: var(--font-mono); }
        .progress-bar-wrap { width: 100%; height: 5px; background: var(--border); border-radius: 5px; margin-bottom: 16px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 5px; transition: width 0.4s ease; }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer {
            color: var(--danger); background: rgba(192,57,43,0.09);
            padding: 6px 14px; border-radius: 20px; font-size: 0.92rem;
            font-weight: 700; font-family: var(--font-mono);
        }

        .question-card {
            background: var(--card-bg); padding: 2.2rem;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(15,76,42,0.07);
            border: 1.5px solid var(--border);
        }
        #question-text {
            line-height: 1.8; margin-bottom: 1.8rem;
            font-size: 1.07rem; font-weight: 600;
        }

        /* ── FILL IN THE GAP INPUT ── */
        .gap-label {
            font-size: 0.78rem; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px;
        }
        .gap-input-wrap { position: relative; }
        .gap-input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border: 2px solid rgba(15,76,42,0.2);
            border-radius: 12px;
            font-size: 1rem;
            font-family: var(--font-mono);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            letter-spacing: 0.3px;
        }
        .gap-input::placeholder { color: var(--text-muted); font-family: var(--font-main); font-size: 0.92rem; letter-spacing: 0; }
        .gap-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,76,42,0.1); }
        .gap-input.correct { border-color: var(--success) !important; background: rgba(26,122,69,0.07) !important; color: var(--success) !important; font-weight: 700; }
        .gap-input.wrong   { border-color: var(--danger) !important; background: rgba(192,57,43,0.07) !important; color: var(--danger) !important; }
        .gap-input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.95rem; pointer-events: none;
        }

        .check-btn {
            margin-top: 1.3rem;
            padding: 0.85rem 1.8rem;
            border: none; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-family: var(--font-main);
            background: var(--primary); color: white;
            transition: opacity 0.2s, transform 0.2s;
            font-size: 0.95rem;
            display: flex; align-items: center; gap: 8px;
        }
        .check-btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .check-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .feedback-msg {
            margin-top: 1.2rem; padding: 1.2rem 1.4rem;
            border-radius: 12px; font-weight: 600;
            animation: fadeIn 0.3s; line-height: 1.65; font-size: 0.95rem;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn {
            padding: 0.8rem 1.6rem; border: none; border-radius: 10px;
            cursor: pointer; font-weight: 700; font-family: var(--font-main);
            background: var(--primary); color: white;
            transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem;
            display: flex; align-items: center; gap: 8px;
        }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── RESULT MODAL ── */
        .result-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .result-modal-content {
            background: var(--card-bg); padding: 40px 28px; border-radius: 24px;
            width: 100%; max-width: 430px; text-align: center; color: var(--text);
            box-shadow: 0 30px 70px rgba(0,0,0,0.4);
            animation: bounceIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid var(--accent);
        }
        @keyframes bounceIn {
            0%   { opacity: 0; transform: scale(0.78) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .score-display {
            background: rgba(15,76,42,0.06); border: 2px dashed rgba(15,76,42,0.2);
            border-radius: 18px; padding: 18px; margin: 18px 0;
        }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; font-family: var(--font-mono); }
        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); font-family: var(--font-mono); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; font-family: var(--font-main); cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(15,76,42,0.3); }
        .btn-review { background: rgba(15,76,42,0.08); color: var(--primary); border: 1.5px solid rgba(15,76,42,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.4rem; }
            .result-modal-content { padding: 26px 16px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <div class="brand-title"><i class="fa-solid fa-pencil-ruler"></i> CVE 105 Practice Portal</div>
        <div class="brand-sub">by Resolute Femi</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); color:#1a1a1a; display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:rgba(15,76,42,0.15); color:var(--primary); padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <!-- DASHBOARD -->
    <div id="dashboard-wrap">
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" style="display:none;">
        <div style="font-size:2.5rem; margin-bottom:0.5rem;">✏️</div>
        <h2 id="setup-title" style="margin-bottom:0.5rem; color:var(--primary); font-size:1.35rem;"></h2>
        <p style="color:var(--text-muted); font-size:0.88rem; margin-bottom:1.5rem;">Fill-in-the-gap format — type your answers</p>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="20" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group checkbox-group">
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-questions" checked> Shuffle Questions
            </label>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- QUIZ INTERFACE -->
    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Exit Review
                </button>
                <span id="timer">30:00</span>
            </div>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>

        <div class="question-card">
            <h3 id="question-text"></h3>
            <div class="gap-label"><i class="fa-solid fa-keyboard"></i> &nbsp;Your Answer</div>
            <div class="gap-input-wrap">
                <span class="gap-input-icon"><i class="fa-solid fa-pen-nib"></i></span>
                <input type="text" id="gap-input" class="gap-input" placeholder="Type your answer here…" autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <button class="check-btn" id="check-btn" onclick="checkAnswer()">
                <i class="fa-solid fa-check-double"></i> Check Answer
            </button>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <button class="btn" id="next-btn" onclick="move(1)">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<!-- RESULT MODAL -->
<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 14px; font-size:1.5rem;">Outstanding!</h2>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>

        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>

        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()">
                <i class="fa-solid fa-magnifying-glass"></i> Review Answers
            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Dashboard
            </button>
        </div>
    </div>
</div>

    /* ══════════════════════════════════
       STATE
    ══════════════════════════════════ */
    let currentExamData = [], userAnswers = {}, currentIndex = 0;
    let timeRemaining = 0, timerId = null;
    let activeMode = 'practice', isReviewMode = false;
    let examSelectionType = 'random', partNum = 1;

    /* ══════════════════════════════════
       INIT
    ══════════════════════════════════ */
    window.onload = () => {
        initDashboard();
        loadStatsBar();
        if (localStorage.getItem('saved_cve105_exam')) {
            document.getElementById('resume-btn').style.display = 'flex';
        }
        // Allow Enter key to check answer
        document.getElementById('gap-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAnswer();
        });
    };

    async function loadStatsBar() {
        const bar = document.getElementById('stats-bar');
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) return;
            const { data } = await db.from('test_results')
                .select('score').eq('student_id', user.id).eq('course_id', COURSE_CODE);
            if (!data || data.length === 0) return;
            const taken = data.length;
            const avg   = Math.round(data.reduce((s, r) => s + r.score, 0) / taken);
            const best  = Math.max(...data.map(r => r.score));
            bar.innerHTML = `
                <div class="stat-card"><div class="stat-val">${taken}</div><div class="stat-lbl">Tests Taken</div></div>
                <div class="stat-card"><div class="stat-val">${avg}%</div><div class="stat-lbl">Average Score</div></div>
                <div class="stat-card"><div class="stat-val">${best}%</div><div class="stat-lbl">Best Score</div></div>`;
            bar.style.display = 'grid';
        } catch (e) { /* offline */ }
    }

    /* ══════════════════════════════════
       DASHBOARD
    ══════════════════════════════════ */
    function initDashboard() {
        const board = document.getElementById('dashboard');
        board.innerHTML = '';
        const total = MASTER_POOL.length;
        const parts = Math.ceil(total / 50);

        if (total === 0) {
            board.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:3rem 0;">
                No questions loaded yet.<br><span style="font-size:0.85rem;">Paste your CVE 105 question JSON into MASTER_POOL.</span></p>`;
            return;
        }

        const rand = document.createElement('div');
        rand.className = 'box box-random';
        rand.innerHTML = `<div style="font-size:1.9rem;">🔀</div><h3>Random Mode</h3><p>${total} Questions</p>`;
        rand.onclick = () => openSetup('random', 0);
        board.appendChild(rand);

        for (let i = 1; i <= parts; i++) {
            const start = (i - 1) * 50 + 1;
            const end   = Math.min(i * 50, total);
            const card  = document.createElement('div');
            card.className = 'box';
            card.innerHTML = `
                <div style="font-size:1.9rem; color:var(--primary);">📐</div>
                <h3>Part ${i}</h3>
                <p>Q${start} – Q${end}</p>`;
            card.onclick = () => openSetup('part', i);
            board.appendChild(card);
        }
    }

    function openSetup(type, part) {
        examSelectionType = type;
        partNum = part;
        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('setup-title').innerText = type === 'random' ? 'Randomised Practice' : `CVE 105   Part ${part}`;
        document.getElementById('random-settings').style.display = type === 'random' ? 'block' : 'none';
    }

    function goHome() {
        clearInterval(timerId);
        isReviewMode = false;
        currentExamData = []; userAnswers = {}; currentIndex = 0;
        document.getElementById('quiz-interface').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quizResultModal').style.display = 'none';
        document.getElementById('dashboard-wrap').style.display = 'block';
        loadStatsBar();
    }

    /* ══════════════════════════════════
       HELPERS
    ══════════════════════════════════ */
    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    /** Case-insensitive, trimmed answer comparison */
    function isCorrect(userInput, acceptedAnswers) {
        const clean = userInput.trim().toLowerCase();
        return acceptedAnswers.some(a => a.trim().toLowerCase() === clean);
    }

    /* ══════════════════════════════════
       START EXAM
    ══════════════════════════════════ */
    function startExam() {
        timeRemaining = parseInt(document.getElementById('t-limit').value) * 60;
        activeMode    = document.getElementById('quiz-mode').value;
        isReviewMode  = false;
        userAnswers   = {};
        currentIndex  = 0;

        let pool = JSON.parse(JSON.stringify(MASTER_POOL));

        if (examSelectionType === 'random') {
            const qty = Math.min(parseInt(document.getElementById('q-count').value), pool.length);
            pool = shuffleArray(pool).slice(0, qty);
        } else {
            const start = (partNum - 1) * 50;
            pool = pool.slice(start, start + 50);
        }

        if (document.getElementById('shuffle-questions').checked) pool = shuffleArray(pool);

        currentExamData = pool;

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText = currentExamData.length;
        runTimer();
        renderQuestion();
    }

    /* ══════════════════════════════════
       TIMER
    ══════════════════════════════════ */
    function runTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeRemaining--;
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeRemaining <= 0) { clearInterval(timerId); showResults(true); }
        }, 1000);
    }

    /* ══════════════════════════════════
       RENDER QUESTION
    ══════════════════════════════════ */
    function renderQuestion() {
        const q          = currentExamData[currentIndex];
        const hasAnswered = userAnswers.hasOwnProperty(currentIndex);
        const userAns    = userAnswers[currentIndex] || '';
        const correct    = isCorrect(userAns, q.answers);

        // Progress bar
        const pct = ((currentIndex + 1) / currentExamData.length) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('cur-idx').innerText = currentIndex + 1;
        document.getElementById('question-text').innerText = q.question;

        const input    = document.getElementById('gap-input');
        const checkBtn = document.getElementById('check-btn');
        const feedArea = document.getElementById('feedback-area');
        feedArea.innerHTML = '';

        const locked = isReviewMode || (activeMode === 'practice' && hasAnswered);

        input.value    = userAns;
        input.disabled = locked;
        input.className = 'gap-input';
        checkBtn.style.display = locked ? 'none' : 'flex';

        if (locked) {
            if (hasAnswered) {
                if (correct) {
                    input.classList.add('correct');
                    feedArea.innerHTML = `<div class="feedback-msg" style="background:rgba(26,122,69,0.1); color:var(--success); border:1.5px solid rgba(26,122,69,0.25);">
                        ✔ Correct! Well done.</div>`;
                } else {
                    input.classList.add('wrong');
                    feedArea.innerHTML = `<div class="feedback-msg" style="background:rgba(192,57,43,0.09); color:var(--danger); border:1.5px solid rgba(192,57,43,0.2);">
                        ✘ Incorrect. Correct answer: <strong>${q.answers[0]}</strong></div>`;
                }
            } else if (isReviewMode) {
                feedArea.innerHTML = `<div class="feedback-msg" style="background:#fef9c3; color:#854d0e; border:1px solid #fde047;">
                    ⚠ Not answered. Correct: <strong>${q.answers[0]}</strong></div>`;
            }
        } else {
            setTimeout(() => input.focus(), 50);
        }

        const isLast = currentIndex === currentExamData.length - 1;
        document.getElementById('next-btn').style.display          = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display        = isReviewMode ? 'none' : 'flex';
        document.getElementById('finish-review-btn').style.display = isReviewMode ? 'flex' : 'none';
    }

    /* ══════════════════════════════════
       CHECK ANSWER (practice / exam)
    ══════════════════════════════════ */
    function checkAnswer() {
        if (isReviewMode) return;
        const input = document.getElementById('gap-input');
        const val   = input.value.trim();
        if (!val) { input.focus(); return; }
        userAnswers[currentIndex] = val;
        saveState();
        renderQuestion();
    }

    function move(d) {
        // In exam mode, save whatever is typed even without checking
        if (activeMode === 'exam' && !isReviewMode) {
            const val = document.getElementById('gap-input').value.trim();
            if (val) userAnswers[currentIndex] = val;
            saveState();
        }
        const n = currentIndex + d;
        if (n >= 0 && n < currentExamData.length) { currentIndex = n; renderQuestion(); }
    }

    function saveState() {
        localStorage.setItem('saved_cve105_exam', JSON.stringify(
            { currentExamData, userAnswers, currentIndex, timeRemaining, activeMode, examSelectionType, partNum }
        ));
    }

    function resumeExam() {
        const s = JSON.parse(localStorage.getItem('saved_cve105_exam'));
        currentExamData   = s.currentExamData;
        userAnswers       = s.userAnswers;
        currentIndex      = s.currentIndex;
        timeRemaining     = s.timeRemaining;
        activeMode        = s.activeMode || 'practice';
        examSelectionType = s.examSelectionType || 'random';
        partNum           = s.partNum || 1;
        isReviewMode      = false;

        document.getElementById('dashboard-wrap').style.display = 'none';
        document.getElementById('resume-btn').style.display     = 'none';
        document.getElementById('quiz-interface').style.display = 'block';
        document.getElementById('total-idx').innerText          = currentExamData.length;
        runTimer();
        renderQuestion();
    }

    /* ══════════════════════════════════
       SHOW RESULTS
    ══════════════════════════════════ */
    async function showResults(forced = false) {
        // In exam mode, save current typed answer before submitting
        if (activeMode === 'exam' && !isReviewMode) {
            const val = document.getElementById('gap-input').value.trim();
            if (val) userAnswers[currentIndex] = val;
        }

        const answered = Object.keys(userAnswers).length;
        if (!forced && answered < currentExamData.length) {
            if (!confirm(`You answered ${answered} of ${currentExamData.length}. Submit anyway?`)) return;
        }

        clearInterval(timerId);
        localStorage.removeItem('saved_cve105_exam');

        let score = 0;
        currentExamData.forEach((q, i) => {
            if (userAnswers[i] && isCorrect(userAnswers[i], q.answers)) score++;
        });
        const total = currentExamData.length;
        const pct   = Math.round((score / total) * 100);

        document.getElementById('finalScoreText').innerText = pct;
        document.getElementById('modalCorrect').innerText   = score;
        document.getElementById('modalTotal').innerText     = total;
        document.getElementById('modalReviewBtn').style.display = activeMode === 'practice' ? 'none' : 'flex';

        if (pct >= 70) {
            document.getElementById('resultIcon').innerText     = '🏆';
            document.getElementById('resultGreeting').innerText = 'Outstanding! 🌟';
            document.getElementById('resultFeedback').innerText = 'Excellent work! Keep it up!';
            confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
        } else if (pct >= 50) {
            document.getElementById('resultIcon').innerText     = '👍';
            document.getElementById('resultGreeting').innerText = 'Good Job!';
            document.getElementById('resultFeedback').innerText = 'Almost there — aim for 70%+!';
        } else {
            document.getElementById('resultIcon').innerText     = '💪';
            document.getElementById('resultGreeting').innerText = 'Keep Trying!';
            document.getElementById('resultFeedback').innerText = 'Review your notes and try again!';
        }

        document.getElementById('quizResultModal').style.display = 'flex';
        await saveTestScore(pct);
    }

    async function saveTestScore(pct) {
        const el = document.getElementById('save-status');
        el.innerText = '⏳ Saving...';
        try {
            const { data: { user } } = await db.auth.getUser();
            if (!user) { el.innerText = ''; return; }

            const { data: prev } = await db.from('test_results')
                .select('score').eq('student_id', user.id).eq('course_id', COURSE_CODE);

            if (prev && prev.length > 0) {
                const all = [...prev.map(r => r.score), pct];
                const avg = Math.round(all.reduce((a, b) => a + b, 0) / all.length);
                document.getElementById('modalAvg').innerText = avg + '%';
            }

            const { error } = await db.from('test_results').insert([
                { student_id: user.id, course_id: COURSE_CODE, score: pct }
            ]);
            el.innerText = error ? '⚠️ Could not save (offline)' : '✅ Score saved!';
        } catch (e) {
            el.innerText = '⚠️ Offline — score not saved';
        }
    }

    function enterReviewMode() {
        document.getElementById('quizResultModal').style.display = 'none';
        isReviewMode = true;
        currentIndex = 0;
        document.getElementById('timer').innerText         = 'REVIEW';
        document.getElementById('timer').style.background = 'rgba(15,76,42,0.1)';
        document.getElementById('timer').style.color      = 'var(--primary)';
        renderQuestion();
    }

    async function shareQuizResult() {
        const score   = document.getElementById('finalScoreText').innerText;
        const section = examSelectionType === 'random' ? 'a random mix' : `Part ${partNum}`;
        const text    = `I just scored ${score}% on ${COURSE_CODE} (${section})! 🚀\n\nChallenge yourself on the Renance CBT portal! 📚🔥\nhttps://renancecbt1.vercel.app`;
        try {
            if (navigator.share) await navigator.share({ title: `My ${COURSE_CODE} Score`, text, url: 'https://renancecbt1.vercel.app' });
            else { await navigator.clipboard.writeText(text); alert('Score copied to clipboard! 📋'); }
        } catch (_) {}
    }
</script>
