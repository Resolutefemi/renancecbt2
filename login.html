<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENANCE — Sign In</title>
<link rel="shortcut icon" href="logo.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="dist/ui-core.js"></script>
<script type="module" src="dist/login.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg: #000000;
  --blue: #3b82f6;
  --glow: #06b6d4;
  --cyan: #22d3ee;
  --violet: #818cf8;
  --ink: #ffffff;
  --muted: #94a3b8;
  --card: rgba(10, 10, 10, 0.8);
  --border: rgba(255, 255, 255, 0.1);
}
html,body{height:100%;margin:0;overflow:hidden;touch-action:none;background:#000;}
body{font-family:'Outfit',sans-serif;color:var(--ink);cursor:default;overflow:hidden}

/* Performance Mode Styles */
.perf-mode #bg-canvas, .perf-mode .scan, .perf-mode .grain { display: none !important; }

#cur-dot{position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 15px #fff, 0 0 30px var(--cyan);transition:width .2s,height .2s;display:none}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(6,182,212,.6);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .4s cubic-bezier(.16,1,.3,1),height .4s cubic-bezier(.16,1,.3,1),border-color .3s;display:none}
@media (min-width: 1024px) { #cur-dot, #cur-ring { display: block; } body { cursor: none; } }

#bg-canvas{position:fixed;inset:0;z-index:0;opacity: 0.5;}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}
.grain{position:fixed;inset:-100%;z-index:3;width:300%;height:300%;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain-sh .5s steps(1) infinite}
@keyframes grain-sh{0%{transform:translate(0,0)}25%{transform:translate(-3%,-6%)}50%{transform:translate(4%,3%)}75%{transform:translate(-6%,7%)}100%{transform:translate(0,0)}}


.layout{position:relative;z-index:10;display:flex;justify-content:center;align-items:center;height:100vh;padding:20px;overflow-y:auto;scrollbar-width:none}
.layout::-webkit-scrollbar{display:none}


.card{position:relative;width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:42px 36px 36px;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);transform-style:preserve-3d;animation:card-in 1s cubic-bezier(.16,1,.3,1) both;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 40px 100px rgba(0,0,0,.9),0 0 80px rgba(37,99,235,.12)}
@keyframes card-in{from{opacity:0;transform:translateY(50px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}


.card::before{content:'';position:absolute;inset:-1px;border-radius:25px;background:conic-gradient(from var(--a,0deg),transparent 60%,rgba(6,182,212,.8) 80%,rgba(59,130,246,.8) 100%);z-index:-1;animation:spin 4s linear infinite}
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spin{to{--a:360deg}}
.card::after{content:'';position:absolute;inset:1px;border-radius:23px;background:linear-gradient(180deg, rgba(6,9,18,.8), rgba(6,9,18,.95));z-index:-1}


.glare{position:absolute;inset:0;border-radius:24px;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.08),transparent 40%);pointer-events:none;z-index:5;mix-blend-mode:overlay}


.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
.gem{width:46px;height:46px;background:linear-gradient(135deg,#06b6d4,#3b82f6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;box-shadow:0 0 20px rgba(6,182,212,.4), inset 0 2px 0 rgba(255,255,255,.2);position:relative}
.gem::after{content:'';position:absolute;inset:0;border-radius:14px;box-shadow:0 0 40px rgba(59,130,246,.6);animation:pulse 2s infinite alternate}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.12em;line-height:1;background:linear-gradient(to right,#fff,#94a3b8);-webkit-background-clip:text;color:transparent}
.brand-tag{font-size:.65rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan);display:block;margin-top:2px}

.ftitle{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.08em;line-height:1;margin-bottom:8px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.2)}
.fsub{text-align:center;font-size:.85rem;font-weight:300;color:var(--muted);margin-bottom:32px}


.fg{display:flex;flex-direction:column;gap:16px;margin-bottom:12px;position:relative;z-index:10}
.f{position:relative}
.fl{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(148,163,184,.5);display:block;margin-bottom:8px;padding-left:4px;transition:color .3s}
.f:focus-within .fl{color:var(--cyan)}
.iw{position:relative;display:flex;align-items:center}
.ic{position:absolute;left:16px;font-size:.85rem;color:rgba(148,163,184,.3);transition:color .3s,transform .3s;pointer-events:none;z-index:2}
.f:focus-within .ic{color:var(--cyan);transform:scale(1.1) translateY(-1px)}
.icr{position:absolute;right:16px;left:auto;cursor:pointer;pointer-events:all;padding:10px}
.icr:hover{color:#fff}

input{width:100%;height:48px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:0 42px;font-size:.9rem;font-family:'Outfit',sans-serif;font-weight:400;color:var(--ink);outline:none;transition:all .3s ease;-webkit-appearance:none}
input::placeholder{color:rgba(148,163,184,.25);font-weight:300}
input:focus{border-color:rgba(6,182,212,.5);background:rgba(6,182,212,.05);box-shadow:0 0 0 4px rgba(6,182,212,.1), inset 0 0 15px rgba(6,182,212,.05)}


.rf {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  position: relative;
  z-index: 10;
}
.remember-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 300;
  transition: color 0.3s;
}
.remember-wrap:hover { color: var(--ink); }
.remember-wrap input[type=checkbox] { display: none; }
.custom-check {
  width: 22px;
  height: 22px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 6px;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  color: transparent;
  font-size: 0.75rem;
}
.remember-wrap input:checked + .custom-check {
  background: var(--cyan);
  border-color: var(--cyan);
  color: #fff;
  box-shadow: 0 0 15px rgba(6, 182, 212, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
  transform: scale(1.1);
}
.rf a { font-size: 0.85rem; color: var(--muted); text-decoration: none; font-weight: 400; transition: color 0.2s; }
.rf a:hover { color: var(--cyan); text-decoration: underline; }


#msg{display:none;padding:12px 16px;border-radius:10px;font-size:.8rem;font-weight:600;margin-bottom:16px;animation:shake .4s ease-in-out;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#f87171;position:relative;z-index:10}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}


.btn-wrap{position:relative;z-index:10}
.btn{position:relative;width:100%;height:52px;border:none;border-radius:12px;background:linear-gradient(135deg,#0284c7,#06b6d4,#3b82f6);font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.15em;color:#fff;cursor:pointer;overflow:hidden;transition:transform .1s,box-shadow .3s;box-shadow:0 8px 30px rgba(6,182,212,.3),0 0 0 1px rgba(255,255,255,.2);will-change:transform}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent)}
.btxt{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.btn:hover{box-shadow:0 15px 40px rgba(6,182,212,.5),0 0 0 1px rgba(255,255,255,.4)}
.btn:active{transform:scale(0.96)}

.lr{text-align:center;margin-top:24px;font-size:.85rem;color:var(--muted);font-weight:300;position:relative;z-index:10}
.lr a{color:var(--cyan);font-weight:700;text-decoration:none;position:relative;padding:4px}
.lr a::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--cyan);transform:scaleX(0);transform-origin:right;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.lr a:hover::after{transform:scaleX(1);transform-origin:left}


.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{position:relative;background:rgba(8,12,28,.96);border:1px solid rgba(59,130,246,.2);border-radius:24px;padding:40px 32px;width:100%;max-width:400px;animation:modal-in .4s cubic-bezier(.16,1,.3,1);box-shadow:0 40px 80px rgba(0,0,0,.9),0 0 80px rgba(6,182,212,.15)}
@keyframes modal-in{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{position:absolute;top:16px;right:18px;width:32px;height:32px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:transparent;color:rgba(148,163,184,.6);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{border-color:rgba(239,68,68,.5);color:#f87171}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;margin-bottom:8px;color:#fff}
.modal-sub{font-size:.85rem;font-weight:300;color:var(--muted);margin-bottom:24px;line-height:1.6}
#reset-feedback{font-size:.8rem;font-weight:600;padding:12px;border-radius:10px;margin-top:16px;display:none}
#reset-feedback.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399}
#reset-feedback.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#f87171}


#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(8,12,24,.96);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(24px);border-radius:100px;padding:12px 26px;font-size:.8rem;font-weight:600;color:var(--ink);opacity:0;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(16,185,129,.35);color:#34d399}
#toast.bad{border-color:rgba(239,68,68,.35);color:#f87171}


@media(max-width:768px){
  #cur, #cur-ring, #bg-canvas { display: none !important; } 
  body { cursor: auto; }
  .card{padding:32px 24px; border-radius:20px;}
  .ftitle{font-size:1.9rem;}
  input{font-size:16px !important; height:46px;} 
  .f, .rf, .btn-wrap, .lr { opacity:0; animation: mobilePop .6s cubic-bezier(.175,.885,.32,1.275) forwards; }
  .f:nth-child(1){animation-delay:.3s}
  .f:nth-child(2){animation-delay:.4s}
  .rf{animation-delay:.5s}
  .btn-wrap{animation-delay:.6s}
  .lr{animation-delay:.7s}
}
@keyframes mobilePop {
  0% { opacity: 0; transform: translateY(15px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scan"></div>
<div class="grain"></div>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<div id="toast"></div>

<div class="layout">
  <div class="card" id="card">
    <div class="glare" id="glare"></div>

    <div class="brand">
      <div class="gem"><i class="fa-solid fa-graduation-cap"></i></div>
      <div><div class="brand-name">RENANCE CBT</div><span class="brand-tag">Learning Never ends </span></div>
    </div>

    <div class="ftitle" id="glitch-text" data-value="WELCOME BACK">WELCOME BACK</div>
    <div class="fsub">Sign in to continue your CBT practice session</div>

    <div id="msg"></div>

    <form id="loginForm" novalidate>
      <div class="fg">
        <div class="f">
          <label class="fl">Email Address</label>
          <div class="iw">
            <i class="fa-solid fa-envelope ic"></i>
            <input type="email" id="email" placeholder="student@futa.edu.ng" required autocomplete="email">
          </div>
        </div>

        <div class="f">
          <label class="fl">Password</label>
          <div class="iw">
            <i class="fa-solid fa-lock ic"></i>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <i class="fa-solid fa-eye ic icr" id="togPw"></i>
          </div>
        </div>
      </div>

      <div class="rf">
        <label class="remember-wrap">
          <input type="checkbox" id="rememberMe">
          <div class="custom-check"><i class="fa-solid fa-check"></i></div>
          <span>Remember me</span>
        </label>
        <a href="#" id="forgotLink">Forgot password?</a>
      </div>

      <div class="btn-wrap" id="btnWrap">
        <button type="submit" class="btn" id="loginBtn">
          <span class="btxt" id="btxt"><i class="fa-solid fa-bolt"></i>&nbsp;LOGIN</span>
        </button>
      </div>
    </form>

    <div class="lr">New to the portal? <a href="index.html">Create an account</a></div>
  </div>
</div>

<div class="modal-overlay" id="forgotModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-title">RESET PASSWORD</div>
    <div class="modal-sub">Enter your email and we'll send a secure reset link straight to your inbox.</div>
    <div class="f" style="margin-bottom:16px">
      <label class="fl">Email Address</label>
      <div class="iw"><i class="fa-solid fa-envelope ic"></i><input type="email" id="resetEmail" placeholder="student@futa.edu.ng"></div>
    </div>
    <div class="btn-wrap" style="margin-top:0">
      <button class="btn" id="sendResetBtn">
        <span class="btxt" id="resetBtxt"><i class="fa-solid fa-paper-plane"></i>&nbsp; SEND RESET LINK</span>
      </button>
    </div>
    <div id="reset-feedback"></div>
  </div>
</div>

</body>
</html>
