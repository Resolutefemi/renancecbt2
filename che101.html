<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHE 101 CBT Portal</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    

    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea580c;
            --border: rgba(0,0,0,0.07);
            --share-gradient: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #7c3aed 100%);
        }
        .dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; min-height: 100vh; }

        nav {
            background: var(--card-bg);
            padding: 0.9rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100;
            gap: 10px; flex-wrap: wrap;
        }
        .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--primary); }

        main { padding: 2rem 5%; max-width: 960px; margin: 0 auto; }

        
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 12px; padding: 1rem;
            text-align: center; border: 1.5px solid var(--border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .stat-card .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

        
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .box {
            background: var(--card-bg); padding: 1.5rem 1rem; border-radius: 14px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(30,64,175,0.12); }
        .box h3 { margin: 10px 0 4px; font-size: 1rem; line-height: 1.4; }
        .box p { font-size: 0.82rem; color: var(--text-muted); margin: 0; }
        .box-random { background: linear-gradient(135deg, #1e40af, #3b82f6) !important; color: white !important; border: none !important; }
        .box-random p { color: rgba(255,255,255,0.8) !important; }

        
        #setup-screen { text-align: center; background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .setup-group { margin: 1.5rem auto; text-align: left; max-width: 360px; }
        .setup-group label { font-weight: 600; font-size: 0.88rem; color: var(--text); display: block; margin-bottom: 7px; }
        .setup-input { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 9px; font-size: 0.95rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
        .setup-input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 1rem; background: rgba(0,0,0,0.02); padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text); font-weight: 500; user-select: none; }
        .custom-checkbox input { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; }

        
        .quiz-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 15px; padding: 0 4px; flex-wrap: wrap; gap: 10px; }
        .q-counter { font-size: 1rem; color: var(--text); }
        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #timer { color: var(--danger); background: rgba(220,38,38,0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; }

        .question-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1.5px solid var(--border); }
        #question-text { line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; }

        .option-btn {
            display: block; width: 100%; padding: 0.95rem 1.1rem;
            margin: 0.65rem 0; border: 2px solid #e2e8f0; border-radius: 10px;
            background: var(--card-bg); color: var(--text); text-align: left;
            cursor: pointer; font-size: 0.97rem; transition: background 0.15s, border-color 0.15s; line-height: 1.5;
        }
        .option-btn:not(:disabled):hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn.selected { background: #e0f2fe !important; border-color: #3b82f6 !important; color: #0369a1 !important; }
        .option-btn.correct  { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .option-btn.wrong    { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .feedback-msg { margin-top: 1.2rem; padding: 1.2rem; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 1.8rem; }
        .btn { padding: 0.8rem 1.6rem; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; transition: opacity 0.2s, transform 0.2s; font-size: 0.95rem; }
        .btn:hover { opacity: 0.88; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        
        .result-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            backdrop-filter: blur(8px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .result-modal-content {
            background: var(--card-bg); padding: 40px 28px; border-radius: 24px;
            width: 100%; max-width: 420px; text-align: center; color: var(--text);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            animation: bounceIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0%   { opacity: 0; transform: scale(0.78) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon { font-size: 3.6rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .score-display { background: rgba(37,99,235,0.06); border: 2px dashed rgba(37,99,235,0.2); border-radius: 18px; padding: 18px; margin: 18px 0; }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .stats-mini { display: flex; justify-content: center; gap: 24px; margin: 10px 0 4px; }
        .stats-mini .sm { text-align: center; }
        .stats-mini .sm .sv { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stats-mini .sm .sl { font-size: 0.72rem; color: var(--text-muted); }
        #save-status { font-size: 0.78rem; color: var(--text-muted); margin: 8px 0 14px; }
        .result-actions { display: flex; flex-direction: column; gap: 11px; }
        .btn-action { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 9px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-share  { background: var(--share-gradient); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
        .btn-review { background: rgba(30,64,175,0.08); color: var(--primary); border: 1.5px solid rgba(30,64,175,0.2); }
        .btn-home   { background: rgba(100,116,139,0.09); color: var(--text); border: 1.5px solid var(--border); }

        
        @media (max-width: 600px) {
            #dashboard { grid-template-columns: repeat(2, 1fr); }
            .question-card { padding: 1.3rem; }
            .result-modal-content { padding: 28px 18px; }
            .score-big { font-size: 2.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="dist/ui-core.js"></script>
    <script type="module" src="dist/che101.js"></script>
</head>
<body>

<nav>
    <div class="nav-brand">
    <div>CHE 101 Practice Portal</div>
    <div style="font-size:0.9rem; font-weight:600; color:var(--text-muted); letter-spacing:0.3px;">by Resolute Femi</div>
</div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button class="btn" style="background:var(--accent); display:none; padding:7px 14px; font-size:0.85rem;" id="resume-btn" onclick="resumeExam()">
            <i class="fa-solid fa-rotate-right"></i> Resume
        </button>
        <button class="btn" style="background:#64748b; padding:7px 14px;" onclick="document.body.classList.toggle('dark-mode')">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<main>
    <div id="dashboard-wrap">
        <div id="stats-bar" class="stats-bar" style="display:none;"></div>
        <div id="dashboard"></div>
    </div>

    <div id="setup-screen" style="display:none;">
        <h2 id="setup-title" style="margin-bottom:1.8rem; color:var(--primary); font-size:1.3rem;"></h2>

        <div class="setup-group">
            <label>Select Mode:</label>
            <select id="quiz-mode" class="setup-input">
                <option value="practice">Practice Mode (Instant Answers)</option>
                <option value="exam">Exam Mode (Answers at End)</option>
            </select>
        </div>

        <div id="random-settings">
            <div class="setup-group">
                <label>Question Quantity:</label>
                <input type="number" id="q-count" value="50" class="setup-input" min="1" max="999">
            </div>
        </div>

        <div class="setup-group">
            <label>Time Limit (Minutes):</label>
            <input type="number" id="t-limit" value="30" class="setup-input" min="1">
        </div>

        <div class="setup-group checkbox-group">
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-questions" checked> Shuffle Questions
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" id="shuffle-options" checked> Shuffle Options (A, B, C, D)
            </label>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:1.8rem;">
            <button class="btn" style="background:#64748b;" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn" onclick="startExam()" style="min-width:160px;">
                Start Now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="quiz-interface" style="display:none;">
        <div class="quiz-header">
            <span class="q-counter">Question <span id="cur-idx">1</span> / <span id="total-idx">0</span></span>
            <div class="btn-group">
                <button class="btn" id="submit-btn" style="background:var(--success); display:none; padding:8px 15px; font-size:0.87rem;" onclick="showResults()">
                    <i class="fa-solid fa-paper-plane"></i> Submit
                </button>
                <button class="btn" id="finish-review-btn" style="display:none; padding:8px 15px; font-size:0.87rem;" onclick="goHome()">
                    <i class="fa-solid fa-house"></i> Exit Review
                </button>
                <span id="timer">30:00</span>
            </div>
        </div>

        <div class="question-card">
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
            <div id="feedback-area"></div>
        </div>

        <div class="controls">
            <button class="btn" style="background:#64748b;" onclick="move(-1)">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>
            <button class="btn" id="next-btn" onclick="move(1)">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<div id="quizResultModal" class="result-modal-overlay" style="display:none;">
    <div class="result-modal-content">
        <span class="result-icon" id="resultIcon">🏆</span>
        <h2 id="resultGreeting" style="margin:0 0 14px; font-size:1.5rem;">Outstanding!</h2>

        <div class="score-display">
            <div class="score-big"><span id="finalScoreText">0</span>%</div>
            <div class="stats-mini">
                <div class="sm"><div class="sv" id="modalCorrect">0</div><div class="sl">Correct</div></div>
                <div class="sm"><div class="sv" id="modalTotal">0</div><div class="sl">Total</div></div>
                <div class="sm"><div class="sv" id="modalAvg">—</div><div class="sl">Your Avg</div></div>
            </div>
        </div>

        <p id="resultFeedback" style="font-size:0.9rem; color:var(--text-muted); margin:0;"></p>
        <p id="save-status"></p>

        <div class="result-actions">
            <button class="btn-action btn-share" onclick="shareQuizResult()">
                <i class="fa-solid fa-share-nodes"></i> Share Score
            </button>
            <button class="btn-action btn-review" id="modalReviewBtn" onclick="enterReviewMode()">
                <i class="fa-solid fa-magnifying-glass"></i> Review Answers
            </button>
            <button class="btn-action btn-home" onclick="goHome()">
                <i class="fa-solid fa-house"></i> Dashboard
            </button>
        </div>
    </div>
</div>


</body>
</html>
